<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PlayFlow Pro - Smart Explorer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');

        :root {
            --bg-color: #030712;
            --accent: #ef4444;
        }

        body {
            background-color: var(--bg-color);
            font-family: 'Plus Jakarta Sans', sans-serif;
            scroll-behavior: smooth;
        }

        .glass {
            background: rgba(17, 24, 39, 0.7);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .video-card {
            transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
            border: 1px solid rgba(255, 255, 255, 0.03);
            position: relative;
        }

        .video-card:hover {
            transform: translateY(-10px) scale(1.02);
            border-color: rgba(239, 68, 68, 0.3);
            box-shadow: 0 20px 40px -15px rgba(239, 68, 68, 0.15);
        }

        /* Expanding Search Bar Animation */
        #search-box {
            width: 160px;
            transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        #search-box:focus {
            width: 280px;
        }
        @media (max-width: 768px) {
            #search-box:focus { width: 100%; }
        }

        .skeleton {
            background: linear-gradient(90deg, #111827 25%, #1f2937 50%, #111827 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
        }
        @keyframes shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }

        .custom-input {
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
        }
        .custom-input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 4px rgba(239, 68, 68, 0.1);
        }

        .watched-badge {
            position: absolute;
            top: 12px;
            right: 12px;
            background: #10b981;
            color: white;
            padding: 4px;
            border-radius: 50%;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            z-index: 10;
        }

        .history-pill {
            transition: all 0.2s;
            cursor: pointer;
        }
        .history-pill:hover {
            background: rgba(239, 68, 68, 0.1);
            border-color: var(--accent);
        }

        /* Context Menu Styles */
        #context-menu {
            display: none;
            position: fixed;
            z-index: 1000;
            background: #1f2937;
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.5);
            border-radius: 8px;
            padding: 4px;
        }

        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #374151; border-radius: 10px; }
    </style>
</head>
<body class="text-slate-300">

    <!-- Navbar -->
    <nav class="sticky top-0 z-[100] glass px-6 py-4 mb-8">
        <div class="max-w-7xl mx-auto flex flex-col md:flex-row items-center justify-between gap-6">
            <div class="flex items-center gap-4">
                <div class="w-12 h-12 bg-gradient-to-tr from-red-600 to-orange-500 rounded-2xl flex items-center justify-center shadow-lg shadow-red-500/20 rotate-3">
                    <svg width="28" height="28" viewBox="0 0 24 24" fill="white"><path d="M19.615 3.184c-3.604-.246-11.631-.245-15.23 0-3.897.266-4.356 2.62-4.385 8.816.029 6.185.484 8.549 4.385 8.816 3.6.245 11.626.246 15.23 0 3.897-.266 4.356-2.62 4.385-8.816-.029-6.185-.484-8.549-4.385-8.816zm-10.615 12.816v-8l8 3.993-8 4.007z"/></svg>
                </div>
                <div>
                    <h1 class="text-2xl font-extrabold text-white tracking-tight">PlayFlow <span class="text-red-500">Pro</span></h1>
                    <p class="text-[10px] text-slate-500 font-bold tracking-[0.2em] uppercase">Smart Playlist Explorer</p>
                </div>
            </div>

            <div class="flex flex-col sm:flex-row gap-3 w-full md:w-auto items-center">
                <div class="relative group w-full md:w-auto">
                    <input id="playlist-input" type="text" placeholder="Playlist link or ID..." class="custom-input w-full md:w-80 px-4 py-3 rounded-xl text-sm text-white focus:outline-none">
                    <button id="fetch-btn" class="absolute right-1 top-1 bg-red-600 hover:bg-red-700 text-white px-4 py-2 rounded-lg text-xs font-bold transition-all active:scale-95">Load</button>
                </div>
                <div class="relative w-full md:w-auto">
                    <input id="search-box" disabled type="text" placeholder="Search..." class="custom-input px-10 py-3 rounded-xl text-sm text-white focus:outline-none disabled:opacity-30">
                    <svg class="absolute left-3.5 top-3.5 text-slate-500" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"></circle><path d="m21 21-4.3-4.3"></path></svg>
                </div>
            </div>
        </div>
        
        <!-- Saved Playlists Section -->
        <div id="history-container" class="max-w-7xl mx-auto mt-4 flex flex-wrap gap-2 hidden border-t border-white/5 pt-4">
            <span class="text-[10px] font-bold text-slate-500 uppercase tracking-widest flex items-center mr-2">Saved:</span>
            <!-- History items injected here -->
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-6 pb-20">
        <div id="toast" class="hidden fixed bottom-10 left-1/2 -translate-x-1/2 z-[200] px-6 py-3 rounded-2xl glass border border-white/10 shadow-2xl animate__animated animate__fadeInUp">
            <p id="toast-msg" class="text-sm font-bold"></p>
        </div>

        <div id="dash-info" class="hidden mb-12 animate__animated animate__fadeIn">
            <h2 id="playlist-title" class="text-4xl font-black text-white mb-2 leading-tight">Syncing Content</h2>
            <div class="flex items-center gap-4">
                <span id="video-count" class="bg-red-500/10 text-red-500 text-[10px] font-black uppercase tracking-widest px-3 py-1 rounded-full border border-red-500/20">0 Videos</span>
            </div>
        </div>

        <!-- Skeleton -->
        <div id="skeleton-grid" class="hidden grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8">
            <script>for(let i=0; i<8; i++) document.write(`<div class="rounded-3xl overflow-hidden border border-white/5"><div class="skeleton aspect-video"></div><div class="p-5 space-y-3"><div class="skeleton h-4 w-3/4 rounded-full"></div><div class="skeleton h-3 w-1/2 rounded-full"></div></div></div>`);</script>
        </div>

        <!-- Empty State -->
        <div id="empty-state" class="flex flex-col items-center justify-center py-32">
            <div class="relative mb-8"><div class="absolute inset-0 bg-red-600 blur-[80px] opacity-20"></div><svg class="relative text-slate-800" width="80" height="80" fill="none" stroke="currentColor" stroke-width="1" viewBox="0 0 24 24"><path d="M21 15V6M18.5 18a4.5 4.5 0 1 0 4.5-4.5H18.5ZM12 12H3M16 6H3M12 18H3"></path></svg></div>
            <h3 class="text-xl font-bold text-white mb-2">Ready to explore?</h3>
            <p class="text-slate-500 max-w-xs text-center text-sm">Paste a link or select a saved playlist to get started.</p>
        </div>

        <div id="video-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8"></div>
    </main>

    <!-- Context Menu for removing history -->
    <div id="context-menu">
        <button id="remove-btn" class="text-xs text-red-400 hover:bg-red-500/10 px-4 py-2 w-full text-left rounded font-bold">Remove Playlist</button>
    </div>

    <button onclick="window.scrollTo({top:0, behavior:'smooth'})" class="fixed bottom-8 right-8 w-12 h-12 glass rounded-2xl flex items-center justify-center hover:bg-red-600 transition-all shadow-xl z-50 group">
        <svg class="group-hover:-translate-y-1 transition-transform" width="20" height="20" fill="none" stroke="currentColor" stroke-width="3" viewBox="0 0 24 24"><path d="m18 15-6-6-6 6"></path></svg>
    </button>

    <script>
        const API_KEY = 'AIzaSyBQZarq7vwcyQpvzaY7Dugj5Qm-qoWty64'; 
        let allVideos = [];
        let watchedVideos = JSON.parse(localStorage.getItem('watched_videos') || '[]');
        let savedPlaylists = JSON.parse(localStorage.getItem('saved_playlists') || '[]');
        let currentRightClickedId = null;

        const elements = {
            input: document.getElementById('playlist-input'),
            search: document.getElementById('search-box'),
            fetchBtn: document.getElementById('fetch-btn'),
            grid: document.getElementById('video-grid'),
            skeleton: document.getElementById('skeleton-grid'),
            empty: document.getElementById('empty-state'),
            toast: document.getElementById('toast'),
            toastMsg: document.getElementById('toast-msg'),
            count: document.getElementById('video-count'),
            dash: document.getElementById('dash-info'),
            history: document.getElementById('history-container'),
            contextMenu: document.getElementById('context-menu')
        };

        function showToast(msg, isError = true) {
            elements.toastMsg.textContent = msg;
            elements.toastMsg.className = isError ? 'text-red-400 font-bold' : 'text-emerald-400 font-bold';
            elements.toast.classList.remove('hidden');
            setTimeout(() => elements.toast.classList.add('hidden'), 4000);
        }

        function extractId(str) {
            const match = str.match(/[?&]list=([a-zA-Z0-9_-]+)/);
            return (match && match[1]) ? match[1] : str.trim();
        }

        // --- History Logic ---
        function updateHistoryUI() {
            if (savedPlaylists.length > 0) {
                elements.history.classList.remove('hidden');
                elements.history.innerHTML = '<span class="text-[10px] font-bold text-slate-500 uppercase tracking-widest flex items-center mr-2">Saved:</span>';
                savedPlaylists.forEach(pl => {
                    const pill = document.createElement('div');
                    pill.className = "history-pill border border-white/10 px-3 py-1 rounded-full text-[11px] font-bold text-slate-400 glass";
                    pill.textContent = pl.title || pl.id;
                    pill.onclick = () => { elements.input.value = pl.id; fetchPlaylist(); };
                    pill.oncontextmenu = (e) => {
                        e.preventDefault();
                        currentRightClickedId = pl.id;
                        elements.contextMenu.style.display = 'block';
                        elements.contextMenu.style.left = e.pageX + 'px';
                        elements.contextMenu.style.top = e.pageY + 'px';
                    };
                    elements.history.appendChild(pill);
                });
            } else {
                elements.history.classList.add('hidden');
            }
        }

        document.addEventListener('click', () => elements.contextMenu.style.display = 'none');
        document.getElementById('remove-btn').onclick = () => {
            savedPlaylists = savedPlaylists.filter(p => p.id !== currentRightClickedId);
            localStorage.setItem('saved_playlists', JSON.stringify(savedPlaylists));
            updateHistoryUI();
        };

        async function fetchPlaylist() {
            const id = extractId(elements.input.value);
            if (!id) return showToast("Please paste a valid link.");

            elements.empty.classList.add('hidden');
            elements.grid.innerHTML = '';
            elements.skeleton.classList.remove('hidden');
            elements.fetchBtn.disabled = true;

            try {
                const url = `https://www.googleapis.com/youtube/v3/playlistItems?part=snippet&maxResults=50&playlistId=${id}&key=${API_KEY}`;
                const res = await fetch(url);
                const data = await res.json();
                if (data.error) throw new Error(data.error.message);
                
                allVideos = data.items.filter(v => v.snippet.thumbnails && v.snippet.title !== "Private video");
                
                // Save to history if not exists
                if (!savedPlaylists.find(p => p.id === id)) {
                    savedPlaylists.push({ id, title: id }); // Could fetch title from playlist API later
                    localStorage.setItem('saved_playlists', JSON.stringify(savedPlaylists));
                    updateHistoryUI();
                }

                setTimeout(() => {
                    render(allVideos);
                    elements.skeleton.classList.add('hidden');
                    elements.search.disabled = false;
                    elements.dash.classList.remove('hidden');
                    elements.count.textContent = `${allVideos.length} Videos Synchronized`;
                }, 500);

            } catch (e) {
                showToast(e.message);
                elements.skeleton.classList.add('hidden');
                elements.empty.classList.remove('hidden');
            } finally {
                elements.fetchBtn.disabled = false;
            }
        }

        function markWatched(vid) {
            if (!watchedVideos.includes(vid)) {
                watchedVideos.push(vid);
                localStorage.setItem('watched_videos', JSON.stringify(watchedVideos));
                render(allVideos); // Re-render to show checkmark
            }
        }

        function render(items) {
            elements.grid.innerHTML = '';
            items.forEach((v, i) => {
                const vid = v.snippet.resourceId.videoId;
                const isWatched = watchedVideos.includes(vid);
                const title = v.snippet.title;
                const channel = v.snippet.videoOwnerChannelTitle || "Creator";
                const thumb = v.snippet.thumbnails.high ? v.snippet.thumbnails.high.url : v.snippet.thumbnails.medium.url;

                const card = document.createElement('div');
                card.className = "video-card glass rounded-[2rem] overflow-hidden animate__animated animate__fadeInUp";
                card.style.animationDelay = `${i * 0.03}s`;
                card.innerHTML = `
                    ${isWatched ? '<div class="watched-badge"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="4"><path d="M20 6 9 17l-5-5"/></svg></div>' : ''}
                    <div class="relative group aspect-video overflow-hidden">
                        <img src="${thumb}" class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-110">
                        <div class="absolute inset-0 bg-black/60 opacity-0 group-hover:opacity-100 transition-all duration-500 flex items-center justify-center backdrop-blur-sm">
                            <a href="https://www.youtube.com/watch?v=${vid}" target="_blank" onclick="markWatched('${vid}')" class="bg-red-600 text-white w-14 h-14 rounded-full flex items-center justify-center shadow-xl hover:scale-110 transition-transform">
                                <svg width="24" height="24" fill="currentColor" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                            </a>
                        </div>
                    </div>
                    <div class="p-6">
                        <h3 class="text-white font-bold text-sm line-clamp-2 mb-4 h-10">${title}</h3>
                        <div class="flex items-center justify-between">
                            <div class="flex items-center gap-2">
                                <div class="w-6 h-6 rounded bg-slate-700 flex items-center justify-center text-[10px] font-black text-white">${channel[0]}</div>
                                <span class="text-[11px] font-bold text-slate-500 truncate max-w-[100px] uppercase tracking-wider">${channel}</span>
                            </div>
                            <span class="text-[10px] text-slate-600 font-mono">#${i+1}</span>
                        </div>
                    </div>
                `;
                elements.grid.appendChild(card);
            });
        }

        elements.search.addEventListener('input', (e) => {
            const q = e.target.value.toLowerCase();
            const filtered = allVideos.filter(v => 
                v.snippet.title.toLowerCase().includes(q) || 
                (v.snippet.videoOwnerChannelTitle && v.snippet.videoOwnerChannelTitle.toLowerCase().includes(q))
            );
            render(filtered);
        });

        elements.fetchBtn.addEventListener('click', fetchPlaylist);
        elements.input.addEventListener('keypress', (e) => e.key === 'Enter' && fetchPlaylist());
        
        // Initial load
        updateHistoryUI();
    </script>
</body>
</html>
