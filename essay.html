<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>BioEssay Reminder</title>
  
  <!-- Google Fonts for Sinhala and premium English Typography -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Sinhala:wght@300;400;500;600;700&family=Yaldevi:wght@300;400;500;600;700&family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>

  <style>
    /* Premium Font Configurations */
    body {
      font-family: 'Plus Jakarta Sans', 'Noto Sans Sinhala', sans-serif;
    }
    h1, h2, h3, .font-heading {
      font-family: 'Yaldevi', 'Plus Jakarta Sans', sans-serif;
    }

    /* Animated background elements */
    .mesh-bg {
      background-color: #f8fafc;
      background-image: 
        radial-gradient(at 0% 0%, rgba(16, 185, 129, 0.08) 0px, transparent 50%),
        radial-gradient(at 100% 0%, rgba(20, 184, 166, 0.08) 0px, transparent 50%),
        radial-gradient(at 100% 100%, rgba(16, 185, 129, 0.05) 0px, transparent 50%),
        radial-gradient(at 0% 100%, rgba(59, 130, 246, 0.05) 0px, transparent 50%);
    }

    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes slideInFromBottom { from { transform: translateY(1.5rem); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    @keyframes slideInFromRight { from { transform: translateX(100%); } to { transform: translateX(0); } }
    @keyframes zoomIn { from { transform: scale(0.95); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    
    .animate-fade-in { animation: fadeIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
    .animate-slide-up { animation: slideInFromBottom 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
    .animate-slide-right { animation: slideInFromRight 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
    .animate-zoom-in { animation: zoomIn 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards; }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    
    .pb-safe { padding-bottom: env(safe-area-inset-bottom); }

    /* Ultra Modern Glassmorphism & Shadows */
    .glass-panel {
      background: rgba(255, 255, 255, 0.75);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.6);
    }

    .glass-card {
      background: rgba(255, 255, 255, 0.65);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: 1px solid rgba(255, 255, 255, 0.5);
      transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .glass-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 20px -8px rgba(16, 185, 129, 0.15);
      background: rgba(255, 255, 255, 0.85);
      border-color: rgba(16, 185, 129, 0.2);
    }

    /* Premium Button Hover FX */
    .btn-gradient {
      background: linear-gradient(135deg, #059669 0%, #0d9488 100%);
      transition: all 0.3s ease;
    }
    .btn-gradient:hover {
      filter: brightness(1.08);
      box-shadow: 0 4px 15px rgba(13, 148, 136, 0.3);
    }
  </style>
</head>

  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js';
    import { getAuth, onAuthStateChanged, signOut, GoogleAuthProvider, signInWithPopup } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js';
    import { getFirestore, collection, doc, setDoc, deleteDoc, onSnapshot, updateDoc } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js';

    lucide.createIcons();

    const firebaseConfig = {
      apiKey: "AIzaSyA9DLfAHTUUGxCPn2j_k6godoTEopzaFAU",
      authDomain: "studymaster-919ba.firebaseapp.com",
      projectId: "studymaster-919ba",
      storageBucket: "studymaster-919ba.firebasestorage.app",
      messagingSenderId: "426684063256",
      appId: "1:426684063256:web:52c17625a9450ea9662d6d"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const appId = "studyflow-pro";

    const REPETITION_INTERVALS = [1, 2, 4, 7, 14, 30];
    function computeNextReminder(currentCount, lastRemindedDate) {
      const interval = REPETITION_INTERVALS[Math.min(currentCount, REPETITION_INTERVALS.length - 1)];
      const next = new Date(lastRemindedDate);
      next.setDate(next.getDate() + interval);
      return next;
    }
    function formatDate(date) { return new Date(date).toISOString().split('T')[0]; }

    const state = {
      user: null,
      units: [],
      activeTab: 'dashboard',
      unsubscribeDb: null,
      suggestionMode: 'pattern',   // 'pattern' or 'random'
      randomCount: 2
    };

    function showToast(msg, type='info') {
      const toast = document.getElementById('toast');
      const icon = document.getElementById('toast-icon');
      const msgEl = document.getElementById('toast-message');
      msgEl.textContent = msg;
      
      let iconName = 'info';
      let iconColor = 'text-blue-500';
      if (type === 'error') {
        iconName = 'alert-circle';
        iconColor = 'text-rose-500';
      } else if (type === 'success') {
        iconName = 'check-circle-2';
        iconColor = 'text-emerald-500';
      }
      
      icon.className = `w-5 h-5 ${iconColor}`;
      icon.setAttribute('data-lucide', iconName);
      
      lucide.createIcons({ root: toast });
      toast.classList.remove('-translate-y-full', 'opacity-0');
      toast.classList.add('translate-y-0', 'opacity-100');
      setTimeout(() => {
        toast.classList.remove('translate-y-0', 'opacity-100');
        toast.classList.add('-translate-y-full', 'opacity-0');
      }, 3000);
    }

    // Get pattern suggestion (most overdue)
    function getPatternSuggestion() {
      const today = new Date(); today.setHours(0,0,0,0);
      let dueEssays = [];
      for (const unit of state.units) {
        for (const essay of (unit.essays || [])) {
          if (!essay.nextReminder) continue;
          const nextDate = new Date(essay.nextReminder);
          nextDate.setHours(0,0,0,0);
          if (nextDate <= today) {
            dueEssays.push({ unitTitle: unit.title, essay, unitId: unit.id });
          }
        }
      }
      if (dueEssays.length === 0) return null;
      dueEssays.sort((a,b) => new Date(a.essay.nextReminder) - new Date(b.essay.nextReminder));
      return dueEssays[0];
    }

    // Get random suggestions (distinct essays, not necessarily due)
    function getRandomSuggestions(count) {
      let allEssays = [];
      for (const unit of state.units) {
        for (const essay of (unit.essays || [])) {
          allEssays.push({ unitTitle: unit.title, essay, unitId: unit.id });
        }
      }
      if (allEssays.length === 0) return [];
      // Shuffle and take first 'count'
      for (let i = allEssays.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [allEssays[i], allEssays[j]] = [allEssays[j], allEssays[i]];
      }
      return allEssays.slice(0, count);
    }

    async function markEssayReviewed(unitId, essayId) {
      const unit = state.units.find(u => u.id === unitId);
      if (!unit) return;
      const essay = unit.essays.find(e => e.id === essayId);
      if (!essay) return;
      const now = new Date();
      const reminderCount = (essay.reminderCount || 0) + 1;
      const nextReminder = computeNextReminder(reminderCount, now);
      const updatedEssays = unit.essays.map(e => 
        e.id === essayId ? { ...e, reminderCount, lastReminded: now.toISOString(), nextReminder: nextReminder.toISOString() } : e
      );
      const unitRef = doc(db, 'artifacts', appId, 'users', state.user.uid, 'units', unitId);
      await updateDoc(unitRef, { essays: updatedEssays });
      showToast(`"${essay.title}" සාර්ථකව සලකුණු කළා! ඊළඟ වාරය: ${formatDate(nextReminder)}`, "success");
      renderView(); // refresh suggestion tab
    }

    // Render the Today's Suggestion tab based on mode
    function renderSuggestion() {
      if (state.units.length === 0 || !state.units.some(u => u.essays && u.essays.length > 0)) {
        return `
          <div class="glass-card rounded-3.5xl p-10 text-center max-w-lg mx-auto border-emerald-100">
            <div class="bg-emerald-50 w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4">
              <i data-lucide="smile" class="w-8 h-8 text-emerald-500"></i>
            </div>
            <h3 class="text-xl font-bold text-slate-800 mb-2 font-heading">තවම රචනා ප්‍රශ්න ඇතුළත් කර නැත!</h3>
            <p class="text-slate-400 font-medium text-sm">නව ප්‍රශ්න එකතු කර ඔබගේ පාඩම් වැඩ ආරම්භ කරන්න.</p>
          </div>`;
      }

      if (state.suggestionMode === 'pattern') {
        const suggestion = getPatternSuggestion();
        if (!suggestion) {
          return `
            <div class="glass-card rounded-3.5xl p-10 text-center max-w-lg mx-auto border-emerald-100">
              <div class="bg-gradient-to-tr from-emerald-50 to-teal-50 w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4 border border-emerald-100">
                <i data-lucide="check-circle" class="w-8 h-8 text-emerald-500"></i>
              </div>
              <h3 class="text-xl font-bold text-slate-800 mb-2 font-heading">අද දිනයට නියමිත ප්‍රශ්න සියල්ල අවසන්!</h3>
              <p class="text-slate-400 font-medium text-sm">නියමයි! ඔයා අද දවසේ පාඩම් වැඩ ටික සුපිරියටම නිම කළා.</p>
            </div>`;
        }
        return renderEssayCard(suggestion, 'pattern');
      } 
      else { // random mode
        const count = state.randomCount;
        const suggestions = getRandomSuggestions(count);
        if (suggestions.length === 0) {
          return `<div class="glass-card rounded-3.5xl p-10 text-center text-slate-400">ප්‍රශ්න කිසිවක් හමු වුණේ නැත.</div>`;
        }
        return `<div class="space-y-6">${suggestions.map(s => renderEssayCard(s, 'random')).join('')}</div>`;
      }
    }

    function renderEssayCard(suggestion, mode) {
      const { unitTitle, essay, unitId } = suggestion;
      const badgeColor = mode === 'pattern' ? 'bg-emerald-100/70 text-emerald-700 border-emerald-200' : 'bg-blue-100/70 text-blue-700 border-blue-200';
      const badgeText = mode === 'pattern' ? 'අනුපිළිවෙලින් (Pattern)' : 'අහඹු ලෙස (Random)';
      return `
        <div class="glass-card rounded-3.5xl shadow-lg border border-slate-100 overflow-hidden animate-slide-up max-w-2xl mx-auto">
          <div class="bg-slate-50/70 p-5 border-b border-slate-100/80 flex justify-between items-center">
            <span class="text-xs font-extrabold text-emerald-700 tracking-wider uppercase font-heading">${escapeHtml(unitTitle)}</span>
            <span class="text-[10px] px-2.5 py-1 rounded-full ${badgeColor} border font-extrabold tracking-wide uppercase">${badgeText}</span>
          </div>
          <div class="p-6 md:p-8">
            <h3 class="text-xl md:text-2xl font-bold text-slate-800 mb-3 leading-snug font-heading">${escapeHtml(essay.title)}</h3>
            ${essay.description ? `<p class="text-slate-500 font-medium text-sm mb-6 leading-relaxed bg-slate-50/50 p-4 rounded-2xl border border-slate-100/50">${escapeHtml(essay.description)}</p>` : ''}
            
            <div class="grid grid-cols-2 md:grid-cols-3 gap-3.5 mb-8">
              <div class="bg-slate-50/50 p-3.5 rounded-2xl border border-slate-100/50">
                <span class="text-[10px] text-slate-400 font-bold block uppercase tracking-wider mb-0.5">සංශෝධන වාර</span>
                <span class="text-lg font-extrabold text-slate-800">${essay.reminderCount || 0}</span>
              </div>
              <div class="bg-slate-50/50 p-3.5 rounded-2xl border border-slate-100/50">
                <span class="text-[10px] text-slate-400 font-bold block uppercase tracking-wider mb-0.5">අවසාන වරට සෙවූ</span>
                <span class="text-sm font-bold text-slate-800 block mt-1">${essay.lastReminded ? formatDate(essay.lastReminded) : 'පළමු වරට'}</span>
              </div>
              ${mode === 'pattern' ? `
              <div class="bg-slate-50/50 p-3.5 rounded-2xl border border-slate-100/50 col-span-2 md:col-span-1">
                <span class="text-[10px] text-slate-400 font-bold block uppercase tracking-wider mb-0.5">මීළඟ වාරය</span>
                <span class="text-sm font-bold text-slate-800 block mt-1">${formatDate(essay.nextReminder)}</span>
              </div>` : ''}
            </div>
            
            <button onclick="window.app.markReviewed('${unitId}', '${essay.id}')" class="w-full btn-gradient hover:scale-[1.01] active:scale-[0.99] text-white font-bold py-4 rounded-2.5xl shadow-md transition-all flex items-center justify-center gap-2">
              <i data-lucide="check-circle-2" class="w-5 h-5"></i> අද දිනට සලකුණු කරන්න
            </button>
          </div>
        </div>
      `;
    }

    function escapeHtml(str) {
      if (!str) return '';
      return str.replace(/[&<>]/g, function(m) {
        if (m === '&') return '&amp;';
        if (m === '<') return '&lt;';
        if (m === '>') return '&gt;';
        return m;
      });
    }

    function renderDashboard() {
      let totalEssays = 0, totalReviews = 0, dueCount = 0;
      const today = new Date(); today.setHours(0,0,0,0);
      for (const unit of state.units) {
        for (const essay of (unit.essays || [])) {
          totalEssays++;
          totalReviews += (essay.reminderCount || 0);
          if (essay.nextReminder && new Date(essay.nextReminder) <= today) dueCount++;
        }
      }
      return `
        <div class="space-y-8 animate-slide-up">
          <div class="grid grid-cols-1 md:grid-cols-3 gap-5">
            <div class="glass-card p-6 rounded-3xl shadow-sm border border-slate-100/50 flex items-center gap-4">
              <div class="p-4 bg-emerald-50 rounded-2xl border border-emerald-100/50"><i data-lucide="edit-3" class="w-7 h-7 text-emerald-600"></i></div>
              <div><p class="text-[11px] text-slate-400 font-bold uppercase tracking-wider">මුළු රචනා ගණන</p><p class="text-3xl font-extrabold text-slate-800 font-heading">${totalEssays}</p></div>
            </div>
            <div class="glass-card p-6 rounded-3xl shadow-sm border border-slate-100/50 flex items-center gap-4">
              <div class="p-4 bg-indigo-50 rounded-2xl border border-indigo-100/50"><i data-lucide="repeat" class="w-7 h-7 text-indigo-600"></i></div>
              <div><p class="text-[11px] text-slate-400 font-bold uppercase tracking-wider">සංශෝධන වාර</p><p class="text-3xl font-extrabold text-slate-800 font-heading">${totalReviews}</p></div>
            </div>
            <div class="glass-card p-6 rounded-3xl shadow-sm border border-slate-100/50 flex items-center gap-4">
              <div class="p-4 bg-amber-50 rounded-2xl border border-amber-100/50"><i data-lucide="calendar" class="w-7 h-7 text-amber-600"></i></div>
              <div><p class="text-[11px] text-slate-400 font-bold uppercase tracking-wider">අද නියමිත වැඩ</p><p class="text-3xl font-extrabold text-slate-800 font-heading">${dueCount}</p></div>
            </div>
          </div>
          <div class="glass-panel rounded-3.5xl p-6 md:p-8 border border-slate-100/50 shadow-md">
            <h3 class="text-lg font-bold mb-4 font-heading text-slate-800">ඔබගේ ඒකකයන් (Your Units)</h3>
            ${state.units.length === 0 ? '<p class="text-slate-400 font-medium text-sm">තවම ඒකකයක් එකතු කර නැත. ඉහළින් ඇති "New Unit" ක්ලික් කරන්න.</p>' : 
              `<div class="grid grid-cols-1 md:grid-cols-2 gap-3.5">${state.units.map(u => `
                <div class="flex justify-between items-center p-4 bg-white/60 hover:bg-white/90 border border-slate-100 rounded-2xl transition-all duration-300">
                  <span class="font-bold text-slate-800 font-heading text-sm">${escapeHtml(u.title)}</span>
                  <span class="text-xs px-3 py-1.5 bg-slate-50 rounded-xl font-bold text-slate-500 border border-slate-100">${(u.essays||[]).length} essays</span>
                </div>`).join('')}</div>`}
          </div>
        </div>
      `;
    }

    function renderEssays() {
      if (state.units.length === 0) return `<div class="glass-card rounded-3.5xl p-10 text-center text-slate-400">කිසිදු ඒකකයක් තවම සකසා නැත.</div>`;
      let html = `<div class="space-y-6 animate-slide-up">`;
      for (const unit of state.units) {
        html += `
          <div class="glass-card rounded-3.5xl border border-slate-100/50 overflow-hidden shadow-sm">
            <div class="bg-slate-50/70 p-4 md:p-5 flex justify-between items-center border-b border-slate-100">
              <h3 class="font-bold text-slate-800 font-heading text-base">${escapeHtml(unit.title)}</h3>
              <button onclick="window.app.openAddEssayModal('${unit.id}')" class="text-emerald-700 hover:text-emerald-800 text-xs font-bold flex items-center gap-1 bg-emerald-50 px-3 py-1.5 rounded-xl border border-emerald-100 transition-colors">
                <i data-lucide="plus" class="w-4 h-4"></i> Add Essay
              </button>
            </div>`;
        if (!unit.essays || unit.essays.length === 0) {
          html += `<div class="p-8 text-center text-slate-400 font-medium text-sm">මෙම ඒකකයට රචනා ප්‍රශ්න තවම එකතු කර නැත.</div>`;
        } else {
          html += `<div class="divide-y divide-slate-100">`;
          for (const essay of unit.essays) {
            html += `
              <div class="p-5 md:p-6 hover:bg-slate-50/30 transition-colors">
                <div class="flex justify-between items-start gap-4">
                  <div class="flex-1">
                    <p class="font-bold text-slate-800 leading-snug font-heading text-base">${escapeHtml(essay.title)}</p>
                    ${essay.description ? `<p class="text-xs text-slate-400 font-medium mt-1.5 max-w-xl">${escapeHtml(essay.description.substring(0,100))}${essay.description.length>100?'…':''}</p>` : ''}
                    <div class="flex flex-wrap gap-3 text-[10px] text-slate-400 font-bold tracking-wide uppercase mt-3">
                      <span class="bg-slate-100 px-2 py-1 rounded-md">🔄 ${essay.reminderCount || 0} reviews</span>
                      <span class="bg-slate-100 px-2 py-1 rounded-md">📅 Last: ${essay.lastReminded ? formatDate(essay.lastReminded) : '—'}</span>
                      <span class="bg-slate-100 px-2 py-1 rounded-md">⏰ Next: ${essay.nextReminder ? formatDate(essay.nextReminder) : '—'}</span>
                    </div>
                  </div>
                  <button onclick="window.app.deleteEssay('${unit.id}', '${essay.id}')" class="w-8 h-8 rounded-lg text-rose-400 hover:text-rose-600 hover:bg-rose-50 flex items-center justify-center transition-all">
                    <i data-lucide="trash-2" class="w-4 h-4"></i>
                  </button>
                </div>
              </div>`;
          }
          html += `</div>`;
        }
        html += `</div>`;
      }
      html += `</div>`;
      return html;
    }

    function renderNavigation() {
      document.querySelectorAll('.nav-btn').forEach(btn => {
        btn.className = btn.id.includes('desktop') 
          ? 'nav-btn w-full flex items-center gap-3.5 px-4 py-3.5 rounded-2xl text-slate-500 hover:bg-slate-50/70 hover:text-slate-800 transition-all duration-300 font-semibold'
          : 'nav-btn flex flex-col items-center p-2 rounded-xl text-slate-400 transition-colors';
      });
      const activeDesktop = document.getElementById(`nav-desktop-${state.activeTab}`);
      const activeMobile = document.getElementById(`nav-mobile-${state.activeTab}`);
      if(activeDesktop) activeDesktop.className = 'nav-btn w-full flex items-center gap-3.5 px-4 py-3.5 rounded-2xl bg-gradient-to-tr from-emerald-600 to-teal-500 text-white font-bold shadow-md shadow-emerald-500/10';
      if(activeMobile) activeMobile.className = 'nav-btn flex flex-col items-center p-2 rounded-xl text-emerald-600 font-bold';
      
      const titles = { dashboard: 'Dashboard', suggestion: "Today's Suggestion", essays: 'All Essays' };
      document.getElementById('page-title').textContent = titles[state.activeTab];
    }

    async function renderView() {
      renderNavigation();
      const container = document.getElementById('view-container');
      if (state.activeTab === 'dashboard') container.innerHTML = renderDashboard();
      else if (state.activeTab === 'suggestion') container.innerHTML = renderSuggestion();
      else container.innerHTML = renderEssays();
      lucide.createIcons();
    }

    function startFirestoreListener(user) {
      if (state.unsubscribeDb) state.unsubscribeDb();
      const unitsRef = collection(db, 'artifacts', appId, 'users', user.uid, 'units');
      state.unsubscribeDb = onSnapshot(unitsRef, (snapshot) => {
        state.units = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
        renderView();
      });
    }

    // Load settings from localStorage
    function loadSettings() {
      const savedMode = localStorage.getItem('suggestionMode');
      const savedCount = localStorage.getItem('randomEssayCount');
      if (savedMode === 'pattern' || savedMode === 'random') state.suggestionMode = savedMode;
      if (savedCount && !isNaN(parseInt(savedCount))) state.randomCount = parseInt(savedCount);
    }

    window.app = {
      switchTab: (tab) => { state.activeTab = tab; renderView(); },
      openAddUnitModal: () => { document.getElementById('add-unit-modal').classList.remove('hidden'); },
      closeAddUnitModal: () => { document.getElementById('add-unit-modal').classList.add('hidden'); },
      handleAddUnit: async (e) => {
        e.preventDefault();
        const title = document.getElementById('new-unit-title').value.trim();
        if (!title) return;
        const newId = crypto.randomUUID();
        await setDoc(doc(db, 'artifacts', appId, 'users', state.user.uid, 'units', newId), { title, essays: [] });
        document.getElementById('new-unit-title').value = '';
        window.app.closeAddUnitModal();
        showToast(`Unit "${title}" සාර්ථකව එකතු කළා`, "success");
      },
      openAddEssayModal: (unitId) => {
        document.getElementById('essay-unit-id').value = unitId;
        document.getElementById('new-essay-title').value = '';
        document.getElementById('new-essay-description').value = '';
        document.getElementById('add-essay-modal').classList.remove('hidden');
      },
      closeAddEssayModal: () => { document.getElementById('add-essay-modal').classList.add('hidden'); },
      handleAddEssay: async (e) => {
        e.preventDefault();
        const unitId = document.getElementById('essay-unit-id').value;
        const title = document.getElementById('new-essay-title').value.trim();
        const description = document.getElementById('new-essay-description').value.trim();
        if (!title) return;
        const unit = state.units.find(u => u.id === unitId);
        if (!unit) return;
        const now = new Date();
        const newEssay = {
          id: crypto.randomUUID(),
          title,
          description: description || '',
          reminderCount: 0,
          lastReminded: null,
          nextReminder: computeNextReminder(0, now).toISOString(),
          createdAt: now.toISOString()
        };
        const updatedEssays = [...(unit.essays || []), newEssay];
        await updateDoc(doc(db, 'artifacts', appId, 'users', state.user.uid, 'units', unitId), { essays: updatedEssays });
        window.app.closeAddEssayModal();
        showToast(`Essay "${title}" සාර්ථකව එකතු කළා`, "success");
      },
      deleteEssay: async (unitId, essayId) => {
        if (!confirm('ඔබට විශ්වාසද මෙම ප්‍රශ්නය ඉවත් කිරීමට අවශ්‍ය බව?')) return;
        const unit = state.units.find(u => u.id === unitId);
        if (!unit) return;
        const updatedEssays = (unit.essays || []).filter(e => e.id !== essayId);
        await updateDoc(doc(db, 'artifacts', appId, 'users', state.user.uid, 'units', unitId), { essays: updatedEssays });
        showToast('ප්‍රශ්නය සාර්ථකව ඉවත් කළා', 'success');
      },
      markReviewed: async (unitId, essayId) => {
        await markEssayReviewed(unitId, essayId);
        renderView();
      },
      openSettings: () => {
        document.querySelector(`input[name="suggestionMode"][value="${state.suggestionMode}"]`).checked = true;
        document.getElementById('randomEssayCount').value = state.randomCount;
        const randomContainer = document.getElementById('randomCountContainer');
        if (state.suggestionMode === 'random') randomContainer.classList.remove('hidden');
        else randomContainer.classList.add('hidden');
        
        const radios = document.querySelectorAll('input[name="suggestionMode"]');
        radios.forEach(radio => {
          radio.onchange = () => {
            if (radio.value === 'random') randomContainer.classList.remove('hidden');
            else randomContainer.classList.add('hidden');
          };
        });
        document.getElementById('settings-modal').classList.remove('hidden');
      },
      closeSettings: () => { document.getElementById('settings-modal').classList.add('hidden'); },
      saveSettings: () => {
        const mode = document.querySelector('input[name="suggestionMode"]:checked').value;
        const count = parseInt(document.getElementById('randomEssayCount').value) || 2;
        state.suggestionMode = mode;
        state.randomCount = Math.min(10, Math.max(1, count));
        localStorage.setItem('suggestionMode', state.suggestionMode);
        localStorage.setItem('randomEssayCount', state.randomCount);
        window.app.closeSettings();
        renderView();
        showToast(`යෝජනා ක්‍රමය සුරැකුණා!`, "success");
      },
      logout: async () => { await signOut(auth); window.app.closeSettings(); },
      handleBackup: () => {
        const data = JSON.stringify(state.units, null, 2);
        const blob = new Blob([data], {type: 'application/json'});
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `bioessay_backup_${new Date().toISOString().split('T')[0]}.json`;
        a.click();
        URL.revokeObjectURL(url);
        showToast('Backup එක සාර්ථකව ලබාගත්තා', 'success');
      },
      handleRestore: async (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = async (ev) => {
          try {
            const units = JSON.parse(ev.target.result);
            for (const unit of units) {
              const ref = doc(db, 'artifacts', appId, 'users', state.user.uid, 'units', unit.id);
              await setDoc(ref, unit);
            }
            showToast('සියලුම දත්ත සාර්ථකව ප්‍රතිස්ථාපනය කළා', 'success');
          } catch(err) { showToast('Backup ගොනුව නිවැරදි නැත', 'error'); }
          e.target.value = '';
        };
        reader.readAsText(file);
      }
    };

    // Auth & init
    const loadingSpinner = document.getElementById('loading-spinner');
    const signinModal = document.getElementById('signin-modal');
    const appContainer = document.getElementById('app-container');

    onAuthStateChanged(auth, (user) => {
      loadingSpinner.classList.add('hidden');
      if (user) {
        signinModal.classList.add('hidden');
        appContainer.classList.remove('hidden');
        state.user = user;
        const name = user.displayName || 'Student';
        const email = user.email || '';
        const initial = name.charAt(0).toUpperCase();
        ['desktop-user-avatar', 'mobile-user-avatar', 'settings-avatar'].forEach(id => {
          const el = document.getElementById(id);
          if (el) el.textContent = initial;
        });
        document.getElementById('settings-name').textContent = name;
        document.getElementById('settings-email').textContent = email;
        loadSettings();
        startFirestoreListener(user);
      } else {
        signinModal.classList.remove('hidden');
        appContainer.classList.add('hidden');
        if (state.unsubscribeDb) state.unsubscribeDb();
        state.user = null;
        state.units = [];
      }
    });

    document.getElementById('immediate-google-signin').addEventListener('click', async () => {
      try {
        await signInWithPopup(auth, new GoogleAuthProvider());
      } catch(e) { showToast('Sign in failed', 'error'); }
    });
  </script>
</body>
</html>
