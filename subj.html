<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>StudyMaster Pro</title>
  
  <!-- Google Fonts: Noto Sans Sinhala -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+Sinhala:wght@400;700&display=swap" rel="stylesheet">
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>

  <style>
    body {
      font-family: 'Inter', 'Noto Sans Sinhala', sans-serif;
    }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes slideInFromBottom { from { transform: translateY(1.5rem); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    @keyframes slideInFromRight { from { transform: translateX(100%); } to { transform: translateX(0); } }
    @keyframes zoomIn { from { transform: scale(0.92); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    
    .animate-fade-in { animation: fadeIn 0.4s ease-out forwards; }
    .animate-slide-up { animation: slideInFromBottom 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
    .animate-slide-right { animation: slideInFromRight 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
    .animate-zoom-in { animation: zoomIn 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards; }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    
    .pb-safe { padding-bottom: env(safe-area-inset-bottom); }
    
    .stagger-item { opacity: 0; }
  </style>
</head>
<body class="bg-slate-50 text-slate-900 overflow-hidden select-none md:select-auto">

  <!-- Loading Screen -->
  <div id="loading-modal" class="fixed inset-0 z-[80] flex items-center justify-center bg-slate-50">
    <div class="flex flex-col items-center animate-pulse">
      <div class="bg-indigo-600 p-4 rounded-2xl mb-4 shadow-lg shadow-indigo-200">
        <i data-lucide="graduation-cap" class="w-10 h-10 text-white"></i>
      </div>
      <h2 class="text-xl font-bold text-slate-800">Loading StudyMaster...</h2>
      <p class="text-sm text-slate-500 mt-2">Get Ready to Study</p>
    </div>
  </div>

  <!-- MAIN APP -->
  <div id="app-container" class="flex h-screen overflow-hidden relative hidden">
    
    <!-- Desktop Sidebar -->
    <aside class="hidden md:flex w-72 flex-col bg-white border-r border-slate-200 z-10">
      <div class="p-6 flex items-center gap-3">
        <div class="bg-indigo-600 p-2 rounded-xl">
          <i data-lucide="graduation-cap" class="w-6 h-6 text-white"></i>
        </div>
        <h1 class="text-xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-indigo-600 to-purple-600">
          StudyMaster
        </h1>
      </div>
      
      <nav class="flex-1 px-4 py-6 space-y-2">
        <button onclick="window.app.switchTab('dashboard')" id="nav-desktop-dashboard" class="nav-btn w-full flex items-center gap-3 px-4 py-3 rounded-xl transition-all bg-indigo-50 text-indigo-700 font-semibold">
          <i data-lucide="layout-dashboard" class="w-5 h-5"></i>
          Dashboard
        </button>
        <button onclick="window.app.switchTab('subjects')" id="nav-desktop-subjects" class="nav-btn w-full flex items-center gap-3 px-4 py-3 rounded-xl transition-all text-slate-600 hover:bg-slate-50">
          <i data-lucide="book-open" class="w-5 h-5"></i>
          All Subjects
        </button>
      </nav>

      <div class="p-4 border-t border-slate-100">
        <button onclick="window.app.openSettings()" class="w-full flex items-center gap-3 p-3 mb-2 rounded-xl bg-slate-50 hover:bg-indigo-50 transition-colors group text-left">
          <div id="desktop-user-avatar" class="w-10 h-10 rounded-full bg-indigo-100 flex items-center justify-center text-indigo-700 font-bold group-hover:bg-indigo-200 transition-colors">U</div>
          <div class="flex-1 overflow-hidden">
            <p id="desktop-user-name" class="text-sm font-semibold text-slate-800 truncate">Student</p>
            <p id="desktop-user-email" class="text-xs text-slate-500 truncate">Signed In</p>
          </div>
          <i data-lucide="settings" class="w-4 h-4 text-slate-400 group-hover:text-indigo-600"></i>
        </button>
      </div>
    </aside>

    <!-- Content Area -->
    <main class="flex-1 flex flex-col h-full overflow-hidden relative">
      
      <header class="md:hidden flex items-center justify-between p-4 bg-white border-b border-slate-200 z-10">
        <div class="flex items-center gap-2">
          <div class="bg-indigo-600 p-1.5 rounded-lg">
            <i data-lucide="graduation-cap" class="w-5 h-5 text-white"></i>
          </div>
          <h1 class="text-lg font-bold text-slate-800">StudyMaster</h1>
        </div>
        <button onclick="window.app.openSettings()" class="flex items-center justify-center w-8 h-8 rounded-full bg-indigo-100 text-indigo-700 font-bold active:scale-95 transition-transform" id="mobile-user-avatar">
          U
        </button>
      </header>

      <div class="flex-1 overflow-y-auto pb-24 md:pb-8" id="main-scroll-area">
        <div class="max-w-6xl mx-auto p-4 md:p-8">
          
          <div class="flex justify-between items-end mb-8">
            <div>
              <h2 id="page-title" class="text-2xl md:text-3xl font-bold text-slate-900 animate-slide-up">Dashboard</h2>
              <p id="page-subtitle" class="text-slate-500 mt-1 animate-slide-up" style="animation-delay: 0.1s">Track your learning progress today.</p>
            </div>
            <button onclick="window.app.openAddSubjectModal()" class="hidden md:flex items-center gap-2 bg-indigo-600 hover:bg-indigo-700 text-white px-5 py-2.5 rounded-xl font-medium transition-all shadow-sm shadow-indigo-200 hover:shadow-md hover:-translate-y-0.5 animate-zoom-in">
              <i data-lucide="plus" class="w-5 h-5"></i>
              Add Subject
            </button>
          </div>

          <div id="view-container"></div>

        </div>
      </div>

      <button onclick="window.app.openAddSubjectModal()" class="md:hidden absolute bottom-28 right-4 w-14 h-14 bg-indigo-600 text-white rounded-full flex items-center justify-center shadow-lg shadow-indigo-200 active:scale-95 transition-transform z-20 animate-zoom-in">
        <i data-lucide="plus" class="w-6 h-6"></i>
      </button>

    </main>

    <!-- Mobile Navigation -->
    <nav class="md:hidden fixed bottom-0 w-full bg-white border-t border-slate-100 flex justify-around p-3 pb-safe z-30 shadow-[0_-4px_20px_rgba(0,0,0,0.02)]">
      <button onclick="window.app.switchTab('dashboard')" id="nav-mobile-dashboard" class="nav-btn flex flex-col items-center p-2 rounded-xl transition-colors text-indigo-600">
        <i data-lucide="layout-dashboard" class="w-6 h-6 mb-1"></i>
        <span class="text-[10px] font-medium">Dashboard</span>
      </button>
      <button onclick="window.app.switchTab('subjects')" id="nav-mobile-subjects" class="nav-btn flex flex-col items-center p-2 rounded-xl transition-colors text-slate-400">
        <i data-lucide="book-open" class="w-6 h-6 mb-1"></i>
        <span class="text-[10px] font-medium">Subjects</span>
      </button>
    </nav>
  </div>

  <!-- Subject Details Drawer -->
  <div id="subject-drawer" class="fixed inset-0 z-40 flex justify-end hidden">
    <div class="absolute inset-0 bg-slate-900/30 backdrop-blur-sm transition-opacity" onclick="window.app.closeSubjectDrawer()"></div>
    <div class="relative w-full md:w-[450px] max-w-lg h-full bg-white shadow-2xl flex flex-col animate-slide-right">
      <div id="drawer-content" class="flex flex-col h-full"></div>
    </div>
  </div>

  <!-- Add Subject Modal -->
  <div id="add-subject-modal" class="fixed inset-0 z-50 flex items-center justify-center p-4 hidden">
    <div class="absolute inset-0 bg-slate-900/30 backdrop-blur-sm" onclick="window.app.closeAddSubjectModal()"></div>
    <div class="relative bg-white rounded-3xl shadow-xl w-full max-sm p-6 animate-zoom-in">
      <div class="flex justify-between items-center mb-6">
        <h2 class="text-xl font-bold text-slate-800">New Subject</h2>
        <button onclick="window.app.closeAddSubjectModal()" class="text-slate-400 hover:bg-slate-100 p-2 rounded-full transition-colors">
          <i data-lucide="x" class="w-5 h-5"></i>
        </button>
      </div>
      <form id="add-subject-form" onsubmit="window.app.handleAddSubject(event)">
        <div class="mb-6">
          <label class="block text-sm font-medium text-slate-500 mb-2">Subject Name</label>
          <input type="text" id="new-subject-title" placeholder="e.g. Mathematics, Science" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:bg-white transition-all" required />
        </div>
        <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-3 rounded-xl transition-colors shadow-md shadow-indigo-200 active:scale-[0.98]">
          Create Subject
        </button>
      </form>
    </div>
  </div>

  <!-- Settings Modal -->
  <div id="settings-modal" class="fixed inset-0 z-50 flex items-center justify-center p-4 hidden">
    <div class="absolute inset-0 bg-slate-900/30 backdrop-blur-sm" onclick="window.app.closeSettings()"></div>
    <div class="relative bg-white rounded-3xl shadow-xl w-full max-w-md animate-zoom-in flex flex-col max-h-[90vh]">
      <div class="flex justify-between items-center p-6 border-b border-slate-100">
        <h2 class="text-xl font-bold text-slate-800 flex items-center gap-2">
          <i data-lucide="settings" class="w-5 h-5 text-indigo-600"></i> Settings
        </h2>
        <button onclick="window.app.closeSettings()" class="text-slate-400 hover:bg-slate-100 p-2 rounded-full transition-colors">
          <i data-lucide="x" class="w-5 h-5"></i>
        </button>
      </div>
      <div class="p-6 overflow-y-auto space-y-8 flex-1">
        <section>
          <h3 class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-3">Profile</h3>
          <div class="bg-slate-50 border border-slate-100 rounded-2xl p-4">
            <div class="flex items-center gap-4 mb-4">
              <div id="settings-avatar" class="w-12 h-12 rounded-full bg-indigo-100 flex items-center justify-center text-indigo-700 font-bold text-lg">U</div>
              <div>
                <p id="settings-name" class="font-bold text-slate-800">Udara</p>
                <p id="settings-email" class="text-sm text-slate-500">Active User</p>
              </div>
            </div>
            <div id="signout-block" class="mt-4 pt-4 border-t border-slate-200">
              <button onclick="window.app.logout()" class="w-full flex items-center justify-center gap-2 text-rose-600 hover:bg-rose-50 font-medium py-2 px-4 rounded-xl transition-colors">
                <i data-lucide="log-out" class="w-4 h-4"></i> Log Out
              </button>
            </div>
          </div>
        </section>
        <section>
          <h3 class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-3">Data Management</h3>
          <div class="bg-white border border-slate-200 rounded-2xl overflow-hidden">
            <button onclick="window.app.handleBackup()" class="w-full flex items-center justify-between p-4 hover:bg-slate-50 transition-colors border-b border-slate-100 text-left group">
              <div class="flex items-center gap-3">
                <div class="bg-indigo-50 p-2 rounded-lg text-indigo-600 group-hover:scale-110 transition-transform">
                  <i data-lucide="download" class="w-4 h-4"></i>
                </div>
                <div>
                  <p class="font-semibold text-slate-700">Backup Data</p>
                  <p class="text-xs text-slate-500">Save your progress as JSON</p>
                </div>
              </div>
              <i data-lucide="chevron-right" class="w-4 h-4 text-slate-300"></i>
            </button>
            <button onclick="document.getElementById('file-upload').click()" class="w-full flex items-center justify-between p-4 hover:bg-slate-50 transition-colors text-left group">
              <div class="flex items-center gap-3">
                <div class="bg-emerald-50 p-2 rounded-lg text-emerald-600 group-hover:scale-110 transition-transform">
                  <i data-lucide="upload" class="w-4 h-4"></i>
                </div>
                <div>
                  <p class="font-semibold text-slate-700">Restore Data</p>
                  <p class="text-xs text-slate-500">Restore from a backup file</p>
                </div>
              </div>
              <i data-lucide="chevron-right" class="w-4 h-4 text-slate-300"></i>
            </button>
            <input type="file" id="file-upload" accept=".json" class="hidden" onchange="window.app.handleRestore(event)">
          </div>
        </section>
      </div>
    </div>
  </div>

  <!-- Toast Notification -->
  <div id="toast" class="fixed top-4 right-4 z-[70] transition-all duration-300 transform -translate-y-full opacity-0 pointer-events-none">
    <div id="toast-content" class="flex items-center gap-3 px-4 py-3 rounded-2xl shadow-lg border bg-white border-slate-100 text-slate-700">
      <i id="toast-icon" data-lucide="info" class="w-5 h-5"></i>
      <span id="toast-message" class="font-medium text-sm">Message</span>
    </div>
  </div>

  <!-- Firebase & App Logic -->
  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js';
    import { getAuth, onAuthStateChanged, signOut, signInAnonymously, signInWithCustomToken } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js';
    import { getFirestore, collection, doc, setDoc, deleteDoc, onSnapshot, updateDoc } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js';

    lucide.createIcons();

    // Firebase Config
    const firebaseConfig = JSON.parse(__firebase_config);
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';

    // Global state
    const state = {
      user: null,
      subjects: [],
      activeTab: 'dashboard',
      selectedSubjectId: null,
      unsubscribeDb: null
    };

    const colors = ['bg-blue-500', 'bg-indigo-500', 'bg-purple-500', 'bg-emerald-500', 'bg-rose-500', 'bg-amber-500'];

    // DOM Elements Reference
    const appContainer = document.getElementById('app-container');

    function showToast(message, type = 'info') {
      const toast = document.getElementById('toast');
      const toastContent = document.getElementById('toast-content');
      const toastIcon = document.getElementById('toast-icon');
      const toastMessage = document.getElementById('toast-message');
      
      toastMessage.textContent = message;
      
      toastContent.className = 'flex items-center gap-3 px-4 py-3 rounded-2xl shadow-lg border';
      if (type === 'error') {
        toastContent.classList.add('bg-rose-50', 'border-rose-100', 'text-rose-700');
        toastIcon.setAttribute('data-lucide', 'alert-circle');
      } else if (type === 'success') {
        toastContent.classList.add('bg-emerald-50', 'border-emerald-100', 'text-emerald-700');
        toastIcon.setAttribute('data-lucide', 'check-circle-2');
      } else {
        toastContent.classList.add('bg-white', 'border-slate-100', 'text-slate-700');
        toastIcon.setAttribute('data-lucide', 'info');
      }
      lucide.createIcons({ root: toast });
      
      toast.classList.remove('-translate-y-full', 'opacity-0');
      toast.classList.add('translate-y-0', 'opacity-100');
      setTimeout(() => {
        toast.classList.remove('translate-y-0', 'opacity-100');
        toast.classList.add('-translate-y-full', 'opacity-0');
      }, 3000);
    }

    function calculateProgress(subject) {
      let total = 0, completed = 0;
      if (subject.units) {
        subject.units.forEach(u => {
          if (u.subunits) {
            total += u.subunits.length;
            completed += u.subunits.filter(su => su.completed).length;
          }
        });
      }
      return total === 0 ? 0 : Math.round((completed / total) * 100);
    }

    function getTaskCount(subject) {
      let count = 0;
      if (subject.units) {
        subject.units.forEach(u => count += (u.subunits ? u.subunits.length : 0));
      }
      return count;
    }

    function getOverallStats() {
      let tTasks = 0, cTasks = 0;
      state.subjects.forEach(s => {
        if (s.units) {
          s.units.forEach(u => {
            if (u.subunits) {
              tTasks += u.subunits.length;
              cTasks += u.subunits.filter(su => su.completed).length;
            }
          });
        }
      });
      return {
        totalTasks: tTasks,
        completedTasks: cTasks,
        progress: tTasks === 0 ? 0 : Math.round((cTasks / tTasks) * 100)
      };
    }

    function generateProgressBar(progress, colorClass) {
      return `
        <div class="w-full bg-slate-100 rounded-full h-2.5 overflow-hidden">
          <div class="h-2.5 rounded-full transition-all duration-700 ease-out ${colorClass}" style="width: ${progress}%"></div>
        </div>
      `;
    }

    function generateSubjectCard(subject, index) {
      const progress = calculateProgress(subject);
      const taskCount = getTaskCount(subject);
      const unitCount = subject.units ? subject.units.length : 0;
      const textColor = subject.color.replace('bg-', 'text-');
      
      return `
        <div onclick="window.app.openSubjectDrawer('${subject.id}')" 
             class="bg-white rounded-3xl p-5 border border-slate-100 shadow-sm hover:shadow-md hover:border-indigo-100 hover:-translate-y-1 transition-all cursor-pointer group flex flex-col justify-between h-48 animate-slide-up stagger-item"
             style="animation-delay: ${index * 0.05}s; opacity: 1;">
          <div>
            <div class="flex justify-between items-start mb-4">
              <div class="p-3 rounded-2xl ${subject.color} bg-opacity-10 text-opacity-90 flex items-center justify-center">
                <i data-lucide="book-marked" class="w-6 h-6 ${textColor}"></i>
              </div>
              <button class="text-slate-300 group-hover:text-slate-500 p-1">
                <i data-lucide="more-vertical" class="w-5 h-5"></i>
              </button>
            </div>
            <h3 class="text-lg font-bold text-slate-800 mb-1 truncate">${subject.title}</h3>
            <p class="text-sm text-slate-500 mb-6">${unitCount} Units • ${taskCount} Tasks</p>
          </div>
          <div>
            <div class="flex justify-between items-center mb-2">
              <span class="text-xs font-semibold text-slate-500 uppercase tracking-wider">Progress</span>
              <span class="text-sm font-bold text-slate-700">${progress}%</span>
            </div>
            ${generateProgressBar(progress, subject.color)}
          </div>
        </div>
      `;
    }

    function renderNavigation() {
      document.querySelectorAll('.nav-btn').forEach(btn => {
        btn.className = btn.id.includes('desktop') 
          ? 'nav-btn w-full flex items-center gap-3 px-4 py-3 rounded-xl transition-all text-slate-600 hover:bg-slate-50'
          : 'nav-btn flex flex-col items-center p-2 rounded-xl transition-colors text-slate-400';
      });

      const activeDesktop = document.getElementById(`nav-desktop-${state.activeTab}`);
      const activeMobile = document.getElementById(`nav-mobile-${state.activeTab}`);
      
      if(activeDesktop) activeDesktop.className = 'nav-btn w-full flex items-center gap-3 px-4 py-3 rounded-xl transition-all bg-indigo-50 text-indigo-700 font-semibold';
      if(activeMobile) activeMobile.className = 'nav-btn flex flex-col items-center p-2 rounded-xl transition-colors text-indigo-600';

      document.getElementById('page-title').textContent = state.activeTab === 'dashboard' ? 'Dashboard' : 'All Subjects';
      document.getElementById('page-subtitle').textContent = state.activeTab === 'dashboard' ? "Track your learning progress today." : "Browse all your study subjects.";
    }

    function renderView() {
      renderNavigation();
      const container = document.getElementById('view-container');
      container.innerHTML = '';
      
      if (state.activeTab === 'dashboard') {
        const stats = getOverallStats();
        let recentCardsHTML = state.subjects.length === 0 
          ? `
            <div class="text-center py-12 bg-white rounded-3xl border border-dashed border-slate-200 col-span-full animate-fade-in">
              <div class="w-16 h-16 bg-slate-50 rounded-full flex items-center justify-center mx-auto mb-3">
                <i data-lucide="book-open" class="w-8 h-8 text-slate-400"></i>
              </div>
              <p class="text-slate-500 font-medium">No subjects found.</p>
              <button onclick="window.app.openAddSubjectModal()" class="mt-4 text-indigo-600 font-medium hover:underline">
                Create your first subject
              </button>
            </div>
          `
          : state.subjects.slice(0, 3).map((s, i) => generateSubjectCard(s, i)).join('');

        container.innerHTML = `
          <div class="space-y-8">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4 md:gap-6">
              <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-100 flex items-center gap-4 animate-slide-up">
                <div class="p-4 bg-indigo-50 rounded-2xl text-indigo-600">
                  <i data-lucide="book-open" class="w-8 h-8"></i>
                </div>
                <div>
                  <p class="text-sm font-medium text-slate-500">Subjects</p>
                  <p class="text-3xl font-bold text-slate-800">${state.subjects.length}</p>
                </div>
              </div>
              <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-100 flex items-center gap-4 animate-slide-up" style="animation-delay: 0.1s">
                <div class="p-4 bg-emerald-50 rounded-2xl text-emerald-600">
                  <i data-lucide="check-circle-2" class="w-8 h-8"></i>
                </div>
                <div>
                  <p class="text-sm font-medium text-slate-500">Tasks Done</p>
                  <p class="text-3xl font-bold text-slate-800">${stats.completedTasks} <span class="text-lg text-slate-400 font-normal">/ ${stats.totalTasks}</span></p>
                </div>
              </div>
              <div class="bg-gradient-to-br from-indigo-600 to-purple-600 p-6 rounded-3xl shadow-md text-white flex flex-col justify-between animate-slide-up" style="animation-delay: 0.2s">
                <div>
                  <p class="text-indigo-100 font-medium mb-1">Overall Progress</p>
                  <div class="flex items-baseline gap-1">
                    <span class="text-4xl font-bold">${stats.progress}</span>
                    <span class="text-xl opacity-80">%</span>
                  </div>
                </div>
                <div class="mt-4">
                  <div class="w-full bg-white/20 rounded-full h-2">
                    <div class="bg-white h-2 rounded-full transition-all duration-1000" style="width: ${stats.progress}%"></div>
                  </div>
                </div>
              </div>
            </div>
            <div>
              <h3 class="text-xl font-bold text-slate-800 mb-4 animate-fade-in">Recent Subjects</h3>
              <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 md:gap-6">
                ${recentCardsHTML}
              </div>
              ${state.subjects.length > 3 ? `
                <button onclick="window.app.switchTab('subjects')" class="mt-6 w-full md:w-auto text-center py-2.5 px-6 rounded-xl bg-slate-100 hover:bg-slate-200 text-slate-600 font-medium transition-all animate-fade-in">
                  View All Subjects &rarr;
                </button>
              ` : ''}
            </div>
          </div>
        `;
      } else {
        const cardsHTML = state.subjects.map((s, i) => generateSubjectCard(s, i)).join('');
        const addPlaceholder = `
          <button onclick="window.app.openAddSubjectModal()" class="flex flex-col items-center justify-center h-48 bg-slate-50 hover:bg-indigo-50 border-2 border-dashed border-slate-200 hover:border-indigo-300 rounded-3xl transition-all group animate-fade-in">
            <div class="p-3 bg-white rounded-full text-slate-400 group-hover:text-indigo-600 group-hover:scale-110 transition-all shadow-sm">
              <i data-lucide="plus" class="w-6 h-6"></i>
            </div>
            <span class="mt-3 font-medium text-slate-500 group-hover:text-indigo-600">Add New Subject</span>
          </button>
        `;
        container.innerHTML = `
          <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 md:gap-6">
            ${cardsHTML}
            ${addPlaceholder}
          </div>
        `;
      }
      lucide.createIcons();
    }

    function renderSubjectDrawer() {
      if (!state.selectedSubjectId) return;
      const subject = state.subjects.find(s => s.id === state.selectedSubjectId);
      if (!subject) {
        window.app.closeSubjectDrawer();
        return;
      }

      const progress = calculateProgress(subject);
      const textColor = subject.color.replace('bg-', 'text-');
      const drawer = document.getElementById('drawer-content');

      let unitsHTML = '';
      if (!subject.units || subject.units.length === 0) {
        unitsHTML += `
          <div class="text-center py-10 animate-fade-in">
            <div class="inline-flex items-center justify-center w-12 h-12 rounded-full bg-slate-100 mb-3">
              <i data-lucide="folder-open" class="w-6 h-6 text-slate-400"></i>
            </div>
            <p class="text-slate-500 font-medium">No units added yet.</p>
            <p class="text-xs text-slate-400 mt-1">Start by creating your first study unit.</p>
          </div>
        `;
      } else {
        unitsHTML += subject.units.map(unit => {
          let subunitsHTML = '';
          if (unit.subunits && unit.subunits.length > 0) {
            subunitsHTML = `<ul class="space-y-1 mt-2 mb-3">` + unit.subunits.map(su => `
              <li class="group flex items-center justify-between hover:bg-slate-50 p-2 rounded-xl transition-colors border border-transparent hover:border-slate-100">
                <button onclick="window.app.toggleSubunit('${subject.id}', '${unit.id}', '${su.id}')" class="flex-1 flex items-center gap-3 text-left">
                  ${su.completed 
                    ? `<i data-lucide="check-circle-2" class="w-5 h-5 ${textColor}"></i>` 
                    : `<i data-lucide="circle" class="w-5 h-5 text-slate-300 group-hover:text-indigo-300"></i>`
                  }
                  <span class="text-sm font-medium ${su.completed ? 'text-slate-400 line-through' : 'text-slate-700'}">${su.title}</span>
                </button>
                <button onclick="window.app.deleteSubunit('${subject.id}', '${unit.id}', '${su.id}')" class="p-1.5 text-slate-300 hover:text-rose-500 opacity-0 group-hover:opacity-100 transition-opacity rounded-lg">
                  <i data-lucide="trash-2" class="w-4 h-4"></i>
                </button>
              </li>
            `).join('') + `</ul>`;
          } else {
            subunitsHTML = `<p class="text-xs text-slate-400 mt-2 ml-2 italic mb-3">No tasks in this unit.</p>`;
          }
          return `
            <div class="bg-white border border-slate-200 rounded-2xl mb-4 overflow-hidden shadow-sm animate-slide-up">
              <div class="bg-slate-50/50 p-3 border-b border-slate-100 flex items-center justify-between">
                <h4 class="font-bold text-slate-800 text-sm flex items-center gap-2">
                  <i data-lucide="folder" class="w-4 h-4 ${textColor}"></i>
                  ${unit.title}
                </h4>
                <button onclick="window.app.deleteUnit('${subject.id}', '${unit.id}')" class="text-slate-400 hover:text-rose-500 transition-colors p-1.5 rounded-lg hover:bg-rose-50">
                  <i data-lucide="trash-2" class="w-4 h-4"></i>
                </button>
              </div>
              <div class="p-3">
                ${subunitsHTML}
                <form onsubmit="window.app.handleAddSubunit(event, '${subject.id}', '${unit.id}')" class="flex items-center gap-2">
                  <input type="text" name="subunit" placeholder="Add task..." class="flex-1 bg-slate-50 border border-slate-200 rounded-lg px-3 py-2 text-xs focus:outline-none focus:ring-1 focus:ring-indigo-500 focus:bg-white transition-all" required autocomplete="off"/>
                  <button type="submit" class="bg-slate-100 text-slate-600 hover:text-white hover:${subject.color} p-2 rounded-lg transition-colors">
                    <i data-lucide="plus" class="w-4 h-4"></i>
                  </button>
                </form>
              </div>
            </div>
          `;
        }).join('');
      }

      drawer.innerHTML = `
        <div class="${subject.color} bg-opacity-10 p-6 border-b border-slate-100 flex items-start justify-between">
          <div>
            <div class="flex items-center gap-3 mb-2">
              <div class="p-3 rounded-2xl ${subject.color} bg-opacity-10 text-opacity-90 flex items-center justify-center">
                <i data-lucide="book-marked" class="w-6 h-6 ${textColor}"></i>
              </div>
              <h2 class="text-xl font-bold text-slate-800">${subject.title}</h2>
            </div>
            <div class="flex items-center gap-2 mt-4">
              <div class="flex-1 w-32">
                ${generateProgressBar(progress, subject.color)}
              </div>
              <span class="text-sm font-semibold text-slate-600">${progress}%</span>
            </div>
          </div>
          <div class="flex items-center gap-2">
            <button onclick="window.app.deleteSubject('${subject.id}')" class="p-2 text-slate-400 hover:text-rose-500 hover:bg-rose-50 rounded-full transition-colors">
              <i data-lucide="trash-2" class="w-5 h-5"></i>
            </button>
            <button onclick="window.app.closeSubjectDrawer()" class="p-2 text-slate-400 hover:bg-slate-100 rounded-full transition-colors">
              <i data-lucide="x" class="w-6 h-6"></i>
            </button>
          </div>
        </div>
        <div class="flex-1 overflow-y-auto p-4 md:p-6 bg-slate-50/50">
          <div class="flex justify-between items-center mb-4">
            <h3 class="text-xs font-bold text-slate-400 uppercase tracking-wider">Course Content</h3>
          </div>
          ${unitsHTML}
        </div>
        <div class="p-4 bg-white border-t border-slate-100">
          <form onsubmit="window.app.handleAddUnit(event, '${subject.id}')" class="flex items-center gap-2">
            <input type="text" name="unit" placeholder="Add new unit..." class="flex-1 bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:bg-white transition-all" required autocomplete="off"/>
            <button type="submit" class="${subject.color} text-white px-4 py-3 rounded-xl hover:opacity-90 transition-all font-medium text-sm shadow-sm flex items-center gap-2">
              <i data-lucide="folder-plus" class="w-4 h-4"></i>
              <span class="hidden sm:inline">Add Unit</span>
            </button>
          </form>
        </div>
      `;
      lucide.createIcons({ root: drawer });
    }

    // App API
    window.app = {
      switchTab: (tab) => {
        state.activeTab = tab;
        renderView();
      },
      openAddSubjectModal: () => {
        document.getElementById('new-subject-title').value = '';
        document.getElementById('add-subject-modal').classList.remove('hidden');
        setTimeout(() => document.getElementById('new-subject-title').focus(), 100);
      },
      closeAddSubjectModal: () => {
        document.getElementById('add-subject-modal').classList.add('hidden');
      },
      openSubjectDrawer: (id) => {
        state.selectedSubjectId = id;
        renderSubjectDrawer();
        document.getElementById('subject-drawer').classList.remove('hidden');
      },
      closeSubjectDrawer: () => {
        state.selectedSubjectId = null;
        document.getElementById('subject-drawer').classList.add('hidden');
      },
      openSettings: () => {
        document.getElementById('settings-modal').classList.remove('hidden');
      },
      closeSettings: () => {
        document.getElementById('settings-modal').classList.add('hidden');
      },
      logout: async () => {
        try { 
          await signOut(auth); 
          window.app.closeSettings();
        } catch (error) { console.error(error); }
      },
      handleBackup: () => {
        if (!state.subjects.length) {
          showToast("Nothing to backup", "info");
          return;
        }
        const dataStr = JSON.stringify(state.subjects, null, 2);
        const blob = new Blob([dataStr], { type: "application/json" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `studymaster_backup_${new Date().toISOString().split('T')[0]}.json`;
        a.click();
        URL.revokeObjectURL(url);
        showToast("Backup downloaded!", "success");
      },
      handleRestore: (event) => {
        const file = event.target.files[0];
        if (!file || !state.user) return;
        const reader = new FileReader();
        reader.onload = async (e) => {
          try {
            const data = JSON.parse(e.target.result);
            showToast("Restoring data...", "info");
            for (const subject of data) {
              const ref = doc(db, 'artifacts', appId, 'users', state.user.uid, 'subjects', subject.id);
              await setDoc(ref, subject);
            }
            showToast("Restore complete!", "success");
            window.app.closeSettings();
          } catch(err) {
            showToast("Restore failed", "error");
          }
          event.target.value = '';
        };
        reader.readAsText(file);
      },
      handleAddSubject: async (e) => {
        e.preventDefault();
        if (!state.user) return;
        const input = document.getElementById('new-subject-title');
        const title = input.value.trim();
        if (!title) return;

        const newId = crypto.randomUUID();
        const newSubject = { 
          id: newId, 
          title, 
          color: colors[Math.floor(Math.random() * colors.length)], 
          units: [], 
          createdAt: Date.now() 
        };
        
        state.subjects.unshift(newSubject);
        window.app.closeAddSubjectModal();
        renderView();

        try {
          await setDoc(doc(db, 'artifacts', appId, 'users', state.user.uid, 'subjects', newId), newSubject);
          showToast("Subject created", "success");
        } catch (err) { showToast("Sync failed", "error"); }
      },
      deleteSubject: async (id) => {
        if (!state.user) return;
        state.subjects = state.subjects.filter(s => s.id !== id);
        window.app.closeSubjectDrawer();
        renderView();
        try {
          await deleteDoc(doc(db, 'artifacts', appId, 'users', state.user.uid, 'subjects', id));
          showToast("Subject deleted", "info");
        } catch (err) { console.error(err); }
      },
      handleAddUnit: async (e, subjectId) => {
        e.preventDefault();
        const title = e.target.elements.unit.value.trim();
        if (!title || !state.user) return;

        const subject = state.subjects.find(s => s.id === subjectId);
        const newUnit = { id: crypto.randomUUID(), title, subunits: [] };
        const updatedUnits = [...(subject.units || []), newUnit];
        
        subject.units = updatedUnits;
        e.target.elements.unit.value = '';
        renderSubjectDrawer();

        try {
          await updateDoc(doc(db, 'artifacts', appId, 'users', state.user.uid, 'subjects', subjectId), { units: updatedUnits });
        } catch (err) { console.error(err); }
      },
      deleteUnit: async (subjectId, unitId) => {
        const subject = state.subjects.find(s => s.id === subjectId);
        const updatedUnits = subject.units.filter(u => u.id !== unitId);
        subject.units = updatedUnits;
        renderSubjectDrawer();
        try {
          await updateDoc(doc(db, 'artifacts', appId, 'users', state.user.uid, 'subjects', subjectId), { units: updatedUnits });
        } catch (err) { console.error(err); }
      },
      handleAddSubunit: async (e, subjectId, unitId) => {
        e.preventDefault();
        const title = e.target.elements.subunit.value.trim();
        if (!title || !state.user) return;

        const subject = state.subjects.find(s => s.id === subjectId);
        const newSub = { id: crypto.randomUUID(), title, completed: false };
        const updatedUnits = subject.units.map(u => 
          u.id === unitId ? { ...u, subunits: [...(u.subunits || []), newSub] } : u
        );

        subject.units = updatedUnits;
        e.target.elements.subunit.value = '';
        renderSubjectDrawer();
        if (state.activeTab === 'dashboard') renderView();

        try {
          await updateDoc(doc(db, 'artifacts', appId, 'users', state.user.uid, 'subjects', subjectId), { units: updatedUnits });
        } catch (err) { console.error(err); }
      },
      toggleSubunit: async (subjectId, unitId, subunitId) => {
        const subject = state.subjects.find(s => s.id === subjectId);
        const updatedUnits = subject.units.map(u => 
          u.id === unitId ? {
            ...u, subunits: u.subunits.map(su => su.id === subunitId ? { ...su, completed: !su.completed } : su)
          } : u
        );
        subject.units = updatedUnits;
        renderSubjectDrawer();
        if (state.activeTab === 'dashboard') renderView();
        try {
          await updateDoc(doc(db, 'artifacts', appId, 'users', state.user.uid, 'subjects', subjectId), { units: updatedUnits });
        } catch (err) { console.error(err); }
      },
      deleteSubunit: async (subjectId, unitId, subunitId) => {
        const subject = state.subjects.find(s => s.id === subjectId);
        const updatedUnits = subject.units.map(u => 
          u.id === unitId ? { ...u, subunits: u.subunits.filter(su => su.id !== subunitId) } : u
        );
        subject.units = updatedUnits;
        renderSubjectDrawer();
        if (state.activeTab === 'dashboard') renderView();
        try {
          await updateDoc(doc(db, 'artifacts', appId, 'users', state.user.uid, 'subjects', subjectId), { units: updatedUnits });
        } catch (err) { console.error(err); }
      }
    };

    // Auth & Init
    const initAuth = async () => {
      try {
        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
          await signInWithCustomToken(auth, __initial_auth_token);
        } else {
          await signInAnonymously(auth);
        }
      } catch (err) { console.error(err); }
    };
    initAuth();

    onAuthStateChanged(auth, (user) => {
      state.user = user;
      document.getElementById('loading-modal').classList.add('hidden');
      
      if (user) {
        if (appContainer) appContainer.classList.remove('hidden');
        if (state.unsubscribeDb) state.unsubscribeDb();
        const subjectsRef = collection(db, 'artifacts', appId, 'users', user.uid, 'subjects');
        state.unsubscribeDb = onSnapshot(subjectsRef, (snapshot) => {
          state.subjects = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
          state.subjects.sort((a, b) => b.createdAt - a.createdAt);
          renderView();
          if (state.selectedSubjectId) renderSubjectDrawer();
        }, (err) => showToast("Sync Error", "error"));
      } else {
        if (appContainer) appContainer.classList.add('hidden');
      }
    });

  </script>
</body>
</html>
