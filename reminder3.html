<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StudyFlow Pro</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            50: '#eef2ff',
                            100: '#e0e7ff',
                            500: '#6366f1',
                            600: '#4f46e5',
                            700: '#4338ca',
                        },
                        appbg: '#f8fafc'
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #f8fafc; }
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #c7c7cc; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #a1a1aa; }
        
        .modal-enter { opacity: 0; transform: scale(0.95); transition: all 0.2s ease-out; }
        .modal-enter-active { opacity: 1; transform: scale(1); }
    </style>
</head>
<body class="text-slate-800 antialiased min-h-screen flex flex-col">

    <!-- Navigation Bar -->
    <nav class="bg-white border-b border-slate-200 sticky top-0 z-10 shadow-sm">
        <div class="max-w-5xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16 items-center">
                <div class="flex items-center gap-2">
                    <i class="ph-fill ph-books text-brand-600 text-3xl"></i>
                    <span class="font-bold text-xl tracking-tight text-slate-900">StudyFlow Pro</span>
                </div>
                <div class="flex items-center gap-4">
                    <span id="sync-status" class="text-sm font-medium text-slate-500 hidden sm:flex items-center gap-1">
                        <i class="ph ph-cloud-slash text-lg"></i> Local
                    </span>
                    <button id="btn-login" class="bg-brand-50 text-brand-700 hover:bg-brand-100 px-4 py-2 rounded-lg font-medium transition-colors flex items-center gap-2">
                        <i class="ph ph-google-logo text-lg"></i> Sign In
                    </button>
                    <div id="user-menu" class="hidden flex items-center gap-3">
                        <img id="user-avatar" src="" alt="Avatar" class="w-8 h-8 rounded-full border border-slate-200">
                        <button id="btn-logout" class="text-slate-500 hover:text-red-500 p-2 rounded-lg transition-colors" title="Sign Out">
                            <i class="ph ph-sign-out text-xl"></i>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="flex-1 max-w-5xl mx-auto w-full px-4 sm:px-6 lg:px-8 py-8">
        <div class="flex justify-between items-center mb-6">
            <h1 class="text-2xl font-bold text-slate-900">Upcoming Reviews</h1>
            <button onclick="openModal()" class="bg-brand-600 hover:bg-brand-700 text-white px-4 py-2 rounded-lg font-medium transition-colors shadow-sm flex items-center gap-2">
                <i class="ph ph-plus-circle text-lg"></i> Add Topic
            </button>
        </div>

        <!-- Task Grid -->
        <div id="task-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
            <!-- Tasks will be injected here -->
        </div>

        <!-- Empty State -->
        <div id="empty-state" class="hidden flex flex-col items-center justify-center py-20 text-center">
            <div class="w-24 h-24 bg-brand-50 rounded-full flex items-center justify-center mb-4 text-brand-500">
                <i class="ph ph-notebook text-5xl"></i>
            </div>
            <h3 class="text-lg font-semibold text-slate-900 mb-1">No topics to review</h3>
            <p class="text-slate-500 max-w-sm mb-6">Add a new study topic to keep track of your revision schedule.</p>
            <button onclick="openModal()" class="text-brand-600 font-medium hover:text-brand-700">Add your first topic &rarr;</button>
        </div>
    </main>

    <!-- Modal Background -->
    <div id="modal-bg" class="fixed inset-0 bg-slate-900/50 backdrop-blur-sm z-40 hidden transition-opacity"></div>
    
    <!-- Task Modal -->
    <div id="task-modal" class="fixed inset-0 z-50 hidden flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl shadow-xl w-full max-w-md overflow-hidden modal-enter flex flex-col max-h-[90vh]">
            <div class="px-6 py-4 border-b border-slate-100 flex justify-between items-center bg-slate-50/50">
                <h2 id="modal-title" class="text-lg font-bold text-slate-900">Add New Topic</h2>
                <button onclick="closeModal()" class="text-slate-400 hover:text-slate-600 p-1 rounded-md transition-colors">
                    <i class="ph ph-x text-xl"></i>
                </button>
            </div>
            
            <form id="form-topic" class="p-6 flex-1 overflow-y-auto">
                <input type="hidden" id="topic-id">
                
                <div class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">Topic Name</label>
                        <input type="text" id="topic-name" required class="w-full border border-slate-300 rounded-lg px-4 py-2 focus:ring-2 focus:ring-brand-500 focus:border-brand-500 outline-none transition-shadow" placeholder="e.g. Thermodynamics">
                    </div>
                    
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-medium text-slate-700 mb-1">Subject</label>
                            <input type="text" id="topic-subject" required class="w-full border border-slate-300 rounded-lg px-4 py-2 focus:ring-2 focus:ring-brand-500 focus:border-brand-500 outline-none" placeholder="Physics">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-slate-700 mb-1">Review Date</label>
                            <input type="date" id="topic-date" required class="w-full border border-slate-300 rounded-lg px-4 py-2 focus:ring-2 focus:ring-brand-500 focus:border-brand-500 outline-none">
                        </div>
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">Study Link (Optional)</label>
                        <input type="url" id="topic-link" class="w-full border border-slate-300 rounded-lg px-4 py-2 focus:ring-2 focus:ring-brand-500 focus:border-brand-500 outline-none" placeholder="https://...">
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">Notes (Optional)</label>
                        <textarea id="topic-notes" rows="3" class="w-full border border-slate-300 rounded-lg px-4 py-2 focus:ring-2 focus:ring-brand-500 focus:border-brand-500 outline-none resize-none" placeholder="Key points to remember..."></textarea>
                    </div>
                </div>

                <div class="mt-8 flex gap-3 justify-end">
                    <button type="button" id="btn-delete-topic" class="hidden px-4 py-2 text-red-600 bg-red-50 hover:bg-red-100 rounded-lg font-medium transition-colors">Delete</button>
                    <button type="button" onclick="closeModal()" class="px-4 py-2 text-slate-600 bg-slate-100 hover:bg-slate-200 rounded-lg font-medium transition-colors">Cancel</button>
                    <button type="submit" class="px-4 py-2 bg-brand-600 text-white hover:bg-brand-700 rounded-lg font-medium shadow-sm transition-colors">Save Topic</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Firebase Scripts (Modular V10) -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, deleteDoc, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // Your Firebase config
        const firebaseConfig = {
            apiKey: "AIzaSyA9DLfAHTUUGxCPn2j_k6godoTEopzaFAU",
            authDomain: "studymaster-919ba.firebaseapp.com",
            projectId: "studymaster-919ba",
            storageBucket: "studymaster-919ba.firebasestorage.app",
            messagingSenderId: "426684063256",
            appId: "1:426684063256:web:52c17625a9450ea9662d6d",
            measurementId: "G-CWQB2330GF"
        };

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app); // Using Firestore instead of Realtime DB for better sync capabilities

        // Global State
        let currentUser = null;
        let tasks = [];
        let unsubscribeSnapshot = null;

        // UI Elements
        const syncStatus = document.getElementById('sync-status');
        const btnLogin = document.getElementById('btn-login');
        const userMenu = document.getElementById('user-menu');
        const btnLogout = document.getElementById('btn-logout');
        const userAvatar = document.getElementById('user-avatar');

        // Authentication logic
        btnLogin.addEventListener('click', async () => {
            const provider = new GoogleAuthProvider();
            try {
                await signInWithPopup(auth, provider);
            } catch (error) {
                console.error("Login Error:", error);
                alert("Login failed! Please try again.");
            }
        });

        btnLogout.addEventListener('click', () => {
            signOut(auth);
        });

        onAuthStateChanged(auth, (user) => {
            currentUser = user;
            if (user) {
                // Logged in UI
                btnLogin.classList.add('hidden');
                userMenu.classList.remove('hidden');
                userMenu.classList.add('flex');
                userAvatar.src = user.photoURL || 'https://via.placeholder.com/150';
                syncStatus.innerHTML = `<i class="ph-fill ph-cloud-check text-green-500 text-lg"></i> Synced`;
                syncStatus.classList.remove('hidden');
                
                // Start cloud sync
                startCloudSync();
            } else {
                // Logged out UI
                btnLogin.classList.remove('hidden');
                userMenu.classList.add('hidden');
                userMenu.classList.remove('flex');
                syncStatus.innerHTML = `<i class="ph ph-cloud-slash text-slate-400 text-lg"></i> Local`;
                syncStatus.classList.remove('hidden');

                if (unsubscribeSnapshot) {
                    unsubscribeSnapshot();
                    unsubscribeSnapshot = null;
                }

                // Load from LocalStorage
                const localData = localStorage.getItem('studyTasks');
                tasks = localData ? JSON.parse(localData) : [];
                renderTasks();
            }
        });

        function startCloudSync() {
            if (!currentUser) return;
            
            // Note: Make sure your Firestore rules allow read/write for this path!
            // Path: users/{uid}/tasks/{taskId}
            const q = query(collection(db, `users/${currentUser.uid}/tasks`));
            
            unsubscribeSnapshot = onSnapshot(q, (snapshot) => {
                tasks = [];
                snapshot.forEach(doc => {
                    tasks.push({ id: doc.id, ...doc.data() });
                });
                
                // Sort locally (nearest date first)
                tasks.sort((a, b) => new Date(a.nextReviewDate) - new Date(b.nextReviewDate));
                
                renderTasks();
            }, (error) => {
                console.error("Sync Error:", error);
                if(error.code === 'permission-denied') {
                    alert("⚠️ Firestore Permission Denied! Please check your Firebase Database Rules.");
                }
            });
        }

        // Expose functions to global scope for HTML event handlers
        window.mutateTask = async function(id, data, isNew = false) {
            // 1. Optimistic UI update (update local array first)
            if (isNew) {
                tasks.push({ id, ...data });
            } else {
                if (data._deleted) {
                    tasks = tasks.filter(t => t.id !== id);
                } else {
                    const idx = tasks.findIndex(t => t.id === id);
                    if (idx > -1) {
                        tasks[idx] = { ...tasks[idx], ...data };
                    }
                }
            }
            renderTasks();

            // 2. Persist Data
            if (currentUser) {
                // Save to Cloud (Firestore)
                try {
                    const docRef = doc(db, `users/${currentUser.uid}/tasks`, id);
                    if (data._deleted) {
                        await deleteDoc(docRef);
                    } else {
                        // Find the complete task object to save
                        const taskToSave = tasks.find(t => t.id === id);
                        await setDoc(docRef, taskToSave);
                    }
                } catch (error) {
                    console.error("Error saving to cloud:", error);
                }
            } else {
                // Save to LocalStorage if offline/not logged in
                localStorage.setItem('studyTasks', JSON.stringify(tasks));
            }
        };

        // UI & Helper Functions
        const getTodayStr = () => new Date().toISOString().split('T')[0];
        const addDaysStr = (dateStr, days) => {
            const d = new Date(dateStr);
            d.setDate(d.getDate() + days);
            return d.toISOString().split('T')[0];
        };
        const generateId = () => Math.random().toString(36).substr(2, 9);

        // Open Modal Function
        window.openModal = function(taskId = null) {
            document.getElementById('modal-bg').classList.remove('hidden');
            const modal = document.getElementById('task-modal');
            modal.classList.remove('hidden');
            
            // Add animation class
            setTimeout(() => {
                modal.querySelector('.bg-white').classList.add('modal-enter-active');
            }, 10);

            const form = document.getElementById('form-topic');
            const deleteBtn = document.getElementById('btn-delete-topic');
            const title = document.getElementById('modal-title');

            if (taskId) {
                const task = tasks.find(t => t.id === taskId);
                if (task) {
                    title.textContent = 'Edit Topic';
                    document.getElementById('topic-id').value = task.id;
                    document.getElementById('topic-name').value = task.topic;
                    document.getElementById('topic-subject').value = task.subject;
                    document.getElementById('topic-date').value = task.nextReviewDate;
                    document.getElementById('topic-link').value = task.summaryLink || '';
                    document.getElementById('topic-notes').value = task.notes || '';
                    deleteBtn.classList.remove('hidden');
                }
            } else {
                title.textContent = 'Add New Topic';
                form.reset();
                document.getElementById('topic-id').value = '';
                document.getElementById('topic-date').value = getTodayStr();
                deleteBtn.classList.add('hidden');
            }
        };

        window.closeModal = function() {
            const modalInner = document.querySelector('#task-modal .bg-white');
            modalInner.classList.remove('modal-enter-active');
            
            setTimeout(() => {
                document.getElementById('modal-bg').classList.add('hidden');
                document.getElementById('task-modal').classList.add('hidden');
            }, 200);
        };

        function renderTasks() {
            const grid = document.getElementById('task-grid');
            const emptyState = document.getElementById('empty-state');
            
            if (tasks.length === 0) {
                grid.innerHTML = '';
                emptyState.classList.remove('hidden');
                return;
            }
            
            emptyState.classList.add('hidden');
            grid.innerHTML = tasks.map(task => {
                const isOverdue = new Date(task.nextReviewDate) < new Date(getTodayStr());
                const isToday = task.nextReviewDate === getTodayStr();
                
                let dateColor = 'text-slate-500';
                let dateIcon = 'ph-calendar-blank';
                if (isOverdue) { dateColor = 'text-red-500 font-medium'; dateIcon = 'ph-warning-circle text-red-500'; }
                if (isToday) { dateColor = 'text-amber-600 font-medium'; dateIcon = 'ph-clock text-amber-600'; }

                return `
                <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-5 hover:shadow-md transition-shadow relative group">
                    <button onclick="openModal('${task.id}')" class="absolute top-4 right-4 text-slate-300 hover:text-brand-500 opacity-0 group-hover:opacity-100 transition-opacity p-1">
                        <i class="ph ph-pencil-simple text-xl"></i>
                    </button>
                    
                    <div class="text-xs font-semibold text-brand-600 bg-brand-50 inline-block px-2 py-1 rounded mb-3 uppercase tracking-wider">
                        ${task.subject}
                    </div>
                    
                    <h3 class="text-lg font-bold text-slate-900 mb-2 leading-tight">${task.topic}</h3>
                    
                    <div class="flex items-center gap-2 mb-3 ${dateColor} text-sm">
                        <i class="ph ${dateIcon} text-lg"></i>
                        <span>${isOverdue ? 'Overdue: ' : isToday ? 'Review Today: ' : 'Next: '}${task.nextReviewDate}</span>
                    </div>

                    ${task.notes ? `<p class="text-sm text-slate-600 mb-4 line-clamp-2">${task.notes}</p>` : '<div class="mb-4"></div>'}
                    
                    <div class="flex items-center justify-between mt-auto pt-4 border-t border-slate-100">
                        ${task.summaryLink ? 
                            `<a href="${task.summaryLink}" target="_blank" class="text-sm font-medium text-slate-500 hover:text-brand-600 flex items-center gap-1">
                                <i class="ph ph-link text-lg"></i> Link
                            </a>` : '<div></div>'
                        }
                        
                        <button onclick="reviewTask('${task.id}')" class="bg-emerald-50 text-emerald-700 hover:bg-emerald-100 px-3 py-1.5 rounded-lg text-sm font-medium transition-colors flex items-center gap-1.5">
                            <i class="ph ph-check-circle text-lg"></i> Mark Reviewed
                        </button>
                    </div>
                </div>
                `;
            }).join('');
        }

        window.reviewTask = function(id) {
            const task = tasks.find(t => t.id === id);
            if (task) {
                const newDate = addDaysStr(getTodayStr(), 3);
                mutateTask(id, { nextReviewDate: newDate });
            }
        };

        // Form Event Listeners
        document.getElementById('form-topic').addEventListener('submit', (e) => {
            e.preventDefault();
            const id = document.getElementById('topic-id').value;
            const isNew = !id;
            const targetId = isNew ? generateId() : id;
            
            const data = {
                topic: document.getElementById('topic-name').value.trim(),
                subject: document.getElementById('topic-subject').value.trim(),
                nextReviewDate: document.getElementById('topic-date').value,
                summaryLink: document.getElementById('topic-link').value.trim(),
                notes: document.getElementById('topic-notes').value.trim()
            };
            
            mutateTask(targetId, data, isNew);
            closeModal();
        });

        document.getElementById('btn-delete-topic').addEventListener('click', () => {
            const id = document.getElementById('topic-id').value;
            if (id && confirm('Are you sure you want to delete this topic?')) {
                mutateTask(id, { _deleted: true });
                closeModal();
            }
        });

        // Initialize (Load local tasks if any before auth state resolves)
        const initialLocal = localStorage.getItem('studyTasks');
        if (initialLocal && tasks.length === 0) {
            tasks = JSON.parse(initialLocal);
            renderTasks();
        }

    </script>
</body>
</html>
