
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Let's have some fun </title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lottie-web/5.12.2/lottie.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-main: #FFF8F4;
            --accent: #0f172a;
            --card-gap: 40px;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg-main);
            margin: 0;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            color: #0f172a;
            -webkit-font-smoothing: antialiased;
        }
        
        #slider-stage {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        #shorts-container {
            display: flex;
            height: 100vh;
            align-items: center;
            gap: var(--card-gap);
            transition: transform 0.8s cubic-bezier(0.23, 1, 0.32, 1);
            will-change: transform;
            position: absolute;
            left: 50%;
        }

        .video-card {
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            width: min(calc(90vh * 9 / 16), calc(100vw - 60px));
            transition: opacity 0.5s ease;
        }

        .card-inner {
            width: 100%;
            height: 90vh;
            position: relative;
            background: #000;
            overflow: hidden;
            border-radius: 40px;
            box-shadow: 0 50px 100px -20px rgba(15, 23, 42, 0.2);
            transition: transform 0.8s cubic-bezier(0.2, 0, 0, 1), filter 0.8s ease;
        }

        @media (max-width: 640px) or (max-aspect-ratio: 10/16) {
            #shorts-container { 
                gap: 0; 
                left: 0;
            }
            .video-card { 
                width: 100vw; 
            }
            .card-inner { 
                height: 100vh;
                width: 100vw;
                border-radius: 0; 
            }
            .scroll-indicator,
            .shortcuts-hint {
                display: none !important;
            }
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: brightness(0.95);
        }

        .card-ui-overlay {
            position: absolute;
            inset: 0;
            padding: 40px 24px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            pointer-events: none;
            z-index: 50;
            background: linear-gradient(to bottom, 
                rgba(0,0,0,0.4) 0%, 
                transparent 25%, 
                transparent 60%, 
                rgba(0,0,0,0.8) 100%);
        }

        .top-info {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .elite-badge {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            padding: 6px 14px;
            border-radius: 12px;
            color: white;
            font-size: 9px;
            font-weight: 800;
            letter-spacing: 0.2em;
            width: fit-content;
            text-transform: uppercase;
            transition: all 0.3s ease;
        }

        .segmented-progress {
            display: flex;
            gap: 6px;
            width: 100%;
        }

        .progress-segment {
            flex: 1;
            height: 2px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 2px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: #ffffff;
            width: 0%;
            border-radius: 2px;
        }

        .bottom-controls {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            pointer-events: auto;
        }

        .video-meta {
            color: white;
            max-width: 80%;
        }

        .video-meta h3 {
            font-weight: 700;
            font-size: 1.35rem;
            margin-bottom: 6px;
            letter-spacing: -0.02em;
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 4px;
        }

        .video-meta p {
            font-size: 0.85rem;
            opacity: 0.7;
            line-height: 1.4;
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 4px;
        }

        /* Lottie emoji styling */
        .lottie-emoji {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 1.4em;
            height: 1.4em;
            vertical-align: middle;
            margin: 0 2px;
        }

        .mute-toggle-btn {
            width: 48px;
            height: 48px;
            border-radius: 16px;
            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        
        .mute-toggle-btn:hover {
            background: rgba(255, 255, 255, 0.25);
            transform: scale(1.02);
        }

        #interaction-hint {
            position: fixed;
            inset: 0;
            background: var(--bg-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            transition: all 0.8s ease;
        }

        .play-core {
            width: 80px;
            height: 80px;
            background: #0f172a;
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            margin-bottom: 24px;
            cursor: pointer;
            transition: transform 0.2s;
        }
        
        .play-core:hover {
            transform: scale(1.05);
        }

        .nav-area {
            position: absolute;
            top: 0;
            bottom: 0;
            width: 35%;
            z-index: 100;
            cursor: pointer;
        }

        .scroll-indicator {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            opacity: 0.4;
            pointer-events: none;
            z-index: 90;
        }

        .mouse-wheel {
            width: 18px;
            height: 28px;
            border: 2px solid #0f172a;
            border-radius: 10px;
            position: relative;
        }

        .mouse-wheel::after {
            content: '';
            position: absolute;
            top: 4px;
            left: 50%;
            transform: translateX(-50%);
            width: 2px;
            height: 6px;
            background: #0f172a;
            border-radius: 2px;
            animation: scroll-anim 2s infinite;
        }

        @keyframes scroll-anim {
            0% { opacity: 1; transform: translate(-50%, 0); }
            100% { opacity: 0; transform: translate(-50%, 10px); }
        }
        
        /* ----- Premium Glassmorphism Notification ----- */
        .glass-notification {
            position: fixed;
            z-index: 1000;
            cursor: pointer;
            opacity: 0;
            transform: translateY(30px) scale(0.95);
            transition: none;
            pointer-events: none;
        }
        
        .glass-notification.show {
            opacity: 1;
            transform: translateY(0) scale(1);
            pointer-events: auto;
            animation: springEntrance 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }
        
        @keyframes springEntrance {
            0% {
                opacity: 0;
                transform: translateY(30px) scale(0.95);
            }
            100% {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }
        
        @keyframes modern-pulse {
            0%, 100% { 
                box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1), 0 0 0 1px rgba(255, 255, 255, 0.4) inset;
                transform: scale(1);
            }
            50% { 
                box-shadow: 0 20px 40px rgba(79, 70, 229, 0.25), 0 0 0 3px rgba(79, 70, 229, 0.4) inset;
                transform: scale(1.03);
            }
        }
        
        .glass-notification.pulse {
            animation: modern-pulse 1.5s ease-in-out 2;
        }
        
        .glass-notification {
            bottom: 100px;
            right: 24px;
            width: 340px;
            max-width: calc(100vw - 48px);
        }
        
        @media (max-width: 640px) {
            .glass-notification {
                top: 20px;
                bottom: auto;
                left: 16px;
                right: 16px;
                width: auto;
                max-width: none;
            }
        }
        
        .notification-container {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(24px);
            border-radius: 28px;
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1), 0 2px 4px rgba(0, 0, 0, 0.02);
            padding: 16px 20px;
            display: flex;
            align-items: center;
            gap: 14px;
            transition: all 0.2s ease;
        }
        
        .notification-avatar {
            width: 48px;
            height: 48px;
            border-radius: 30px;
            background: linear-gradient(135deg, #6366f1, #a855f7);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3);
        }
        
        .notification-content {
            flex: 1;
        }
        
        .notification-header {
            display: flex;
            align-items: baseline;
            justify-content: space-between;
            margin-bottom: 4px;
        }
        
        .notification-sender {
            font-weight: 800;
            font-size: 0.9rem;
            color: #1e293b;
            letter-spacing: -0.2px;
        }
        
        .notification-time {
            font-size: 0.7rem;
            font-weight: 500;
            color: #64748b;
        }
        
        .notification-message {
            font-size: 0.85rem;
            font-weight: 500;
            color: #0f172a;
            line-height: 1.3;
            display: flex;
            align-items: center;
            gap: 6px;
            flex-wrap: wrap;
        }
        
        .notification-message span {
            background: rgba(0,0,0,0.05);
            padding: 2px 8px;
            border-radius: 20px;
            font-size: 0.75rem;
        }
        
        .shortcuts-hint {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(8px);
            padding: 6px 12px;
            border-radius: 40px;
            font-size: 8px;
            font-weight: 500;
            color: rgba(255,255,255,0.7);
            letter-spacing: 0.3px;
            z-index: 200;
            pointer-events: none;
            font-family: monospace;
            border: 1px solid rgba(255,255,255,0.15);
        }
    </style>
</head>
<body>

    <div id="interaction-hint" onclick="startExperience()">
        <div class="play-core">
            <i data-lucide="play" class="w-6 h-6 ml-1"></i>
        </div>
        <h2 class="font-extrabold text-2xl mb-1 tracking-tighter">STREAMLINE</h2>
        <p class="text-slate-400 text-[10px] font-bold tracking-[0.2em] uppercase">Enter Showcase</p>
    </div>

    <main id="slider-stage">
        <div class="nav-area left-0" onclick="handlePrev()"></div>
        <div class="nav-area right-0" onclick="handleNext()"></div>
        
        <div id="shorts-container"></div>

        <div class="scroll-indicator">
            <div class="mouse-wheel"></div>
            <span class="text-[9px] font-bold tracking-[0.1em] uppercase">Click Sides to Navigate</span>
        </div>
    </main>
    
    <!-- Premium Glassmorphism Notification -->
    <div id="secretNotification" class="glass-notification" onclick="handleNotificationClick()">
        <div class="notification-container">
            <div class="notification-avatar">
                <i data-lucide="message-circle" class="w-5 h-5 text-white"></i>
            </div>
            <div class="notification-content">
                <div class="notification-header">
                    <span class="notification-sender">Udara</span>
                    <span class="notification-time">Now</span>
                </div>
                <div class="notification-message">
                    I Know Who You Are
                    <span>🙂🤨</span>
                    <span style="background: rgba(99,102,241,0.2);">tap me</span>
                </div>
            </div>
        </div>
    </div>
    
    <div class="shortcuts-hint">
        ⌨️ ← → | SPACE (⏯️) | M (🔇)
    </div>

    <script type="module">
        // Lottie emoji mapping
        const emojiToLottie = {
            '😅': 'https://raw.githubusercontent.com/alstudy063/reminder3/main/lottie/grinsweat.json',
            '😎': 'https://raw.githubusercontent.com/alstudy063/reminder3/main/lottie/sunglassface.json',
            '😏': 'https://raw.githubusercontent.com/alstudy063/reminder3/main/lottie/smirk.json',
            '😋': 'https://raw.githubusercontent.com/alstudy063/reminder3/main/lottie/yum.json',
            '💔': 'https://raw.githubusercontent.com/alstudy063/reminder3/main/lottie/lottie.json'
        };

        function replaceEmojisWithLottieSpans(text) {
            let result = text;
            for (const [emoji, url] of Object.entries(emojiToLottie)) {
                const regex = new RegExp(escapeRegExp(emoji), 'g');
                result = result.replace(regex, `<span class="lottie-emoji" data-lottie-url="${url}" data-emoji="${emoji}"></span>`);
            }
            return result;
        }

        function escapeRegExp(string) {
            return string.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
        }

        // Initialize all Lottie animations inside the given container (or document)
        function initLottieAnimations(container = document) {
            const elements = container.querySelectorAll('.lottie-emoji:not([data-lottie-initialized])');
            elements.forEach(el => {
                const url = el.getAttribute('data-lottie-url');
                if (url) {
                    lottie.loadAnimation({
                        container: el,
                        renderer: 'svg',
                        loop: true,
                        autoplay: true,
                        path: url
                    });
                    el.setAttribute('data-lottie-initialized', 'true');
                }
            });
        }

        // Video content (no infinite loop initially)
        let content = [
            { src: "https://res.cloudinary.com/dosqol8zt/video/upload/v1777197145/AQOmv-ZqNlBpS6G3fmQotsfmDlHwvDtp9LihBLKHepchtfxKGay6UtP9iJee8ec6Ne5VITA56xNCb_dWjOu_FS7rJ-SXzjmvk3jfDv1bLXE0hQ_tqbpjb.mp4", title: "lest have some fun 😎😋", desc: "Enjoy the moment" },
            { src: "https://res.cloudinary.com/dosqol8zt/video/upload/v1777322827/AQPyiwu2t3WjZPNTa_xCb33bfpK3Ds49fnDcWVboJZGN7HvowugDkgcrJ5LhTKNToJpuKEsjzhER_oiT7HWU7xkfOEuOe0JdSekc_dU_mu8fjj.mp4", title: "Ok 💔", desc: "Heartfelt emotion" },
            { src: "https://res.cloudinary.com/dosqol8zt/video/upload/v1777322839/AQPgpnEb6ptRx4S7EYNBj9SpfZSQZWzmr5iChDIqJUbDCDEdTt_ycEI8X39FwXMFnQgeaT3MRNEzX2mj9V9vkbrvH8fHl6GUKSNoIDIoaz4wTA_gjl05z.mp4", title: "Babies day out 😅😏", desc: "Playful chaos" },
            { src: "https://res.cloudinary.com/dosqol8zt/video/upload/v1777196517/0414_a8rtf5.mp4", title: "Happy birthday, dear! See you, sis!", desc: "Celebration with love" }
        ];

        const container = document.getElementById('shorts-container');
        const hint = document.getElementById('interaction-hint');
        const notification = document.getElementById('secretNotification');
        
        let currentIndex = 0;
        let userInteracted = false;
        let isMuted = false;
        let specialVideoAdded = false;
        let pulseTimer = null;
        
        function isMobileLayout() {
            return window.matchMedia("(max-width: 640px), (max-aspect-ratio: 10/16)").matches;
        }
        
        function buildSegmentsHTML(cardIdx) {
            let html = '';
            content.forEach((_, segIdx) => {
                const fillWidth = (segIdx < cardIdx) ? '100%' : '0%';
                html += `
                    <div class="progress-segment">
                        <div class="progress-fill" id="fill-${cardIdx}-${segIdx}" style="width: ${fillWidth}"></div>
                    </div>
                `;
            });
            return html;
        }
        
        function refreshMuteIcon() {
            const activeCard = document.querySelectorAll('.video-card')[currentIndex];
            if (!activeCard) return;
            const muteBtn = activeCard.querySelector('.mute-toggle-btn');
            if (!muteBtn) return;
            const iconElem = muteBtn.querySelector('i');
            if (iconElem) {
                const newIcon = isMuted ? 'volume-x' : 'volume-2';
                iconElem.setAttribute('data-lucide', newIcon);
            }
            if (window.lucide) lucide.createIcons();
        }
        
        function showNotification() {
            if (!notification || specialVideoAdded) return;
            notification.classList.add('show');
            if (pulseTimer) clearTimeout(pulseTimer);
            pulseTimer = setTimeout(() => {
                if (notification.classList.contains('show') && !specialVideoAdded) {
                    notification.classList.add('pulse');
                    setTimeout(() => {
                        notification.classList.remove('pulse');
                    }, 3000);
                }
            }, 2000);
        }
        
        function hideNotification() {
            if (!notification) return;
            notification.classList.remove('show', 'pulse');
            if (pulseTimer) clearTimeout(pulseTimer);
        }
        
        function addSpecialVideoAndTransition() {
            if (specialVideoAdded) return;
            
            const specialVideo = {
                src: "https://res.cloudinary.com/dosqol8zt/video/upload/v1777322829/AQNw8nmVtqWHvNAgXS1Qg-us02c2Q7SXkj6-EJo9CQAiazrv8izSv_sgrqFRken6YSfi0F5qs1V7jV_Pq0_-XVBcfe_EAE0tAowtC4jbddnzvw_zhmgjd.mp4",
                title: "Secret Reveal 🕵️",
                desc: "You unlocked the mystery"
            };
            
            content.push(specialVideo);
            specialVideoAdded = true;
            
            // Rebuild container
            container.innerHTML = '';
            content.forEach((item, idx) => {
                container.appendChild(createCard(item, idx));
            });
            
            // Jump to new video
            currentIndex = content.length - 1;
            updateSlider();
            
            hideNotification();
            // Initialize Lottie animations for the new card
            initLottieAnimations(container);
        }
        
        window.handleNotificationClick = function() {
            if (!specialVideoAdded) {
                addSpecialVideoAndTransition();
            }
        };
        
        function createCard(item, index) {
            const card = document.createElement('div');
            card.className = `video-card`;
            const segmentsHTML = buildSegmentsHTML(index);
            
            // Replace emojis in title and description with Lottie spans
            const titleWithLottie = replaceEmojisWithLottieSpans(item.title);
            const descWithLottie = replaceEmojisWithLottieSpans(item.desc);
            
            card.innerHTML = `
                <div class="card-inner">
                    <video src="${item.src}" playsinline preload="auto"></video>
                    <div class="card-ui-overlay">
                        <div class="top-info">
                            <div class="segmented-progress">${segmentsHTML}</div>
                            <div class="elite-badge">Elite Series • 0${index + 1}</div>
                        </div>
                        <div class="bottom-controls">
                            <div class="video-meta">
                                <h3>${titleWithLottie}</h3>
                                <p>${descWithLottie}</p>
                            </div>
                            <button class="mute-toggle-btn" data-mute-btn="true">
                                <i data-lucide="${isMuted ? 'volume-x' : 'volume-2'}" class="mute-icon w-4 h-4"></i>
                            </button>
                        </div>
                    </div>
                </div>
            `;
            
            const video = card.querySelector('video');
            
            video.addEventListener('timeupdate', () => {
                if (index === currentIndex && userInteracted && video.duration && isFinite(video.duration)) {
                    const progress = (video.currentTime / video.duration) * 100;
                    const activeFill = document.getElementById(`fill-${index}-${index}`);
                    if (activeFill) activeFill.style.width = `${progress}%`;
                    
                    if (index === content.length - 1 && !specialVideoAdded && progress >= 90) {
                        showNotification();
                    }
                }
            });
            
            video.addEventListener('ended', () => {
                if (userInteracted && index === currentIndex) {
                    if (currentIndex < content.length - 1) {
                        setTimeout(() => {
                            if (currentIndex === index) handleNext();
                        }, 50);
                    } else if (index === content.length - 1 && !specialVideoAdded) {
                        showNotification();
                    }
                }
            });
            
            return card;
        }
        
        function updateSlider() {
            const cards = document.querySelectorAll('.video-card');
            if (cards.length === 0) return;
            
            const mobile = isMobileLayout();
            const gap = mobile ? 0 : 40;
            const cardWidth = cards[0].offsetWidth;
            
            if (mobile) {
                const offset = currentIndex * cardWidth;
                container.style.transform = `translateX(${-offset}px)`;
            } else {
                const offset = (currentIndex * (cardWidth + gap)) + (cardWidth / 2);
                container.style.transform = `translateX(${-offset}px)`;
            }
            
            cards.forEach((card, i) => {
                const video = card.querySelector('video');
                const inner = card.querySelector('.card-inner');
                const isActive = (i === currentIndex);
                
                if (isActive) {
                    video.muted = isMuted;
                    if (userInteracted) {
                        video.play().catch(e => console.log("play resume", e));
                    }
                    inner.style.transform = "scale(1)";
                    inner.style.filter = "brightness(1) blur(0px)";
                    card.style.opacity = "1";
                } else {
                    video.pause();
                    video.currentTime = 0;
                    inner.style.transform = "scale(0.85)";
                    inner.style.filter = "brightness(0.3) blur(8px)";
                    card.style.opacity = "0.6";
                }
            });
            
            // Sync progress fills
            for (let i = 0; i < content.length; i++) {
                for (let seg = 0; seg < content.length; seg++) {
                    const fillEl = document.getElementById(`fill-${i}-${seg}`);
                    if (fillEl) {
                        if (i === currentIndex && seg === currentIndex) {
                            if (!userInteracted || fillEl.style.width === '0%' || fillEl.style.width === '') {
                                fillEl.style.width = '0%';
                            }
                        } else if (i === currentIndex) {
                            fillEl.style.width = (seg < currentIndex) ? '100%' : '0%';
                        } else {
                            fillEl.style.width = (seg < i) ? '100%' : '0%';
                        }
                    }
                }
            }
            
            refreshMuteIcon();
            if (window.lucide) lucide.createIcons();
        }
        
        window.handleNext = function() {
            if (!content.length) return;
            if (currentIndex < content.length - 1) {
                currentIndex++;
                updateSlider();
            }
        }
        
        window.handlePrev = function() {
            if (!content.length) return;
            if (currentIndex > 0) {
                currentIndex--;
                updateSlider();
            }
        }
        
        window.toggleMute = function(event) {
            if (event) event.stopPropagation();
            isMuted = !isMuted;
            const activeCard = document.querySelectorAll('.video-card')[currentIndex];
            if (activeCard) {
                const activeVideo = activeCard.querySelector('video');
                if (activeVideo) activeVideo.muted = isMuted;
            }
            refreshMuteIcon();
            if (window.lucide) lucide.createIcons();
        };
        
        window.togglePlayPause = function() {
            if (!userInteracted) return;
            const activeCard = document.querySelectorAll('.video-card')[currentIndex];
            if (!activeCard) return;
            const video = activeCard.querySelector('video');
            if (!video) return;
            if (video.paused) video.play().catch(e => console.log("play error", e));
            else video.pause();
        };
        
        document.addEventListener('click', (e) => {
            const btn = e.target.closest('.mute-toggle-btn');
            if (btn && userInteracted) {
                e.preventDefault();
                e.stopPropagation();
                toggleMute(e);
            }
        });
        
        window.startExperience = function() {
            if (userInteracted) return;
            userInteracted = true;
            hint.style.opacity = '0';
            hint.style.pointerEvents = 'none';
            setTimeout(() => {
                hint.style.display = 'none';
            }, 800);
            updateSlider();
        }
        
        window.addEventListener('keydown', (e) => {
            if (!userInteracted) return;
            if (e.key === 'ArrowLeft') { e.preventDefault(); handlePrev(); return; }
            if (e.key === 'ArrowRight') { e.preventDefault(); handleNext(); return; }
            if (e.key === ' ' || e.key === 'Space' || e.code === 'Space') { e.preventDefault(); e.stopPropagation(); togglePlayPause(); return; }
            if (e.key === 'm' || e.key === 'M') { e.preventDefault(); toggleMute(); return; }
        });
        
        window.addEventListener('resize', () => updateSlider());
        window.addEventListener('orientationchange', () => setTimeout(updateSlider, 30));
        
        content.forEach((item, idx) => container.appendChild(createCard(item, idx)));
        updateSlider();
        
        // Initialize Lottie animations on all cards
        initLottieAnimations(container);
        
        const firstVideo = document.querySelector('.video-card video');
        if (firstVideo) firstVideo.load();
        
        if (window.lucide) lucide.createIcons();
        
        console.log('Lottie animations integrated — emojis replaced with smooth, looping animations');
    </script>
</body>
</html>
