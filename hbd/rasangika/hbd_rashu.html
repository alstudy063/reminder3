<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>yo sis</title>
  
  <!-- Modern Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;0,700;1,600&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Lato:ital,wght@1,300&display=swap" rel="stylesheet">
  
  <!-- External Libraries -->
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/vanilla-tilt/1.8.1/vanilla-tilt.min.js"></script>

  <style>
    :root {
      --card-width: 420px;
      --card-height: 580px;
      --primary: #5c4033; 
      --accent: #d4a373;
      --bg-cream: #fdf6e9;
      --navy-dark: #1a233a;
      --glass-bg: rgba(253, 246, 233, 0.45);
      --glass-border: rgba(255, 255, 255, 0.5);
    }

    /* Dark Mode Support */
    @media (prefers-color-scheme: dark) {
      :root {
        --bg-cream: #121212;
        --primary: #f0e6d2; 
        --accent: #e5b88f;
        --navy-dark: #0a0a0a;
        --glass-bg: rgba(30, 30, 30, 0.5);
        --glass-border: rgba(255, 255, 255, 0.1);
      }
      body {
        background: linear-gradient(45deg, #1a1a2e, #16213e, #0f3460, #1a1a2e) !important;
        background-size: 400% 400% !important;
      }
      .hi-claudia, .happy-birthday-main { color: var(--primary); text-shadow: 0 2px 10px rgba(255,255,255,0.1); }
      .photo-frame { background: #1a1a1a !important; box-shadow: 0 15px 35px rgba(0,0,0,0.5) !important; }
      .it-is-birthday { color: var(--accent); }
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      cursor: none; /* Hide default cursor for custom cursor */
    }

    body {
      font-family: 'Poppins', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(45deg, #fff5e6, #ffccd5, #e2cfea, #fdf0d5);
      background-size: 400% 400%;
      animation: gradientBG 15s ease infinite;
      overflow: hidden;
    }

    /* Custom Cursor */
    #custom-cursor {
      position: fixed;
      top: 0;
      left: 0;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255,255,255,0.8), rgba(255,255,255,0));
      pointer-events: none;
      z-index: 9999;
      transform: translate(-50%, -50%);
      transition: transform 0.1s, width 0.2s, height 0.2s;
      mix-blend-mode: overlay;
      box-shadow: 0 0 15px rgba(255, 255, 255, 0.5);
    }
    
    /* Interactive classes for cursor */
    body.hovering #custom-cursor {
        transform: translate(-50%, -50%) scale(2);
        background: radial-gradient(circle, rgba(212, 163, 115, 0.8), rgba(255,255,255,0));
    }

    /* Envelope Intro Screen */
    #envelope-screen {
      position: fixed;
      inset: 0;
      background: inherit;
      z-index: 2000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(20px);
    }

    .envelope-wrapper {
      position: relative;
      width: 300px;
      height: 200px;
      background: var(--primary);
      border-radius: 8px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.3);
      display: flex;
      align-items: center;
      justify-content: center;
      transform-style: preserve-3d;
      perspective: 1000px;
      transition: transform 0.3s;
    }

    .envelope-wrapper:hover {
        transform: translateY(-5px);
    }

    .envelope-flap {
      position: absolute;
      top: 0;
      left: 0;
      width: 0;
      height: 0;
      border-left: 150px solid transparent;
      border-right: 150px solid transparent;
      border-top: 120px solid var(--accent);
      transform-origin: top;
      z-index: 3;
    }

    .envelope-front {
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(0,0,0,0.1), rgba(0,0,0,0));
      z-index: 2;
      pointer-events: none;
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.1);
    }

    .envelope-text {
      color: white;
      text-align: center;
      z-index: 4;
      pointer-events: none;
      font-family: 'Playfair Display', serif;
    }
    .envelope-text h3 { font-size: 1.5rem; margin-bottom: 5px; }
    .envelope-text p { font-size: 0.8rem; opacity: 0.8; font-family: 'Poppins', sans-serif; letter-spacing: 2px;}

    @keyframes gradientBG {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }

    .scene {
      perspective: 2000px;
      animation: float 6s ease-in-out infinite;
      visibility: hidden; /* Hidden until envelope opens */
      opacity: 0;
    }

    .card {
      width: var(--card-width);
      height: var(--card-height);
      position: relative;
      transform-style: preserve-3d;
      transition: transform 1s cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* Hover "Peek" effect before opening */
    .card:not(.is-open):hover .card-cover {
      transform: rotateY(-15deg);
      box-shadow: 15px 10px 30px rgba(0, 0, 0, 0.2);
    }

    .card.is-open {
      transform: translateX(35%);
    }

    .card-face {
      position: absolute;
      inset: 0;
      backface-visibility: hidden;
      border-radius: 8px;
      box-shadow: 0 10px 30px -5px rgba(0, 0, 0, 0.2);
    }

    .card-face::after {
      content: '';
      position: absolute;
      top: 0;
      bottom: 0;
      left: 0;
      width: 40px;
      background: linear-gradient(to right, rgba(0,0,0,0.15) 0%, transparent 100%);
      pointer-events: none;
      border-radius: 8px 0 0 8px;
      z-index: 10;
    }

    /* THE COVER */
    .card-cover {
      position: absolute;
      inset: 0;
      transform-origin: left;
      transform-style: preserve-3d;
      transition: transform 1.4s cubic-bezier(0.645, 0.045, 0.355, 1), box-shadow 0.4s ease;
      z-index: 2;
    }

    .card.is-open .card-cover {
      transform: rotateY(-165deg);
      box-shadow: -10px 10px 30px rgba(0, 0, 0, 0.2);
    }

    .cover-front {
      background: var(--primary);
      color: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      border-right: 1px solid rgba(0,0,0,0.2);
      border-radius: 8px;
    }

    .cover-front h1 {
      font-family: 'Playfair Display', serif;
      font-size: 3.5rem;
      text-align: center;
      line-height: 1.1;
      letter-spacing: 2px;
    }

    .tap-text {
      font-size: 0.75rem;
      margin-top: 30px;
      letter-spacing: 4px;
      opacity: 0.6;
      transition: opacity 0.3s ease;
      background: rgba(255,255,255,0.1);
      padding: 8px 16px;
      border-radius: 20px;
      backdrop-filter: blur(5px);
    }
    
    .card:not(.is-open):hover .tap-text { opacity: 1; }

    /* LEFT PAGE (Back of Cover) */
    .cover-back {
      background: var(--navy-dark);
      transform: rotateY(180deg);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      border-radius: 8px;
      border-left: 1px solid rgba(255,255,255,0.05);
      overflow: hidden;
    }

    .inside-right::after {
      left: 0;
      background: linear-gradient(to right, rgba(0,0,0,0.08) 0%, transparent 100%);
    }

    .svg-cake-container {
      position: relative;
      width: 200px;
      height: 500px;
      transform: scale(0.55);
      margin-top: -60px;
    }

    #cake { display: block; position: absolute; top: 0; left: 0; width: 100%; height: 100%; }

    .velas {
      background: #ffffff;
      border-radius: 10px;
      position: absolute;
      top: 380px;        
      left: 50%;
      margin-left: -2.4px;
      width: 5px;
      height: 35px;
      transform: translateY(-300px);
      backface-visibility: hidden;
    }
    
    .card.has-opened .velas {
      animation: candle-in 600ms 4.8s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; 
    }
    
    .velas:after, .velas:before { background: rgba(255, 0, 0, 0.4); content: ""; position: absolute; width: 100%; height: 2.22px; }
    .velas:after { top: 25%; left: 0; }
    .velas:before { top: 45%; left: 0; }

    .fuego {
      border-radius: 100%;
      position: absolute;
      top: -20px;
      left: 50%;
      margin-left: -2.6px;
      width: 6.66px;
      height: 18px;
      opacity: 0;
      transition: opacity 0.5s ease, transform 0.5s ease;
    }
    
    /* Flames state */
    .card.has-opened .fuego.active:nth-child(1) { animation: fuego 2s 5.2s infinite; opacity: 1; }
    .card.has-opened .fuego.active:nth-child(2) { animation: fuego 1.5s 5.2s infinite; opacity: 1; }
    .card.has-opened .fuego.active:nth-child(3) { animation: fuego 1s 5.2s infinite; opacity: 1; }
    .card.has-opened .fuego.active:nth-child(4) { animation: fuego 0.5s 5.2s infinite; opacity: 1; }
    .card.has-opened .fuego.active:nth-child(5) { animation: fuego 0.2s 5.2s infinite; opacity: 1; }

    /* Class added when mic detects blow */
    .fuego.blown-out {
        animation: none !important;
        opacity: 0 !important;
        transform: translateY(-30px) scale(0) !important;
    }

    @keyframes fuego {
      0%, 100% { background: rgba(254, 248, 97, 0.5); box-shadow: 0 0 40px 10px rgba(248, 233, 209, 0.2); transform: translateY(0) scale(1); }
      50% { background: rgba(255, 50, 0, 0.1); box-shadow: 0 0 40px 20px rgba(248, 233, 209, 0.2); transform: translateY(-20px) scale(0); }
    }

    @keyframes candle-in { to { transform: translateY(0); } }

    .cake-text {
      color: #e5b88f;
      font-family: 'Lato', sans-serif;
      font-weight: 300;
      font-style: italic;
      text-align: center;
      margin-top: -110px;
      z-index: 10;
      padding: 0 25px;
      opacity: 0;
      transform: translateY(10px);
      transition: all 1s ease 5.5s; 
    }
    
    .card.has-opened .cake-text { opacity: 1; transform: translateY(0); }
    .cake-text p { font-size: 0.90rem; line-height: 1.5; margin-bottom: 15px;}

    /* Microphone Button */
    #mic-btn {
        background: rgba(255,255,255,0.1);
        border: 1px solid rgba(255,255,255,0.2);
        color: white;
        padding: 6px 12px;
        border-radius: 20px;
        font-family: 'Poppins';
        font-size: 0.7rem;
        letter-spacing: 1px;
        transition: all 0.3s ease;
        backdrop-filter: blur(5px);
    }
    #mic-btn:hover { background: rgba(255,255,255,0.2); transform: scale(1.05); }
    #mic-btn.listening { background: rgba(255, 50, 50, 0.3); animation: pulse 1.5s infinite; }
    
    @keyframes pulse {
        0% { box-shadow: 0 0 0 0 rgba(255, 50, 50, 0.4); }
        70% { box-shadow: 0 0 0 10px rgba(255, 50, 50, 0); }
        100% { box-shadow: 0 0 0 0 rgba(255, 50, 50, 0); }
    }

    /* RIGHT PAGE - Glassmorphism Design */
    .inside-right {
      background: var(--glass-bg);
      backdrop-filter: blur(15px);
      border-right: 1px solid var(--glass-border);
      z-index: 1;
      padding: 40px 25px;
      display: flex;
      flex-direction: column;
      align-items: center;
      overflow: hidden;
      border-radius: 8px;
    }

    /* Glassmorphism Blobs */
    .blob {
      position: absolute;
      border-radius: 50%;
      filter: blur(35px);
      z-index: 0;
      opacity: 0.7;
      animation: floatBlobs 8s infinite alternate ease-in-out;
    }
    
    @keyframes floatBlobs {
        0% { transform: translate(0, 0) scale(1); }
        100% { transform: translate(20px, -20px) scale(1.1); }
    }

    .content-area { text-align: right; width: 100%; z-index: 1; }

    .content-area > * { opacity: 0; transform: translateY(20px); transition: all 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
    .card.is-open .hi-claudia { transition-delay: 0.5s; opacity: 1; transform: translateY(0); }
    .card.is-open .quote { transition-delay: 0.7s; opacity: 1; transform: translateY(0); }
    .card.is-open .happy-birthday-main { transition-delay: 0.9s; opacity: 1; transform: translateY(0); }

    .hi-claudia { font-family: 'Playfair Display', serif; font-size: 2.2rem; color: var(--primary); }
    .quote { font-size: 0.8rem; color: var(--accent); margin-bottom: 5px; max-width: 250px; margin-left: auto; line-height: 1.5; font-weight: 500;}
    .happy-birthday-main { font-family: 'Playfair Display', serif; font-size: 2.8rem; color: var(--primary); margin-bottom: 10px; }

    /* Photo Frame Animation */
    .photo-frame-wrapper {
      opacity: 0;
      transform: scale(0.8) rotate(-5deg);
      transition: all 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
      transform-style: preserve-3d;
    }

    .card.is-open .photo-frame-wrapper {
      transition-delay: 1.1s;
      opacity: 1;
      transform: scale(1) rotate(2deg);
    }

    .photo-frame {
      width: 240px;
      background: white;
      padding: 10px 10px 30px 10px;
      box-shadow: 0 15px 35px rgba(0,0,0,0.15);
      position: relative;
      z-index: 2;
      border-radius: 4px;
      /* Tilt properties applied via JS */
    }

    .photo-frame::before {
      content: '';
      position: absolute;
      top: -12px;
      left: 50%;
      margin-left: -45px;
      width: 90px;
      height: 25px;
      background: rgba(212, 163, 115, 0.6);
      backdrop-filter: blur(4px);
      transform: rotate(-2deg) translateZ(20px); /* 3D depth for tape */
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }

    .photo-img {
      width: 100%;
      aspect-ratio: 1/1;
      position: relative;
      overflow: hidden;
      border-radius: 2px;
      background: #eee;
      transform: translateZ(10px); /* 3D depth */
    }

    .photo-img img {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center 20%;
      opacity: 0;
      transition: opacity 1.5s ease-in-out;
    }

    .photo-img img.active { opacity: 1; }

    /* Scratch-Off Canvas Area */
    .scratch-container {
        margin-top: 15px;
        position: relative;
        width: 200px;
        height: 40px;
        z-index: 2;
        opacity: 0;
        transform: translateY(10px);
        transition: all 0.6s ease;
        border-radius: 6px;
        overflow: hidden;
        box-shadow: inset 0 2px 5px rgba(0,0,0,0.1);
    }
    
    .card.is-open .scratch-container {
        transition-delay: 1.4s;
        opacity: 1;
        transform: translateY(0);
    }

    .secret-msg {
        position: absolute;
        inset: 0;
        background: rgba(255,255,255,0.5);
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: 'Poppins';
        font-size: 0.8rem;
        font-weight: 600;
        color: var(--primary);
        text-align: center;
    }

    #scratch-pad {
        position: absolute;
        inset: 0;
        z-index: 3;
        width: 100%;
        height: 100%;
    }

    .it-is-birthday {
      margin-top: auto;
      font-size: 0.75rem;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: var(--primary);
      opacity: 0;
      z-index: 1;
      transform: translateY(15px);
      transition: all 0.6s ease;
      font-weight: 500;
    }

    .card.is-open .it-is-birthday {
      transition-delay: 1.6s;
      opacity: 0.7;
      transform: translateY(0);
    }

    @media (max-width: 500px) {
      .scene { transform: scale(0.65); }
      .card.is-open { transform: translateX(25%); }
    }
  </style>
</head>

  <script>
    // --- Custom Cursor Logic ---
    const cursor = document.getElementById('custom-cursor');
    document.addEventListener('mousemove', (e) => {
        cursor.style.left = e.clientX + 'px';
        cursor.style.top = e.clientY + 'px';
    });
    document.addEventListener('mousedown', () => cursor.style.transform = 'translate(-50%, -50%) scale(0.8)');
    document.addEventListener('mouseup', () => cursor.style.transform = 'translate(-50%, -50%) scale(1)');

    // Add hover states to interactable elements
    document.querySelectorAll('.card, #envelope-btn, #mic-btn, #scratch-pad').forEach(el => {
        el.addEventListener('mouseenter', () => document.body.classList.add('hovering'));
        el.addEventListener('mouseleave', () => document.body.classList.remove('hovering'));
    });

    // --- Audio Synthesis (Web Audio API) ---
    const AudioContext = window.AudioContext || window.webkitAudioContext;
    let audioCtx;

    function playMagicSound() {
        try {
            if (!audioCtx) audioCtx = new AudioContext();
            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            
            osc.type = 'sine';
            osc.frequency.setValueAtTime(600, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(1200, audioCtx.currentTime + 1.5);
            
            gainNode.gain.setValueAtTime(0, audioCtx.currentTime);
            gainNode.gain.linearRampToValueAtTime(0.1, audioCtx.currentTime + 0.1);
            gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 1.5);
            
            osc.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 1.5);
        } catch(e) { console.log('Audio error', e); }
    }

    // --- Envelope & GSAP Intro ---
    const envBtn = document.getElementById('envelope-btn');
    const envFlap = document.getElementById('env-flap');
    const envScreen = document.getElementById('envelope-screen');
    const mainScene = document.getElementById('main-scene');
    const bgMusic = document.getElementById('bgMusic');

    envBtn.addEventListener('click', () => {
        playMagicSound(); // Play chime
        
        // Start background music with low volume
        bgMusic.volume = 0.15; // 15% volume so it's not loud
        bgMusic.play().catch(e => console.log("Audio playback failed:", e));
        
        // GSAP Timeline for Envelope Open
        const tl = gsap.timeline();
        tl.to(envFlap, { rotateX: 180, duration: 0.5, ease: "power2.inOut", transformOrigin: "top" })
          .to(envBtn, { y: 200, opacity: 0, duration: 0.8, ease: "power3.in" }, "+=0.2")
          .to(envScreen, { opacity: 0, duration: 0.5, onComplete: () => {
              envScreen.style.display = 'none';
              mainScene.style.visibility = 'visible';
              gsap.to(mainScene, { opacity: 1, duration: 1 });
          }}, "-=0.4");
    });

    // --- Card Folding & Slideshow Logic ---
    const card = document.getElementById('card');
    
    // Load Cover Image securely
    const coverFront = document.querySelector('.cover-front');
    const coverImgUrl = "https://lh3.googleusercontent.com/rd-d/ALs6j_FN0xKrMsvyr_VRQ5pnfbR-Pu2U-qZxe64N1Hjgbp5B5XJ6IbrPkPhXm2suWifuVYxdUZXJk7Oq0pF3blEKBjLpBb2jZEfXhB_9UGwHwus4yoPQBFDFigvEx_GtFok1N3NF8EL2K_zeyAQRaN1b2yvX0LlMXzHlXFe25TQ-lpE_t92rRll0f4BFa8DrUlrYagj7JNNOSxIn9hKhglBwlraBALXFQl5DkuEWvOieaAu1Rm47W_yTGQFM89AXITQ5-Nx_eQtuWlNp1fdVK9k_a7zKoHzdhjVI7BU7swO_WRL4OXhexPm0oc6H9RFfA5XGvRfK1xdi4Rp3OJeEKmyCQRD4balsMSfEYc9eDRwcLiTzb0LC_GQQxJBWbFnotDtRMQwEJmoxy0Qm-Fmu6J_vGGOsTyUE2OuuIl8pKCj-8ioQlL4_23zOQslRaLQ7Xwmp-5PulDYIJGfCp0gBWi4Btiex9OVIdQPs-O33ny98-SmYtQyzqWjRZ3QLXPFZBRrnzQJygXthcJ7xHMSxZW8BJ9pb6qGRSlRRVSPPsuuCTLvRpKtMWL5gIiMHVfqa1oFmAn7ME-nFJvzhAY90tZUo_amRf1v39djkkWzXZ41h7cjTYgZF_KsIAFG8Kwyjz1ezCZw-MdcLkPbHZLmsumOgGri_e-1Zr0CykpwIk4s9cVkP0bzGUeIu9Mv9Y0QUWKZPJzWuB3wTud9qj72Mk4REQf7Qlm8xQzq_4dBNP0zscPyeLeAY-t-GDO7cXjWFzvQ1lvLBsoH7XTkbUpGJl0qv-emrntP1mlUixINU-koY5U9ICeGjMD8Wey271KSaG-qthUU0B3tMDsPyZqNUZ8WNwSWe98imZx8GNSBcHiR5Oewu94PJfbhRXBsqifZ2cY0IN0vENG1tBmbMhMCxuwtiN1Nrl0RufIlFPAS29CBHtZ_g1_CiSPz0HO0S8V-uEmHsXPt9S_vmDI-jff4bd4q2syHm4g9F5lXQD-b6iyQ4BXMSEkmkv23W8rKBYvAB9_G2pEWHZ6V6Xgt2yVW1bUZl-OKan5wfCTWK7TPmrXdk-SzUpjvDPrc6TTdOnAeHwOYQ2kO0j0cLlEn-dMzq8K104q0LExLE0zwesCjW6xW_WHpHEkI5=w1910-h882?auditContext=forDisplay";
    
    const coverImg = new Image();
    coverImg.src = coverImgUrl;
    coverImg.onload = () => {
        coverFront.style.backgroundImage = `url('${coverImgUrl}')`;
        coverFront.style.backgroundSize = "cover";
        coverFront.style.backgroundPosition = "center";
        const title = coverFront.querySelector('h1');
        const tapText = coverFront.querySelector('.tap-text');
        if (title) title.style.display = 'none';
        if (tapText) tapText.style.display = 'none';
    };

    card.addEventListener('click', (e) => {
      // Prevent opening/closing if clicking on mic button or scratch pad
      if(e.target.closest('#mic-btn') || e.target.closest('#scratch-pad')) return;

      card.classList.toggle('is-open');
      
      if (!card.classList.contains('has-opened')) {
        card.classList.add('has-opened');

        setTimeout(() => {
          document.getElementById('bizcocho_1').beginElement();
        }, 500); 
        
        // Initialize Scratchpad (Needs to be visible to get correct dimensions)
        setTimeout(initScratchPad, 1500);
      }
    });

    const slides = document.querySelectorAll('.photo-img .slide');
    let currentSlide = 0;
    setInterval(() => {
        slides[currentSlide].classList.remove('active');
        currentSlide = (currentSlide + 1) % slides.length;
        slides[currentSlide].classList.add('active');
    }, 3500);

    function triggerConfetti() {
        var duration = 4000;
        var animationEnd = Date.now() + duration;
        var defaults = { startVelocity: 30, spread: 360, ticks: 60, zIndex: 0 };
        function randomInRange(min, max) { return Math.random() * (max - min) + min; }

        var interval = setInterval(function() {
            var timeLeft = animationEnd - Date.now();
            if (timeLeft <= 0) return clearInterval(interval);
            var particleCount = 50 * (timeLeft / duration);
            
            confetti(Object.assign({}, defaults, { 
                particleCount, 
                origin: { x: randomInRange(0.1, 0.9), y: Math.random() - 0.2 },
                colors: ['#5c4033', '#d4a373', '#fdf6e9', '#1a233a'] 
            }));
        }, 250);
    }

    // --- Blow Candles Redirect ---
    const micBtn = document.getElementById('mic-btn');

    micBtn.addEventListener('click', () => {
        window.location.href = "https://alstudy063.github.io/reminder3/hbd/rasangika/blow";
    });

    // --- Scratch-Off Logic ---
    function initScratchPad() {
        const canvas = document.getElementById('scratch-pad');
        const ctx = canvas.getContext('2d');
        const container = document.querySelector('.scratch-container');
        
        canvas.width = container.offsetWidth;
        canvas.height = container.offsetHeight;
        
        // Fill silver coating
        ctx.fillStyle = '#C0C0C0';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        // Diagonal shine effect
        let gradient = ctx.createLinearGradient(0, 0, canvas.width, canvas.height);
        gradient.addColorStop(0, "rgba(255,255,255,0)");
        gradient.addColorStop(0.5, "rgba(255,255,255,0.4)");
        gradient.addColorStop(1, "rgba(255,255,255,0)");
        ctx.fillStyle = gradient;
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // Overlay Text
        ctx.font = '12px Poppins';
        ctx.fillStyle = '#666';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText('Scratch here to reveal', canvas.width/2, canvas.height/2);

        // Ready to scratch
        ctx.globalCompositeOperation = 'destination-out';
        let isDrawing = false;

        function getMousePos(e) {
            const rect = canvas.getBoundingClientRect();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            return {
                x: clientX - rect.left,
                y: clientY - rect.top
            };
        }

        function scratch(e) {
            if (!isDrawing) return;
            e.preventDefault(); // Prevent scrolling on touch
            const pos = getMousePos(e);
            ctx.beginPath();
            ctx.arc(pos.x, pos.y, 15, 0, Math.PI * 2);
            ctx.fill();
        }

        canvas.addEventListener('mousedown', () => isDrawing = true);
        canvas.addEventListener('touchstart', (e) => { isDrawing = true; scratch(e); }, {passive: false});
        
        window.addEventListener('mouseup', () => isDrawing = false);
        window.addEventListener('touchend', () => isDrawing = false);
        
        canvas.addEventListener('mousemove', scratch);
        canvas.addEventListener('touchmove', scratch, {passive: false});
    }
