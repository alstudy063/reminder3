<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Telegram File Manager</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <!-- idb-keyval library ngam huuwa IndexedDB (Fula comment for system prompt) -->
    <script src="https://cdn.jsdelivr.net/npm/idb-keyval@6/dist/umd.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .glass-panel {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
        }
        .file-card {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .file-card:hover {
            transform: translateY(-4px) scale(1.02);
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
        }
        /* Fade in animation (Fula: Kuugal kadi) */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in {
            animation: fadeIn 0.4s ease-out forwards;
        }
        /* Custom scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>
<body class="bg-[#f4f7fb] text-gray-800 h-screen flex overflow-hidden selection:bg-blue-200">

    <!-- Sidebar -->
    <aside class="w-64 glass-panel border-r border-gray-200 flex flex-col justify-between hidden md:flex">
        <div>
            <div class="p-6 flex items-center space-x-3">
                <div class="bg-blue-600 text-white p-2 rounded-lg">
                    <i class="fa-solid fa-cloud"></i>
                </div>
                <h1 class="text-xl font-semibold text-gray-700">File Explorer</h1>
            </div>

            <div class="px-4">
                <button class="w-full flex items-center justify-center space-x-2 bg-white border border-gray-300 shadow-sm hover:shadow-md transition-all duration-300 py-3 rounded-2xl text-gray-700 font-medium mb-6 hover:bg-gray-50">
                    <i class="fa-solid fa-plus text-blue-500"></i>
                    <span>New</span>
                </button>
            </div>

            <nav class="px-2 space-y-1">
                <a href="#" class="flex items-center space-x-3 px-4 py-3 bg-blue-50 text-blue-700 rounded-xl font-medium">
                    <i class="fa-solid fa-laptop text-lg w-5"></i>
                    <span>Computers (Drives)</span>
                </a>
                <a href="#" class="flex items-center space-x-3 px-4 py-3 text-gray-600 hover:bg-gray-100 rounded-xl transition-colors font-medium">
                    <i class="fa-regular fa-clock text-lg w-5"></i>
                    <span>Recent</span>
                </a>
                <a href="#" class="flex items-center space-x-3 px-4 py-3 text-gray-600 hover:bg-gray-100 rounded-xl transition-colors font-medium">
                    <i class="fa-regular fa-star text-lg w-5"></i>
                    <span>Starred</span>
                </a>
            </nav>
        </div>

        <div class="p-4">
            <a href="#" class="flex items-center space-x-3 px-4 py-3 text-gray-600 hover:bg-gray-100 rounded-xl transition-colors font-medium mb-4">
                <i class="fa-solid fa-gear text-lg w-5"></i>
                <span>Settings</span>
            </a>
            <div class="px-4">
                <div class="w-full bg-gray-200 rounded-full h-1.5 mb-2">
                    <div class="bg-blue-500 h-1.5 rounded-full" style="width: 45%"></div>
                </div>
                <p class="text-xs text-gray-500 font-medium uppercase tracking-wider">Storage Info</p>
            </div>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 flex flex-col h-screen overflow-hidden relative">
        
        <!-- Header -->
        <header class="glass-panel p-4 flex items-center justify-between z-10">
            <div class="flex-1 max-w-3xl flex items-center bg-gray-100 rounded-full px-4 py-2 border border-transparent focus-within:bg-white focus-within:border-blue-300 focus-within:shadow-sm transition-all duration-300">
                <i class="fa-solid fa-magnifying-glass text-gray-400 mr-3"></i>
                <input type="text" id="searchInput" placeholder="Search in current view (Supports Sinhala/English)" class="bg-transparent border-none outline-none w-full text-gray-700 placeholder-gray-400 text-sm">
            </div>
            <div class="flex items-center space-x-4 ml-4">
                <button class="text-gray-500 hover:text-gray-700 hover:bg-gray-100 p-2 rounded-full transition-colors" onclick="loadFiles(true)">
                    <i class="fa-solid fa-arrow-rotate-right"></i>
                </button>
                <div class="w-9 h-9 rounded-full bg-purple-600 text-white flex items-center justify-center font-bold shadow-sm cursor-pointer hover:scale-105 transition-transform">
                    U
                </div>
            </div>
        </header>

        <!-- Breadcrumb -->
        <div class="px-8 py-4 flex items-center text-sm text-gray-600 font-medium">
            <i class="fa-solid fa-server mr-2"></i> Computers 
            <i class="fa-solid fa-chevron-right text-xs mx-3 text-gray-400"></i>
            <span class="bg-blue-50 text-blue-700 px-3 py-1 rounded-lg">Telegram Desktop</span>
        </div>

        <!-- Connection Screen (Fula: Yeeso jokkondiral) -->
        <div id="connectScreen" class="flex-1 flex flex-col items-center justify-center p-8 text-center animate-fade-in">
            <div class="w-24 h-24 bg-blue-100 rounded-full flex items-center justify-center mb-6">
                <i class="fa-brands fa-telegram text-5xl text-blue-500"></i>
            </div>
            <h2 class="text-2xl font-bold text-gray-800 mb-2">Connect Your Telegram Folder</h2>
            <p class="text-gray-500 max-w-md mb-8">Let's organize your PDF files automatically. Your files remain on your device and are organized virtually.</p>
            
            <button id="selectFolderBtn" class="bg-blue-600 hover:bg-blue-700 text-white font-medium py-3 px-6 rounded-xl shadow-lg hover:shadow-blue-500/30 transition-all duration-300 flex items-center space-x-2">
                <i class="fa-regular fa-folder-open"></i>
                <span>Select Telegram Folder</span>
            </button>
            <button id="restoreAccessBtn" class="hidden mt-4 bg-white border border-gray-300 hover:bg-gray-50 text-gray-700 font-medium py-3 px-6 rounded-xl shadow-sm transition-all duration-300 flex items-center space-x-2">
                <i class="fa-solid fa-unlock-keyhole"></i>
                <span>Load My Files (Saved Access)</span>
            </button>
        </div>

        <!-- Files Grid (Fula: Layni fiildeeji) -->
        <div id="mainView" class="flex-1 overflow-y-auto px-8 pb-8 hidden">
            <!-- Folders Section -->
            <div id="foldersSection" class="mb-8">
                <h3 class="text-sm font-semibold text-gray-500 uppercase tracking-wider mb-4">Smart Categories</h3>
                <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-5" id="foldersContainer">
                    <!-- Folders rendered here via JS -->
                </div>
            </div>

            <!-- Files Section -->
            <div>
                <h3 class="text-sm font-semibold text-gray-500 uppercase tracking-wider mb-4" id="filesHeader">All Files</h3>
                <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-5" id="filesContainer">
                    <!-- Files rendered here via JS -->
                </div>
            </div>
        </div>
        
        <!-- Loading Overlay -->
        <div id="loadingOverlay" class="absolute inset-0 bg-white/80 backdrop-blur-sm z-50 flex flex-col items-center justify-center hidden">
            <div class="animate-spin rounded-full h-12 w-12 border-4 border-blue-200 border-t-blue-600 mb-4"></div>
            <p class="text-gray-600 font-medium">Organizing your files...</p>
        </div>

    </main>

    <script>
        // Keywords for smart categorization including Sinhala synonyms (Fula: Kelme keertiiɗe)
        const categoriesMap = {
            "Physics 🧲": ["physics", "thermal", "magnetic", "prism", "vapor", "fields", "භෞතික", "තාප", "චුම්භක", "ප්‍රිස්ම", "මිනුම්", "optics", "mechanics"],
            "Chemistry 🧪": ["chemistry", "solubility", "chemical", "alkeane", "රසායන", "සමාවයවික", "පරිවර්තන", "acid", "base", "organic", "inorganic"],
            "Biology 🧬": ["biology", "gene", "molecular", "සත්ව", "ජීව", "botany", "zoology", "plant", "animal", "ආකාරය", "ක්‍රියාකාරීත්වය"],
            "Exams & Papers 📄": ["paper", "mcq", "seq", "essay", "fast track", "legendary", "final paper", "විභාග", "ප්‍රශ්න", "marking", "sm", "answers", "tute", "revision", "ft", "mp"]
        };

        let directoryHandle = null;
        let allFiles = [];
        let organizedData = {
            "Physics 🧲": [],
            "Chemistry 🧪": [],
            "Biology 🧬": [],
            "Exams & Papers 📄": [],
            "Other Files 📁": []
        };
        let currentCategory = null; // null means showing all

        // Elements (Fula: Ceebe)
        const connectScreen = document.getElementById('connectScreen');
        const selectFolderBtn = document.getElementById('selectFolderBtn');
        const restoreAccessBtn = document.getElementById('restoreAccessBtn');
        const mainView = document.getElementById('mainView');
        const foldersContainer = document.getElementById('foldersContainer');
        const filesContainer = document.getElementById('filesContainer');
        const searchInput = document.getElementById('searchInput');
        const loadingOverlay = document.getElementById('loadingOverlay');
        const filesHeader = document.getElementById('filesHeader');
        const foldersSection = document.getElementById('foldersSection');

        // Initialize (Fula: Fuɗɗo)
        async function init() {
            try {
                const storedHandle = await idbKeyval.get('telegram_folder_handle');
                if (storedHandle) {
                    directoryHandle = storedHandle;
                    restoreAccessBtn.classList.remove('hidden');
                }
            } catch (err) {
                console.error("IndexedDB error:", err);
            }
        }

        // Handle initial folder selection (Fula: Huuwa suɓaagol fiilde)
        selectFolderBtn.addEventListener('click', async () => {
            try {
                const handle = await window.showDirectoryPicker({ mode: 'read' });
                directoryHandle = handle;
                await idbKeyval.set('telegram_folder_handle', handle);
                await loadFiles();
            } catch (error) {
                console.log("User cancelled selection", error);
            }
        });

        // Handle restoring access (Fula: Huuwa artirde jokkondiral)
        restoreAccessBtn.addEventListener('click', async () => {
            try {
                const permission = await directoryHandle.verifyPermission({ mode: 'read' });
                if (permission !== 'granted') {
                    const request = await directoryHandle.requestPermission({ mode: 'read' });
                    if (request !== 'granted') {
                        alert("Permission needed to read files.");
                        return;
                    }
                }
                await loadFiles();
            } catch (error) {
                console.error("Permission error", error);
                alert("Failed to restore access. Please select the folder again.");
            }
        });

        async function loadFiles(forceRefresh = false) {
            connectScreen.classList.add('hidden');
            loadingOverlay.classList.remove('hidden');
            
            // Reset state
            allFiles = [];
            Object.keys(organizedData).forEach(k => organizedData[k] = []);

            try {
                for await (const entry of directoryHandle.values()) {
                    if (entry.kind === 'file' && (entry.name.toLowerCase().endsWith('.pdf') || entry.name.toLowerCase().endsWith('.html') || entry.name.toLowerCase().endsWith('.jpg'))) {
                        
                        const file = await entry.getFile();
                        const fileObj = {
                            handle: entry,
                            name: entry.name,
                            size: formatSize(file.size),
                            date: formatDate(file.lastModified),
                            originalFile: file
                        };
                        allFiles.push(fileObj);
                        categorizeFile(fileObj);
                    }
                }
                
                renderView();
                mainView.classList.remove('hidden');
                mainView.classList.add('animate-fade-in');
            } catch (error) {
                console.error("Error reading directory:", error);
            } finally {
                loadingOverlay.classList.add('hidden');
            }
        }

        function categorizeFile(fileObj) {
            const name = fileObj.name.toLowerCase();
            let categorized = false;
            
            for (const [category, keywords] of Object.entries(categoriesMap)) {
                if (keywords.some(kw => name.includes(kw.toLowerCase()))) {
                    organizedData[category].push(fileObj);
                    categorized = true;
                    // Don't break, a file might belong to Exams AND Physics. But for simplicity, we assign to first match.
                    break; 
                }
            }
            
            if (!categorized) {
                organizedData["Other Files 📁"].push(fileObj);
            }
        }

        function renderView(searchTerm = "") {
            foldersContainer.innerHTML = '';
            filesContainer.innerHTML = '';

            // Render Folders (only if not searching and in root view)
            if (searchTerm === "" && currentCategory === null) {
                foldersSection.classList.remove('hidden');
                Object.keys(organizedData).forEach((category, index) => {
                    const count = organizedData[category].length;
                    if (count > 0) {
                        const folderEl = document.createElement('div');
                        folderEl.className = `file-card bg-white p-5 rounded-2xl border border-gray-100 shadow-sm cursor-pointer flex flex-col items-center justify-center group animate-fade-in`;
                        folderEl.style.animationDelay = `${index * 50}ms`;
                        folderEl.onclick = () => {
                            currentCategory = category;
                            searchInput.value = '';
                            renderView();
                        };
                        folderEl.innerHTML = `
                            <div class="text-4xl text-yellow-400 mb-3 group-hover:scale-110 transition-transform"><i class="fa-solid fa-folder"></i></div>
                            <h4 class="font-semibold text-gray-800 text-center">${category.split(' ')[0]}</h4>
                            <p class="text-xs text-gray-400 mt-1">${count} files</p>
                        `;
                        foldersContainer.appendChild(folderEl);
                    }
                });
            } else {
                foldersSection.classList.add('hidden');
            }

            // Render Files
            let filesToRender = [];
            if (searchTerm !== "") {
                const term = searchTerm.toLowerCase();
                filesToRender = allFiles.filter(f => f.name.toLowerCase().includes(term));
                filesHeader.innerText = `Search Results (${filesToRender.length})`;
            } else if (currentCategory !== null) {
                filesToRender = organizedData[currentCategory];
                filesHeader.innerHTML = `<span class="cursor-pointer text-blue-500 hover:underline" onclick="goBack()">All Files</span> <i class="fa-solid fa-chevron-right text-xs mx-2"></i> ${currentCategory}`;
            } else {
                filesToRender = allFiles;
                filesHeader.innerText = "All Files";
            }

            filesToRender.forEach((file, index) => {
                const isPdf = file.name.toLowerCase().endsWith('.pdf');
                const iconColor = isPdf ? 'text-red-500' : 'text-blue-500';
                const iconClass = isPdf ? 'fa-file-pdf' : 'fa-file-lines';

                const fileEl = document.createElement('div');
                fileEl.className = `file-card bg-white p-4 rounded-2xl border border-gray-100 shadow-sm cursor-pointer animate-fade-in`;
                fileEl.style.animationDelay = `${index * 20}ms`;
                fileEl.onclick = () => openFile(file.handle);
                
                // Truncate name for display
                const displayName = file.name.length > 25 ? file.name.substring(0, 25) + '...' : file.name;

                fileEl.innerHTML = `
                    <div class="flex flex-col h-full justify-between">
                        <div>
                            <div class="flex items-start justify-between mb-3">
                                <div class="${iconColor} text-3xl"><i class="fa-solid ${iconClass}"></i></div>
                                <div class="w-3 h-3 rounded-full bg-yellow-400"></div> <!-- Yellow dot matching design -->
                            </div>
                            <h4 class="font-semibold text-sm text-gray-800 mb-1 line-clamp-2" title="${file.name}">${displayName}</h4>
                        </div>
                        <div class="flex items-center justify-between mt-4 border-t border-gray-50 pt-3">
                            <span class="text-xs text-gray-400 font-medium">${file.size}</span>
                            <span class="text-xs text-gray-400">${file.date}</span>
                        </div>
                    </div>
                `;
                filesContainer.appendChild(fileEl);
            });
        }

        window.goBack = () => {
            currentCategory = null;
            renderView();
        }

        // Open File (Fula: Uddit fiilde)
        async function openFile(fileHandle) {
            try {
                const file = await fileHandle.getFile();
                const url = URL.createObjectURL(file);
                window.open(url, '_blank');
                // Clean up URL object after a short delay to allow it to open
                setTimeout(() => URL.revokeObjectURL(url), 5000); 
            } catch (err) {
                console.error("Error opening file", err);
                alert("Cannot open file. Make sure permission is granted.");
            }
        }

        // Search Functionality (Fula: Kuugal tefoore)
        searchInput.addEventListener('input', (e) => {
            renderView(e.target.value);
        });

        // Utils
        function formatSize(bytes) {
            if (bytes === 0) return '0 B';
            const k = 1024;
            const sizes = ['B', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(1)) + ' ' + sizes[i];
        }

        function formatDate(timestamp) {
            const date = new Date(timestamp);
            const months = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
            return `${months[date.getMonth()]} ${date.getDate()}`;
        }

        // Start
        init();
    </script>
</body>
</html>
