:rgb(156 163 175 / var(--tw-text-opacity))}.placeholder\:text-zinc-800::-moz-placeholder{--tw-text-opacity: 1;color:rgb(39 39 42 / var(--tw-text-opacity))}.placeholder\:text-zinc-800::placeholder{--tw-text-opacity: 1;color:rgb(39 39 42 / var(--tw-text-opacity))}.focus-within\:ring:focus-within{--tw-ring-offset-shadow: var(--tw-ring-inset) 0 0 0 var(--tw-ring-offset-width) var(--tw-ring-offset-color);--tw-ring-shadow: var(--tw-ring-inset) 0 0 0 calc(3px + var(--tw-ring-offset-width)) var(--tw-ring-color);box-shadow:var(--tw-ring-offset-shadow),var(--tw-ring-shadow),var(--tw-shadow, 0 0 #0000)}.hover\:bg-zinc-800:hover{--tw-bg-opacity: 1;background-color:rgb(39 39 42 / var(--tw-bg-opacity))}.hover\:bg-amber-300:hover{--tw-bg-opacity: 1;background-color:rgb(252 211 77 / var(--tw-bg-opacity))}.hover\:text-amber-500:hover{--tw-text-opacity: 1;color:rgb(245 158 11 / var(--tw-text-opacity))}.hover\:brightness-\[\.85\]:hover{--tw-brightness: brightness(.85);filter:var(--tw-blur) var(--tw-brightness) var(--tw-contrast) var(--tw-grayscale) var(--tw-hue-rotate) var(--tw-invert) var(--tw-saturate) var(--tw-sepia) var(--tw-drop-shadow)}.focus\:outline-none:focus{outline:2px solid transparent;outline-offset:2px}@media (min-width: 640px){.sm\:mt-20{margin-top:5rem}.sm\:max-w-max{max-width:-moz-max-content;max-width:max-content}.sm\:gap-10{gap:2.5rem}.sm\:overflow-auto{overflow:auto}.sm\:p-8{padding:2rem}}
    </style>
</head>
<body>
    <div id="root"></div>

    <!-- Libraries -->
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;
        const { motion, AnimatePresence } = window.Motion;

        // SVG Icons (Replacing lucide-react for standalone Babel environment)
        const SearchIcon = () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>;
        const PlusIcon = () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M5 12h14"/><path d="M12 5v14"/></svg>;
        const LoaderIcon = () => <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="animate-spin"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg>;
        const BugIcon = () => <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m8 2 1.88 1.88"/><path d="M14.12 3.88 16 2"/><path d="M9 7.13v-1a3.003 3.003 0 1 1 6 0v1"/><path d="M12 20c-3.3 0-6-2.7-6-6v-3a4 4 0 0 1 4-4h4a4 4 0 0 1 4 4v3c0 3.3-2.7 6-6 6"/><path d="M12 20v-9"/><path d="M6.53 9C4.6 8.8 3 7.1 3 5"/><path d="M6 13H2"/><path d="M3 21c0-2.1 1.7-3.9 3.8-4"/><path d="M20.97 5c-2 .2-3.53 1.9-3.53 3.9"/><path d="M22 13h-4"/><path d="M17.2 17c2.1.1 3.8 1.9 3.8 4"/></svg>;
        const MoreIcon = () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="1"/><circle cx="19" cy="12" r="1"/><circle cx="5" cy="12" r="1"/></svg>;
        const TrashIcon = () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" x2="10" y1="11" y2="17"/><line x1="14" x2="14" y1="11" y2="17"/></svg>;
        const PinIcon = () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="12" x2="12" y1="17" y2="22"/><path d="M5 17h14v-1.76a2 2 0 0 0-1.11-1.79l-1.78-.9A2 2 0 0 1 15 10.76V6h1a2 2 0 0 0 0-4H8a2 2 0 0 0 0 4h1v4.76a2 2 0 0 1-1.11 1.79l-1.78.9A2 2 0 0 0 5 15.24Z"/></svg>;
        const PinOffIcon = () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="2" x2="22" y1="2" y2="22"/><line x1="12" x2="12" y1="17" y2="22"/><path d="M5 17h14v-1.76a2 2 0 0 0-1.11-1.79l-1.78-.9A2 2 0 0 1 15 10.76V6h1a2 2 0 0 0 0-4H8a2 2 0 0 0 0 4h1v4.76a2 2 0 0 1-1.11 1.79l-1.78.9A2 2 0 0 0 5 15.24Z"/></svg>;

        const COLORS = [
          { id: "color-1", color: "bg-amber-400" },
          { id: "color-2", color: "bg-orange-400" },
          { id: "color-3", color: "bg-purple-400" },
          { id: "color-4", color: "bg-lime-400" },
          { id: "color-5", color: "bg-emerald-400" }
        ];

        function NoteCard({ note, onUpdate, onDelete }) {
          const [showOptions, setShowOptions] = useState(false);

          return (
            <motion.div 
              layout
              initial={{ opacity: 0, scale: 0.8 }}
              animate={{ opacity: 1, scale: 1 }}
              exit={{ opacity: 0, scale: 0.8 }}
              className={`relative flex-1 min-h-[20rem] min-w-[16rem] max-w-[20rem] flex flex-col justify-between px-6 py-7 rounded-3xl font-medium leading-[1.4] transition-shadow shadow-sm focus-within:ring-2 ring-zinc-900 ring-offset-4 ${note.color}`}
            >
              <header className="mb-2">
                <input 
                  type="text"
                  placeholder="What I need to do ?"
                  value={note.title}
                  onChange={e => onUpdate(note.id, { title: e.target.value })}
                  className="w-full bg-transparent focus:outline-none placeholder:text-zinc-800/60 font-bold text-lg text-zinc-900"
                />
              </header>

              <textarea
                placeholder="Time to take some notes!"
                value={note.content}
                onChange={e => onUpdate(note.id, { content: e.target.value })}
                className="placeholder:text-zinc-800/60 resize-none focus:outline-none w-full h-full bg-transparent text-base text-zinc-900 mt-2"
              />

              <div className="flex items-center justify-between mt-4 relative z-10">
                <span className="font-normal text-sm opacity-80 text-zinc-900">
                  {new Date(note.date).toLocaleDateString()}
                </span>
                
                <div className="relative flex justify-center">
                  <button 
                    onClick={() => setShowOptions(!showOptions)}
                    className="p-2 w-fit rounded-full transition-colors bg-zinc-900 hover:bg-zinc-800 text-white"
                  >
                    <MoreIcon />
                  </button>

                  <AnimatePresence>
                    {showOptions && (
                      <React.Fragment>
                        <div className="fixed inset-0 z-40" onClick={() => setShowOptions(false)} />
                        <motion.div 
                          initial={{ opacity: 0, y: 10 }}
                          animate={{ opacity: 1, y: 0 }}
                          exit={{ opacity: 0, y: 10 }}
                          className="absolute bottom-12 right-0 z-50 flex gap-2 bg-zinc-900 p-2 rounded-2xl shadow-xl"
                        >
                          <button 
                            onClick={() => { onDelete(note.id); setShowOptions(false); }}
                            className="p-2 bg-zinc-800 hover:bg-red-500 text-white rounded-full transition-colors"
                            title="Delete Note"
                          >
                            <TrashIcon />
                          </button>
                          <button 
                            onClick={() => { onUpdate(note.id, { isPinned: !note.isPinned }); setShowOptions(false); }}
                            className={`p-2 hover:bg-zinc-700 text-white rounded-full transition-colors ${note.isPinned ? 'bg-amber-500' : 'bg-zinc-800'}`}
                            title={note.isPinned ? "Unpin Note" : "Pin Note"}
                          >
                            {note.isPinned ? <PinOffIcon /> : <PinIcon />}
                          </button>
                        </motion.div>
                      </React.Fragment>
                    )}
                  </AnimatePresence>
                </div>
              </div>
            </motion.div>
          );
        }

        function App() {
          const [notes, setNotes] = useState([]);
          const [searchQuery, setSearchQuery] = useState("");
          const [isFabOpen, setIsFabOpen] = useState(false);
          const [isLoading, setIsLoading] = useState(true);

          useEffect(() => {
            const saved = localStorage.getItem("DOCKET_NOTES");
            if (saved) {
              setNotes(JSON.parse(saved));
            }
            setTimeout(() => setIsLoading(false), 300);
          }, []);

          const saveNotes = (newNotes) => {
            setNotes(newNotes);
            localStorage.setItem("DOCKET_NOTES", JSON.stringify(newNotes));
          };

          const addNote = (color) => {
            const newNote = {
              id: crypto.randomUUID(),
              title: "",
              content: "",
              date: new Date().toISOString(),
              color: color,
              isPinned: false
            };
            saveNotes([newNote, ...notes]);
            setIsFabOpen(false);
          };

          const updateNote = (id, updates) => {
            saveNotes(notes.map(n => n.id === id ? { ...n, ...updates } : n));
          };

          const deleteNote = (id) => {
            saveNotes(notes.filter(n => n.id !== id));
          };

          const filteredNotes = useMemo(() => {
            return notes.filter(n => n.title.toLowerCase().includes(searchQuery.toLowerCase()));
          }, [notes, searchQuery]);

          const pinnedNotes = filteredNotes.filter(n => n.isPinned);
          const otherNotes = filteredNotes.filter(n => !n.isPinned);

          return (
            <div className="flex flex-col sm:flex-row h-screen bg-zinc-50 text-zinc-900 font-sans selection:bg-amber-200">
              <aside className="py-8 px-4 sm:p-8 flex flex-col items-center sm:border-r-2 border-gray-100 bg-white sm:min-w-[120px]">
                <h1 className="font-semibold text-2xl tracking-tighter">
                  Docket
                </h1>
                <div className="mt-5 sm:mt-20 flex flex-col items-center gap-8 relative">
                  <button 
                    onClick={() => setIsFabOpen(!isFabOpen)}
                    className="z-10 p-3 bg-zinc-900 text-white rounded-full hover:bg-zinc-800 transition-colors shadow-md"
                  >
                    <motion.div animate={{ rotate: isFabOpen ? 315 : 0 }}>
                      <PlusIcon />
                    </motion.div>
                  </button>
                  
                  <AnimatePresence>
                    {isFabOpen && (
                      <motion.div 
                        initial={{ opacity: 0, y: -20 }}
                        animate={{ opacity: 1, y: 0 }}
                        exit={{ opacity: 0, y: -20 }}
                        className="absolute top-16 flex flex-col gap-4 items-center z-0"
                      >
                        {COLORS.map((c, i) => (
                          <motion.button
                            key={c.id}
                            initial={{ scale: 0 }}
                            animate={{ scale: 1 }}
                            transition={{ delay: i * 0.05 }}
                            onClick={() => addNote(c.color)}
                            className={`w-8 h-8 rounded-full shadow-sm hover:brightness-90 transition-all ${c.color}`}
                          />
                        ))}
                      </motion.div>
                    )}
                  </AnimatePresence>
                </div>
              </aside>

              <main className="flex-1 py-8 px-4 sm:p-8 overflow-y-auto bg-white">
                <div className="max-w-sm mb-12">
                  <div className="py-2 px-3 flex items-center gap-2 border border-gray-300 rounded-lg overflow-hidden transition-all focus-within:ring-2 ring-amber-400 ring-offset-2">
                    <span className="text-gray-400"><SearchIcon /></span>
                    <input 
                      type="text"
                      placeholder="Search by title"
                      value={searchQuery}
                      onChange={e => setSearchQuery(e.target.value)}
                      className="w-full h-full focus:outline-none placeholder:text-gray-400 font-medium bg-transparent"
                    />
                  </div>
                </div>

                <h1 className="font-semibold text-6xl tracking-tight mb-14">Notes</h1>

                {isLoading ? (
                  <div className="mt-14 flex flex-col items-center gap-5 text-zinc-500">
                    <LoaderIcon />
                    <span>Hi! We are loading your notes, just a second.</span>
                  </div>
                ) : notes.length === 0 ? (
                  <div className="mt-14 flex flex-col items-center gap-5 text-zinc-500 text-center">
                    <span className="opacity-50"><BugIcon /></span>
                    <span>
                      Hmmm, it seems you don't have any notes created. <br/>
                      Let's <button onClick={() => setIsFabOpen(true)} className="bg-amber-400 px-2 py-0.5 rounded text-zinc-800 font-semibold hover:bg-amber-300 transition-colors mx-1">create</button> one right away?
                    </span>
                  </div>
                ) : filteredNotes.length === 0 ? (
                  <div className="mt-14 flex flex-col items-center gap-5 text-zinc-500 text-center">
                    <span className="opacity-50"><SearchIcon /></span>
                    <span>Ops, <span className="text-amber-500 font-semibold">{searchQuery}</span> was not found.</span>
                  </div>
                ) : (
                  <div className="flex flex-col gap-10">
                    {pinnedNotes.length > 0 && (
                      <section>
                        <h2 className="mb-5 text-zinc-500 font-semibold">Pinned</h2>
                        <div className="flex flex-wrap gap-6">
                          <AnimatePresence>
                            {pinnedNotes.map(note => (
                              <NoteCard key={note.id} note={note} onUpdate={updateNote} onDelete={deleteNote} />
                            ))}
                          </AnimatePresence>
                        </div>
                      </section>
                    )}

                    {otherNotes.length > 0 && (
                      <section>
                        <h2 className="mb-5 text-zinc-500 font-semibold">Others</h2>
                        <div className="flex flex-wrap gap-6">
                          <AnimatePresence>
                            {otherNotes.map(note => (
                              <NoteCard key={note.id} note={note} onUpdate={updateNote} onDelete={deleteNote} />
                            ))}
                          </AnimatePresence>
                        </div>
                      </section>
                    )}
                  </div>
                )}
              </main>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
