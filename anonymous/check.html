<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Location Tracker Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&family=Yaldevi:wght@400;600;700&display=swap" rel="stylesheet">
    <!-- Leaflet CSS for Maps -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    <style>
        body { font-family: 'Quicksand', 'Yaldevi', sans-serif; background-color: #f8fafc; }
        #map { height: 450px; border-radius: 1.5rem; z-index: 10; width: 100%; }
        .glass-card { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .user-item { transition: all 0.3s ease; border-left: 4px solid transparent; }
        .user-item.active { background-color: #eff6ff; border-left-color: #3b82f6; }
        .custom-scroll::-webkit-scrollbar { width: 6px; }
        .custom-scroll::-webkit-scrollbar-track { background: #f1f1f1; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="p-4 md:p-6 lg:p-10">

    <div class="max-w-7xl mx-auto space-y-6">
        
        <!-- Header -->
        <div class="flex flex-col md:flex-row md:items-center justify-between gap-4">
            <div>
                <h1 class="text-3xl font-bold text-gray-900">🌍 Live Tracker Dashboard</h1>
                <p class="text-gray-500 font-medium">සියලුම පරිශීලකයින්ගේ සජීවී දත්ත මෙතැනින් බලන්න</p>
            </div>
            <div class="flex items-center gap-2 bg-green-100 text-green-700 px-4 py-2 rounded-full text-sm font-bold shadow-sm">
                <span class="relative flex h-3 w-3">
                    <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-green-400 opacity-75"></span>
                    <span class="relative inline-flex rounded-full h-3 w-3 bg-green-500"></span>
                </span>
                සජීවීව සම්බන්ධයි
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
            
            <!-- Sidebar: User List -->
            <div class="lg:col-span-4 flex flex-col gap-4">
                <div class="glass-card rounded-3xl shadow-sm border border-gray-200 overflow-hidden flex flex-col h-[600px]">
                    <div class="p-5 border-b bg-gray-50/50">
                        <h2 class="font-bold text-gray-800 flex items-center gap-2">
                            පරිශීලකයින් (<span id="userCount">0</span>)
                        </h2>
                    </div>
                    <div id="userList" class="flex-1 overflow-y-auto custom-scroll p-2 space-y-1">
                        <!-- User items will be injected here -->
                        <div class="p-8 text-center text-gray-400">
                            <div class="animate-pulse mb-2 text-4xl">🔎</div>
                            දත්ත පූරණය වෙමින් පවතී...
                        </div>
                    </div>
                </div>
            </div>

            <!-- Main Content: Map & Details -->
            <div class="lg:col-span-8 space-y-6">
                <!-- Map Area -->
                <div class="glass-card p-4 rounded-3xl shadow-lg border border-gray-100">
                    <div id="map" class="shadow-inner bg-gray-100"></div>
                </div>

                <!-- Info Cards -->
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div class="glass-card p-6 rounded-2xl shadow-sm border border-gray-100">
                        <h3 class="text-sm font-bold text-gray-400 uppercase tracking-wider mb-3">ස්ථානය (Coordinates)</h3>
                        <div class="flex items-center gap-4">
                            <div class="p-3 bg-blue-100 rounded-xl text-blue-600">📍</div>
                            <div>
                                <p class="text-xl font-bold text-gray-800" id="cordData">තෝරාගෙන නැත</p>
                                <p class="text-xs text-gray-500" id="accuracyData">Accuracy: -</p>
                            </div>
                        </div>
                    </div>
                    <div class="glass-card p-6 rounded-2xl shadow-sm border border-gray-100">
                        <h3 class="text-sm font-bold text-gray-400 uppercase tracking-wider mb-3">උපාංග විස්තර (Device Info)</h3>
                        <div class="flex items-center gap-4">
                            <div class="p-3 bg-purple-100 rounded-xl text-purple-600">📱</div>
                            <div>
                                <p class="text-sm font-bold text-gray-800" id="platformData">-</p>
                                <p class="text-xs text-gray-500 truncate w-48" id="userAgentData">User Agent: -</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    
    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";
        import { getFirestore, collection, onSnapshot, query, getDocs } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";

        // Firebase Config (data-a0ce0)
        const firebaseConfig = {
            apiKey: "AIzaSyCbqDvrvNDn3lF31LYRq5O4PDpp-VSxIwc",
            authDomain: "data-a0ce0.firebaseapp.com",
            projectId: "data-a0ce0",
            storageBucket: "data-a0ce0.firebasestorage.app",
            messagingSenderId: "737698119491",
            appId: "1:737698119491:web:64f8d1f77d2fc05b8ff9f6"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // Map Setup
        let map = L.map('map').setView([7.8731, 80.7718], 7);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap'
        }).addTo(map);

        let activeMarker, activeCircle;
        let usersData = {}; // Store all users location docs

        // Login & Data Fetching
        signInAnonymously(auth).then(() => {
            onAuthStateChanged(auth, (user) => {
                if (user) loadUsersList();
            });
        });

        async function loadUsersList() {
            const userListEl = document.getElementById('userList');
            
            // අපි root level එකෙන් පටන් අරන් "birthday-card" ඇතුලේ ඉන්න ඔක්කොම usersලාගේ locations බලනවා
            // Rule එක "allow read: if request.auth != null" විය යුතුයි.
            const usersRootRef = collection(db, 'artifacts', 'birthday-card', 'users');
            
            // මේක Real-time snapshot එකක්, අලුත් කෙනෙක් ආපු ගමන් list එකට වැටෙනවා
            onSnapshot(usersRootRef, (snapshot) => {
                userListEl.innerHTML = '';
                document.getElementById('userCount').textContent = snapshot.docs.length;

                if (snapshot.empty) {
                    userListEl.innerHTML = '<div class="p-8 text-center text-gray-400">කිසිදු පරිශීලකයෙකු හමු නොවීය</div>';
                    return;
                }

                snapshot.docs.forEach(userDoc => {
                    const userId = userDoc.id;
                    const item = document.createElement('div');
                    item.className = 'user-item p-4 rounded-2xl cursor-pointer hover:bg-gray-50 flex items-center justify-between border-b border-gray-100';
                    item.dataset.id = userId;
                    item.innerHTML = `
                        <div class="flex items-center gap-3">
                            <div class="w-10 h-10 rounded-full bg-blue-500 flex items-center justify-center text-white font-bold">
                                ${userId.substring(0, 2).toUpperCase()}
                            </div>
                            <div>
                                <p class="text-sm font-bold text-gray-800">User: ${userId.substring(0, 8)}...</p>
                                <p class="text-xs text-gray-400">Click to view location</p>
                            </div>
                        </div>
                        <div class="text-blue-500">→</div>
                    `;

                    item.onclick = () => selectUser(userId, item);
                    userListEl.appendChild(item);
                });
            }, (error) => {
                console.error("Firestore Error:", error);
                userListEl.innerHTML = '<div class="p-8 text-center text-red-500 font-bold">Permission Denied! <br> <span class="text-xs font-normal">Check Firestore Rules</span></div>';
            });
        }

        async function selectUser(userId, element) {
            // UI Toggle
            document.querySelectorAll('.user-item').forEach(el => el.classList.remove('active'));
            element.classList.add('active');

            // Fetch the latest location for THIS user
            const locationsRef = collection(db, 'artifacts', 'birthday-card', 'users', userId, 'locations');
            const q = query(locationsRef); // සරල query එකක් use කරනවා indices ඕනේ නැති වෙන්න
            
            const querySnapshot = await getDocs(q);
            if (!querySnapshot.empty) {
                // සේව් වෙලා තියෙන අලුත්ම එක ගමු (JS වලින් sort කරලා)
                const allLocs = querySnapshot.docs.map(d => d.data());
                allLocs.sort((a, b) => b.timestamp?.toMillis() - a.timestamp?.toMillis());
                
                const latestData = allLocs[0];
                updateUIPanel(latestData);
                updateMap(latestData);
            } else {
                alert("මේ User ගේ Location දත්ත සොයාගත නොහැක.");
            }
        }

        function updateUIPanel(data) {
            document.getElementById('cordData').textContent = `${data.lat.toFixed(6)}, ${data.lng.toFixed(6)}`;
            document.getElementById('accuracyData').textContent = `Accuracy: ${data.accuracy ? Math.round(data.accuracy) : '-'} m`;
            document.getElementById('platformData').textContent = data.platform || 'Device Info N/A';
            document.getElementById('userAgentData').textContent = data.userAgent || '-';
        }

        function updateMap(data) {
            const latlng = [data.lat, data.lng];
            
            if (activeMarker) map.removeLayer(activeMarker);
            if (activeCircle) map.removeLayer(activeCircle);

            activeMarker = L.marker(latlng).addTo(map)
                .bindPopup(`<b>User Location</b><br>Accuracy: ${Math.round(data.accuracy)}m`)
                .openPopup();
            
            if(data.accuracy) {
                activeCircle = L.circle(latlng, { 
                    radius: data.accuracy, 
                    color: '#3b82f6', 
                    fillColor: '#3b82f6', 
                    fillOpacity: 0.15 
                }).addTo(map);
                map.fitBounds(activeCircle.getBounds(), { padding: [50, 50] });
            } else {
                map.setView(latlng, 16);
            }
        }
    </script>
</body>
</html>
