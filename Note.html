    <style>
        * { -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Inter', 'Noto Sans Sinhala', sans-serif; background: #fff; overflow: hidden; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        /* Shine animation */
        @keyframes textShine { 0% { background-position: 200% center; } 100% { background-position: -200% center; } }
        .text-shine-fx {
            background: linear-gradient(to right, #111827 20%, #d1d5db 40%, #fff 50%, #d1d5db 60%, #111827 80%);
            background-size: 200% auto; color: transparent !important; -webkit-background-clip: text; background-clip: text;
            animation: textShine 3s ease-in-out forwards;
        }
        .text-shine-fx-infinite { animation: textShine 3s linear infinite; }

        @keyframes fadeInUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in-up { animation: fadeInUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards; opacity: 0; }
        @keyframes popIn { from { opacity: 0; transform: scale(0.95) translateY(10px); } to { opacity: 1; transform: scale(1) translateY(0); } }

        /* Palette menu */

        @media (min-width: 768px) { .palette-menu { transform: translateY(-15px) scale(0.95); transform-origin: top center; } }
        .palette-menu.open { opacity: 1; pointer-events: auto; transform: translateY(0) scale(1); }
        .color-dot {
            opacity: 0; transform: translateY(15px) scale(0.5); transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        @media (min-width: 768px) { .color-dot { transform: translateY(-15px) scale(0.5); } }
        .palette-menu.open .color-dot { opacity: 1; transform: translateY(0) scale(1); }
        .color-dot:nth-child(5) { transition-delay: 0.05s; }
        .color-dot:nth-child(4) { transition-delay: 0.10s; }
        .color-dot:nth-child(3) { transition-delay: 0.15s; }
        .color-dot:nth-child(2) { transition-delay: 0.20s; }
        .color-dot:nth-child(1) { transition-delay: 0.25s; }
        @media (min-width: 768px) {
            .color-dot:nth-child(1) { transition-delay: 0.05s; }
            .color-dot:nth-child(2) { transition-delay: 0.10s; }
            .color-dot:nth-child(3) { transition-delay: 0.15s; }
            .color-dot:nth-child(4) { transition-delay: 0.20s; }
            .color-dot:nth-child(5) { transition-delay: 0.25s; }
        }

        #toggle-palette-btn i { transition: transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1); }
        #toggle-palette-btn.open i { transform: rotate(135deg); }

        .format-btn { padding: 0.35rem; color: #6b7280; border-radius: 0.375rem; transition: all 0.2s; }
        .format-btn:hover { color: #111827; background: #f3f4f6; transform: scale(1.1); }
        .format-btn:active { transform: scale(0.95); }

        @keyframes highlightFlash { 0% { background: rgba(250,204,21,0.9); box-shadow: 0 0 12px rgba(250,204,21,0.6); } 100% { background: transparent; box-shadow: none; } }
        .prose strong, .prose mark { animation: highlightFlash 1.5s ease-out forwards; }
        .prose mark { background-color: #fef08a; padding: 0.1em 0.3em; border-radius: 0.25rem; }

        .prose { line-height: 1.6; color: #1f2937; }
        .prose h1 { font-size: 2.5rem; font-weight: 800; border-bottom: 2px solid #e5e7eb; padding-bottom: 0.5rem; }
        .prose h2 { font-size: 2rem; font-weight: 700; }
        .prose h3 { font-size: 1.5rem; font-weight: 600; }
        .prose p { margin-bottom: 1.25rem; }
        .prose code:not(pre code) { background: #f3f4f6; color: #ef4444; padding: 0.2rem 0.4rem; border-radius: 0.375rem; }
        .prose pre { background: #1f2937; padding: 1.25rem; border-radius: 0.75rem; overflow-x: auto; }
        .prose pre code { color: #e5e7eb; background: none; }
        .prose ul, .prose ol { margin: 1rem 0 1rem 1.5rem; }
        .prose blockquote { background: #fef9e3; border-left: 4px solid #f5b042; padding: 1rem 1.5rem; border-radius: 0 0.75rem 0.75rem 0; }
        .katex-display { overflow-x: auto; margin: 1.5rem 0; }
        @media (max-width: 768px) { .prose h1 { font-size: 1.75rem; } .prose h2 { font-size: 1.5rem; } .prose { font-size: 0.95rem; } }

        /* LIVE HTML WIDGET (no container, full width) */
        .live-html-widget {
            margin: 1rem 0;
            width: 100%;
            background: transparent;
        }
        .live-html-widget iframe {
            width: 100%;
            border: none;
            background: transparent;
            display: block;
        }
        /* Ensure the parent prose allows full-width children */
        .prose {
            max-width: 100%;
        }
        .prose .live-html-widget {
            width: 100%;
            margin-left: 0;
            margin-right: 0;

    </style>

        // ---------- LIVE HTML WIDGET (no container, full width, always live) ----------
        function renderLiveHtmlWidgets(containerElement) {
            if (!containerElement) return;
            // Find all <pre><code class="language-html">...</code></pre> blocks
            const codeBlocks = containerElement.querySelectorAll('pre code.language-html');
            codeBlocks.forEach(block => {
                const pre = block.parentElement;
                if (!pre || pre.classList.contains('html-widget-processed')) return;
                pre.classList.add('html-widget-processed');
                let rawHtml = block.textContent || '';
                // Create a wrapper div for the live widget
                const widgetDiv = document.createElement('div');
                widgetDiv.className = 'live-html-widget';
                // Use iframe for safe, isolated rendering (supports full CSS/JS)
                const iframe = document.createElement('iframe');
                iframe.setAttribute('sandbox', 'allow-same-origin allow-scripts allow-popups allow-forms allow-modals');
                iframe.setAttribute('referrerpolicy', 'no-referrer');
                iframe.style.minHeight = '200px';
                iframe.style.width = '100%';
                // Generate full HTML document with proper viewport and styles
                const fullDoc = `<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=yes"><style>body { margin: 0; padding: 16px; font-family: system-ui, -apple-system, 'Inter', sans-serif; background: white; } * { box-sizing: border-box; }</style></head><body>${rawHtml}</body></html>`;
                iframe.srcdoc = fullDoc;
                // Auto-resize iframe height based on content (simple)
                iframe.addEventListener('load', () => {
                    try {
                        const height = iframe.contentWindow.document.body.scrollHeight;
                        iframe.style.height = Math.max(height + 16, 200) + 'px';
                    } catch(e) { iframe.style.height = '300px'; }
                });
                widgetDiv.appendChild(iframe);
                // Replace the <pre> block with our live widget
                pre.parentNode.replaceChild(widgetDiv, pre);
            });
        }

        // Override for dynamic content (preview & view)
        const originalRenderMath = renderMathInElement;
        window.renderMathInElement = function(el, opts) { originalRenderMath(el, opts); renderLiveHtmlWidgets(el); };

        // Marked setup
        marked.setOptions({ gfm: true, breaks: true });

        // Helper functions
        function escapeHtml(str) { return str?.replace(/[&<>]/g, m => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;' }[m])) || ''; }
        function showToast(msg) { const t=document.createElement('div'); t.innerText=msg; t.className='fixed bottom-20 left-1/2 -translate-x-1/2 bg-gray-900 text-white px-4 py-2 rounded-full text-sm z-[9999]'; document.body.appendChild(t); setTimeout(()=>t.remove(),2000); }

        function formatSnippet(content, maxLen=100) { if(!content) return ''; let txt=content.replace(/```[\s\S]*?```/g, '[widget]').replace(/[#*`>]/g,'').trim(); if(txt.length>maxLen) txt=txt.slice(0,maxLen)+'...'; return txt; }

        // Render notes grid
        function renderNotes(notes) {
            const grid = document.getElementById('notes-grid');
            const empty = document.getElementById('empty-state');
            grid.innerHTML = '';
            if(notes.length===0) empty.classList.remove('hidden'); else empty.classList.add('hidden');
            notes.forEach((note, idx) => {
                const div = document.createElement('div');
                div.className = `group relative rounded-2xl md:rounded-[30px] p-5 md:p-7 flex flex-col justify-between min-h-[200px] md:min-h-[240px] transition-all duration-500 hover:-translate-y-2 hover:shadow-2xl hover:scale-[1.02] cursor-pointer animate-pop-in`;
                div.style.animationDelay = `${idx*0.05}s`;
                div.style.backgroundColor = note.color || '#ffffff';
                const snippet = formatSnippet(note.content, 100);
                const dateStr = note.timestamp ? new Date(note.timestamp).toLocaleDateString('en-US', { month:'short', day:'numeric', year:'numeric' }) : 'No date';
                div.innerHTML = `
                    <div><h3 class="text-xl md:text-2xl font-bold text-gray-900 mb-2 line-clamp-2">${escapeHtml(note.title) || 'Untitled'}</h3><p class="text-gray-800/80 text-sm md:text-base line-clamp-3">${snippet}</p></div>
                    <div class="mt-4 flex justify-between items-center"><span class="text-xs md:text-sm font-semibold text-gray-900/60">${dateStr}</span><div class="flex gap-2"><div class="w-10 h-10 md:w-12 md:h-12 bg-white border rounded-full flex items-center justify-center shadow-sm copy-btn"><i data-lucide="copy" class="w-4 h-4"></i></div><div class="w-10 h-10 md:w-12 md:h-12 bg-black rounded-full flex items-center justify-center shadow-md edit-btn"><i data-lucide="pencil" class="w-4 h-4 text-white"></i></div></div></div>
                `;
                div.addEventListener('click', (e) => { if(!e.target.closest('.edit-btn') && !e.target.closest('.copy-btn')) openViewModal(note); });
                div.querySelector('.copy-btn')?.addEventListener('click', (e) => { e.stopPropagation(); navigator.clipboard.writeText(note.content || ''); showToast("Copied"); });
                div.querySelector('.edit-btn')?.addEventListener('click', (e) => { e.stopPropagation(); openEditorModal(note); });
                grid.appendChild(div);
            });
            lucide.createIcons();
        }

        // View modal with live HTML widgets
        function openViewModal(note) {
            currentViewNote = note;
            const viewLoading = document.getElementById('view-loading');
            const wrapper = document.getElementById('view-content-wrapper');
            viewLoading.classList.remove('hidden'); wrapper.classList.add('hidden');
            document.getElementById('view-modal').classList.remove('hidden');
            setTimeout(() => { document.getElementById('view-modal').classList.add('opacity-100'); document.getElementById('view-modal-content').classList.add('scale-100'); }, 20);
            setTimeout(() => {
                document.getElementById('view-title').textContent = note.title || 'Untitled Note';
                document.getElementById('view-color-indicator').style.backgroundColor = note.color || '#cccccc';
                let processed = (note.content || '').replace(/==([^=]+)==/g, '<mark>$1</mark>');
                const html = marked.parse(processed);
                const contentDiv = document.getElementById('view-content');
                contentDiv.innerHTML = html;
                renderMathInElement(contentDiv, { delimiters: [{left:'$$',right:'$$',display:true},{left:'$',right:'$',display:false},{left:'\\(',right:'\\)',display:false},{left:'\\[',right:'\\]',display:true}], throwOnError:false });
                renderLiveHtmlWidgets(contentDiv);
                viewLoading.classList.add('hidden'); wrapper.classList.remove('hidden');
            }, 400);
        }

        // Editor preview with live widgets
        function updatePreview() {
            const previewTitle = document.getElementById('preview-title');
            const previewContent = document.getElementById('preview-content');
            previewTitle.textContent = titleInput.value || 'Untitled Note';
            let processed = (contentInput.value || '').replace(/==([^=]+)==/g, '<mark>$1</mark>');
            const parsed = marked.parse(processed);
            previewContent.innerHTML = parsed;
            renderMathInElement(previewContent, { delimiters: [{left:'$$',right:'$$',display:true},{left:'$',right:'$',display:false},{left:'\\(',right:'\\)',display:false},{left:'\\[',right:'\\]',display:true}], throwOnError:false });
            renderLiveHtmlWidgets(previewContent);
            const text = contentInput.value;
            const chars = text.length;
            const words = text.trim() === '' ? 0 : text.trim().split(/\s+/).length;
            document.getElementById('word-count').textContent = `${words} word${words!==1?'s':''}`;
            document.getElementById('char-count').textContent = `${chars} character${chars!==1?'s':''}`;
        }

        // Editor modal logic
        let activeNoteId = null, activeColor = '#ffffff', currentViewNote = null;
        const toggleBtn = document.getElementById('toggle-palette-btn');
        const paletteMenu = document.getElementById('palette-menu');
        const searchInput = document.getElementById('search-input');
        const editorModal = document.getElementById('editor-modal');
        const editorContainer = document.getElementById('editor-container');
        const titleInput = document.getElementById('note-title-input');
        const contentInput = document.getElementById('note-content-input');
        const cancelBtn = document.getElementById('cancel-note-btn');
        const saveBtn = document.getElementById('save-note-btn');
        const deleteBtn = document.getElementById('delete-note-btn');
        const modalHeader = document.getElementById('modal-header');
        const modalColorIndicator = document.getElementById('modal-color-indicator');
        const closeViewBtn = document.getElementById('close-view-modal');
        const editFromViewBtn = document.getElementById('edit-from-view-btn');
        const fullscreenViewBtn = document.getElementById('fullscreen-view-btn');
        const viewModal = document.getElementById('view-modal');
        const viewModalContent = document.getElementById('view-modal-content');
        
        let isPaletteOpen = false;
        toggleBtn.addEventListener('click', (e) => { e.stopPropagation(); isPaletteOpen = !isPaletteOpen; if(isPaletteOpen) { paletteMenu.classList.add('open'); toggleBtn.classList.add('open'); } else closePalette(); });
        function closePalette() { isPaletteOpen = false; paletteMenu.classList.remove('open'); toggleBtn.classList.remove('open'); }
        document.addEventListener('click', (e) => { if(isPaletteOpen && !toggleBtn.contains(e.target) && !paletteMenu.contains(e.target)) closePalette(); });
        document.querySelectorAll('.color-dot').forEach(dot => dot.addEventListener('click', (e) => { closePalette(); openEditorModal(null, e.target.dataset.color); }));

        function openEditorModal(note=null, color='#ffffff') {
            activeNoteId = note?.id || null;
            activeColor = note?.color || color;
            titleInput.value = note?.title || '';
            contentInput.value = note?.content || '';
            modalHeader.style.backgroundColor = `${activeColor}20`;
            modalColorIndicator.style.backgroundColor = activeColor;
            updatePreview();
            deleteBtn.classList.toggle('hidden', !activeNoteId);
            editorModal.classList.remove('hidden');
            setTimeout(() => { editorModal.classList.add('opacity-100'); editorContainer.classList.add('scale-100'); }, 20);
            titleInput.focus();
        }
        function closeEditorModal() {
            editorModal.classList.remove('opacity-100');
            editorModal.classList.add('opacity-0');
            editorContainer.classList.remove('scale-100');
            editorContainer.classList.add('scale-95');
            setTimeout(() => editorModal.classList.add('hidden'), 500);
        }
        cancelBtn.addEventListener('click', closeEditorModal);
        saveBtn.addEventListener('click', async () => {
            if(!currentUser) { showToast("Sign in to save"); openSettings(); return; }
            const title = titleInput.value.trim() || 'Untitled';
            const content = contentInput.value.trim();
            if(!content && !titleInput.value.trim()) { closeEditorModal(); return; }
            const noteData = { title, content, color: activeColor, timestamp: Date.now() };
            const ref = collection(db, 'artifacts', APP_ID, 'users', currentUser.uid, 'notes');
            if(activeNoteId) await setDoc(doc(ref, activeNoteId), noteData);
            else await addDoc(ref, noteData);
            closeEditorModal();
        });
        deleteBtn.addEventListener('click', () => {
            if(!activeNoteId || !currentUser) return;
            const confirmModal = document.getElementById('confirm-modal');
            confirmModal.classList.remove('hidden');
            setTimeout(() => confirmModal.classList.add('opacity-100'), 20);
            const confirmDelete = document.getElementById('confirm-delete-btn');
            const confirmCancel = document.getElementById('confirm-cancel-btn');
            const closeConfirm = () => { confirmModal.classList.remove('opacity-100'); confirmModal.classList.add('opacity-0'); setTimeout(()=>confirmModal.classList.add('hidden'),500); };
            confirmDelete.onclick = async () => { await deleteDoc(doc(db, 'artifacts', APP_ID, 'users', currentUser.uid, 'notes', activeNoteId)); closeConfirm(); closeEditorModal(); };
            confirmCancel.onclick = closeConfirm;
        });
        titleInput.addEventListener('input', updatePreview);
        contentInput.addEventListener('input', updatePreview);
        // Format buttons
        document.querySelectorAll('.format-btn').forEach(btn => btn.addEventListener('click', (e) => {
            e.preventDefault();
            const format = btn.dataset.format, suffix = btn.dataset.suffix || format;
            const start = contentInput.selectionStart, end = contentInput.selectionEnd, text = contentInput.value, selected = text.substring(start,end);
            let newText, cursor;
            if(['# ','## ','- ','1. ','> '].includes(format)) { newText = text.substring(0,start)+format+selected+text.substring(end); cursor = end+format.length; }
            else if(format === '```\n' || format === '```html\n') { newText = text.substring(0,start)+format+selected+suffix+text.substring(end); cursor = start+format.length; }
            else { newText = text.substring(0,start)+format+selected+suffix+text.substring(end); cursor = selected.length>0 ? end+format.length*2 : start+format.length; }
            contentInput.value = newText; contentInput.focus(); contentInput.selectionStart = contentInput.selectionEnd = cursor; updatePreview();
        }));
        // Tab support
        contentInput.addEventListener('keydown', (e) => { if(e.key === 'Tab') { e.preventDefault(); const s=contentInput.selectionStart; contentInput.value = contentInput.value.substring(0,s)+'  '+contentInput.value.substring(contentInput.selectionEnd); contentInput.selectionStart = contentInput.selectionEnd = s+2; updatePreview(); } });

        // Settings & Auth
        function openSettings() { const modal = document.getElementById('settings-modal'); modal.classList.remove('hidden'); setTimeout(()=>modal.classList.add('opacity-100'),20); }
        document.getElementById('settings-btn-desktop')?.addEventListener('click', openSettings);
        document.getElementById('settings-btn-mobile')?.addEventListener('click', openSettings);
        document.getElementById('close-settings-btn')?.addEventListener('click', () => { const modal=document.getElementById('settings-modal'); modal.classList.remove('opacity-100'); modal.classList.add('opacity-0'); setTimeout(()=>modal.classList.add('hidden'),500); });
        document.getElementById('settings-google-signin-btn')?.addEventListener('click', async () => { await signInWithPopup(auth, provider); showToast("Signed in"); document.getElementById('settings-modal').classList.add('hidden'); });
        document.getElementById('settings-signout-btn')?.addEventListener('click', async () => { await signOut(auth); showToast("Signed out"); document.getElementById('settings-modal').classList.add('hidden'); });
        
        function updateSettingsUI(user) { /* not critical for functionality */ }
        onAuthStateChanged(auth, (user) => {
            currentUser = user;
            if(user) {
                const ref = collection(db, 'artifacts', APP_ID, 'users', user.uid, 'notes');
                if(unsubscribeSnapshot) unsubscribeSnapshot();
                unsubscribeSnapshot = onSnapshot(ref, (snap) => {
                    notesData = snap.docs.map(d => ({ id: d.id, ...d.data() })).sort((a,b) => (b.timestamp||0)-(a.timestamp||0));
                    renderNotes(notesData);
                    const urlNoteId = new URLSearchParams(location.search).get('note');
                    if(urlNoteId && notesData.find(n=>n.id===urlNoteId)) openViewModal(notesData.find(n=>n.id===urlNoteId));
                });
            } else { notesData = []; renderNotes([]); }
        });

        closeViewBtn.addEventListener('click', () => { viewModal.classList.remove('opacity-100'); viewModalContent.classList.remove('scale-100'); setTimeout(()=>viewModal.classList.add('hidden'),500); });
        editFromViewBtn.addEventListener('click', () => { if(currentViewNote) { closeViewModal(); openEditorModal(currentViewNote); } });
        fullscreenViewBtn.addEventListener('click', () => { if(!document.fullscreenElement) viewModalContent.requestFullscreen(); else document.exitFullscreen(); });
        document.getElementById('copy-view-btn')?.addEventListener('click', () => { if(currentViewNote) navigator.clipboard.writeText(currentViewNote.content || ''); showToast("Copied"); });
        searchInput.addEventListener('input', (e) => { const q = e.target.value.toLowerCase(); renderNotes(notesData.filter(n => n.title?.toLowerCase().includes(q) || n.content?.toLowerCase().includes(q))); });

        // Initial loading skeletons
        function renderSkeletons() { const grid=document.getElementById('notes-grid'); grid.innerHTML=''; for(let i=0;i<6;i++) grid.innerHTML+=`<div class="rounded-2xl p-5 bg-white border animate-pulse"><div class="h-7 bg-gray-200 rounded w-3/4 mb-5"></div><div class="h-3.5 bg-gray-100 rounded mb-3"></div><div class="h-3.5 bg-gray-100 rounded w-5/6"></div></div>`; }
        renderSkeletons();
    </script>
</body>
</html>
