<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Docket Notes - Advanced HTML Widgets</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- Google Fonts: Inter + Sinhala -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+Sinhala:wght@100..900&display=swap" rel="stylesheet">
    
    <!-- Markdown Parser -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    
    <!-- KaTeX for Math Rendering -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'Noto Sans Sinhala', 'sans-serif'],
                        sinhala: ['Noto Sans Sinhala', 'sans-serif'],
                    },
                    colors: {
                        c1: '#ffcc80',
                        c2: '#ffab91',
                        c3: '#b39ddb',
                        c4: '#80deea',
                        c5: '#c5e1a5',
                    },
                    transitionTimingFunction: {
                        'smooth': 'cubic-bezier(0.16, 1, 0.3, 1)',
                        'spring': 'cubic-bezier(0.175, 0.885, 0.32, 1.275)',
                    }
                }
            }
        }
    </script>

    <style>
        * {
            -webkit-tap-highlight-color: transparent;
        }
        body {
            font-family: 'Inter', 'Noto Sans Sinhala', sans-serif;
            background-color: #ffffff;
            overflow: hidden;
        }

        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        /* Premium Animations */
        @keyframes textShine {
            0% { background-position: 200% center; }
            100% { background-position: -200% center; }
        }
        .text-shine-fx {
            background: linear-gradient(to right, #111827 20%, #d1d5db 40%, #ffffff 50%, #d1d5db 60%, #111827 80%);
            background-size: 200% auto;
            color: transparent !important;
            -webkit-text-fill-color: transparent !important;
            -webkit-background-clip: text !important;
            background-clip: text !important;
            animation: textShine 3s ease-in-out forwards;
        }
        .text-shine-fx-infinite {
            background: linear-gradient(to right, #111827 20%, #d1d5db 40%, #ffffff 50%, #d1d5db 60%, #111827 80%);
            background-size: 200% auto;
            color: transparent !important;
            -webkit-text-fill-color: transparent !important;
            -webkit-background-clip: text !important;
            background-clip: text !important;
            animation: textShine 3s linear infinite;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in-up {
            animation: fadeInUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            opacity: 0;
        }
        @keyframes popIn {
            from { opacity: 0; transform: scale(0.95) translateY(10px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }
        .animate-pop-in {
            animation: popIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
            opacity: 0;
        }

        /* Palette menu */
        .palette-menu {
            opacity: 0;
            pointer-events: none;
            transform: translateY(15px) scale(0.95);
            transform-origin: bottom center;
            transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        @media (min-width: 768px) {
            .palette-menu {
                transform: translateY(-15px) scale(0.95);
                transform-origin: top center;
            }
        }
        .palette-menu.open {
            opacity: 1;
            pointer-events: auto;
            transform: translateY(0) scale(1);
        }
        .color-dot {
            opacity: 0;
            transform: translateY(15px) scale(0.5);
            transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        @media (min-width: 768px) {
            .color-dot {
                transform: translateY(-15px) scale(0.5);
            }
        }
        .palette-menu.open .color-dot {
            opacity: 1;
            transform: translateY(0) scale(1);
        }
        
        .color-dot:nth-child(5) { transition-delay: 0.05s; }
        .color-dot:nth-child(4) { transition-delay: 0.10s; }
        .color-dot:nth-child(3) { transition-delay: 0.15s; }
        .color-dot:nth-child(2) { transition-delay: 0.20s; }
        .color-dot:nth-child(1) { transition-delay: 0.25s; }
        @media (min-width: 768px) {
            .color-dot:nth-child(1) { transition-delay: 0.05s; }
            .color-dot:nth-child(2) { transition-delay: 0.10s; }
            .color-dot:nth-child(3) { transition-delay: 0.15s; }
            .color-dot:nth-child(4) { transition-delay: 0.20s; }
            .color-dot:nth-child(5) { transition-delay: 0.25s; }
        }

        #toggle-palette-btn i {
            transition: transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        #toggle-palette-btn.open i {
            transform: rotate(135deg);
        }

        /* Format Toolbar */
        .format-btn {
            padding: 0.35rem;
            color: #6b7280;
            border-radius: 0.375rem;
            transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .format-btn:hover {
            color: #111827;
            background-color: #f3f4f6;
            transform: scale(1.1);
        }
        .format-btn:active {
            transform: scale(0.95);
        }

        /* Flash Animation */
        @keyframes highlightFlash {
            0% { background-color: rgba(250, 204, 21, 0.9); color: #000; box-shadow: 0 0 12px rgba(250, 204, 21, 0.6); }
            100% { background-color: transparent; box-shadow: 0 0 0 transparent; }
        }
        .prose strong {
            font-weight: 700;
            color: #000000;
            border-radius: 0.2rem;
            animation: highlightFlash 1.5s ease-out forwards;
        }
        .prose mark {
            background-color: #fef08a;
            color: #111827;
            padding: 0.1em 0.3em;
            border-radius: 0.25rem;
            animation: highlightFlash 1.5s ease-out forwards;
        }

        /* HTML Widget iframe container */
        .html-widget-container {
            margin: 1.5rem 0;
            border-radius: 0.75rem;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            border: 1px solid #e5e7eb;
            background: white;
        }
        .html-widget-container iframe {
            width: 100%;
            border: none;
            display: block;
        }

        /* Prose typography */
        .prose {
            line-height: 1.6;
            color: #1f2937;
        }
        .prose h1 { font-size: 2.5rem; font-weight: 800; margin-top: 2.5rem; margin-bottom: 1rem; border-bottom: 2px solid #e5e7eb; padding-bottom: 0.5rem; color: #111827; }
        .prose h2 { font-size: 2rem; font-weight: 700; margin-top: 2rem; margin-bottom: 0.75rem; color: #111827; }
        .prose h3 { font-size: 1.5rem; font-weight: 600; margin-top: 1.5rem; margin-bottom: 0.5rem; color: #1f2937; }
        .prose p { margin-bottom: 1.25rem; line-height: 1.7; }
        .prose code:not(pre code) { background-color: #f3f4f6; color: #ef4444; padding: 0.2rem 0.4rem; border-radius: 0.375rem; font-size: 0.875em; }
        .prose pre { background-color: #1f2937; padding: 1.25rem; border-radius: 0.75rem; overflow-x: auto; margin: 1.5rem 0; }
        .prose pre code { color: #e5e7eb; background: none; padding: 0; }
        .prose ul { list-style-type: disc; margin: 1rem 0 1rem 1.5rem; }
        .prose ol { list-style-type: decimal; margin: 1rem 0 1rem 1.5rem; }
        .prose li { margin-bottom: 0.5rem; }
        .prose blockquote { background-color: #fef9e3; border-left: 4px solid #f5b042; padding: 1rem 1.5rem; margin: 1.5rem 0; border-radius: 0 0.75rem 0.75rem 0; color: #78350f; font-style: italic; }
        .prose a { color: #2563eb; text-decoration: underline; text-underline-offset: 3px; }
        .prose img { max-width: 100%; border-radius: 0.75rem; margin: 1.5rem auto; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); }
        .katex-display { overflow-x: auto; }
        @media (max-width: 768px) {
            .prose h1 { font-size: 1.75rem; }
            .prose h2 { font-size: 1.5rem; }
            .prose { font-size: 0.95rem; }
        }

        .modal-center { display: flex; align-items: center; justify-content: center; }
        @media (max-width: 768px) {
            #editor-modal .bg-white, #view-modal .bg-white, #settings-modal .bg-white { width: 100%; height: 100%; border-radius: 0; }
            #editor-modal, #view-modal, #settings-modal { padding: 0; }
            #view-modal-content { max-height: 100%; border-radius: 0; }
            .edit-btn { opacity: 1 !important; background-color: rgba(0,0,0,0.7) !important; }
        }
    </style>
</head>
<body class="h-screen w-full flex flex-col md:flex-row">

    <!-- Sidebar (same as original) -->
    <aside class="w-0 h-0 md:w-[100px] md:h-full md:bg-white md:border-r border-gray-200 flex md:flex-col items-center md:justify-start md:py-8 md:px-4 z-[60] flex-shrink-0 order-last md:order-1">
        <h1 class="font-bold text-xl tracking-tight text-gray-900 hidden md:block mb-20 animate-fade-in-up">Docket</h1>
        <div class="fixed bottom-6 right-6 md:relative md:bottom-auto md:right-auto flex flex-col items-center z-[100] animate-fade-in-up" style="animation-delay: 0.1s;">
            <div id="palette-menu" class="palette-menu absolute bottom-full mb-4 md:top-full md:bottom-auto md:mb-0 md:mt-6 flex flex-col items-center gap-3 p-3 bg-white/90 backdrop-blur-xl rounded-[24px] md:rounded-full shadow-2xl border border-gray-100 z-10">
                <button class="w-11 h-11 md:w-8 md:h-8 rounded-full bg-c5 color-dot shadow-sm" data-color="#c5e1a5"></button>
                <button class="w-11 h-11 md:w-8 md:h-8 rounded-full bg-c4 color-dot shadow-sm" data-color="#80deea"></button>
                <button class="w-11 h-11 md:w-8 md:h-8 rounded-full bg-c3 color-dot shadow-sm" data-color="#b39ddb"></button>
                <button class="w-11 h-11 md:w-8 md:h-8 rounded-full bg-c2 color-dot shadow-sm" data-color="#ffab91"></button>
                <button class="w-11 h-11 md:w-8 md:h-8 rounded-full bg-c1 color-dot shadow-sm" data-color="#ffcc80"></button>
            </div>
            <button id="toggle-palette-btn" class="w-14 h-14 md:w-12 md:h-12 bg-gray-900 text-white rounded-full flex items-center justify-center transition-all duration-300 shadow-[0_8px_30px_rgb(0,0,0,0.2)] hover:shadow-[0_12px_40px_rgb(0,0,0,0.3)] hover:scale-105 active:scale-95 focus:outline-none z-20">
                <i data-lucide="plus" class="w-7 h-7 md:w-6 md:h-6"></i>
            </button>
        </div>
        <div class="hidden md:block mt-auto animate-fade-in-up" style="animation-delay: 0.2s;">
            <button id="settings-btn-desktop" class="w-10 h-10 rounded-full flex items-center justify-center text-gray-500 hover:text-gray-900 hover:bg-gray-100 transition-all duration-300 active:scale-90">
                <i data-lucide="settings" class="w-5 h-5 transition-transform duration-500 hover:rotate-90"></i>
            </button>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 h-full flex flex-col relative bg-white overflow-hidden order-2">
        <header class="pt-4 md:pt-8 px-4 md:px-10 flex items-center justify-between md:justify-end z-10">
            <button id="settings-btn-mobile" class="md:hidden w-10 h-10 rounded-full flex items-center justify-center text-gray-500 hover:text-gray-900 hover:bg-gray-100 transition-all active:scale-90 animate-fade-in-up">
                <i data-lucide="settings" class="w-5 h-5"></i>
            </button>
            <div class="flex items-center text-gray-400 bg-gray-50 border border-gray-200 rounded-full px-4 py-2 w-full max-w-sm ml-auto md:ml-0 animate-fade-in-up transition-all duration-300 focus-within:shadow-md focus-within:bg-white focus-within:border-gray-300" style="animation-delay: 0.1s;">
                <i data-lucide="search" class="w-5 h-5 mr-2"></i>
                <input id="search-input" type="text" placeholder="Search notes..." class="bg-transparent w-full outline-none text-base">
            </div>
        </header>

        <div class="flex-1 overflow-y-auto no-scrollbar px-4 md:px-10 pb-20 md:pb-16 pt-4">
            <h2 id="main-title" class="text-6xl md:text-8xl font-extrabold text-gray-900 mb-6 md:mb-12 tracking-tighter animate-fade-in-up cursor-pointer select-none" style="animation-delay: 0.2s;">Notes</h2>
            <div id="notes-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 md:gap-8 items-start pb-8"></div>
            <div id="empty-state" class="hidden w-full py-12 flex flex-col justify-center items-center text-gray-400 animate-fade-in-up" style="animation-delay: 0.3s;">
                <i data-lucide="sticky-note" class="w-16 h-16 mb-4 opacity-50"></i>
                <p class="text-lg text-center px-4">No notes found. Tap the + button to create your first note!</p>
            </div>
        </div>
    </main>

    <!-- Editor Modal (updated toolbar with HTML Widget button) -->
    <div id="editor-modal" class="fixed inset-0 z-50 bg-white/90 md:bg-white/40 backdrop-blur-md hidden modal-center p-0 md:p-6 opacity-0 transition-opacity duration-500 ease-smooth">
        <div class="bg-white w-full h-full md:w-full md:max-w-7xl md:h-[90vh] md:rounded-[30px] shadow-[0_20px_60px_-15px_rgba(0,0,0,0.1)] flex flex-col overflow-hidden border-0 md:border border-gray-200 transform scale-95 transition-all duration-500 ease-smooth" id="editor-container">
            <div class="h-14 md:h-16 border-b border-gray-100 flex items-center justify-between px-4 md:px-6 flex-shrink-0 transition-colors duration-500" id="modal-header">
                <div class="flex items-center gap-2">
                    <div id="modal-color-indicator" class="w-4 h-4 rounded-full transition-colors duration-500"></div>
                    <span class="font-medium text-gray-500 text-sm">Editor</span>
                </div>
                <div class="flex items-center gap-2">
                    <button id="delete-note-btn" class="px-3 py-1.5 text-sm font-medium text-red-600 hover:bg-red-50 rounded-full hidden items-center gap-1 transition-colors active:scale-95">
                        <i data-lucide="trash-2" class="w-4 h-4"></i><span class="hidden md:inline">Delete</span>
                    </button>
                    <button id="cancel-note-btn" class="px-3 py-1.5 text-sm font-medium text-gray-600 hover:bg-gray-50 rounded-full transition-colors active:scale-95">Cancel</button>
                    <button id="save-note-btn" class="px-4 py-1.5 text-sm font-semibold text-white bg-black rounded-full hover:bg-gray-800 shadow-md hover:shadow-lg transition-all active:scale-95">Save</button>
                </div>
            </div>
            <div class="flex flex-col md:flex-row flex-1 overflow-hidden">
                <div class="w-full md:w-1/2 h-1/2 md:h-full border-b md:border-b-0 md:border-r border-gray-100 flex flex-col bg-white">
                    <div class="flex-1 flex flex-col p-4 md:p-6 overflow-hidden">
                        <input id="note-title-input" type="text" placeholder="Note Title..." class="text-2xl md:text-3xl font-bold text-gray-900 outline-none w-full mb-4 bg-transparent">
                        <!-- Toolbar with new HTML Widget button -->
                        <div class="flex items-center gap-1 mb-3 pb-3 border-b border-gray-100 overflow-x-auto no-scrollbar flex-shrink-0">
                            <button class="format-btn" data-format="**" title="Bold"><i data-lucide="bold" class="w-4 h-4"></i></button>
                            <button class="format-btn" data-format="*" title="Italic"><i data-lucide="italic" class="w-4 h-4"></i></button>
                            <button class="format-btn" data-format="~~" title="Strikethrough"><i data-lucide="strikethrough" class="w-4 h-4"></i></button>
                            <button class="format-btn" data-format="==" title="Highlight"><i data-lucide="highlighter" class="w-4 h-4"></i></button>
                            <div class="w-px h-4 bg-gray-200 mx-1"></div>
                            <button class="format-btn" data-format="# " title="Heading 1"><i data-lucide="heading-1" class="w-4 h-4"></i></button>
                            <button class="format-btn" data-format="## " title="Heading 2"><i data-lucide="heading-2" class="w-4 h-4"></i></button>
                            <div class="w-px h-4 bg-gray-200 mx-1"></div>
                            <button class="format-btn" data-format="- " title="Bullet List"><i data-lucide="list" class="w-4 h-4"></i></button>
                            <button class="format-btn" data-format="1. " title="Numbered List"><i data-lucide="list-ordered" class="w-4 h-4"></i></button>
                            <div class="w-px h-4 bg-gray-200 mx-1"></div>
                            <button class="format-btn" data-format="> " title="Quote"><i data-lucide="quote" class="w-4 h-4"></i></button>
                            <button class="format-btn" data-format="```\n" data-suffix="\n```" title="Code Block"><i data-lucide="code" class="w-4 h-4"></i></button>
                            <!-- NEW: HTML Widget button inserts ```html code block -->
                            <button id="html-widget-btn" class="format-btn" title="Insert HTML Widget (Flex/Grid/SVG)"><i data-lucide="layout" class="w-4 h-4"></i></button>
                        </div>
                        <textarea id="note-content-input" placeholder="Start typing... Markdown & LaTeX supported. Use ```html ... ``` for interactive HTML widgets." class="flex-1 w-full resize-none outline-none text-base md:text-lg text-gray-700 bg-transparent leading-relaxed no-scrollbar"></textarea>
                    </div>
                    <div class="h-10 border-t border-gray-50 flex items-center px-4 md:px-6 flex-shrink-0 bg-gray-50/50 text-xs text-gray-400 justify-between font-medium">
                        <span id="word-count">0 words</span>
                        <span id="char-count">0 characters</span>
                    </div>
                </div>
                <div class="w-full md:w-1/2 h-1/2 md:h-full overflow-y-auto p-4 md:p-8 bg-gray-50">
                    <h1 id="preview-title" class="text-2xl md:text-4xl font-bold text-gray-900 mb-4 pb-2 border-b border-gray-200 empty:hidden"></h1>
                    <div id="preview-content" class="prose prose-base md:prose-lg text-gray-800 w-full max-w-none"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- View Modal (same enhanced rendering) -->
    <div id="view-modal" class="fixed inset-0 z-50 bg-black/50 backdrop-blur-sm hidden modal-center p-0 md:p-6 opacity-0 transition-opacity duration-500 ease-smooth">
        <div id="view-modal-content" class="bg-white w-full h-full md:w-full md:max-w-4xl md:max-h-[85vh] md:rounded-2xl shadow-2xl flex flex-col overflow-hidden transform scale-95 transition-all duration-500 ease-smooth">
            <div class="flex items-center justify-between px-4 md:px-6 py-3 md:py-4 border-b border-gray-100">
                <div class="flex items-center gap-2"><div id="view-color-indicator" class="w-4 h-4 rounded-full"></div><span class="text-xs font-medium text-gray-400 uppercase tracking-wider">Preview</span></div>
                <button id="close-view-modal" class="text-gray-400 hover:text-gray-600"><i data-lucide="x" class="w-5 h-5"></i></button>
            </div>
            <div class="flex-1 overflow-y-auto p-4 md:p-8">
                <div id="view-loading" class="hidden flex-col gap-4 animate-pulse"><div class="h-8 bg-gray-200 rounded-md w-3/4"></div><div class="h-4 bg-gray-100 rounded-md w-full"></div><div class="h-4 bg-gray-100 rounded-md w-5/6"></div></div>
                <div id="view-content-wrapper" class="block"><h1 id="view-title" class="text-2xl md:text-4xl font-bold text-gray-900 mb-4"></h1><div id="view-content" class="prose prose-base md:prose-lg text-gray-800 w-full max-w-none"></div></div>
            </div>
            <div class="px-4 md:px-6 py-3 md:py-4 border-t border-gray-100 flex justify-end gap-2">
                <button id="copy-view-btn" class="px-3 py-1.5 text-sm font-medium text-gray-600 hover:bg-gray-50 rounded-full flex items-center gap-1"><i data-lucide="copy" class="w-4 h-4"></i><span class="hidden md:inline">Copy Text</span></button>
                <button id="fullscreen-view-btn" class="px-3 py-1.5 text-sm font-medium text-gray-600 hover:bg-gray-50 rounded-full flex items-center gap-1"><i data-lucide="maximize" class="w-4 h-4"></i><span class="hidden md:inline">Full Screen</span></button>
                <button id="edit-from-view-btn" class="px-4 py-1.5 text-sm font-semibold text-white bg-black rounded-full hover:bg-gray-800 shadow-md flex items-center gap-1"><i data-lucide="pencil" class="w-4 h-4"></i><span>Edit</span></button>
            </div>
        </div>
    </div>

    <!-- Settings Modal (unchanged) -->
    <div id="settings-modal" class="fixed inset-0 z-50 bg-black/50 backdrop-blur-sm hidden modal-center p-4 opacity-0 transition-opacity duration-500 ease-smooth">
        <div class="bg-white w-full max-w-md rounded-2xl shadow-2xl transform scale-95 transition-all duration-500 ease-smooth overflow-hidden">
            <div class="flex items-center justify-between px-6 py-4 border-b border-gray-100"><h3 class="text-lg font-semibold text-gray-900">Settings</h3><button id="close-settings-btn" class="text-gray-400 hover:text-gray-600"><i data-lucide="x" class="w-5 h-5"></i></button></div>
            <div class="p-6"><div id="settings-auth-container"><div class="flex flex-col items-center gap-4"><div id="settings-user-info" class="hidden flex-col items-center gap-2"><img id="settings-avatar" class="w-16 h-16 rounded-full object-cover"><span id="settings-name" class="text-sm font-medium text-gray-700"></span><button id="settings-signout-btn" class="mt-2 text-sm text-red-600">Sign out</button></div><button id="settings-google-signin-btn" class="flex items-center gap-2 bg-white border border-gray-300 rounded-full px-6 py-2 text-sm font-medium text-gray-700 hover:bg-gray-50"><img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" class="w-5 h-5">Sign in with Google</button></div></div></div>
        </div>
    </div>

    <!-- Delete Confirmation Modal -->

        // Custom Markdown renderer for HTML widgets (```html blocks)
        function renderMarkdownWithWidgets(markdownText) {
            if (!markdownText) return '';
            // Use marked with custom renderer for code blocks
            const renderer = new marked.Renderer();
            const originalCode = renderer.code.bind(renderer);
            renderer.code = function(code, language, escaped) {
                if (language && (language.toLowerCase() === 'html' || language.toLowerCase() === 'widget')) {
                    // Create an iframe with srcdoc containing the HTML/CSS/JS
                    const iframeId = 'widget-' + Math.random().toString(36).substr(2, 8);
                    // Ensure the HTML content is properly escaped for srcdoc
                    const escapedCode = code.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
                    // We'll use srcdoc with a base style to make iframe responsive
                    const srcdocContent = `
                        <!DOCTYPE html>
                        <html>
                        <head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1"><style>body { margin: 0; padding: 12px; background: white; }</style></head>
                        <body>${code}</body>
                        </html>
                    `;
                    return `<div class="html-widget-container"><iframe srcdoc="${srcdocContent.replace(/"/g, '&quot;')}" style="min-height: 200px; height: auto;" onload="this.style.height=this.contentWindow.document.body.scrollHeight+'px'"></iframe></div>`;
                }
                return originalCode(code, language, escaped);
            };
            marked.setOptions({ renderer: renderer, gfm: true, breaks: true });
            return marked.parse(markdownText);
        }

            }
            // Adjust iframe heights after load (delegated)
            document.querySelectorAll('.html-widget-container iframe').forEach(iframe => {
                iframe.addEventListener('load', function() { this.style.height = this.contentWindow.document.body.scrollHeight + 'px'; });

            notesToRender.forEach((note,idx)=>{ const div=document.createElement('div'); div.className=`group relative rounded-2xl md:rounded-[30px] p-5 md:p-7 flex flex-col justify-between min-h-[200px] transition-all duration-500 hover:-translate-y-2 hover:shadow-2xl cursor-pointer animate-pop-in`; div.style.animationDelay=`${idx*0.05}s`; div.style.backgroundColor=note.color||'#ffffff'; let snippet=formatSnippet(note.content,100); if(!snippet) snippet='No content'; const dateStr=note.timestamp?new Date(note.timestamp).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}):'No date'; div.innerHTML=`<div class="transition-transform group-hover:translate-x-1"><h3 class="text-xl md:text-2xl font-bold text-gray-900 mb-2 line-clamp-2">${escapeHtml(note.title)||'Untitled Note'}</h3><p class="text-gray-800/80 font-medium text-sm md:text-base line-clamp-3">${snippet}</p></div><div class="mt-4 flex items-end justify-between"><span class="text-xs font-semibold text-gray-900/60">${dateStr}</span><div class="flex gap-2"><div class="w-10 h-10 bg-white border border-gray-200 rounded-full flex items-center justify-center cursor-pointer copy-btn"><i data-lucide="copy" class="w-4 h-4"></i></div><div class="w-10 h-10 bg-black rounded-full flex items-center justify-center cursor-pointer edit-btn"><i data-lucide="pencil" class="w-4 h-4 text-white"></i></div></div></div>`; div.addEventListener('click',(e)=>{ if(e.target.closest('.edit-btn')||e.target.closest('.copy-btn')) return; openViewModal(note); }); div.querySelector('.copy-btn').addEventListener('click',(e)=>{ e.stopPropagation(); const textarea=document.createElement('textarea'); textarea.value=note.content||''; document.body.appendChild(textarea); textarea.select(); document.execCommand('copy'); document.body.removeChild(textarea); showToast("Copied!"); }); div.querySelector('.edit-btn').addEventListener('click',(e)=>{ e.stopPropagation(); openEditorModal(note); }); div.addEventListener('contextmenu',(e)=>{ e.         function openViewModal(note) { currentViewNote=note; const viewLoading=document.getElementById('view-loading'), viewWrapper=document.getElementById('view-content-wrapper'); viewLoading.classList.remove('hidden'); viewLoading.classList.add('flex'); viewWrapper.classList.add('hidden'); viewModal.classList.remove('hidden'); setTimeout(()=>{ viewModal.classList.remove('opacity-0'); viewModalContent.classList.remove('scale-95'); viewModal.classList.add('opacity-100'); viewModalContent.classList.add('scale-100'); },20); setTimeout(()=>{ viewTitle.textContent=note.title||'Untitled Note'; viewColorIndicator.style.backgroundColor=note.color||'#cccccc'; const processed=(note.content||'').replace(/==([^=]+)==/g,'<mark>$1</mark>'); const html=renderMarkdownWithWidgets(processed); viewContent.innerHTML=html; try{ renderMathInElement(viewContent,{delimiters:[{left:'$$',right:'$$',display:true},{left:'$',right:'$',display:false},{left:'\\(',right:'\\)',display:false},{left:'\\[',right:'\\]',display:true}],throwOnError:false}); }catch(e){} viewLoading.classList.add('hidden'); viewLoading.classList.remove('flex'); viewWrapper.classList.remove('hidden'); fullscreenIcon=fullscreenViewBtn.querySelector('i'); if(fullscreenIcon) lucide.createIcons(); },400); }

        document.querySelectorAll('.format-btn:not(#html-widget-btn)').forEach(btn=>{ btn.addEventListener('click',(e)=>{ e.preventDefault(); const format=btn.getAttribute('data-format'), suffix=btn.getAttribute('data-suffix')||format, start=contentInput.selectionStart, end=contentInput.selectionEnd, text=contentInput.value, selected=text.substring(start,end); let newText='', newPos=start; if(['# ','## ','- ','1. ','> '].includes(format)){ newText=text.substring(0,start)+format+selected+text.substring(end); newPos=end+format.length; } else if(format==='```\n'){ newText=text.substring(0,start)+format+selected+suffix+text.substring(end); newPos=start+format.length; } else{ newText=text.substring(0,start)+format+selected+suffix+text.substring(end); newPos=selected.length>0?end+format.length*2:start+format.length; } contentInput.value=newText; contentInput.focus(); contentInput.selectionStart=contentInput.selectionEnd=newPos; updatePreview(); }); });
