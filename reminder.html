<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>StudyFlow Pro · Offline‑first Spaced Repetition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Inter', system-ui, -apple-system, sans-serif; }
        body { background: #f8fafc; color: #1e293b; }
        
        @keyframes fadeSlideUp { from { opacity: 0; transform: translateY(18px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes toastIn { from { transform: translateY(100px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        .animate-fade-up { animation: fadeSlideUp 0.35s cubic-bezier(0.2, 0.9, 0.4, 1.1) forwards; }
        .reminder-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); border: 1px solid #e2e8f0; }
        .reminder-card:hover { transform: translateY(-4px) scale(1.01); box-shadow: 0 20px 25px -12px rgba(79, 70, 229, 0.1); border-color: #c7d2fe; }
        
        .modal-overlay { backdrop-filter: blur(8px); background: rgba(15, 23, 42, 0.4); }
        
        .nav-link.active { color: #4f46e5; background-color: #eef2ff; font-weight: 600; }
        .status-btn.active { background-color: #4f46e5; color: white; box-shadow: 0 4px 6px -1px rgba(79, 70, 229, 0.2); }
        
        .mobile-bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(255,255,255,0.9); backdrop-filter: blur(12px); border-top: 1px solid #e5e7eb; z-index: 1000; padding: 10px 16px 24px; display: none; }
        @media (max-width: 767px) { .desktop-nav { display: none; } .mobile-bottom-nav { display: flex; justify-content: space-around; align-items: center; } .main-content-padding { padding-bottom: 100px; } }
        
        #toast-container { position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%); z-index: 9999; pointer-events: none; }
        .toast { background: #1e293b; color: white; padding: 12px 24px; border-radius: 99px; font-size: 14px; font-weight: 500; margin-top: 8px; animation: toastIn 0.3s ease-out; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.2); pointer-events: auto; }
        
        .empty-state { text-align: center; padding: 40px 20px; color: #94a3b8; }
        .overdue-card { border-left: 4px solid #f97316; background: #fffaf5; }
        .summary-link-btn { transition: all 0.2s; }
        .summary-link-btn:hover { background-color: #e0e7ff; transform: scale(1.02); }
        
        .sync-spinner { animation: spin 0.8s linear infinite; }
        #syncIndicator { transition: opacity 0.2s ease; }
        
        .data-loss-warning {
            background: #fef9e3;
            border-left: 4px solid #f59e0b;
        }
        
        .pending-badge {
            background-color: #fef9c3;
            color: #854d0e;
            font-size: 9px;
            font-weight: bold;
            padding: 2px 8px;
            border-radius: 20px;
            margin-left: 8px;
        }
    </style>
</head>
<body class="bg-slate-50">

    <div id="toast-container"></div>

    <!-- Data loss warning banner -->
    <div id="dataLossWarning" class="data-loss-warning hidden mx-auto max-w-7xl mt-4 px-4 sm:px-6 lg:px-8">
        <div class="bg-amber-50 rounded-2xl p-4 shadow-sm flex items-center justify-between flex-wrap gap-4">
            <div class="flex items-center gap-3">
                <svg class="w-6 h-6 text-amber-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" /></svg>
                <p class="text-sm font-medium text-amber-800">Your data is saved locally. Cloud sync may be delayed – tasks are never lost.</p>
            </div>
            <button id="dismissWarningBtn" class="px-4 py-2 bg-white text-amber-700 rounded-xl text-sm font-bold shadow-sm hover:bg-amber-50 transition">Got it</button>
        </div>
    </div>

    <!-- Syncing indicator -->
    <div id="syncIndicator" class="fixed top-20 right-4 z-50 bg-white rounded-full shadow-lg px-4 py-2 flex items-center gap-2 opacity-0 pointer-events-none transition-opacity">
        <svg class="sync-spinner w-4 h-4 text-indigo-600" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
        </svg>
        <span class="text-xs font-medium text-slate-700">Syncing...</span>
    </div>

    <div id="appBody" class="min-h-screen">
        <nav class="desktop-nav bg-white/80 backdrop-blur-md border-b border-slate-200 sticky top-0 z-50 shadow-sm">
            <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                <div class="flex justify-between items-center h-16">
                    <div class="flex items-center space-x-3">
                        <div class="w-10 h-10 bg-gradient-to-br from-indigo-600 to-purple-600 rounded-xl flex items-center justify-center shadow-lg">
                            <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"></path></svg>
                        </div>
                        <span class="font-extrabold text-xl tracking-tight text-slate-800">StudyFlow <span class="text-indigo-600">Pro</span></span>
                    </div>
                    <div class="hidden md:flex items-center space-x-2 bg-slate-100/50 p-1.5 rounded-full border border-slate-200">
                        <button data-nav="home" class="nav-link active flex items-center gap-2 px-5 py-2 text-sm font-medium rounded-full transition-all">Home</button>
                        <button data-nav="add" class="nav-link flex items-center gap-2 px-5 py-2 text-sm font-medium rounded-full transition-all">Add Topic</button>

        </nav>

        <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 main-content-padding">
            <!-- Stats -->
            <div class="grid grid-cols-2 lg:grid-cols-4 gap-4 mb-8">

                    <p class="text-xs font-bold text-slate-400 uppercase mb-1">Due Today</p>

    <!-- Modals -->
    <div id="addModal" class="modal-overlay fixed inset-0 hidden justify-center items-center z-[1100]">

    <div id="editModal" class="modal-overlay fixed inset-0 hidden justify-center items-center z-[1100]">

                <textarea id="editNotes" rows="2" class="w-full px-4 py-3 bg-slate-50 border rounded-2xl"></textarea>

    <div id="progressModal" class="modal-overlay fixed inset-0 hidden justify-center items-center z-[1100]">
        <div class="modal-content bg-white rounded-3xl w-[90%] max-w-md p-8 animate-fade-up">
            <h2 class="text-2xl font-black text-slate-800 mb-4">Mastery</h2>
            <div id="masteryList" class="space-y-4"></div>
            <button onclick="closeModal('progressModal')" class="w-full mt-6 py-4 bg-indigo-600 text-white rounded-2xl font-bold">Close</button>
        </div>

    <div id="profileModal" class="modal-overlay fixed inset-0 hidden justify-center items-center z-[1100]">
        <div class="modal-content bg-white rounded-3xl w-[90%] max-w-md p-8 animate-fade-up">
            <h2 class="text-2xl font-black text-slate-800 mb-4">Account</h2>
            <p id="profileUserEmail" class="text-sm text-slate-500 mb-6"></p>
            <button onclick="closeModal('profileModal')" class="w-full py-4 bg-slate-100 rounded-2xl font-bold text-slate-700">Close</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, setDoc, onSnapshot, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = JSON.parse('{"apiKey":"AIzaSyA9DLfAHTUUGxCPn2j_k6godoTEopzaFAU","authDomain":"studymaster-919ba.firebaseapp.com","databaseURL":"https://studymaster-919ba-default-rtdb.firebaseio.com","projectId":"studymaster-919ba","storageBucket":"studymaster-919ba.firebasestorage.app","messagingSenderId":"426684063256","appId":"1:426684063256:web:52c17625a9450ea9662d6d","measurementId":"G-CWQB2330GF"}');
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';

        console.log("🔥 Firebase initialized. appId:", appId);

        // ---------- Global State ----------
        let currentReminders = [];
        let currentStatusFilter = "all";
        let currentUser = null;
        let unsubscribeSnapshot = null;
        let pendingSync = false;

        const syncIndicator = document.getElementById('syncIndicator');
        let syncTimeout = null;
        const LOCAL_STORAGE_KEY = 'studyflow_reminders_backup';

        // Helper functions (unchanged)
        function showSyncSpinner() {
            if (!currentUser) return;
            if (syncTimeout) clearTimeout(syncTimeout);
            syncIndicator.style.opacity = '1';
            syncIndicator.style.pointerEvents = 'auto';
        }

        function hideSyncSpinner() {
            if (syncTimeout) clearTimeout(syncTimeout);
            syncTimeout = setTimeout(() => {
                syncIndicator.style.opacity = '0';
                syncIndicator.style.pointerEvents = 'none';
            }, 300);
        }

        function saveToLocalStorage(reminders) {
            try {
                localStorage.setItem(LOCAL_STORAGE_KEY, JSON.stringify(reminders));
            } catch (e) { console.warn('Failed to save to localStorage:', e); }
        }

        function loadFromLocalStorage() {
            try {
                const data = localStorage.getItem(LOCAL_STORAGE_KEY);
                if (data) return JSON.parse(data);
            } catch (e) { console.warn('Failed to load from localStorage:', e); }
            return null;
        }

        function showToast(msg, isError = false) {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.innerText = msg;
            if (isError) toast.style.background = '#b91c1c';
            container.appendChild(toast);
            setTimeout(() => { toast.style.opacity = '0'; setTimeout(() => toast.remove(), 300); }, 3000);
        }

        function updateStats() {
            const activeReminders = currentReminders.filter(r => !r._deleted);
            const today = new Date().toISOString().split('T')[0];
            const pending = activeReminders.filter(r => !r.completed && r.nextReviewDate <= today).length;
            const overdue = activeReminders.filter(r => !r.completed && r.nextReviewDate < today).length;
            const mastered = activeReminders.filter(r => r.completed).length;
            document.getElementById('pendingCountDisplay').innerText = pending;
            document.getElementById('overdueCountDisplay').innerText = overdue;
            document.getElementById('completedCountDisplay').innerText = mastered;
        }

        function renderReminders() {
            const grid = document.getElementById('reminderGrid');
            const subFilter = document.getElementById('subjectFilter').value;
            const today = new Date().toISOString().split('T')[0];
            let items = currentReminders.filter(r => !r.completed && !r._deleted);
            if (subFilter !== 'All') items = items.filter(r => r.subject === subFilter);
            if (currentStatusFilter === 'pending') items = items.filter(r => r.nextReviewDate === today);
            if (currentStatusFilter === 'overdue') items = items.filter(r => r.nextReviewDate < today);
            items.sort((a,b) => (a.nextReviewDate || '').localeCompare(b.nextReviewDate || ''));
            grid.innerHTML = '';
            if (items.length === 0) {
                grid.innerHTML = `<div class="col-span-full py-20 text-center text-slate-400">No active tasks found for this filter.</div>`;
                return;
            }
            items.forEach(r => {
                const card = document.createElement('div');
                card.className = `reminder-card bg-white rounded-3xl p-6 shadow-sm border border-slate-100 ${r.nextReviewDate < today ? 'overdue-card' : ''}`;
                let summaryHtml = '';
                if (r.summaryLink && r.summaryLink.trim() !== '') {
                    summaryHtml = `<button onclick="window.openSummaryLink('${r.summaryLink.replace(/'/g, "\\'")}')" class="summary-link-btn px-4 py-2 bg-indigo-50 text-indigo-600 text-xs font-black rounded-xl flex items-center gap-1">📄 Summary</button>`;
                }
                const pendingBadge = r.syncStatus === 'pending' ? '<span class="pending-badge">↻ pending</span>' : '';
                card.innerHTML = `
                    <div class="flex justify-between items-start mb-4">
                        <span class="px-3 py-1 bg-slate-100 text-slate-600 text-[10px] font-black rounded-full">${r.subject}</span>
                        ${pendingBadge}
                    </div>
                    <h3 class="font-bold text-slate-800 text-lg">${r.topic}</h3>
                    <p class="text-xs text-slate-400 mb-4 line-clamp-2">${r.notes || ''}</p>
                    <div class="flex items-center justify-between pt-4 border-t border-slate-50">
                        <span class="text-[10px] font-bold text-slate-400 uppercase">${r.nextReviewDate}</span>
                        <div class="flex gap-2">
                            <button onclick="window.openEditModal('${r.id}')" class="p-2 bg-slate-50 rounded-xl" title="Edit">⚙️</button>
                            ${summaryHtml}
                            <button onclick="window.markMastered('${r.id}')" class="px-4 py-2 bg-emerald-50 text-emerald-600 text-xs font-black rounded-xl" title="Mark as Mastered">✓</button>
                            <button onclick="window.handleReview('${r.id}')" class="px-6 py-2 bg-indigo-50 text-indigo-600 text-xs font-black rounded-xl">Review</button>
                        </div>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        function updateMasteryUI() {
            const list = document.getElementById('masteryList');
            const subjects = ["Biology", "Physics", "Chemistry"];
            const activeReminders = currentReminders.filter(r => !r._deleted);
            list.innerHTML = '';
            subjects.forEach(sub => {
                const count = activeReminders.filter(r => r.subject === sub).length;
                const mastered = activeReminders.filter(r => r.subject === sub && r.completed).length;
                const percent = count === 0 ? 0 : Math.round((mastered / count) * 100);
                const div = document.createElement('div');
                div.innerHTML = `
                    <div class="flex justify-between text-xs font-bold mb-1"><span>${sub}</span><span>${percent}%</span></div>
                    <div class="w-full bg-slate-100 h-2 rounded-full overflow-hidden">
                        <div class="bg-indigo-600 h-full" style="width: ${percent}%"></div>
                    </div>
                `;
                list.appendChild(div);
            });
        }

        async function syncPendingChanges() {
            if (!currentUser || pendingSync) return;
            pendingSync = true;
            showSyncSpinner();
            try {
                const pendingReminders = currentReminders.filter(r => r.syncStatus === 'pending');
                for (const rem of pendingReminders) {
                    const docRef = doc(db, 'artifacts', appId, 'users', currentUser.uid, 'reminders', rem.id);
                    if (rem._deleted) {
                        await deleteDoc(docRef);
                        currentReminders = currentReminders.filter(r => r.id !== rem.id);
                        console.log(`🗑️ Synced delete for ${rem.id}`);
                    } else {
                        const dataToSend = { ...rem };
                        delete dataToSend.syncStatus;
                        delete dataToSend._deleted;
                        await setDoc(docRef, dataToSend, { merge: true });
                        const idx = currentReminders.findIndex(r => r.id === rem.id);
                        if (idx !== -1) currentReminders[idx].syncStatus = 'synced';
                        console.log(`✅ Synced ${rem.id}`);
                    }
                }
                saveToLocalStorage(currentReminders);
                renderReminders();
                updateStats();
                updateMasteryUI();
            } catch (err) {
                console.error("Sync error:", err);
                showToast("Cloud sync failed – will retry later", true);
            } finally {
                pendingSync = false;
                hideSyncSpinner();
            }
        }

        function setupFirestoreListener(uid) {
            if (unsubscribeSnapshot) unsubscribeSnapshot();
            const remindersRef = collection(db, 'artifacts', appId, 'users', uid, 'reminders');
            console.log("📡 Firestore listener attached");
            unsubscribeSnapshot = onSnapshot(remindersRef,
                (snapshot) => {
                    const cloudReminders = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    let updated = false;
                    const cloudMap = new Map();
                    cloudReminders.forEach(r => cloudMap.set(r.id, r));
                    const mergedReminders = [];
                    for (const local of currentReminders) {
                        const cloudRem = cloudMap.get(local.id);
                        if (cloudRem) {
                            if (local.syncStatus === 'pending') mergedReminders.push(local);
                            else mergedReminders.push({ ...cloudRem, syncStatus: 'synced' });
                            cloudMap.delete(local.id);
                        } else {
                            if (local.syncStatus === 'pending') mergedReminders.push(local);
                        }
                    }
                    for (const cloudRem of cloudMap.values()) {
                        mergedReminders.push({ ...cloudRem, syncStatus: 'synced' });
                    }
                    if (JSON.stringify(mergedReminders) !== JSON.stringify(currentReminders)) {
                        currentReminders = mergedReminders;
                        updated = true;
                    }
                    if (updated) {
                        saveToLocalStorage(currentReminders);
                        updateStats();
                        renderReminders();
                        updateMasteryUI();
                    }
                    hideSyncSpinner();
                },
                (error) => {
                    console.error("❌ Firestore listener error:", error);
                    hideSyncSpinner();
                }
            );
        }

        async function addReminder(topicData) {
            const now = Date.now();
            const newId = 'local_' + now + '_' + Math.random().toString(36).substr(2, 6);
            const newReminder = {
                id: newId,
                ...topicData,
                createdAt: now,
                updatedAt: now,
                completed: false,
                syncStatus: 'pending'
            };
            currentReminders = [newReminder, ...currentReminders];
            saveToLocalStorage(currentReminders);
            updateStats();
            renderReminders();
            updateMasteryUI();
            showToast("Task saved");
            if (currentUser) await syncPendingChanges();
        }

        async function updateReminder(id, updates) {
            const idx = currentReminders.findIndex(r => r.id === id);
            if (idx === -1) return;
            const updated = { ...currentReminders[idx], ...updates, updatedAt: Date.now(), syncStatus: 'pending' };
            currentReminders[idx] = updated;
            saveToLocalStorage(currentReminders);
            updateStats();
            renderReminders();
            updateMasteryUI();
            if (currentUser) await syncPendingChanges();
        }

        async function deleteReminder(id) {
            const idx = currentReminders.findIndex(r => r.id === id);
            if (idx === -1) return;
            currentReminders[idx]._deleted = true;
            currentReminders[idx].syncStatus = 'pending';
            saveToLocalStorage(currentReminders);
            updateStats();
            renderReminders();
            updateMasteryUI();
            showToast("Deleted");
            if (currentUser) await syncPendingChanges();
        }

        window.openSummaryLink = (url) => {
            if (url && url.startsWith('http')) window.open(url, '_blank', 'noopener,noreferrer');
            else showToast('Invalid link');
        };

        window.handleReview = async (id) => {
            const nextDate = new Date();
            nextDate.setDate(nextDate.getDate() + 3);
            const nextStr = nextDate.toISOString().split('T')[0];
            await updateReminder(id, { nextReviewDate: nextStr });
            showToast("Review pushed forward 3 days!");
        };

        window.markMastered = async (id) => {
            await updateReminder(id, { completed: true });
            showToast("Task Mastered! 🎉");
        };

        window.openEditModal = (id) => {
            const r = currentReminders.find(rem => rem.id === id);
            if (!r) return;
            document.getElementById('editId').value = r.id;
            document.getElementById('editTopic').value = r.topic;
            document.getElementById('editNextReview').value = r.nextReviewDate;
            document.getElementById('editNotes').value = r.notes || '';
            document.getElementById('editSummaryLink').value = r.summaryLink || '';
            openModal('editModal');
        };

        window.deleteReminderFromEdit = async () => {
            const id = document.getElementById('editId').value;
            if (!confirm("Delete this?")) return;
            await deleteReminder(id);
            closeModal('editModal');
        };

        // ---------- ENHANCED AUTH: Try to get token from parent or URL ----------
        const initAuth = async () => {
            let token = null;

            // 1. Check for URL parameter ?token=...
            const urlParams = new URLSearchParams(window.location.search);
            if (urlParams.has('token')) {
                token = urlParams.get('token');
                console.log("Using token from URL");
            }

            // 2. Check for global variable set by parent
            if (!token && typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                token = __initial_auth_token;
                console.log("Using token from __initial_auth_token");
            }

            // 3. If parent window provides a function to get token, call it
            if (!token && window.parent && typeof window.parent.__getFirebaseToken === 'function') {
                try {
                    token = await window.parent.__getFirebaseToken();
                    console.log("Retrieved token from parent function");
                } catch (e) { console.warn("Parent token retrieval failed", e); }
            }

            if (token) {
                try {
                    await signInWithCustomToken(auth, token);
                    console.log("✅ Signed in with custom token");
                } catch (err) {
                    console.error("Custom token sign-in failed:", err);
                    showToast("Custom token invalid, falling back to anonymous", true);
                    await signInAnonymously(auth);
                }
            } else {
                console.log("No token provided, signing in anonymously");
                await signInAnonymously(auth);
            }
        };

        initAuth();

        onAuthStateChanged(auth, (user) => {
            console.log("🔐 Auth State Changed:", user ? user.uid : "None");
            if (user) {
                currentUser = user;
                const name = user.isAnonymous ? "Scholar" : (user.displayName || "Explorer");
                document.getElementById('userGreetingNav').innerText = `Hi, ${name}`;
                document.getElementById('profileUserEmail').innerText = user.email || 'Anonymous Scholar';
                document.getElementById('headerAvatarDesktop').src = `https://ui-avatars.com/api/?background=4f46e5&color=fff&name=${encodeURIComponent(name)}`;
                
                const localData = loadFromLocalStorage();
                if (localData && localData.length > 0) currentReminders = localData;
                updateStats();
                renderReminders();
                updateMasteryUI();
                setupFirestoreListener(user.uid);
                setTimeout(() => syncPendingChanges(), 500);
                
                const dismissed = localStorage.getItem('studyflow_warning_dismissed');
                const warningDiv = document.getElementById('dataLossWarning');
                if (user.isAnonymous && !dismissed) warningDiv.classList.remove('hidden');
                else warningDiv.classList.add('hidden');
            } else {
                currentUser = null;
            }
        });

        document.getElementById('dismissWarningBtn').addEventListener('click', () => {
            localStorage.setItem('studyflow_warning_dismissed', 'true');
            document.getElementById('dataLossWarning').classList.add('hidden');
        });

        document.getElementById('addForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const newTopic = {
                topic: document.getElementById('topicName').value,
                subject: document.getElementById('topicSubject').value,
                notes: document.getElementById('topicNotes').value,
                summaryLink: document.getElementById('topicSummaryLink').value.trim() || null,
                nextReviewDate: document.getElementById('topicDate').value,
            };
            await addReminder(newTopic);
            closeModal('addModal');
            e.target.reset();
            document.getElementById('topicSummaryLink').value = '';
        });

        document.getElementById('editForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const id = document.getElementById('editId').value;
            const updates = {
                topic: document.getElementById('editTopic').value,
                nextReviewDate: document.getElementById('editNextReview').value,
                notes: document.getElementById('editNotes').value,
                summaryLink: document.getElementById('editSummaryLink').value.trim() || null
            };
            await updateReminder(id, updates);
            closeModal('editModal');
        });

        document.getElementById('subjectFilter').onchange = renderReminders;
        document.querySelectorAll('[data-status]').forEach(btn => btn.onclick = () => {
            document.querySelectorAll('[data-status]').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentStatusFilter = btn.getAttribute('data-status');
            renderReminders();
        });

        function openModal(id) {
            const el = document.getElementById(id);
            if (el) {
                el.style.display = 'flex';
                if (id === 'addModal') document.getElementById('topicDate').valueAsDate = new Date();
            }
        }
        window.closeModal = (id) => { const el = document.getElementById(id); if (el) el.style.display = 'none'; };
        window.openModal = openModal;

        document.querySelectorAll('[data-nav]').forEach(btn => btn.onclick = () => {
            const nav = btn.getAttribute('data-nav');
            if (nav === 'home') renderReminders();
            else openModal(`${nav}Modal`);
        });
        document.querySelectorAll('[data-mobile-nav]').forEach(btn => btn.onclick = () => {
            const nav = btn.getAttribute('data-mobile-nav');
            if (nav === 'home') renderReminders();
            else openModal(`${nav}Modal`);
        });

        document.getElementById('forceSyncBtn').addEventListener('click', async () => {
            if (currentUser) {
                showToast("Forcing sync...");
                await syncPendingChanges();
                showToast("Sync check complete");
            } else {
                showToast("Not logged in yet");
            }
        });

        window.onclick = (e) => { if (e.target.classList.contains('modal-overlay')) e.target.style.display = 'none'; };
        window.addEventListener('online', () => { console.log("Network online – retrying sync"); syncPendingChanges(); });
    </script>
</body>
</html>
