<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>AL Master Flow | Premium Study Suite</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    /* (All existing styles remain exactly the same - no changes needed here) */
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
    :root {
      --bg-primary: #f0f4fd;
      --bg-secondary: #ffffff;
      --text-primary: #0f172a;
      --text-secondary: #64748b;
      --card-bg: rgba(255, 255, 255, 0.75);
      --border-color: rgba(255, 255, 255, 0.6);
      --glass-blur: blur(24px);
      --accent: #3b82f6;
      --accent-hover: #2563eb;
      --shadow-soft: 0 10px 30px -10px rgba(0, 0, 0, 0.08);
      --shadow-hover: 0 20px 40px -12px rgba(0, 0, 0, 0.12);
    }
    body.dark {
      --bg-primary: #0b1120;
      --bg-secondary: #1e293b;
      --text-primary: #f8fafc;
      --text-secondary: #94a3b8;
      --card-bg: rgba(30, 41, 59, 0.7);
      --border-color: rgba(255, 255, 255, 0.08);
      --shadow-soft: 0 10px 30px -10px rgba(0, 0, 0, 0.4);
      --shadow-hover: 0 20px 40px -12px rgba(0, 0, 0, 0.6);
    }
    body { background: var(--bg-primary); color: var(--text-primary); transition: background-color 0.5s ease, color 0.5s ease; overflow-x: hidden; }
    @keyframes fadeSlideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes popIn { 0% { opacity: 0; transform: scale(0.9); } 100% { opacity: 1; transform: scale(1); } }
    #tabContent > * { animation: fadeSlideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; opacity: 0; }
    .app-container { display: flex; min-height: 100vh; }
    .sidebar { width: 280px; background: var(--card-bg); backdrop-filter: var(--glass-blur); border-right: 1px solid var(--border-color); padding: 2.5rem 1.5rem; position: sticky; top: 0; height: 100vh; display: flex; flex-direction: column; gap: 2.5rem; z-index: 50; }
    .logo { font-size: 1.8rem; font-weight: 800; background: linear-gradient(135deg, var(--accent), #8b5cf6, #ec4899); background-size: 200% auto; -webkit-background-clip: text; background-clip: text; color: transparent; animation: gradientFlow 5s ease infinite; }
    @keyframes gradientFlow { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
    .nav-links { display: flex; flex-direction: column; gap: 0.6rem; }
    .nav-item { display: flex; align-items: center; gap: 1.2rem; padding: 0.9rem 1.2rem; border-radius: 16px; font-weight: 600; color: var(--text-secondary); transition: all 0.3s; cursor: pointer; position: relative; overflow: hidden; }
    .nav-item::before { content: ''; position: absolute; left: 0; top: 0; height: 100%; width: 0; background: linear-gradient(90deg, rgba(59,130,246,0.1), transparent); transition: width 0.3s; z-index: -1; }
    .nav-item:hover { color: var(--text-primary); transform: translateX(6px); }
    .nav-item:hover::before { width: 100%; }
    .nav-item i { width: 24px; font-size: 1.3rem; transition: transform 0.3s; }
    .nav-item:hover i { transform: scale(1.15) rotate(5deg); color: var(--accent); }
    .nav-item.active { background: var(--bg-secondary); color: var(--accent); box-shadow: var(--shadow-soft); border-left: 4px solid var(--accent); }
    .main-content { flex: 1; padding: 2.5rem 3rem; overflow-y: auto; }
    .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2.5rem; flex-wrap: wrap; gap: 1.5rem; animation: fadeSlideUp 0.5s ease forwards; }
    .sync-indicator { display: flex; align-items: center; gap: 10px; background: var(--card-bg); backdrop-filter: var(--glass-blur); padding: 8px 20px; border-radius: 40px; font-size: 0.85rem; font-weight: 600; box-shadow: var(--shadow-soft); border: 1px solid var(--border-color); }
    .spinner { width: 18px; height: 18px; border: 2px solid var(--border-color); border-top: 2px solid var(--accent); border-radius: 50%; animation: spin 0.7s infinite linear; }
    @keyframes spin { 100% { transform: rotate(360deg); } }
    .glass-card { background: var(--card-bg); backdrop-filter: var(--glass-blur); border-radius: 1.5rem; padding: 1.8rem; border: 1px solid var(--border-color); margin-bottom: 1.8rem; box-shadow: var(--shadow-soft); transition: transform 0.4s, box-shadow 0.4s; }
    .glass-card:hover { transform: translateY(-4px); box-shadow: var(--shadow-hover); }
    .glass-card h2, .glass-card h3 { font-size: 1.3rem; font-weight: 700; margin-bottom: 1.2rem; display: flex; align-items: center; gap: 0.6rem; }
    .glass-card h2 i, .glass-card h3 i { color: var(--accent); }
    .item-card { background: var(--bg-secondary); border-radius: 1.2rem; padding: 1.2rem; margin-bottom: 0.85rem; display: flex; justify-content: space-between; align-items: center; border-left: 5px solid var(--accent); box-shadow: 0 4px 6px -1px rgba(0,0,0,0.03); transition: transform 0.3s, box-shadow 0.3s; }
    .item-card:hover { transform: translateY(-4px) scale(1.01); box-shadow: var(--shadow-hover); }
    .btn-icon { background: var(--bg-secondary); color: var(--text-primary); border: 1px solid var(--border-color); padding: 8px 16px; border-radius: 2rem; cursor: pointer; font-weight: 600; font-size: 0.85rem; transition: all 0.3s; display: inline-flex; align-items: center; gap: 0.6rem; }
    .btn-icon:hover { transform: translateY(-3px); color: var(--accent); border-color: var(--accent); }
    .flex-row { display: flex; gap: 1rem; flex-wrap: wrap; margin-bottom: 1.2rem; align-items: center; }
    input, textarea, select { background: var(--bg-secondary); color: var(--text-primary); border: 1px solid var(--border-color); border-radius: 1rem; padding: 10px 14px; outline: none; font-size: 0.95rem; }
    input:focus, select:focus, textarea:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(59,130,246,0.15); transform: translateY(-1px); }
    .badge { display: inline-block; padding: 3px 10px; border-radius: 12px; font-size: 0.7rem; font-weight: 700; text-transform: uppercase; }
    .add-section { background: var(--bg-secondary); border-radius: 1.2rem; border: 1px solid var(--border-color); overflow: hidden; margin-bottom: 1.8rem; }
    .add-section-header { padding: 1.2rem 1.5rem; display: flex; align-items: center; gap: 0.8rem; font-weight: 600; cursor: pointer; }
    .add-section-header i.fa-chevron-down { margin-left: auto; transition: transform 0.4s; }
    .add-section-content { max-height: 0; overflow: hidden; opacity: 0; transition: max-height 0.6s, opacity 0.4s, padding 0.4s; padding: 0 1.5rem; }
    .add-section-content.expanded { max-height: 800px; opacity: 1; padding: 0 1.5rem 1.5rem 1.5rem; }
    .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(15,23,42,0.6); backdrop-filter: blur(8px); display: flex; align-items: center; justify-content: center; z-index: 1000; animation: fadeIn 0.3s; }
    .modal { background: var(--bg-secondary); border-radius: 1.8rem; width: 90%; max-width: 600px; max-height: 85vh; overflow-y: auto; padding: 2rem; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25); border: 1px solid var(--border-color); animation: popIn 0.4s; }
    .modal h3 { margin-bottom: 1.5rem; display: flex; justify-content: space-between; align-items: center; font-size: 1.4rem; }
    .modal .modal-close { cursor: pointer; font-size: 1.2rem; transition: transform 0.2s; }
    .modal .modal-close:hover { transform: rotate(90deg); color: #ef4444; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    .sheet-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); backdrop-filter: blur(4px); z-index: 1000; visibility: hidden; opacity: 0; transition: visibility 0.2s, opacity 0.2s; }
    .sheet-overlay.active { visibility: visible; opacity: 1; }
    .bottom-sheet { position: fixed; bottom: 0; left: 0; right: 0; background: var(--bg-secondary); border-radius: 28px 28px 0 0; transform: translateY(100%); transition: transform 0.3s cubic-bezier(0.2,0.9,0.4,1.1); z-index: 1001; padding: 1.5rem 1.2rem 2rem; max-height: 80vh; overflow-y: auto; }
    .bottom-sheet.active { transform: translateY(0); }
    .sheet-handle { width: 50px; height: 5px; background: var(--text-secondary); border-radius: 20px; margin: 0 auto 1.5rem auto; opacity: 0.5; }
    .sheet-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; }
    .sheet-close { font-size: 1.5rem; cursor: pointer; }
    .sheet-tab-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
    .sheet-tab-card { background: var(--card-bg); backdrop-filter: var(--glass-blur); border: 1px solid var(--border-color); border-radius: 1.2rem; padding: 1rem 0.5rem; display: flex; flex-direction: column; align-items: center; gap: 8px; cursor: pointer; text-align: center; }
    .sheet-tab-card i { font-size: 1.6rem; color: var(--accent); }
    .sr-stats { display: flex; gap: 1rem; font-size: 0.8rem; color: var(--text-secondary); margin-top: 0.5rem; }
    .sr-stats span { background: rgba(0,0,0,0.05); padding: 4px 8px; border-radius: 8px; font-weight: 600; }
    .sr-btn { background: var(--accent); color: white; border: none; padding: 6px 12px; border-radius: 20px; font-size: 0.8rem; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 5px; }
    .pomodoro-fullscreen-wrapper { position: relative; border-radius: 2rem; background: var(--bg-secondary); border: 1px solid var(--border-color); padding: 3rem 2rem; display: flex; flex-direction: column; align-items: center; }
    .pomo-timer-circle { width: 320px; height: 320px; margin: 2rem auto; border-radius: 50%; display: flex; align-items: center; justify-content: center; background: radial-gradient(circle, rgba(59,130,246,0.05) 0%, transparent 70%); }
    .pomo-timer-circle.active-glow { animation: ultraPulse 4s infinite alternate; }
    @keyframes ultraPulse { 0% { box-shadow: 0 0 30px rgba(59,130,246,0.2); } 100% { box-shadow: 0 0 80px rgba(59,130,246,0.6); } }
    .timer-text-display { font-size: 5rem; font-weight: 800; font-variant-numeric: tabular-nums; }
    .pomo-keyboard-hints { margin-top: 2rem; font-size: 0.85rem; display: flex; gap: 1.5rem; opacity: 0.7; }
    .def-sug-card { background: var(--card-bg); backdrop-filter: var(--glass-blur); border: 1px solid var(--border-color); border-radius: 1rem; padding: 1.5rem; transition: transform 0.3s; cursor: pointer; text-align: center; margin-bottom: 1rem; }
    .def-sug-card:hover { transform: translateY(-4px); box-shadow: var(--shadow-hover); }
    .def-sug-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; }
    .def-sug-term { font-size: 1.6rem; font-weight: 800; color: var(--text-primary); word-break: break-word; }
    .def-sug-badge { background: rgba(59,130,246,0.15); color: var(--accent); padding: 4px 10px; border-radius: 20px; font-size: 0.8rem; font-weight: 700; }
    .def-sug-hidden { display: none; font-size: 1.1rem; color: var(--text-secondary); line-height: 1.6; margin: 1.5rem 0; }
    .def-sug-actions { display: flex; gap: 1rem; justify-content: center; margin-top: 1.5rem; }
    .topic-group { margin-bottom: 1.5rem; border: 1px solid var(--border-color); border-radius: 1rem; overflow: hidden; }
    .topic-header { background: var(--card-bg); padding: 0.8rem 1.2rem; font-weight: 700; font-size: 1.1rem; cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
    .topic-header i { transition: transform 0.3s; }
    .topic-header.collapsed i { transform: rotate(-90deg); }
    .topic-definitions { padding: 0.5rem 1rem; background: var(--bg-secondary); }
    .topic-definitions.collapsed { display: none; }
    .library-def-item { border-bottom: 1px solid var(--border-color); padding: 12px 0; display: flex; justify-content: space-between; flex-wrap: wrap; gap: 8px; }
    .def-actions { display: flex; gap: 8px; }
    .app-toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(100px); background: #10b981; color: white; padding: 12px 24px; border-radius: 30px; font-weight: 600; z-index: 9999; opacity: 0; transition: all 0.4s; display: flex; align-items: center; gap: 10px; }
    .app-toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
    .mobile-bottom-nav { display: none; position: fixed; bottom: 0; left: 0; width: 100%; background: var(--card-bg); backdrop-filter: var(--glass-blur); border-top: 1px solid var(--border-color); padding: 0.5rem 1rem 1.5rem; justify-content: space-around; z-index: 200; min-height: 75px; }
    .mobile-nav-item { display: flex; flex-direction: column; align-items: center; font-size: 0.75rem; color: var(--text-secondary); gap: 5px; cursor: pointer; flex: 1; }
    .mobile-nav-item i { font-size: 1.5rem; }
    .mobile-nav-item.active { color: var(--accent); transform: translateY(-3px); }
    @media (max-width: 768px) { .sidebar { display: none; } .main-content { padding: 1.5rem 1rem 6rem 1rem; } .mobile-bottom-nav { display: flex !important; } }
  </style>
</head>
<body>
<div class="app-container">
  <aside class="sidebar"><div class="logo">✨ AL Master Flow</div><div class="nav-links" id="navLinks"></div></aside>
  <main class="main-content">
    <div class="top-bar">
      <h2 style="font-size:1.5rem; font-weight:800; display:flex; align-items:center; gap:0.5rem;"><i class="fas fa-graduation-cap" style="color:var(--accent);"></i> <span id="headerTitle">Dashboard</span></h2>
      <div class="sync-indicator"><i class="fas fa-cloud-upload-alt"></i> <span id="syncText">Ready</span><div id="syncSpinner" style="display:none;" class="spinner"></div></div>
    </div>
    <div id="tabContent"></div>
  </main>
</div>
<div class="mobile-bottom-nav" id="mobileNav"></div>
<div id="sheetOverlay" class="sheet-overlay"></div>
<div id="bottomSheet" class="bottom-sheet">
  <div class="sheet-handle"></div>
  <div class="sheet-header"><h4><i class="fas fa-th-large"></i> More Tools</h4><i class="fas fa-times sheet-close" id="closeSheetBtn"></i></div>
  <div class="sheet-tab-grid" id="sheetTabsContainer"></div>
</div>
<div id="appToast" class="app-toast"></div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
  import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
  import { getDatabase, ref, set, get, child } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyA9DLfAHTUUGxCPn2j_k6godoTEopzaFAU",
    authDomain: "studymaster-919ba.firebaseapp.com",
    databaseURL: "https://studymaster-919ba-default-rtdb.firebaseio.com",
    projectId: "studymaster-919ba",
    storageBucket: "studymaster-919ba.firebasestorage.app",
    messagingSenderId: "426684063256",
    appId: "1:426684063256:web:52c17625a9450ea9662d6d",
  };
  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getDatabase(app);
  const provider = new GoogleAuthProvider();

  let currentUser = null;
  let currentTab = 'dashboard';
  let subjects = ['Physics', 'Chemistry', 'Biology', 'Mathematics'];
  let allItems = { revision: [], equations: [], papers: [], essays: [], pomodoro: [], definitions: [] };
  let syncCount = 0;

  function loadSettings() { return { theme: localStorage.getItem('theme') || 'light', accentColor: localStorage.getItem('accentColor') || '#3b82f6' }; }
  function saveSettings(settings) { for (let k in settings) localStorage.setItem(k, settings[k]); applyThemeAndStyle(); }
  function applyThemeAndStyle() { const s = loadSettings(); if (s.theme === 'dark') document.body.classList.add('dark'); else document.body.classList.remove('dark'); document.documentElement.style.setProperty('--accent', s.accentColor); }
  function showToast(msg, isError = false) { const t = document.getElementById('appToast'); t.innerHTML = `<i class="fas ${isError ? 'fa-exclamation-circle' : 'fa-check-circle'}"></i> ${msg}`; t.style.background = isError ? '#ef4444' : '#10b981'; t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 3000); }
  function showSync() { syncCount++; const sp=document.getElementById('syncSpinner'), tx=document.getElementById('syncText'); if(sp) sp.style.display='block'; if(tx) tx.innerText='Syncing...'; }
  function hideSync() { syncCount--; if(syncCount<=0){ syncCount=0; const sp=document.getElementById('syncSpinner'), tx=document.getElementById('syncText'); if(sp) sp.style.display='none'; if(tx) tx.innerText='Synced'; } }
  async function withSync(fn) { showSync(); try { return await fn(); } finally { hideSync(); } }
  function getLocalData(key) { const d = localStorage.getItem(key); return d ? JSON.parse(d) : []; }
  function setLocalData(key, data) { localStorage.setItem(key, JSON.stringify(data)); }
  async function syncToFirebase(col) { if(currentUser) await withSync(async()=>set(ref(db, `users/${currentUser.uid}/${col}`), allItems[col])); }
  async function loadAllFromFirebase() { if(!currentUser) return; await withSync(async()=>{ for(let k of Object.keys(allItems)){ const snap=await get(child(ref(db), `users/${currentUser.uid}/${k}`)); if(snap.exists()) allItems[k]=snap.val(); } }); }
  async function saveAll() { for(let k of Object.keys(allItems)){ setLocalData(k, allItems[k]); await syncToFirebase(k); } }
  function getTodayStr() { return new Date().toISOString().split('T')[0]; }
  function calculateNextReview(item) { item.reviewCount = (item.reviewCount || 0) + 1; item.lastReviewedDate = getTodayStr(); const interval = 3 + 2 * ((item.reviewCount || 1) - 1); const nextDate = new Date(); nextDate.setDate(nextDate.getDate() + interval); item.nextReviewDate = nextDate.toISOString().split('T')[0]; return item; }
  function ensureSRFields(item) { if(!item.nextReviewDate) item.nextReviewDate = getTodayStr(); if(item.reviewCount === undefined) item.reviewCount = 0; return item; }
  function getSRStatsHtml(item) { ensureSRFields(item); const today = getTodayStr(); const dueClass = item.nextReviewDate < today ? 'color:#ef4444;' : (item.nextReviewDate === today ? 'color:#f59e0b;' : 'color:#10b981;'); return `<div class="sr-stats"><span><i class="fas fa-history"></i> Last: ${item.lastReviewedDate || 'Never'}</span><span style="${dueClass}"><i class="fas fa-calendar-check"></i> Next: ${item.nextReviewDate}</span><span><i class="fas fa-redo"></i> Count: ${item.reviewCount}</span></div>`; }
  async function handleReviewClick(id, collection) { const idx = allItems[collection].findIndex(i => i.id === id); if(idx !== -1) { allItems[collection][idx] = calculateNextReview(allItems[collection][idx]); await saveAll(); showToast('Reviewed! Next interval calculated.'); switchTab(currentTab); } }
  function getDefinitionWeight(def) { const f = def.failCount || 0, p = def.passCount || 0; if(f > p) return 4; if(p > 0 && f > 0) return 2; return 1; }
  
  // FORCE reset of daily suggestions cache to fix "Untitled" problem
  function resetDailySuggestions() {
    localStorage.removeItem('suggestionsHistory');
    showToast('Today\'s suggestions have been reset. Refresh the page to see correct terms.');
    if (currentTab === 'definitions') renderDefinitions();
  }
  
  function generateDailySuggestions() {
    const today = getTodayStr();
    let history = JSON.parse(localStorage.getItem('suggestionsHistory') || '[]');
    let todayEntry = history.find(h => h.date === today);
    if(!todayEntry) {
      let pool = [];
      allItems.definitions.forEach(def => {
        const w = getDefinitionWeight(def);
        for(let i=0; i<w; i++) pool.push(def);
      });
      pool.sort(() => Math.random() - 0.5);
      let selectedIds = new Set();
      let suggestions = [];
      for(let d of pool) {
        if(!selectedIds.has(d.id)) {
          // IMPORTANT: copy the FULL definition object, including term
          suggestions.push({ ...d, sessionStatus: 'incomplete' });
          selectedIds.add(d.id);
          if(suggestions.length >= 30) break;
        }
      }
      todayEntry = { date: today, definitions: suggestions };
      history.push(todayEntry);
      localStorage.setItem('suggestionsHistory', JSON.stringify(history));
    }
    return todayEntry;
  }
  
  async function updateDefinitionStatus(id, status) {
    const defIdx = allItems.definitions.findIndex(d => d.id === id);
    if(defIdx !== -1) {
      if(status === 'pass') allItems.definitions[defIdx].passCount = (allItems.definitions[defIdx].passCount || 0) + 1;
      if(status === 'fail') allItems.definitions[defIdx].failCount = (allItems.definitions[defIdx].failCount || 0) + 1;
      allItems.definitions[defIdx].count = (allItems.definitions[defIdx].count || 0) + 1;
      await saveAll();
    }
    let history = JSON.parse(localStorage.getItem('suggestionsHistory') || '[]');
    let todayEntry = history.find(h => h.date === getTodayStr());
    if(todayEntry) {
      const sIdx = todayEntry.definitions.findIndex(d => d.id === id);
      if(sIdx !== -1) {
        todayEntry.definitions[sIdx].sessionStatus = status;
        localStorage.setItem('suggestionsHistory', JSON.stringify(history));
      }
    }
    showToast(`Marked as ${status}`);
    renderDefinitions();
  }

  function showAllModal(collection, title, renderFn) {
    const div = document.createElement('div'); div.className = 'modal-overlay'; div.innerHTML = `<div class="modal" style="max-width:800px;"><h3><i class="fas fa-list"></i> All ${title} <span class="modal-close"><i class="fas fa-times"></i></span></h3><div id="modalListContent"></div></div>`;
    document.body.appendChild(div); div.querySelector('.modal-close').onclick = () => div.remove(); const content = div.querySelector('#modalListContent'); renderFn(content, allItems[collection]);
  }

  function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, function(m) { if (m === '&') return '&amp;'; if (m === '<') return '&lt;'; if (m === '>') return '&gt;'; return m; }); }
  
  function editDefinition(defId) {
    const def = allItems.definitions.find(d => d.id === defId);
    if (!def) return;
    const existingTopics = [...new Set(allItems.definitions.map(d => d.topic).filter(t => t && t.trim() !== ""))];
    const div = document.createElement('div'); div.className = 'modal-overlay';

    const existingTopics = [...new Set(allItems.definitions.map(d => d.topic).filter(t => t && t.trim() !== ""))];
    div.innerHTML = `<div class="modal"><h3>Add Definition <span class="modal-close"><i class="fas fa-times"></i></span></h3><input type="text" id="mDefTerm" placeholder="Term (Required)" style="width:100%; margin-bottom:1rem;"><textarea id="mDefText" rows="4" placeholder="Definition (Required)" style="width:100%; margin-bottom:1rem;"></textarea><div style="margin-bottom:1rem;"><label>Topic / Unit (Optional):</label><select id="topicSelect" style="width:100%;"><option value="">-- Select existing topic --</option>${existingTopics.map(t => `<option value="${escapeHtml(t)}">${escapeHtml(t)}</option>`).join('')}<option value="__new__">➕ Add new topic</option></select><input type="text" id="newTopicInput" placeholder="New topic name" style="width:100%; margin-top:8px; display:none;"></div><button id="saveMDef" class="btn-icon" style="width:100%; justify-content:center; background:var(--accent); color:white;">Save Definition</button></div>`;
    document.body.appendChild(div); div.querySelector('.modal-close').onclick = () => div.remove();
    const topicSelect = div.querySelector('#topicSelect'); const newTopicInput = div.querySelector('#newTopicInput');
    topicSelect.addEventListener('change', () => { if (topicSelect.value === '__new__') newTopicInput.style.display = 'block'; else newTopicInput.style.display = 'none'; });
    div.querySelector('#saveMDef').onclick = async () => {
      const defText = div.querySelector('#mDefText').value; if (!defText) return showToast('Definition is required', true);
      const term = div.querySelector('#mDefTerm').value.trim(); if (!term) return showToast('Term is required', true);
      let finalTopic = topicSelect.value; if (finalTopic === '__new__') { finalTopic = newTopicInput.value.trim(); if (!finalTopic) return showToast('Please enter a topic name', true); } else if (finalTopic === "") finalTopic = undefined;
      allItems.definitions.push({ id: Date.now(), term, definition: defText, topic: finalTopic, passCount: 0, failCount: 0, count: 0 });
      await saveAll(); showToast('Added!'); div.remove(); renderDefinitions();
    };
  };
  
  window.switchTab = async (t) => { currentTab = t; renderNav(); const map={dashboard:renderDashboard, revision:renderRevision, equations:renderEquations, papers:renderPapers, essays:renderEssays, pomodoro:renderPomodoro, definitions:renderDefinitions, settings:renderSettings}; if(map[t]) await map[t](); };
  window.deleteItem = async (id, col) => { if(confirm('Delete this?')) { allItems[col] = allItems[col].filter(i=>i.id!==id); await saveAll(); if(currentTab===col) switchTab(col); } };
  window.editDate = async (id, col) => { const idx = allItems[col].findIndex(i=>i.id===id); if(idx===-1) return; const newDate = prompt('Enter next review date (YYYY-MM-DD):', allItems[col][idx].nextReviewDate); if(newDate && /^\d{4}-\d{2}-\d{2}$/.test(newDate)) { allItems[col][idx].nextReviewDate = newDate; await saveAll(); switchTab(currentTab); } else if(newDate) showToast('Invalid format', true); };
  window.showAllModal = showAllModal; window.updateDefinitionStatus = updateDefinitionStatus; window.handleReviewClick = handleReviewClick; window.renderDefLibrary = renderDefLibrary; window.editDefinition = editDefinition; window.resetDailySuggestions = resetDailySuggestions;
  
  async function init() {
    for(let k of Object.keys(allItems)) { allItems[k] = getLocalData(k); if(!allItems[k].length) allItems[k]=[]; }
    // Add sample definition if empty (using user's example)
    if (allItems.definitions.length === 0) {
      allItems.definitions.push({ id: Date.now(), term: "ක්ෂුද්‍රජීව විද්‍යාව", definition: "එකයිකයෙකු ලෙස පවතින විට පැහැදිලිව පියවි ඇසින් නිරීක්ෂණය කළ නොහැකි හෝ දෘශ්‍යාධාර නොමැතිව නොපෙනෙන කුඩා ජීවීන් පිළිබඳ අධ්‍යනය.", topic: "Biology", passCount: 0, failCount: 0, count: 0 });
      await saveAll();
    }
    // Ensure every definition has a term
    let changed = false;
    for (let def of allItems.definitions) { if (!def.term || def.term.trim() === "") { def.term = "Term missing"; changed = true; } }
    if (changed) await saveAll();
    applyThemeAndStyle();
    onAuthStateChanged(auth, async (u) => { currentUser=u; if(u){ await loadAllFromFirebase(); await saveAll(); } if(currentTab==='settings') renderSettings(); });
    await switchTab('definitions'); // Go directly to definitions tab so user sees the fix
  }
  init();
</script>
</body>
