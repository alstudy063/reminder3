<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>File Explorer - සැකසුම් සුරකිනු ලැබේ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        /* Base Scrollbar */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        
        /* Stop all browser bounce/navigation on swipe */
        html, body { overscroll-behavior-x: none; overscroll-behavior-y: none; }
        
        /* Smooth UI Transitions */
        .active-nav { background-color: #c2e7ff; color: #001d35; transition: all 0.3s ease; }
        .active-nav i { color: #001d35; }
        
        .file-item { transition: all 0.25s cubic-bezier(0.16, 1, 0.3, 1); }
        .file-item:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(0,0,0,0.06); border-color: #e2e8f0; }
        .file-item:hover .file-actions { opacity: 1; transform: translateY(0); }
        .file-item:active { transform: translateY(-1px) scale(0.98); }
        
        .file-actions { opacity: 0; transform: translateY(-4px); transition: all 0.2s ease; }
        
        /* Icon Animations */
        .file-item:hover .ph-folder { transform: scale(1.08); color: #ca8a04; transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1), color 0.2s; }
        .spin-anim { animation: spin 0.6s cubic-bezier(0.4, 0, 0.2, 1); }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        /* Skeleton Loading Shimmer */
        .skeleton {
            background: linear-gradient(90deg, #e2e8f0 25%, #f1f5f9 50%, #e2e8f0 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite linear;
            border-radius: 4px;
            color: transparent !important;
            pointer-events: none;
        }
        @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

        /* Context Menu */
        .context-menu {
            position: fixed;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(12px);
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.12);
            z-index: 1000;
            min-width: 180px;
            transform-origin: top left;
            animation: popIn 0.2s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            overflow: hidden;
        }
        .context-menu-item {
            padding: 10px 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 14px;
            transition: background 0.15s ease;
        }
        .context-menu-item:hover { background-color: #f1f5f9; color: #2563eb; }

        /* Modal Animations */
        .modal-container {
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(5px);
            animation: fadeIn 0.2s ease-out;
        }
        .modal-content {
            animation: slideUpPop 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }

        /* Keyframes */
        @keyframes popIn { 
            0% { opacity: 0; transform: scale(0.9); } 
            100% { opacity: 1; transform: scale(1); } 
        }
        @keyframes slideUpPop { 
            0% { opacity: 0; transform: translateY(20px) scale(0.95); } 
            100% { opacity: 1; transform: translateY(0) scale(1); } 
        }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        .animate-stagger { opacity: 0; animation: slideUpPop 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
    </style>
</head>
<body class="bg-[#f8fafd] text-[#1f1f1f] h-screen flex font-sans overflow-hidden select-none">

    <!-- Sidebar -->
    <aside class="w-64 min-w-[256px] flex flex-col p-4 z-10">
        <div class="flex items-center gap-2 px-2 mb-8 cursor-pointer hover:opacity-80 transition-opacity">
            <i class="ph-fill ph-hard-drives text-3xl text-blue-600"></i>
            <span class="text-xl font-normal text-gray-700 tracking-tight">File Explorer</span>
        </div>
        <button onclick="showNewMenu()" class="flex items-center gap-3 bg-white hover:bg-gray-50 hover:shadow-md shadow-sm border border-gray-200 rounded-2xl px-5 py-4 w-max mb-6 transition-all active:scale-95">
            <i class="ph ph-plus text-xl font-bold text-blue-600"></i> <span class="font-medium text-sm text-gray-800">New</span>
        </button>
        <nav class="flex flex-col gap-1 flex-1">
            <a href="#" data-tab="computers" onclick="switchTab('computers', event)" class="active-nav flex items-center gap-4 px-4 py-2.5 rounded-full text-sm font-medium">
                <i class="ph-fill ph-computer-tower text-lg transition-transform group-hover:scale-110"></i> Computers (Drives)
            </a>
            <a href="#" data-tab="recent" onclick="switchTab('recent', event)" class="hover:bg-gray-100 flex items-center gap-4 px-4 py-2.5 rounded-full text-sm font-medium text-gray-700 transition-colors">
                <i class="ph ph-clock text-lg"></i> Recent
            </a>
            <a href="#" data-tab="starred" onclick="switchTab('starred', event)" class="hover:bg-gray-100 flex items-center gap-4 px-4 py-2.5 rounded-full text-sm font-medium text-gray-700 transition-colors">
                <i class="ph ph-star text-lg"></i> Starred
            </a>
        </nav>
        <div class="mt-auto flex flex-col gap-2">
            <button onclick="openSettings()" class="hover:bg-gray-100 flex items-center gap-4 px-4 py-2.5 rounded-full text-sm font-medium text-gray-700 transition-all active:scale-95">
                <i class="ph ph-gear text-lg"></i> Settings
            </button>
            <div class="px-4 mt-2 p-3 bg-blue-50/50 rounded-xl border border-blue-100/50" id="storage-info">
                <div class="w-full bg-blue-100 rounded-full h-1.5 mb-2 overflow-hidden">
                    <div class="bg-blue-600 h-1.5 rounded-full transition-all duration-1000 ease-out" style="width: 0%"></div>
                </div>
                <span class="text-[11px] text-gray-500 font-medium uppercase tracking-wider">Storage Info</span>
            </div>
        </div>
    </aside>

    <!-- Main Content -->
    <main id="main-content" class="flex-1 flex flex-col bg-white rounded-3xl my-3 mr-3 shadow-sm border border-gray-100 overflow-hidden relative">
        
        <!-- Drag & Drop Overlay -->
        <div id="drop-zone" class="absolute inset-0 bg-blue-500/10 backdrop-blur-[2px] border-[3px] border-dashed border-blue-400 rounded-3xl z-[40] hidden flex-col items-center justify-center pointer-events-none transition-all duration-200 opacity-0">
            <div class="bg-white p-6 rounded-2xl shadow-xl flex flex-col items-center animate-bounce">
                <i class="ph-duotone ph-download-simple text-6xl text-blue-600 mb-2"></i>
                <h2 class="text-xl font-bold text-gray-800">Drop files to copy</h2>
            </div>
        </div>

        <header class="h-16 flex items-center justify-between px-6 border-b border-gray-100/80 bg-white/80 backdrop-blur-md z-10">
            <div class="flex-1 max-w-2xl relative group">
                <i class="ph ph-magnifying-glass absolute left-4 top-1/2 -translate-y-1/2 text-gray-400 text-lg transition-colors group-focus-within:text-blue-500"></i>
                <input type="text" id="search-input" placeholder="Search in current view" class="block w-full pl-12 pr-4 py-2.5 border-transparent rounded-full bg-[#f1f3f4] focus:bg-white focus:ring-2 focus:ring-blue-100 focus:shadow-sm outline-none text-sm transition-all">
            </div>
            <div class="flex items-center gap-4 ml-4">
                <button onclick="refreshCurrentView(this)" class="p-2.5 hover:bg-gray-100 rounded-full transition-colors active:bg-gray-200"><i class="ph ph-arrow-clockwise text-xl text-gray-600"></i></button>
                <div class="w-9 h-9 rounded-full bg-gradient-to-tr from-purple-600 to-blue-500 text-white flex items-center justify-center font-medium shadow-sm cursor-pointer hover:opacity-90 transition-transform hover:scale-105 active:scale-95">U</div>
            </div>
        </header>

        <!-- Breadcrumbs + actions -->
        <div class="px-6 py-3 flex items-center justify-between border-b border-gray-50 bg-gray-50/30">
            <div class="flex items-center gap-2 text-sm text-gray-600" id="breadcrumb-container"></div>
            <div class="flex gap-2 relative z-10">
                <button onclick="createNewFolder()" class="px-3 py-1.5 text-sm bg-gray-100/80 rounded-lg hover:bg-blue-50 hover:text-blue-700 transition-colors active:scale-95 flex items-center gap-2 font-medium text-gray-700 group"><i class="ph ph-folder-plus text-lg text-blue-500 group-hover:scale-110 transition-transform"></i> Folder</button>
                <button onclick="createNewFile()" class="px-3 py-1.5 text-sm bg-gray-100/80 rounded-lg hover:bg-blue-50 hover:text-blue-700 transition-colors active:scale-95 flex items-center gap-2 font-medium text-gray-700 group"><i class="ph ph-file-plus text-lg text-blue-500 group-hover:scale-110 transition-transform"></i> File</button>
            </div>
        </div>

        <div class="flex-1 overflow-y-auto p-6" id="file-container">
            <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 xl:grid-cols-5 gap-5 pb-10" id="items-grid"></div>
        </div>
    </main>

    <!-- FTP Add Modal -->
    <div id="ftp-modal" class="fixed inset-0 bg-gray-900/40 hidden z-50 modal-container">
        <div class="bg-white rounded-xl w-96 p-6 modal-content shadow-2xl">
            <h3 class="text-lg font-semibold mb-4 text-gray-800 flex items-center gap-2"><i class="ph-fill ph-hard-drives text-blue-500"></i> Add FTP Server</h3>
            <div class="space-y-3">
                <div><label class="text-xs font-semibold text-gray-500 uppercase">Alias / Name</label><input type="text" id="ftp-name" class="w-full border-2 border-blue-100 rounded-lg px-3 py-2 text-sm focus:border-blue-500 outline-none" placeholder="My Remote Server"></div>
                <div class="flex gap-2">
                    <div class="flex-1"><label class="text-xs font-semibold text-gray-500 uppercase">Host</label><input type="text" id="ftp-host" class="w-full border-2 border-blue-100 rounded-lg px-3 py-2 text-sm focus:border-blue-500 outline-none" placeholder="ftp.example.com"></div>
                    <div class="w-20"><label class="text-xs font-semibold text-gray-500 uppercase">Port</label><input type="number" id="ftp-port" value="21" class="w-full border-2 border-blue-100 rounded-lg px-3 py-2 text-sm focus:border-blue-500 outline-none"></div>
                </div>
                <div><label class="text-xs font-semibold text-gray-500 uppercase">Username</label><input type="text" id="ftp-user" class="w-full border-2 border-blue-100 rounded-lg px-3 py-2 text-sm focus:border-blue-500 outline-none"></div>
                <div><label class="text-xs font-semibold text-gray-500 uppercase">Password</label><input type="password" id="ftp-pass" class="w-full border-2 border-blue-100 rounded-lg px-3 py-2 text-sm focus:border-blue-500 outline-none"></div>
            </div>
            <div class="flex justify-end gap-3 mt-6">
                <button onclick="closeFtpModal()" class="px-4 py-2 text-sm font-medium text-gray-600 bg-gray-100 hover:bg-gray-200 rounded-lg transition-colors active:scale-95">Cancel</button>
                <button onclick="saveFtpConnection()" class="px-4 py-2 text-sm font-medium bg-blue-600 hover:bg-blue-700 text-white rounded-lg transition-colors shadow-sm active:scale-95">Save Server</button>
            </div>
        </div>
    </div>

    <!-- Rename Modal -->
    <div id="rename-modal" class="fixed inset-0 bg-gray-900/40 hidden z-50 modal-container">
        <div class="bg-white rounded-xl w-96 p-6 modal-content shadow-2xl">
            <h3 class="text-lg font-semibold mb-4 text-gray-800">Rename Item</h3>
            <input type="text" id="rename-input" class="w-full border-2 border-blue-100 rounded-lg px-4 py-2.5 mb-5 focus:outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-100 transition-all text-sm font-medium">
            <div class="flex justify-end gap-3">
                <button onclick="closeRenameModal()" class="px-4 py-2 text-sm font-medium text-gray-600 bg-gray-100 hover:bg-gray-200 rounded-lg transition-colors active:scale-95">Cancel</button>
                <button onclick="confirmRename()" class="px-4 py-2 text-sm font-medium bg-blue-600 hover:bg-blue-700 text-white rounded-lg transition-colors shadow-sm active:scale-95">Save</button>
            </div>
        </div>
    </div>

    <!-- Preview Modal -->
    <div id="preview-modal" class="fixed inset-0 bg-gray-900/80 hidden z-[60] flex items-center justify-center p-4 backdrop-blur-sm transition-opacity modal-container">
        <div class="bg-white rounded-2xl w-full max-w-4xl h-[85vh] flex flex-col overflow-hidden relative shadow-2xl modal-content">
            <div class="px-4 py-3 border-b flex justify-between items-center bg-gray-50/80 backdrop-blur">
                <h3 id="preview-title" class="text-base font-semibold text-gray-800 truncate pr-4 flex items-center gap-2"><i class="ph-fill ph-file text-blue-500"></i> <span>File Name</span></h3>
                <div class="flex gap-2">
                    <button id="preview-open-btn" class="p-2 text-gray-500 hover:bg-gray-200 rounded-lg transition-colors" title="Open in New Tab"><i class="ph-bold ph-arrow-square-out"></i></button>
                    <button onclick="closePreview()" class="p-2 text-gray-500 hover:bg-red-100 hover:text-red-500 rounded-lg transition-colors" title="Close (Esc)"><i class="ph-bold ph-x"></i></button>
                </div>
            </div>
            <div id="preview-content" class="flex-1 overflow-auto bg-[#f8fafd] flex items-center justify-center relative p-4"></div>
        </div>
    </div>

    <!-- Settings Modal -->
    <div id="settings-modal" class="fixed inset-0 bg-gray-900/40 hidden z-50 modal-container">
        <div class="bg-white rounded-2xl w-full max-w-md shadow-2xl modal-content border border-gray-100 flex flex-col max-h-[85vh]">
            <div class="p-5 border-b border-gray-100 flex justify-between items-center bg-gray-50/80 backdrop-blur rounded-t-2xl">
                <h3 class="text-lg font-semibold text-gray-800 flex items-center gap-2"><i class="ph-fill ph-gear text-blue-600"></i> Settings & Connections</h3>
                <button onclick="closeSettings()" class="text-gray-400 hover:text-gray-800 transition-colors p-1 hover:bg-gray-200 rounded-lg"><i class="ph-bold ph-x text-lg"></i></button>
            </div>
            
            <div class="p-6 flex-1 overflow-y-auto space-y-6 bg-white">
                <div>
                    <div class="flex justify-between items-center mb-3">
                        <label class="block text-sm font-bold text-gray-700 uppercase tracking-wider">Local Folders</label>
                        <button onclick="pickComputerFolder()" class="text-xs bg-blue-50 text-blue-600 px-3 py-1.5 rounded-lg hover:bg-blue-100 font-medium flex items-center gap-1 active:scale-95 transition-all"><i class="ph-bold ph-plus"></i> Add</button>
                    </div>
                    <div id="settings-local-list" class="space-y-2"></div>
                </div>

                <div>
                    <div class="flex justify-between items-center mb-3">
                        <label class="block text-sm font-bold text-gray-700 uppercase tracking-wider">FTP Servers</label>
                        <button onclick="openFtpModal()" class="text-xs bg-purple-50 text-purple-600 px-3 py-1.5 rounded-lg hover:bg-purple-100 font-medium flex items-center gap-1 active:scale-95 transition-all"><i class="ph-bold ph-plus"></i> Add</button>
                    </div>
                    <div id="settings-ftp-list" class="space-y-2"></div>
                </div>
            </div>

            <div class="p-5 border-t border-gray-100 bg-gray-50/80 rounded-b-2xl flex justify-between items-center">
                <button onclick="clearAllHandles()" class="text-red-500 hover:text-red-700 hover:bg-red-50 px-4 py-2 rounded-lg text-sm font-medium transition-all active:scale-95"><i class="ph-bold ph-warning-circle"></i> Revoke All Data</button>
                <button onclick="closeSettings()" class="px-6 py-2 bg-gray-900 text-white rounded-xl text-sm font-medium hover:bg-black transition-all active:scale-95 shadow-sm">Done</button>
            </div>
        </div>
    </div>

    <!-- Context Menu -->
    <div id="context-menu" class="context-menu hidden"></div>

    <!-- Toast -->
    <div id="toast" class="fixed bottom-8 left-1/2 transform -translate-x-1/2 bg-gray-800/95 backdrop-blur-md text-white px-6 py-3 rounded-full shadow-[0_10px_25px_rgba(0,0,0,0.2)] text-sm font-medium transition-all duration-300 opacity-0 translate-y-4 scale-95 pointer-events-none z-50 flex items-center gap-2 border border-gray-700"></div>

    <script>
        // ======================= PERSISTENCE WITH INDEXEDDB =======================
        let currentDirectoryHandle = null;
        let currentFtpContext = null; 
        let currentPath = [];
        let currentTab = 'computers';
        let savedFolders = [];
        let savedFTPs = []; // Array for FTP servers
        let recentFiles = [];
        let starredFiles = [];
        let contextTarget = null;
        let currentRenderId = 0; 
        let currentPreviewUrl = null;

        function openDB() {
            return new Promise((resolve, reject) => {
                // Upgraded to version 6 to support FTP store
                const request = indexedDB.open('FileExplorerDB', 6);
                request.onupgradeneeded = (e) => {
                    const db = e.target.result;
                    if (!db.objectStoreNames.contains('handles')) db.createObjectStore('handles');
                    if (!db.objectStoreNames.contains('ftp')) db.createObjectStore('ftp', { keyPath: 'id' });
                    if (!db.objectStoreNames.contains('recent')) db.createObjectStore('recent', { keyPath: 'id' });
                    if (!db.objectStoreNames.contains('starred')) db.createObjectStore('starred', { keyPath: 'id' });
                    if (!db.objectStoreNames.contains('appState')) db.createObjectStore('appState');
                };
                request.onsuccess = () => resolve(request.result);
                request.onerror = () => reject(request.error);
            });
        }

        // ---------- Handle & Connection Management ----------
        function updateSettingsInputs() {
            const localList = document.getElementById('settings-local-list');
            const ftpList = document.getElementById('settings-ftp-list');
            
            if (localList) {
                localList.innerHTML = savedFolders.length === 0 
                    ? '<p class="text-sm text-gray-400 italic">No local folders saved.</p>'
                    : savedFolders.map(f => `
                        <div class="flex justify-between items-center p-2.5 bg-gray-50 border border-gray-100 rounded-lg group hover:border-blue-200 transition-colors">
                            <div class="flex items-center gap-3 overflow-hidden">
                                <i class="ph-fill ph-folder text-blue-500 text-xl"></i>
                                <span class="text-sm text-gray-700 truncate font-medium">${escapeHtml(f.name)}</span>
                            </div>
                            <div class="flex gap-1 opacity-0 group-hover:opacity-100 transition-opacity">
                                <button onclick="renameLocation('${f.id}', 'local_location', '${escapeHtml(f.name)}')" class="p-1.5 text-gray-400 hover:text-blue-600 hover:bg-blue-50 rounded transition-colors"><i class="ph-bold ph-pencil-simple"></i></button>
                                <button onclick="removeLocation('${f.id}', 'local')" class="p-1.5 text-gray-400 hover:text-red-600 hover:bg-red-50 rounded transition-colors"><i class="ph-bold ph-trash"></i></button>
                            </div>
                        </div>
                    `).join('');
            }

            if (ftpList) {
                ftpList.innerHTML = savedFTPs.length === 0 
                    ? '<p class="text-sm text-gray-400 italic">No FTP servers saved.</p>'
                    : savedFTPs.map(f => `
                        <div class="flex justify-between items-center p-2.5 bg-gray-50 border border-gray-100 rounded-lg group hover:border-purple-200 transition-colors">
                            <div class="flex items-center gap-3 overflow-hidden">
                                <i class="ph-fill ph-hard-drives text-purple-500 text-xl"></i>
                                <div class="flex flex-col truncate">
                                    <span class="text-sm text-gray-700 truncate font-medium leading-tight">${escapeHtml(f.name)}</span>
                                    <span class="text-[11px] text-gray-400 truncate">${escapeHtml(f.host)}</span>
                                </div>
                            </div>
                            <div class="flex gap-1 opacity-0 group-hover:opacity-100 transition-opacity">
                                <button onclick="renameLocation('${f.id}', 'ftp_location', '${escapeHtml(f.name)}')" class="p-1.5 text-gray-400 hover:text-purple-600 hover:bg-purple-50 rounded transition-colors"><i class="ph-bold ph-pencil-simple"></i></button>
                                <button onclick="removeLocation('${f.id}', 'ftp')" class="p-1.5 text-gray-400 hover:text-red-600 hover:bg-red-50 rounded transition-colors"><i class="ph-bold ph-trash"></i></button>
                            </div>
                        </div>
                    `).join('');
            }
        }

        async function loadHandlesAndFTPs() {
            const db = await openDB();
            
            // Load Local Folders
            const txFolders = db.transaction('handles', 'readonly');
            const reqFolders = txFolders.objectStore('handles').openCursor();
            savedFolders = [];
            await new Promise(r => {
                reqFolders.onsuccess = (e) => {
                    const cursor = e.target.result;
                    if (cursor) {
                        const item = cursor.value;
                        if (item && item.handle) {
                            if (!item.id) item.id = cursor.key || ('folder_' + Date.now() + Math.random());
                            if (!item.name) item.name = item.handle.name || item.key;
                            savedFolders.push(item);
                        }
                        cursor.continue();
                    } else r();
                };
            });

            // Load FTP Servers
            if (db.objectStoreNames.contains('ftp')) {
                const txFtp = db.transaction('ftp', 'readonly');
                const reqFtp = txFtp.objectStore('ftp').getAll();
                savedFTPs = await new Promise(r => { 
                    reqFtp.onsuccess = () => r(reqFtp.result || []); 
                });
            }
            updateSettingsInputs();
        }

        function openFtpModal() {
            document.getElementById('ftp-modal').classList.remove('hidden');
            document.getElementById('ftp-name').value = '';
            document.getElementById('ftp-host').value = '';
            document.getElementById('ftp-user').value = '';
            document.getElementById('ftp-pass').value = '';
        }
        
        function closeFtpModal() {
            document.getElementById('ftp-modal').classList.add('hidden');
        }

        async function saveFtpConnection() {
            const name = document.getElementById('ftp-name').value.trim();
            const host = document.getElementById('ftp-host').value.trim();
            const port = document.getElementById('ftp-port').value.trim();
            const user = document.getElementById('ftp-user').value.trim();
            const pass = document.getElementById('ftp-pass').value;

            if (!name || !host) return showToast('Name and Host are required!');

            const newFtp = { id: 'ftp_' + Date.now(), name, host, port, user, pass };
            savedFTPs.push(newFtp);

            const db = await openDB();
            const tx = db.transaction('ftp', 'readwrite');
            tx.objectStore('ftp').put(newFtp);
            await new Promise(r => tx.oncomplete = r);

            closeFtpModal();
            updateSettingsInputs();
            showToast(`<i class="ph-fill ph-check-circle text-green-400"></i> Saved FTP Server`);
            if (currentTab === 'computers') renderComputers();
        }

        async function removeLocation(id, type) {
            const db = await openDB();
            if (type === 'local') {
                savedFolders = savedFolders.filter(f => f.id !== id);
                const tx = db.transaction('handles', 'readwrite');
                tx.objectStore('handles').delete(id);
                await new Promise(r => tx.oncomplete = r);
            } else if (type === 'ftp') {
                savedFTPs = savedFTPs.filter(f => f.id !== id);
                const tx = db.transaction('ftp', 'readwrite');
                tx.objectStore('ftp').delete(id);
                await new Promise(r => tx.oncomplete = r);
            }
            updateSettingsInputs();
            if (currentTab === 'computers') await renderComputers();
            showToast('Removed location');
        }

        function clearAllHandles() {
            savedFolders = [];
            savedFTPs = [];
            openDB().then(db => {
                const tx1 = db.transaction('handles', 'readwrite'); tx1.objectStore('handles').clear();
                const tx2 = db.transaction('ftp', 'readwrite'); if(db.objectStoreNames.contains('ftp')) tx2.objectStore('ftp').clear();
                updateSettingsInputs();
                closeSettings();
                showToast('All permissions and connections cleared'); 
                if(currentTab === 'computers') renderComputers();
                else switchTab('computers');
            });
        }

        async function saveCurrentState() {
            if (!currentDirectoryHandle && !currentFtpContext) return;
            const db = await openDB();
            const tx = db.transaction('appState', 'readwrite');
            const store = tx.objectStore('appState');
            if (currentDirectoryHandle) store.put(currentDirectoryHandle, 'currentDir');
            store.put(currentPath, 'currentPath');
            store.put(currentTab, 'currentTab');
            await new Promise(r => tx.oncomplete = r);
        }

        async function loadCurrentState() {
            const db = await openDB();
            if (!db.objectStoreNames.contains('appState')) return;
            const tx = db.transaction('appState', 'readonly');
            const store = tx.objectStore('appState');
            const savedDir = await new Promise(r => { const req = store.get('currentDir'); req.onsuccess = () => r(req.result); });
            const savedPath = await new Promise(r => { const req = store.get('currentPath'); req.onsuccess = () => r(req.result); });
            const savedTab = await new Promise(r => { const req = store.get('currentTab'); req.onsuccess = () => r(req.result); });
            if (savedDir && savedDir.name) {
                currentDirectoryHandle = savedDir;
                if (Array.isArray(savedPath)) currentPath = savedPath.filter(h => h && h.name);
                if (savedTab) currentTab = savedTab;
            }
        }

        // ---------- State Loaders ----------
        async function saveRecentList() {
            const db = await openDB();
            const tx = db.transaction('recent', 'readwrite');
            tx.objectStore('recent').clear();
            for (let item of recentFiles.slice(0, 20)) tx.objectStore('recent').put(item);
        }
        async function saveStarredList() {
            const db = await openDB();
            const tx = db.transaction('starred', 'readwrite');
            tx.objectStore('starred').clear();
            for (let item of starredFiles) tx.objectStore('starred').put(item);
        }
        async function loadRecentAndStarred() {
            const db = await openDB();
            if (db.objectStoreNames.contains('recent')) {
                const req = db.transaction('recent', 'readonly').objectStore('recent').getAll();
                recentFiles = await new Promise(r => { req.onsuccess = () => r(req.result || []); });
            }
            if (db.objectStoreNames.contains('starred')) {
                const req = db.transaction('starred', 'readonly').objectStore('starred').getAll();
                starredFiles = await new Promise(r => { req.onsuccess = () => r(req.result || []); });
            }
        }

        // ---------- File Operations ----------
        async function getFilesAndFolders(dirHandle) {
            const folders = [], files = [];
            for await (const entry of dirHandle.values()) {
                if (entry.kind === 'directory') folders.push(entry);
                else files.push(entry);
            }
            folders.sort((a,b) => a.name.localeCompare(b.name));
            files.sort((a,b) => a.name.localeCompare(b.name));
            return { folders, files };
        }

        async function renderCurrentDirectory(prompt = false) {
            currentFtpContext = null; // Clear FTP context if switching to local
            const renderId = ++currentRenderId;
            const grid = document.getElementById('items-grid');
            document.getElementById('search-input').value = '';
            
            if (!currentDirectoryHandle) {
                switchTab('computers');
                return;
            }

            const hasPermission = await ensurePermission(currentDirectoryHandle, prompt);
            if (renderId !== currentRenderId) return; 

            if (!hasPermission) {
                grid.innerHTML = `
                    <div class="col-span-full flex flex-col items-center py-24 text-center animate-fade-in">
                        <div class="w-24 h-24 bg-orange-50 rounded-full flex items-center justify-center mb-6"><i class="ph-fill ph-lock-key text-5xl text-orange-400"></i></div>
                        <h2 class="text-2xl font-semibold text-gray-800 mb-2">Permission Required</h2>
                        <p class="text-gray-500 text-sm max-w-md mx-auto mb-8">The browser requires permission to read "${escapeHtml(currentDirectoryHandle.name)}" after a reload.</p>
                        <button id="grant-btn" class="px-8 py-3 bg-blue-600 hover:bg-blue-700 text-white rounded-xl shadow-md active:scale-95 flex items-center gap-2"><i class="ph-bold ph-check"></i> Grant Access</button>
                    </div>
                `;
                document.getElementById('grant-btn').onclick = async () => {
                    if (await ensurePermission(currentDirectoryHandle, true)) await renderCurrentDirectory(false);
                };
                updateBreadcrumbs();
                return;
            }

            const { folders, files } = await getFilesAndFolders(currentDirectoryHandle);
            if (renderId !== currentRenderId) return; 
            
            grid.innerHTML = '';
            let delay = 0;
            const appendWithDelay = (element) => {
                element.style.animationDelay = `${delay}s`;
                element.classList.add('animate-stagger');
                grid.appendChild(element);
                delay += 0.03;
            };

            for (const folder of folders) appendWithDelay(createItemCard(folder, true));
            for (const file of files) appendWithDelay(createItemCard(file, false));
            
            if (folders.length === 0 && files.length === 0) {
                grid.innerHTML = `<div class="col-span-full flex flex-col items-center py-20 text-center animate-fade-in"><i class="ph-fill ph-folder-open text-6xl text-gray-300 mb-4"></i><p class="text-gray-600 font-medium">This folder is empty</p></div>`;
            }
            
            updateBreadcrumbs();
            updateStorageInfo();
            await saveCurrentState();
        }

        function createItemCard(handle, isFolder) {
            const div = document.createElement('div');
            div.className = 'file-item search-item flex flex-col p-4 bg-[#f0f4f9] rounded-2xl border border-transparent relative cursor-pointer group bg-white shadow-[0_2px_8px_rgba(0,0,0,0.02)]';

            div.innerHTML = `
                <div class="flex justify-between items-start mb-4">

                        <button class="p-1.5 hover:bg-red-50 text-red-500 rounded-md transition-colors" onclick="event.stopPropagation(); deleteItem('${handle.name}', ${isFolder})" title="Delete"><i class="ph ph-trash"></i></button>
                        <button class="p-1.5 hover:bg-yellow-50 text-yellow-500 rounded-md transition-colors" onclick="event.stopPropagation(); toggleStar('${handle.name}', ${isFolder})" title="Star"><i class="ph-fill ph-star"></i></button>

                </div>
                <div class="mt-auto">
                    <span class="text-sm font-semibold text-gray-800 block truncate item-title" title="${escapeHtml(handle.name)}">${escapeHtml(handle.name)}</span>
                    ${!isFolder 
                        ? `<div class="flex justify-between items-center mt-1.5">
                            <span class="file-size skeleton text-[11px] font-medium px-2 py-0.5 rounded w-12 h-4 inline-block"></span>
                            <span class="file-date skeleton text-[11px] w-16 h-4 inline-block"></span>
                           </div>` 
                        : `<span class="text-[11px] font-medium text-gray-500 mt-1.5 block">File Folder</span>`
                    }

            if (!isFolder) {
                handle.getFile().then(file => {
                    const sizeEl = div.querySelector('.file-size'); const dateEl = div.querySelector('.file-date');

                    if(dateEl) { const d = new Date(file.lastModified); dateEl.classList.remove('skeleton', 'w-16', 'h-4'); dateEl.classList.add('text-gray-400'); dateEl.innerText = d.toLocaleDateString(undefined, {month:'short', day:'numeric'}); }
                }).catch(e => {
                    const sizeEl = div.querySelector('.file-size');
                    if(sizeEl) { sizeEl.classList.remove('skeleton', 'w-12', 'h-4'); sizeEl.innerText = 'Unknown'; sizeEl.classList.add('bg-red-50', 'text-red-400'); }

                else { await openFile(handle); addToRecent(handle, false); }

            div.addEventListener('contextmenu', (e) => { e.preventDefault(); contextTarget = { handle, name: handle.name, isFolder }; showContextMenu(e.clientX, e.clientY); });

        async function openFile(fileHandle) {
            try {
                const file = await fileHandle.getFile();
                const ext = file.name.split('.').pop().toLowerCase();
                const imgExts = ['png', 'jpg', 'jpeg', 'gif', 'webp', 'svg', 'bmp'];
                const vidExts = ['mp4', 'webm', 'ogg'];
                const audExts = ['mp3', 'wav', 'ogg', 'aac'];
                const txtExts = ['txt', 'json', 'js', 'html', 'css', 'md', 'csv', 'py', 'java', 'c', 'cpp', 'xml'];

                document.getElementById('preview-title').innerHTML = `<i class="ph-fill ${getFileIcon(file.name).match(/ph-[a-z-]+/)[0]} text-blue-500"></i> <span>${escapeHtml(file.name)}</span>`;
                const contentDiv = document.getElementById('preview-content');
                contentDiv.innerHTML = '<div class="flex flex-col items-center"><i class="ph-duotone ph-spinner-gap animate-spin text-4xl text-blue-500 mb-3"></i><p class="text-gray-500 font-medium">Loading preview...</p></div>';
                document.getElementById('preview-modal').classList.remove('hidden');

                if (currentPreviewUrl) URL.revokeObjectURL(currentPreviewUrl);
                currentPreviewUrl = URL.createObjectURL(file);
                document.getElementById('preview-open-btn').onclick = () => window.open(currentPreviewUrl, '_blank');

                if (imgExts.includes(ext)) { contentDiv.innerHTML = `<img src="${currentPreviewUrl}" class="max-w-full max-h-full object-contain rounded-lg shadow-sm">`; }
                else if (vidExts.includes(ext)) { contentDiv.innerHTML = `<video src="${currentPreviewUrl}" controls autoplay class="max-w-full max-h-full rounded-lg shadow-sm bg-black"></video>`; }
                else if (audExts.includes(ext)) {
                    contentDiv.innerHTML = `<div class="bg-white p-8 rounded-2xl shadow-sm border border-gray-100 flex flex-col items-center"><div class="w-24 h-24 bg-pink-50 rounded-full flex items-center justify-center mb-6"><i class="ph-fill ph-music-notes text-5xl text-pink-500 animate-pulse"></i></div><p class="font-semibold text-gray-800 mb-4 text-center">${escapeHtml(file.name)}</p><audio src="${currentPreviewUrl}" controls autoplay></audio></div>`;
                } else if (txtExts.includes(ext)) {
                    const text = await file.text();
                    contentDiv.innerHTML = `<pre class="w-full h-full text-left bg-white p-6 rounded-xl overflow-auto text-sm text-gray-800 shadow-inner border border-gray-200 whitespace-pre-wrap font-mono">${escapeHtml(text)}</pre>`;
                } else {
                    contentDiv.innerHTML = `<div class="flex flex-col items-center bg-white p-10 rounded-2xl text-center"><i class="ph-duotone ph-file-dashed text-7xl text-gray-400 mb-5"></i><p class="text-gray-800 font-semibold text-lg mb-2">No Preview Available</p><button onclick="window.open('${currentPreviewUrl}', '_blank')" class="px-6 py-2.5 bg-blue-600 text-white rounded-xl mt-4">Open Externally</button></div>`;
                }
            } catch(err) { showToast(`Cannot open file`); closePreview(); }
        }

        function closePreview() {
            document.getElementById('preview-modal').classList.add('hidden');
            document.getElementById('preview-content').innerHTML = ''; 
            if (currentPreviewUrl) { URL.revokeObjectURL(currentPreviewUrl); currentPreviewUrl = null; }
        }

        function getFileIcon(filename) {
            const ext = filename.split('.').pop().toLowerCase();
            const map = { pdf: 'ph-file-pdf text-red-500', jpg: 'ph-image text-blue-500', png: 'ph-image text-blue-500', mp4: 'ph-video text-purple-500', txt: 'ph-file-text text-gray-500', zip: 'ph-file-archive text-gray-700' };
            return map[ext] ? `<i class="ph-fill ${map[ext]} text-[40px] drop-shadow-sm"></i>` : `<i class="ph-fill ph-file text-[40px] text-gray-400 drop-shadow-sm"></i>`;
        }

        function formatSize(bytes) { if (!bytes) return '0 B'; const sizes = ['B','KB','MB','GB']; const i = Math.floor(Math.log(bytes)/Math.log(1024)); return (bytes/Math.pow(1024,i)).toFixed(1)+' '+sizes[i]; }

        async function updateStorageInfo() {
            if (!currentDirectoryHandle) return;
            try {
                let total = 0;
                for await (const entry of currentDirectoryHandle.values()) if (entry.kind === 'file') total += (await entry.getFile()).size;
                const percent = Math.min(100, (total/5e9)*100);
                document.querySelector('#storage-info .bg-blue-600').style.width = `${percent}%`;
                document.querySelector('#storage-info span').innerText = `${(total / (1024**3)).toFixed(2)} GB in folder`;
            } catch(e) {}
        }

        function updateBreadcrumbs() {
            const container = document.getElementById('breadcrumb-container');
            let html = `<button onclick="switchTab('computers')" class="hover:text-blue-600 hover:scale-105 transition-all font-medium flex items-center gap-1"><i class="ph-fill ph-hard-drives"></i> Computers</button>`;
            
            if (currentFtpContext) {
                html += `<i class="ph ph-caret-right mx-1.5 text-gray-400 text-xs"></i><span class="font-semibold text-gray-800 bg-blue-50 px-2 py-0.5 rounded-md text-blue-800">${escapeHtml(currentFtpContext.name)}</span>`;
            } else if (currentDirectoryHandle || currentPath.length > 0) {
                for (let i = 0; i < currentPath.length; i++) {
                    html += `<i class="ph ph-caret-right mx-1.5 text-gray-400 text-xs"></i>`;
                    html += `<button onclick="navigateToLevel(${i})" class="hover:text-blue-600 hover:scale-105 transition-all truncate max-w-[120px]">${escapeHtml(currentPath[i].name)}</button>`;
                }
                if (currentDirectoryHandle) {
                    html += `<i class="ph ph-caret-right mx-1.5 text-gray-400 text-xs"></i><span class="font-semibold text-gray-800 truncate max-w-[200px] bg-blue-50 px-2 py-0.5 rounded-md text-blue-800">${escapeHtml(currentDirectoryHandle.name)}</span>`;
                }
            }
            container.innerHTML = html;
        }

        async function navigateToRoot() { currentDirectoryHandle = currentPath[0] || null; currentPath = []; await renderCurrentDirectory(true); }
        async function navigateToLevel(idx) { const newPath = currentPath.slice(0, idx+1); currentDirectoryHandle = newPath[newPath.length-1]; currentPath = newPath.slice(0, -1); await renderCurrentDirectory(true); }
        async function refreshCurrentView(btnElement) {
            if (btnElement) { const icon = btnElement.querySelector('i'); icon.classList.add('spin-anim'); setTimeout(() => icon.classList.remove('spin-anim'), 600); }
            if (currentFtpContext) renderFtpDirectory(); else if (currentDirectoryHandle) await renderCurrentDirectory(true); 
        }

        // ---------- Unified Rename Logic ----------
        let renameTarget = null, renameMode = 'file'; 
        
        function renameLocation(id, type, currentName, event) {
            if (event) event.stopPropagation();
            renameMode = type; 
            renameTarget = id; 
            const input = document.getElementById('rename-input');
            input.value = currentName; 
            document.getElementById('rename-modal').classList.remove('hidden'); 
            setTimeout(() => { input.focus(); input.select(); }, 100);
        }

        async function confirmRename() {
            const newName = document.getElementById('rename-input').value.trim();
            if (!newName) { closeRenameModal(); return; }

            try {
                if (renameMode === 'local_location') {
                    const loc = savedFolders.find(f => f.id === renameTarget);
                    if (loc && loc.name !== newName) {
                        loc.name = newName;
                        const db = await openDB();
                        const tx = db.transaction('handles', 'readwrite');
                        tx.objectStore('handles').put(loc, loc.id);
                        await new Promise(r => tx.oncomplete = r);
                        updateSettingsInputs();
                        if (currentTab === 'computers') renderComputers();
                        showToast(`Renamed connection to ${newName}`);
                    }
                } else if (renameMode === 'ftp_location') {
                    const ftp = savedFTPs.find(f => f.id === renameTarget);
                    if (ftp && ftp.name !== newName) {
                        ftp.name = newName;
                        const db = await openDB();
                        const tx = db.transaction('ftp', 'readwrite');
                        tx.objectStore('ftp').put(ftp);
                        await new Promise(r => tx.oncomplete = r);
                        updateSettingsInputs();
                        if (currentTab === 'computers') renderComputers();
                        showToast(`Renamed server to ${newName}`);
                    }
                } else if (renameMode === 'file') {
                    if (newName === renameTarget) return;
                    const targetHandle = await currentDirectoryHandle.getFileHandle(renameTarget, { create: false }).catch(() => currentDirectoryHandle.getDirectoryHandle(renameTarget, { create: false }));
                    if (!targetHandle) throw new Error('Not found');
                    await targetHandle.move(newName);
                    showToast(`Renamed file to ${newName}`);
                    await renderCurrentDirectory(false);
                }
            } catch(e) { showToast('Rename failed: ' + e.message); }
            closeRenameModal();
        }
        function closeRenameModal() { document.getElementById('rename-modal').classList.add('hidden'); renameTarget = null; }

        async function deleteItem(name, isFolder) {
            if (!confirm(`Are you sure you want to delete "${name}" permanently?`)) return;
            try {
                if (isFolder) await currentDirectoryHandle.removeEntry(name, { recursive: true });
                else await currentDirectoryHandle.removeEntry(name);
                showToast(`Deleted ${name}`);
                await renderCurrentDirectory(false);
            } catch(e) { showToast('Delete failed: ' + e.message); }
        }

        // ---------- TAB RENDERING: Computers Dashboard ----------
        async function switchTab(tabId, event) {
            if(event) event.preventDefault();
            currentTab = tabId;
            document.getElementById('search-input').value = ''; 
            document.querySelectorAll('nav a').forEach(a => { a.classList.remove('active-nav'); a.classList.add('text-gray-700'); });
            document.querySelector(`[data-tab="${tabId}"]`).classList.add('active-nav'); 
            document.querySelector(`[data-tab="${tabId}"]`).classList.remove('text-gray-700');
            
            if (tabId === 'computers') await renderComputers();
            else if (tabId === 'recent') await renderRecent();
            else if (tabId === 'starred') await renderStarred();
            await saveCurrentState();
        }

        function createConnectionCard(id, name, type, iconClass, subtitle, contextData) {

                </div>
                <span class="text-sm font-semibold text-gray-800 truncate w-full text-center">${escapeHtml(name)}</span>
                <span class="text-[10px] text-gray-400 font-medium mt-1 uppercase truncate w-full text-center">${escapeHtml(subtitle)}</span>
            `;
            div.onclick = async () => {
                if (type === 'local') { currentPath = []; currentDirectoryHandle = contextData; await renderCurrentDirectory(true); }
                else if (type === 'ftp') { currentPath = []; currentFtpContext = contextData; renderFtpDirectory(); }
            };
            return div;
        }

        async function pickComputerFolder() {
            try {
                const handle = await window.showDirectoryPicker();
                const exists = savedFolders.find(f => f.name === handle.name);
                if (!exists) {
                    const id = 'folder_' + Date.now();
                    const folderObj = { id, name: handle.name, handle };
                    savedFolders.push(folderObj);
                    const db = await openDB();
                    const tx = db.transaction('handles', 'readwrite'); tx.objectStore('handles').put(folderObj, id);
                    await new Promise(r => tx.oncomplete = r);
                    updateSettingsInputs();
                }
                currentPath = []; currentDirectoryHandle = handle; await renderCurrentDirectory(false);
                showToast(`Opened: ${handle.name}`);
            } catch(e) {}
        }

        // ---------- Global Helpers ----------
        async function ensurePermission(handle, prompt = true) {
            if (!handle) return false;
            if ((await handle.queryPermission({mode: 'readwrite'})) === 'granted') return true;
            if (prompt) { try { if ((await handle.requestPermission({mode:'readwrite'})) === 'granted') return true; } catch (e) {} }
            return false;
        }

        function showToast(msg) {
            const toast = document.getElementById('toast'); toast.innerHTML = msg;
            toast.classList.remove('opacity-0', 'translate-y-4', 'scale-95', 'pointer-events-none'); toast.classList.add('opacity-100', 'translate-y-0', 'scale-100');
            setTimeout(() => { toast.classList.remove('opacity-100', 'translate-y-0', 'scale-100'); toast.classList.add('opacity-0', 'translate-y-4', 'scale-95', 'pointer-events-none'); }, 3000);
        }
        function escapeHtml(str) { return str.replace(/[&<>]/g, m => m==='&'?'&amp;':m==='<'?'&lt;':'&gt;'); }
        function openSettings() { document.getElementById('settings-modal').classList.remove('hidden'); }
        function closeSettings() { document.getElementById('settings-modal').classList.add('hidden'); }
        function showNewMenu() { showToast('<i class="ph-fill ph-info text-blue-400"></i> Use the folder/file buttons above'); }

        // ---------- LIVE UX: Search Filtering ----------
        document.getElementById('search-input').addEventListener('input', (e) => {
            const term = e.target.value.toLowerCase();
            document.querySelectorAll('.search-item').forEach(item => {
                const nameNode = item.querySelector('.item-title');
                if (nameNode) item.style.display = nameNode.innerText.toLowerCase().includes(term) ? '' : 'none';
            });
        });

        // ---------- LIVE UX: Drag & Drop Files ----------
        const mainEl = document.getElementById('main-content'); const dropZone = document.getElementById('drop-zone');
        mainEl.addEventListener('dragover', (e) => { e.preventDefault(); if (currentDirectoryHandle) { dropZone.classList.remove('hidden'); setTimeout(() => dropZone.classList.remove('opacity-0'), 10); }});
        mainEl.addEventListener('dragleave', (e) => { if (!mainEl.contains(e.relatedTarget)) { dropZone.classList.add('opacity-0'); setTimeout(() => dropZone.classList.add('hidden'), 200); }});
        mainEl.addEventListener('drop', async (e) => {
            e.preventDefault(); dropZone.classList.add('opacity-0'); setTimeout(() => dropZone.classList.add('hidden'), 200);
            if (!currentDirectoryHandle) return;
            const items = e.dataTransfer.items; let count = 0;
            for (let i=0; i<items.length; i++) {
                if (items[i].kind === 'file') {
                    const file = items[i].getAsFile();
                    try { const newH = await currentDirectoryHandle.getFileHandle(file.name, {create: true}); const w = await newH.createWritable(); await w.write(file); await w.close(); count++; } catch(err) {}
                }
            }
            if (count > 0) { showToast(`<i class="ph-fill ph-check-circle text-green-400 text-lg"></i> Copied ${count} file(s)`); renderCurrentDirectory(false); }
        });

        // ---------- Start ----------
        window.onload = async () => {
            await loadHandlesAndFTPs();
            await loadRecentAndStarred();
            await loadCurrentState();
            
            // Re-route fallback to computers if old session had my-files active
            if(currentTab === 'my-files') currentTab = 'computers';
            
            await switchTab(currentTab, null);
            if (currentFtpContext) renderFtpDirectory();
            else if (currentDirectoryHandle) await renderCurrentDirectory(false);
            else if (currentTab === 'computers') await renderComputers();
        };
    </script>
</body>
</html>
