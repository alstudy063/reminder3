<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Local File Manager - Google Drive Style</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #dadce0; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #bdc1c6; }
        .active-nav { background-color: #c2e7ff; color: #001d35; }
        .active-nav i { color: #001d35; }
        .file-item:hover .file-actions { opacity: 1; }
    </style>
</head>
<body class="bg-[#f8fafd] text-[#1f1f1f] h-screen flex font-sans overflow-hidden">

    <!-- Sidebar (same as before, slightly modified) -->
    <aside class="w-64 min-w-[256px] flex flex-col p-4">
        <div class="flex items-center gap-2 px-2 mb-8 cursor-pointer">
            <i class="ph-fill ph-hard-drives text-3xl text-blue-600"></i>
            <span class="text-xl font-normal text-gray-700">Local File Manager</span>
        </div>

        <button onclick="openLocalFolder()" class="flex items-center gap-3 bg-blue-600 hover:bg-blue-700 text-white shadow-sm rounded-2xl px-5 py-4 w-max mb-6 transition-all">
            <i class="ph ph-folder-open text-xl font-bold"></i>
            <span class="font-medium text-sm">Open Local Folder</span>
        </button>

        <nav class="flex flex-col gap-1 flex-1">
            <a href="#" data-tab="home" onclick="switchTab('home', event)" class="active-nav flex items-center gap-4 px-4 py-2 rounded-full transition-colors text-sm font-medium">
                <i class="ph-fill ph-folder text-lg"></i> Home
            </a>
        </nav>

        <div class="mt-auto flex flex-col gap-2">
            <button onclick="showInfo()" class="hover:bg-gray-100 flex items-center gap-4 px-4 py-2 rounded-full text-sm text-gray-700">
                <i class="ph ph-info text-lg"></i> About
            </button>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 flex flex-col bg-white rounded-3xl my-3 mr-3 shadow-sm border border-gray-100 overflow-hidden">
        <header class="h-16 flex items-center justify-between px-6 border-b">
            <div class="flex-1 max-w-2xl relative">
                <i class="ph ph-magnifying-glass absolute left-3 top-1/2 -translate-y-1/2 text-gray-500"></i>
                <input type="text" id="search-input" placeholder="Search in current folder" class="w-full pl-10 pr-3 py-2 rounded-full bg-[#f1f3f4] focus:bg-white outline-none">
            </div>
            <div class="flex items-center gap-2">
                <button onclick="createNewFile()" class="p-2 hover:bg-gray-100 rounded-full" title="New text file"><i class="ph ph-file-plus text-xl"></i></button>
                <button onclick="createNewFolder()" class="p-2 hover:bg-gray-100 rounded-full" title="New folder"><i class="ph ph-folder-plus text-xl"></i></button>
                <div class="w-8 h-8 rounded-full bg-purple-600 text-white flex items-center justify-center">U</div>
            </div>
        </header>

        <!-- Breadcrumbs + current path -->
        <div class="px-6 py-3 flex items-center gap-2 text-sm border-b" id="breadcrumb-area">
            <span class="text-gray-500">No folder opened. Click "Open Local Folder" to start.</span>
        </div>

        <!-- Files container -->
        <div class="flex-1 overflow-y-auto p-6" id="file-container">
            <div id="folder-grid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-4"></div>
        </div>
    </main>

    <!-- Modal for rename / new item -->
    <div id="modal" class="fixed inset-0 bg-black bg-opacity-40 hidden items-center justify-center z-50">
        <div class="bg-white rounded-xl w-96 p-5">
            <h3 class="text-lg font-medium mb-3" id="modal-title">Rename</h3>
            <input type="text" id="modal-input" class="w-full border rounded-lg px-3 py-2 mb-4">
            <div class="flex justify-end gap-2">
                <button onclick="closeModal()" class="px-4 py-2 text-gray-600">Cancel</button>
                <button onclick="confirmModal()" class="px-4 py-2 bg-blue-600 text-white rounded-lg">Confirm</button>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div id="toast" class="fixed bottom-6 left-1/2 transform -translate-x-1/2 bg-gray-800 text-white px-6 py-3 rounded-full text-sm transition-opacity opacity-0 pointer-events-none z-50"></div>

    <script>
        // ==================== LOCAL FILE SYSTEM MANAGEMENT ====================
        let currentDirectoryHandle = null;      // The directory handle we are viewing
        let currentFiles = [];                  // Array of {name, handle, isDirectory, size?}
        let pendingAction = null;               // { type: 'rename', item, isDir } or { type: 'newFile', parentHandle }
        let modalInput = document.getElementById('modal-input');
        
        // Helper: show toast
        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.innerText = msg;
            toast.classList.remove('opacity-0');
            toast.classList.add('opacity-100');
            setTimeout(() => {
                toast.classList.remove('opacity-100');
                toast.classList.add('opacity-0');
            }, 2500);
        }

        // Open a local folder (user picks)
        async function openLocalFolder() {
            try {
                const dirHandle = await window.showDirectoryPicker();
                currentDirectoryHandle = dirHandle;
                await loadDirectory(dirHandle);
                switchTab('home'); // ensure UI state
                showToast(`Opened: ${dirHandle.name}`);
            } catch (err) {
                if (err.name !== 'AbortError') showToast('Error opening folder: ' + err.message);
            }
        }

        // Load directory contents
        async function loadDirectory(dirHandle) {
            const items = [];
            try {
                for await (const [name, handle] of dirHandle.entries()) {
                    const isDir = handle.kind === 'directory';
                    let size = null;
                    if (!isDir) {
                        try {
                            const file = await handle.getFile();
                            size = formatFileSize(file.size);
                        } catch(e) { size = '? KB'; }
                    }
                    items.push({ name, handle, isDirectory: isDir, size: size || (isDir ? '' : 'Unknown') });
                }
                // Sort: directories first, then files
                items.sort((a,b) => {
                    if (a.isDirectory === b.isDirectory) return a.name.localeCompare(b.name);
                    return a.isDirectory ? -1 : 1;
                });
                currentFiles = items;
                renderCurrentFolder();
                updateBreadcrumb();
            } catch (err) {
                showToast('Failed to read directory: ' + err.message);
            }
        }

        function formatFileSize(bytes) {
            if (!bytes) return '0 KB';
            if (bytes < 1024) return bytes + ' B';
            if (bytes < 1048576) return (bytes / 1024).toFixed(1) + ' KB';
            return (bytes / 1048576).toFixed(1) + ' MB';
        }

        // Render files/folders as grid
        function renderCurrentFolder() {
            const container = document.getElementById('folder-grid');
            if (!currentDirectoryHandle) {
                container.innerHTML = `<div class="col-span-full text-center text-gray-500 py-10">No folder opened. Click "Open Local Folder" to start managing your files.</div>`;
                return;
            }
            if (currentFiles.length === 0) {
                container.innerHTML = `<div class="col-span-full text-center text-gray-500 py-10">This folder is empty.</div>`;
                return;
            }
            container.innerHTML = currentFiles.map(item => `
                <div class="file-item relative bg-[#f0f4f9] hover:bg-[#e4e9f0] rounded-xl p-4 cursor-pointer transition group" 
                     ondblclick="${item.isDirectory ? `navigateToFolder('${escapeJs(item.name)}')` : `downloadFile('${escapeJs(item.name)}')`}">
                    <div class="flex justify-between items-start">
                        <i class="ph-fill ${item.isDirectory ? 'ph-folder text-amber-500' : getFileIcon(item.name)} text-4xl"></i>
                        <div class="file-actions opacity-0 group-hover:opacity-100 flex gap-1">
                            <button onclick="event.stopPropagation(); renameItem('${escapeJs(item.name)}', ${item.isDirectory})" class="p-1 rounded hover:bg-gray-300"><i class="ph ph-pencil-simple"></i></button>
                            <button onclick="event.stopPropagation(); deleteItem('${escapeJs(item.name)}', ${item.isDirectory})" class="p-1 rounded hover:bg-gray-300"><i class="ph ph-trash"></i></button>
                        </div>
                    </div>
                    <div class="mt-2">
                        <div class="text-sm font-medium truncate" title="${escapeHtml(item.name)}">${escapeHtml(item.name)}</div>
                        ${!item.isDirectory ? `<div class="text-xs text-gray-500">${item.size || ''}</div>` : ''}
                    </div>
                </div>
            `).join('');
        }

        function getFileIcon(filename) {
            const ext = filename.split('.').pop().toLowerCase();
            if (['jpg','jpeg','png','gif','svg','webp'].includes(ext)) return 'ph-image text-blue-500';
            if (['pdf'].includes(ext)) return 'ph-file-pdf text-red-500';
            if (['doc','docx'].includes(ext)) return 'ph-file-doc text-blue-600';
            if (['xls','xlsx','csv'].includes(ext)) return 'ph-file-xls text-green-600';
            if (['html','css','js','json','xml'].includes(ext)) return 'ph-file-code text-orange-500';
            if (['txt','md'].includes(ext)) return 'ph-file-text text-gray-600';
            if (['zip','rar','7z'].includes(ext)) return 'ph-file-zip text-gray-500';
            return 'ph-file text-gray-500';
        }

        function escapeHtml(str) {
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }
        function escapeJs(str) {
            return str.replace(/'/g, "\\'").replace(/"/g, '&quot;');
        }

        // Navigate into a subfolder
        async function navigateToFolder(folderName) {
            if (!currentDirectoryHandle) return;
            const item = currentFiles.find(f => f.name === folderName && f.isDirectory);
            if (!item) return;
            const subDir = await currentDirectoryHandle.getDirectoryHandle(folderName);
            currentDirectoryHandle = subDir;
            await loadDirectory(subDir);
        }

        // Go up one level
        async function navigateUp() {
            if (!currentDirectoryHandle) return;
            const parent = await currentDirectoryHandle.getParent();
            if (parent) {
                currentDirectoryHandle = parent;
                await loadDirectory(parent);
            } else {
                showToast('Already at root of selected folder.');
            }
        }

        // Update breadcrumb with clickable path
        async function updateBreadcrumb() {
            const breadDiv = document.getElementById('breadcrumb-area');
            if (!currentDirectoryHandle) {
                breadDiv.innerHTML = `<span class="text-gray-500">No folder opened.</span>`;
                return;
            }
            // Build path hierarchy
            let handles = [];
            let current = currentDirectoryHandle;
            while (current) {
                handles.unshift(current);
                try { current = await current.getParent(); } catch(e) { break; }
            }
            let html = `<button onclick="navigateUp()" class="hover:underline text-blue-600"><i class="ph ph-arrow-u-up-left"></i> Up</button> <span class="mx-1">|</span> `;
            for (let i = 0; i < handles.length; i++) {
                const h = handles[i];
                const name = i === handles.length-1 ? h.name : `<span class="hover:underline cursor-pointer" onclick="navigateToBreadcrumb(${i})">${escapeHtml(h.name)}</span>`;
                html += name;
                if (i < handles.length-1) html += ` <i class="ph ph-caret-right text-xs"></i> `;
            }
            breadDiv.innerHTML = html;
        }
        window.navigateToBreadcrumb = async function(index) {
            // Reconstruct handle path
            let handles = [];
            let cur = currentDirectoryHandle;
            while (cur) {
                handles.unshift(cur);
                try { cur = await cur.getParent(); } catch(e) { break; }
            }
            if (index < handles.length) {
                currentDirectoryHandle = handles[index];
                await loadDirectory(currentDirectoryHandle);
            }
        }

        // Rename item
        function renameItem(name, isDir) {
            const item = currentFiles.find(f => f.name === name && f.isDirectory === isDir);
            if (!item) return;
            pendingAction = { type: 'rename', oldName: name, handle: item.handle, isDir };
            document.getElementById('modal-title').innerText = `Rename ${isDir ? 'Folder' : 'File'}`;
            modalInput.value = name;
            document.getElementById('modal').classList.remove('hidden');
            document.getElementById('modal').classList.add('flex');
        }

        async function confirmModal() {
            const newName = modalInput.value.trim();
            if (!newName) { closeModal(); return; }
            if (pendingAction.type === 'rename') {
                const { oldName, handle, isDir } = pendingAction;
                try {
                    if (isDir) {
                        await currentDirectoryHandle.getDirectoryHandle(oldName); // check existence
                        const newDir = await currentDirectoryHandle.move(oldName, newName);
                        // reload
                        await loadDirectory(currentDirectoryHandle);
                        showToast(`Renamed to ${newName}`);
                    } else {
                        const fileHandle = await currentDirectoryHandle.getFileHandle(oldName);
                        const newFile = await fileHandle.move(newName);
                        await loadDirectory(currentDirectoryHandle);
                        showToast(`Renamed to ${newName}`);
                    }
                } catch(e) { showToast('Rename failed: ' + e.message); }
            } else if (pendingAction.type === 'newFile') {
                // create new text file
                try {
                    const fileHandle = await currentDirectoryHandle.getFileHandle(newName, { create: true });
                    const writable = await fileHandle.createWritable();
                    await writable.write('');
                    await writable.close();
                    await loadDirectory(currentDirectoryHandle);
                    showToast(`Created file: ${newName}`);
                } catch(e) { showToast('Failed to create file: ' + e.message); }
            } else if (pendingAction.type === 'newFolder') {
                try {
                    await currentDirectoryHandle.getDirectoryHandle(newName, { create: true });
                    await loadDirectory(currentDirectoryHandle);
                    showToast(`Created folder: ${newName}`);
                } catch(e) { showToast('Failed to create folder: ' + e.message); }
            }
            closeModal();
        }

        function closeModal() {
            document.getElementById('modal').classList.add('hidden');
            document.getElementById('modal').classList.remove('flex');
            pendingAction = null;
        }

        // Delete item (move to trash via API? we'll just remove)
        async function deleteItem(name, isDir) {
            if (!confirm(`Delete ${name} permanently?`)) return;
            try {
                if (isDir) {
                    await currentDirectoryHandle.removeEntry(name, { recursive: true });
                } else {
                    await currentDirectoryHandle.removeEntry(name);
                }
                await loadDirectory(currentDirectoryHandle);
                showToast(`Deleted ${name}`);
            } catch(e) {
                showToast('Delete failed: ' + e.message);
            }
        }

        // Download a file (copy to browser's download folder)
        async function downloadFile(fileName) {
            const fileHandle = await currentDirectoryHandle.getFileHandle(fileName);
            const file = await fileHandle.getFile();
            const url = URL.createObjectURL(file);
            const a = document.createElement('a');
            a.href = url;
            a.download = fileName;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
            showToast(`Downloaded ${fileName}`);
        }

        // Create new text file
        function createNewFile() {
            if (!currentDirectoryHandle) { showToast('Open a folder first'); return; }
            pendingAction = { type: 'newFile' };
            document.getElementById('modal-title').innerText = 'New File Name';
            modalInput.value = 'untitled.txt';
            document.getElementById('modal').classList.remove('hidden');
            document.getElementById('modal').classList.add('flex');
        }

        function createNewFolder() {
            if (!currentDirectoryHandle) { showToast('Open a folder first'); return; }
            pendingAction = { type: 'newFolder' };
            document.getElementById('modal-title').innerText = 'New Folder Name';
            modalInput.value = 'New Folder';
            document.getElementById('modal').classList.remove('hidden');
            document.getElementById('modal').classList.add('flex');
        }

        // Tab handling (simple)
        function switchTab(tabId, event) {
            if(event) event.preventDefault();
            document.querySelectorAll('nav a').forEach(a => a.classList.remove('active-nav'));
            if(event) event.currentTarget.classList.add('active-nav');
            // only home tab is relevant; nothing else
        }

        function showInfo() {
            alert("Local File Manager\n\n- Click 'Open Local Folder' to select any folder on your computer.\n- Double-click folders to enter.\n- Use the 'Up' button or breadcrumb to navigate.\n- Right-click (or hover) to see rename/delete icons.\n- Create new text files or folders using the toolbar buttons.\n- Supported in modern Chrome, Edge, Opera.");
        }

        // Search filter (simple client-side)
        document.getElementById('search-input')?.addEventListener('input', function(e) {
            const term = e.target.value.toLowerCase();
            if (!currentDirectoryHandle) return;
            const filtered = currentFiles.filter(f => f.name.toLowerCase().includes(term));
            const container = document.getElementById('folder-grid');
            if (filtered.length === 0) {
                container.innerHTML = `<div class="col-span-full text-center text-gray-500">No matches</div>`;
                return;
            }
            container.innerHTML = filtered.map(item => `
                <div class="file-item relative bg-[#f0f4f9] hover:bg-[#e4e9f0] rounded-xl p-4 cursor-pointer transition group" 
                     ondblclick="${item.isDirectory ? `navigateToFolder('${escapeJs(item.name)}')` : `downloadFile('${escapeJs(item.name)}')`}">
                    <div class="flex justify-between items-start">
                        <i class="ph-fill ${item.isDirectory ? 'ph-folder text-amber-500' : getFileIcon(item.name)} text-4xl"></i>
                        <div class="file-actions opacity-0 group-hover:opacity-100 flex gap-1">
                            <button onclick="event.stopPropagation(); renameItem('${escapeJs(item.name)}', ${item.isDirectory})" class="p-1 rounded hover:bg-gray-300"><i class="ph ph-pencil-simple"></i></button>
                            <button onclick="event.stopPropagation(); deleteItem('${escapeJs(item.name)}', ${item.isDirectory})" class="p-1 rounded hover:bg-gray-300"><i class="ph ph-trash"></i></button>
                        </div>
                    </div>
                    <div class="mt-2">
                        <div class="text-sm font-medium truncate">${escapeHtml(item.name)}</div>
                        ${!item.isDirectory ? `<div class="text-xs text-gray-500">${item.size || ''}</div>` : ''}
                    </div>
                </div>
            `).join('');
        });
    </script>
</body>
</html>
