<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>File Explorer Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');

        :root {
            --accent: #2563eb;
            --sidebar-bg: #f8faff;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--sidebar-bg);
            overscroll-behavior: none;
        }

        /* --- Premium Sidebar Animation --- */
        .nav-item {
            position: relative;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 1;
        }

        .nav-item::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            height: 100%;
            width: 0%;
            background: #e0eaff;
            border-radius: 99px;
            z-index: -1;
            transition: width 0.3s ease;
        }

        .nav-item.active-nav::before {
            width: 100%;
            background: #dbeafe;
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.08);
        }

        .nav-item.active-nav {
            color: var(--accent);
            transform: translateX(4px);
        }

        /* --- Premium Button Effects --- */
        .btn-premium {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }

        .btn-premium:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px -6px rgba(0,0,0,0.15);
        }

        .btn-premium:active {
            transform: translateY(0) scale(0.96);
        }

        /* --- Content View Transitions --- */
        #items-grid {
            transition: opacity 0.3s ease, transform 0.3s ease;
        }

        .view-transitioning {
            opacity: 0;
            transform: translateX(10px);
        }

        /* --- File Cards --- */
        .file-item {
            transition: all 0.3s cubic-bezier(0.23, 1, 0.32, 1);
            border: 1px solid transparent;
        }

        .file-item:hover {
            background: white;
            border-color: #e2e8f0;
            transform: scale(1.02);
            box-shadow: 0 12px 24px -10px rgba(0,0,0,0.08);
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #cbd5e1; }

        /* Skeleton Shimmer */
        .shimmer {
            background: linear-gradient(90deg, #f0f2f5 25%, #f8fafc 50%, #f0f2f5 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite linear;
        }
        @keyframes shimmer { to { background-position: -200% 0; } }
    </style>
</head>
<body class="h-screen flex overflow-hidden select-none">

    <!-- Sidebar -->
    <aside class="w-72 flex flex-col p-6 bg-[#f8faff] border-r border-gray-100">
        <div class="flex items-center gap-3 mb-10 px-2">
            <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center shadow-lg shadow-blue-200">
                <i class="ph-fill ph-cloud-arrow-up text-white text-2xl"></i>
            </div>
            <span class="text-xl font-bold text-gray-800 tracking-tight">ProDrive</span>
        </div>

        <button onclick="createNewFile()" class="btn-premium flex items-center justify-center gap-3 bg-white border border-gray-200 rounded-2xl py-4 mb-8 text-sm font-semibold text-gray-700 shadow-sm">
            <i class="ph-bold ph-plus text-blue-600"></i> New Asset
        </button>

        <nav class="flex flex-col gap-2 flex-1">
            <a href="#" data-tab="my-files" onclick="switchTab('my-files', event)" class="nav-item active-nav flex items-center gap-4 px-5 py-3 rounded-full text-sm font-medium">
                <i class="ph-fill ph-house-line text-xl"></i> Home
            </a>
            <a href="#" data-tab="computers" onclick="switchTab('computers', event)" class="nav-item flex items-center gap-4 px-5 py-3 rounded-full text-sm font-medium text-gray-500">
                <i class="ph ph-hard-drives text-xl"></i> Local Storage
            </a>
            <a href="#" data-tab="recent" onclick="switchTab('recent', event)" class="nav-item flex items-center gap-4 px-5 py-3 rounded-full text-sm font-medium text-gray-500">
                <i class="ph ph-clock-counter-clockwise text-xl"></i> Recent
            </a>
            <a href="#" data-tab="starred" onclick="switchTab('starred', event)" class="nav-item flex items-center gap-4 px-5 py-3 rounded-full text-sm font-medium text-gray-500">
                <i class="ph ph-star text-xl"></i> Favorites
            </a>
        </nav>

        <div class="mt-auto p-5 bg-white rounded-2xl border border-gray-100 shadow-sm">
            <div class="flex justify-between text-[11px] font-bold text-gray-400 mb-2 uppercase tracking-widest">
                <span>Storage</span>
                <span id="storage-percentage">0%</span>
            </div>
            <div class="h-1.5 w-full bg-gray-100 rounded-full overflow-hidden">
                <div id="storage-bar" class="h-full bg-blue-500 transition-all duration-1000" style="width: 0%"></div>
            </div>
            <p class="text-[10px] text-gray-400 mt-2">Offline Mode Enabled <i class="ph-fill ph-check-circle text-green-500 ml-1"></i></p>
        </div>
    </aside>

    <!-- Main View -->
    <main class="flex-1 flex flex-col bg-white relative">
        <header class="h-20 flex items-center justify-between px-10 border-b border-gray-50">
            <div class="flex-1 max-w-xl relative">
                <i class="ph ph-magnifying-glass absolute left-4 top-1/2 -translate-y-1/2 text-gray-400"></i>
                <input type="text" id="search-input" placeholder="Search files, folders..." class="w-full pl-12 pr-4 py-3 bg-gray-50 border-none rounded-2xl focus:ring-2 focus:ring-blue-100 focus:bg-white transition-all outline-none text-sm">
            </div>
            <div class="flex items-center gap-6 ml-6">
                <button onclick="openSettings()" class="text-gray-400 hover:text-blue-600 transition-colors"><i class="ph ph-sliders text-2xl"></i></button>
                <div class="w-10 h-10 rounded-full bg-blue-100 border-2 border-white shadow-sm overflow-hidden">
                    <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Felix" alt="User">
                </div>
            </div>
        </header>

        <div class="px-10 py-4 flex items-center justify-between bg-white/50 backdrop-blur-sm z-10 sticky top-0">
            <div id="breadcrumb-container" class="flex items-center gap-2 text-xs font-semibold text-gray-400 uppercase tracking-widest">
                <!-- Breadcrumbs -->
            </div>
            <div class="flex gap-2">
                <button onclick="createNewFolder()" class="btn-premium p-2 bg-gray-50 text-gray-600 rounded-xl hover:text-blue-600">
                    <i class="ph-bold ph-folder-plus text-xl"></i>
                </button>
            </div>
        </div>

        <div id="file-container" class="flex-1 overflow-y-auto px-10 pb-10">
            <div id="items-grid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-6">
                <!-- Dynamic Items -->
            </div>
        </div>
    </main>

    <!-- Modal Background -->
    <div id="modal-overlay" class="fixed inset-0 bg-black/20 backdrop-blur-sm z-50 hidden transition-opacity duration-300 opacity-0 flex items-center justify-center">
        <div id="modal-content" class="bg-white rounded-3xl shadow-2xl w-full max-w-md p-8 transform transition-transform duration-300 scale-90">
            <!-- Modal Body injected by JS -->
        </div>
    </div>

    <!-- Toast -->
    <div id="toast" class="fixed bottom-8 left-1/2 -translate-x-1/2 px-6 py-3 bg-gray-900 text-white rounded-2xl text-sm font-medium shadow-2xl transform translate-y-20 opacity-0 transition-all duration-500 z-[100] flex items-center gap-3"></div>

    <script>
        /**
         * SERVICE WORKER FOR OFFLINE SUPPORT
         */
        if ('serviceWorker' in navigator) {
            const swCode = `
                const CACHE_NAME = 'prodrive-v1';
                const ASSETS = [
                    '/',
                    'https://cdn.tailwindcss.com',
                    'https://unpkg.com/@phosphor-icons/web',
                    'https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap'
                ];

                self.addEventListener('install', (e) => {
                    e.waitUntil(caches.open(CACHE_NAME).then(cache => cache.addAll(ASSETS)));
                });

                self.addEventListener('fetch', (e) => {
                    e.respondWith(caches.match(e.request).then(res => res || fetch(e.request)));
                });
            `;
            const blob = new Blob([swCode], { type: 'application/javascript' });
            navigator.serviceWorker.register(URL.createObjectURL(blob));
        }

        // --- APP STATE ---
        let currentTab = 'my-files';
        let currentDirectoryHandle = null;
        let currentPath = [];
        let starredFiles = [];

        // --- UI UTILITIES ---
        function showToast(msg, icon = 'ph-info') {
            const toast = document.getElementById('toast');
            toast.innerHTML = `<i class="ph-bold ${icon} text-blue-400"></i> ${msg}`;
            toast.classList.remove('translate-y-20', 'opacity-0');
            setTimeout(() => toast.classList.add('translate-y-20', 'opacity-0'), 3000);
        }

        async function switchTab(tabId, e) {
            if(e) e.preventDefault();
            const grid = document.getElementById('items-grid');
            grid.classList.add('view-transitioning');
            
            setTimeout(async () => {
                currentTab = tabId;
                document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active-nav', 'text-gray-500'));
                const active = document.querySelector(`[data-tab="${tabId}"]`);
                active.classList.add('active-nav');
                
                // Clear search
                document.getElementById('search-input').value = '';

                if(tabId === 'my-files') await renderMyFiles();
                if(tabId === 'computers') await renderComputers();
                if(tabId === 'recent') await renderRecent();
                if(tabId === 'starred') await renderStarred();

                grid.classList.remove('view-transitioning');
            }, 200);
        }

        // --- MOCK STORAGE & DATA (Using local persistence if needed) ---
        async function renderMyFiles() {
            const grid = document.getElementById('items-grid');
            grid.innerHTML = `
                <div class="col-span-full py-20 flex flex-col items-center justify-center border-2 border-dashed border-gray-100 rounded-3xl">
                    <i class="ph ph-folder-dotted text-6xl text-gray-200 mb-4"></i>
                    <p class="text-gray-400 font-medium">Connect a directory to start</p>
                    <button onclick="switchTab('computers')" class="mt-4 px-6 py-2 bg-blue-600 text-white rounded-xl font-semibold text-sm hover:bg-blue-700 transition-colors">Browse System</button>
                </div>
            `;
            updateBreadcrumbs(['Home']);
        }

        async function renderComputers() {
            const grid = document.getElementById('items-grid');
            grid.innerHTML = `
                <div class="col-span-full py-20 text-center">
                    <h2 class="text-2xl font-bold text-gray-800 mb-2">Native Access</h2>
                    <p class="text-gray-400 mb-8">Choose a local folder to manage with ProDrive</p>
                    <button onclick="pickFolder()" class="btn-premium px-10 py-4 bg-gray-900 text-white rounded-2xl font-bold flex items-center gap-3 mx-auto">
                        <i class="ph-bold ph-magnifying-glass"></i> Select Directory
                    </button>
                </div>
            `;
            updateBreadcrumbs(['System', 'Local Storage']);
        }

        async function pickFolder() {
            try {
                currentDirectoryHandle = await window.showDirectoryPicker();
                await renderCurrentDirectory();
            } catch(e) { showToast('Access denied', 'ph-warning'); }
        }

        async function renderCurrentDirectory() {
            const grid = document.getElementById('items-grid');
            grid.innerHTML = '';
            
            for await (const entry of currentDirectoryHandle.values()) {
                const card = createCard(entry);
                grid.appendChild(card);
            }
            updateBreadcrumbs(['Root', currentDirectoryHandle.name]);
        }

        function createCard(handle) {
            const isFolder = handle.kind === 'directory';
            const div = document.createElement('div');
            div.className = 'file-item p-5 bg-white rounded-3xl flex flex-col items-start gap-4 cursor-pointer group';
            div.innerHTML = `
                <div class="w-12 h-12 flex items-center justify-center rounded-2xl ${isFolder ? 'bg-yellow-50 text-yellow-500' : 'bg-blue-50 text-blue-500'}">
                    <i class="ph-fill ${isFolder ? 'ph-folder' : 'ph-file'} text-2xl"></i>
                </div>
                <div class="w-full">
                    <p class="text-sm font-bold text-gray-800 truncate">${handle.name}</p>
                    <p class="text-[10px] text-gray-400 uppercase font-bold tracking-tighter mt-1">${isFolder ? 'Directory' : 'Asset'}</p>
                </div>
            `;
            return div;
        }

        function updateBreadcrumbs(parts) {
            const container = document.getElementById('breadcrumb-container');
            container.innerHTML = parts.map((p, i) => `
                <span class="${i === parts.length-1 ? 'text-blue-600' : ''}">${p}</span>
                ${i < parts.length-1 ? '<i class="ph ph-caret-right text-[10px]"></i>' : ''}
            `).join('');
        }

        // --- INITIALIZATION ---
        window.onload = () => {
            switchTab('my-files');
            showToast('Ready for offline use', 'ph-check-circle');
        };

        // --- PLAIN MODAL HELPERS ---
        function openSettings() {
            const overlay = document.getElementById('modal-overlay');
            const content = document.getElementById('modal-content');
            content.innerHTML = `
                <h3 class="text-xl font-bold text-gray-800 mb-6">Preferences</h3>
                <div class="space-y-4">
                    <div class="flex items-center justify-between p-4 bg-gray-50 rounded-2xl">
                        <span class="text-sm font-semibold text-gray-600">Offline Cache</span>
                        <div class="w-10 h-5 bg-green-500 rounded-full relative"><div class="absolute right-1 top-1 w-3 h-3 bg-white rounded-full"></div></div>
                    </div>
                </div>
                <button onclick="closeModal()" class="w-full mt-8 py-4 bg-gray-100 text-gray-600 font-bold rounded-2xl hover:bg-gray-200 transition-colors">Close</button>
            `;
            overlay.classList.remove('hidden');
            setTimeout(() => {
                overlay.classList.remove('opacity-0');
                content.classList.remove('scale-90');
            }, 10);
        }

        function closeModal() {
            const overlay = document.getElementById('modal-overlay');
            overlay.classList.add('opacity-0');
            document.getElementById('modal-content').classList.add('scale-90');
            setTimeout(() => overlay.classList.add('hidden'), 300);
        }

        async function createNewFile() { showToast('Navigate to a folder first', 'ph-info'); }
        async function createNewFolder() { showToast('Navigate to a folder first', 'ph-info'); }

    </script>
</body>
</html>
