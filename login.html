<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Flow</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        /* Custom Animations */
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-15px); }
        }
        .anim-float-1 {
            animation: float 6s ease-in-out infinite;
        }
        .anim-float-2 {
            animation: float 5s ease-in-out infinite reverse;
        }
        .anim-bounce-slow {
            animation: bounce 4s ease-in-out infinite;
        }
        
        /* Modal & Main Content Transitions */
        .page-content-wrapper {
            transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.5s ease;
        }
        .page-content-hidden {
            opacity: 0;
            transform: scale(0.98);
            pointer-events: none;
        }

        .modal-backdrop {
            transition: opacity 0.4s ease;
        }
        .modal-content {
            transition: transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.4s ease;
        }
        .hidden-modal {
            pointer-events: none;
            opacity: 0;
        }
        .hidden-modal .modal-content {
            transform: scale(0.9) translateY(20px);
        }

        /* Glassmorphism for Login Card */
        .glass-card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }

        /* Toast Notification Styling */
        #toast {
            transition: transform 0.3s ease, opacity 0.3s ease;
            transform: translate(-50%, 100px);
            opacity: 0;
        }
        #toast.show {
            transform: translate(-50%, 0);
            opacity: 1;
        }
    </style>
</head>
<body class="bg-[#FAFAFA]">
    <!-- Custom Toast Notification -->
    <div id="toast" class="fixed bottom-8 left-1/2 z-[200] bg-gray-900 text-white px-6 py-3 rounded-2xl shadow-2xl flex items-center gap-3 text-sm font-medium pointer-events-none">
        <i data-lucide="info" class="w-4 h-4 text-yellow-400"></i>
        <span id="toast-message">Message here</span>
    </div>

    <!-- Wrapper for all main landing page content to hide/show animately -->
    <div id="pageWrapper" class="page-content-wrapper min-h-screen font-sans overflow-hidden relative selection:bg-yellow-200">
      
        <!-- Background Decorative Lines -->
        <svg class="absolute top-0 left-0 w-full h-full pointer-events-none opacity-40" viewBox="0 0 1440 800" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M-100 400C200 400 300 600 700 600C1100 600 1300 300 1600 300" stroke="#E2E8F0" stroke-width="1"></path>
            <path d="M-100 200C300 200 400 500 800 500C1200 500 1300 100 1600 100" stroke="#E2E8F0" stroke-width="1"></path>
        </svg>

        <!-- Navigation -->
        <nav class="relative z-20 flex items-center justify-between px-6 py-6 max-w-7xl mx-auto lg:px-12">
            <div class="flex items-center gap-1 cursor-pointer">
                <span class="text-xl font-extrabold tracking-tight text-gray-900">Master Flow</span>
                <span class="w-2 h-2 rounded-full bg-yellow-400 mt-1"></span>
            </div>

            <div class="hidden md:flex items-center gap-10 text-sm font-medium text-gray-500">
                <a href="#" class="hover:text-gray-900 transition-colors">Features</a>
                <a href="#" class="hover:text-gray-900 transition-colors">Pricing</a>
                <a href="#" class="hover:text-gray-900 transition-colors">Promotions</a>
            </div>

            <button onclick="openModal()" class="bg-[#412E27] text-white px-7 py-2.5 rounded-full text-sm font-medium hover:bg-[#2d1e19] transition-all shadow-lg shadow-[#412E27]/20">
                Sign Up
            </button>
        </nav>

        <!-- Hero Section -->
        <main class="relative z-10 max-w-7xl mx-auto px-6 lg:px-12 pt-12 lg:pt-24 flex flex-col lg:flex-row items-center justify-between">
            <div class="w-full lg:w-[55%] flex flex-col items-start mt-8 lg:mt-0 text-center lg:text-left">
                <h1 class="text-5xl sm:text-6xl lg:text-[5rem] leading-[1.1] font-extrabold text-[#111827] tracking-tight w-full">
                    Manage your<br>
                    <span class="relative inline-block">
                        Todos with
                        <svg class="absolute -bottom-2 left-0 w-full h-4 sm:h-6 -z-10 text-[#FFD447]" viewBox="0 0 300 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="none">
                            <path d="M2.00021 15.0001C35.0002 9.00014 135.5 -1.49986 298.5 10.0001C298.5 10.0001 292.5 19.5001 280.5 20.0001C194 23.5716 35.0002 24.0001 6.50021 21.0001C-1.87978 20.1177 -0.500305 15.5001 2.00021 15.0001Z"></path>
                        </svg>
                    </span>
                    <br>
                    ease.
                </h1>
                <p class="mt-8 text-gray-500 text-lg lg:text-xl max-w-md mx-auto lg:mx-0">
                    Learn about how to manage your daily tasks efficiently.
                </p>
                <div class="mt-10 lg:mt-14 w-full flex justify-center lg:justify-start">
                    <button onclick="openModal()" class="bg-[#EAB308] text-white px-8 py-3.5 rounded-full text-base font-medium shadow-[0_8px_25px_-5px_rgba(234,179,8,0.5)] hover:bg-[#CA9A04] hover:-translate-y-0.5 transition-all">
                        Try to free
                    </button>
                </div>
            </div>
            <div class="hidden lg:block w-full lg:w-[45%] relative mt-20 lg:mt-0 h-[600px]">
                <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[550px] h-[550px] bg-[#FFE8D6] rounded-full -z-20"></div>
                <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[400px] h-[500px] rounded-[2.5rem] overflow-hidden shadow-2xl z-10 border-4 border-white transform hover:scale-[1.02] transition-transform duration-500">
                    <img src="https://alstudy063.github.io/reminder3/Boy_on_cloud_202603271309.jpeg" alt="Boy on cloud" class="w-full h-full object-cover">
                </div>
            </div>
        </main>
    </div>

    <!-- Login Modal -->
    <div id="loginModal" class="fixed inset-0 z-[100] flex items-center justify-center hidden-modal modal-backdrop">
        <div class="absolute inset-0 bg-white/30 backdrop-blur-md" onclick="closeModal()"></div>
        
        <div class="absolute inset-0 pointer-events-none opacity-40">
            <img src="https://images.unsplash.com/photo-1513002749550-c59d786b8e6c?auto=format&fit=crop&q=80&w=2000" alt="Cloud Background" class="w-full h-full object-cover">
        </div>

        <div class="relative w-full max-w-[400px] px-6 modal-content">
            <div class="glass-card rounded-[2.5rem] p-6 shadow-2xl border border-white/50 text-center relative overflow-hidden">
                
                <button onclick="closeModal()" class="absolute top-4 right-4 p-2 rounded-full hover:bg-gray-100/50 transition-colors">
                    <i data-lucide="x" class="w-5 h-5 text-gray-400"></i>
                </button>

                <div class="w-12 h-12 bg-gray-50 rounded-2xl flex items-center justify-center mx-auto mb-4 shadow-sm border border-gray-100">
                    <i data-lucide="log-in" class="w-6 h-6 text-gray-700"></i>
                </div>

                <h2 class="text-xl font-bold text-gray-900 mb-1">Sign in with email</h2>
                <p class="text-gray-500 text-[11px] leading-snug mb-5 px-4">
                    Make a new doc to bring your words, data, and teams together. For free
                </p>

                <form id="emailLoginForm" class="space-y-2.5">
                    <div class="relative">
                        <span class="absolute left-4 top-1/2 -translate-y-1/2 text-gray-400">
                            <i data-lucide="mail" class="w-4 h-4"></i>
                        </span>
                        <input type="email" id="loginEmail" placeholder="Email" class="w-full bg-gray-100/50 border-transparent focus:border-gray-200 focus:bg-white focus:ring-0 rounded-xl py-2.5 pl-10 pr-4 text-[11px] transition-all outline-none" required>
                    </div>

                    <div class="relative">
                        <span class="absolute left-4 top-1/2 -translate-y-1/2 text-gray-400">
                            <i data-lucide="lock" class="w-4 h-4"></i>
                        </span>
                        <input type="password" id="loginPassword" placeholder="Password" class="w-full bg-gray-100/50 border-transparent focus:border-gray-200 focus:bg-white focus:ring-0 rounded-xl py-2.5 pl-10 pr-10 text-[11px] transition-all outline-none" required>
                    </div>

                    <div class="text-right px-1">
                        <a href="#" class="text-[10px] font-semibold text-gray-900 hover:underline">Forgot password?</a>
                    </div>

                    <button type="submit" id="btnEmailLogin" class="w-full bg-[#1A1A1A] text-white py-3 rounded-xl font-bold text-xs hover:bg-black transition-all shadow-lg shadow-black/10 flex items-center justify-center gap-2">
                        Get Started
                    </button>
                </form>

                <div class="flex items-center gap-3 my-4">
                    <div class="h-px flex-1 bg-gray-200/50"></div>
                    <span class="text-[8px] font-bold text-gray-400 uppercase tracking-widest">Or sign in with</span>
                    <div class="h-px flex-1 bg-gray-200/50"></div>
                </div>

                <div class="flex justify-center pb-1">
                    <!-- Google Login Button -->
                    <button id="btnGoogleLogin" type="button" class="w-10 h-10 rounded-xl border border-gray-100 flex items-center justify-center hover:bg-gray-50 transition-all bg-white shadow-sm">
                        <svg class="w-4 h-4" viewBox="0 0 24 24">
                            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                            <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                            <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
                            <path d="M12 5.38c1.62 0 3.06.56 4.21 1.66l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
                        </svg>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Firebase Implementation -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.4.1/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/11.4.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyA9DLfAHTUUGxCPn2j_k6godoTEopzaFAU",
            authDomain: "studymaster-919ba.firebaseapp.com",
            databaseURL: "https://studymaster-919ba-default-rtdb.firebaseio.com",
            projectId: "studymaster-919ba",
            storageBucket: "studymaster-919ba.firebasestorage.app",
            messagingSenderId: "426684063256",
            appId: "1:426684063256:web:52c17625a9450ea9662d6d",
            measurementId: "G-CWQB2330GF"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        // UI Helpers
        const showToast = (message) => {
            const toast = document.getElementById('toast');
            const toastMsg = document.getElementById('toast-message');
            toastMsg.innerText = message;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        };

        // Google Login Trigger
        const btnGoogle = document.getElementById('btnGoogleLogin');
        btnGoogle.addEventListener('click', async () => {
            try {
                // Triggering the popup
                const result = await signInWithPopup(auth, provider);
                const user = result.user;
                showToast(`Signed in as ${user.displayName}`);
                closeModal();
            } catch (error) {
                // Handling errors gracefully
                console.log("Firebase Auth Error:", error.code, error.message);
                
                if (error.code === 'auth/popup-closed-by-user') {
                    console.log("User closed the popup window before completing the sign-in.");
                } else if (error.code === 'auth/cancelled-popup-request') {
                    console.log("Popup request was cancelled.");
                } else {
                    showToast("Authentication failed. Please try again.");
                }
            }
        });

        // Email Login Trigger
        const emailForm = document.getElementById('emailLoginForm');
        emailForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            
            try {
                await signInWithEmailAndPassword(auth, email, password);
                showToast("Login successful!");
                closeModal();
            } catch (error) {
                console.error(error);
                showToast("Invalid email or password.");
            }
        });
    </script>

    <!-- UI Logic -->
    <script>
        lucide.createIcons();
        const modal = document.getElementById('loginModal');
        const pageWrapper = document.getElementById('pageWrapper');
        
        function openModal() {
            pageWrapper.classList.add('page-content-hidden');
            setTimeout(() => modal.classList.remove('hidden-modal'), 50);
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            modal.classList.add('hidden-modal');
            setTimeout(() => pageWrapper.classList.remove('page-content-hidden'), 200);
            document.body.style.overflow = 'auto';
        }

        window.openModal = openModal;
        window.closeModal = closeModal;
        document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeModal(); });
    </script>
</body>
</html>
