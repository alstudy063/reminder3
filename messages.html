<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anonymous Private Chat</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+Sinhala:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        body {
            font-family: 'Inter', 'Noto Sans Sinhala', sans-serif;
        }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 h-screen w-full overflow-hidden flex">

    <!-- Left Sidebar -->
    <div class="w-[350px] bg-gray-100 flex flex-col border-r border-gray-200 shrink-0">
        <div class="p-6 bg-white border-b">
            <div class="flex items-center gap-4 mb-4">
                <img id="my-avatar" src="https://i.pravatar.cc/150?u=temp" class="w-14 h-14 rounded-full shadow-md border-2 border-blue-500" />
                <div class="overflow-hidden">
                    <h2 id="my-name" class="text-blue-600 font-bold truncate">Loading...</h2>
                    <p class="text-[10px] text-gray-400 font-mono" id="my-id-display">ID: ...</p>
                </div>
            </div>
            <button id="copy-id-btn" class="w-full bg-blue-50 text-blue-600 text-xs py-2 rounded-lg font-semibold hover:bg-blue-100 transition-all flex items-center justify-center gap-2">
                <i data-lucide="copy" class="w-3 h-3"></i> Copy My ID for Friends
            </button>
        </div>

        <div class="p-4">
            <p class="text-xs font-bold text-gray-500 mb-3 uppercase tracking-wider">Start Private Chat</p>
            <div class="bg-white rounded-xl p-3 shadow-sm border border-gray-200">
                <input type="text" id="target-user-id" placeholder="Paste Friend's ID here..." class="w-full text-sm outline-none border-b border-gray-100 pb-2 mb-2" />
                <p class="text-[9px] text-gray-400 italic">* Paste the ID of the person you want to message.</p>
            </div>
        </div>

        <div class="flex-1 overflow-y-auto p-4 pt-0">
            <div class="bg-blue-500 rounded-2xl p-4 text-white shadow-lg shadow-blue-200">
                <h3 class="font-bold text-sm mb-1">Private Mode On</h3>
                <p class="text-[11px] opacity-90">Messages are only visible to you and the receiver. No login required.</p>
            </div>
        </div>
    </div>

    <!-- Main Chat Area -->
    <div class="flex-1 bg-white flex flex-col relative">
        <!-- Chat Header -->
        <div class="h-20 border-b flex items-center justify-between px-6 bg-white shrink-0">
            <div class="flex items-center gap-4">
                <div id="chat-status-dot" class="w-3 h-3 bg-gray-300 rounded-full"></div>
                <div>
                    <h2 id="chat-with-label" class="text-lg font-semibold text-gray-700">Select or Enter an ID to Chat</h2>
                    <p id="chat-with-id" class="text-[10px] text-gray-400 font-mono"></p>
                </div>
            </div>
        </div>

        <!-- Messages Display -->
        <div id="messages-container" class="flex-1 overflow-y-auto p-6 flex flex-col space-y-4">
            <div class="flex flex-col items-center justify-center h-full text-gray-400 opacity-50">
                <i data-lucide="message-circle" class="w-12 h-12 mb-2"></i>
                <p class="text-sm">Enter a Friend's ID on the left to start talking.</p>
            </div>
        </div>

        <!-- Message Input Area -->
        <div class="p-4 bg-gray-50 border-t flex items-center shrink-0">
            <form id="chat-form" class="w-full bg-white rounded-2xl px-4 py-3 flex items-center shadow-md border border-gray-200">
                <input 
                    type="text" 
                    id="message-input"
                    placeholder="Type your message..." 
                    class="flex-1 outline-none text-sm bg-transparent"
                    autocomplete="off"
                />
                <button 
                    type="submit" 
                    id="send-btn"
                    class="bg-blue-600 text-white w-10 h-10 flex items-center justify-center rounded-xl hover:bg-blue-700 transition-all shadow-lg disabled:opacity-50"
                >
                    <i data-lucide="send" class="w-5 h-5"></i>
                </button>
            </form>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, where } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Firebase Config parsing
        const firebaseConfig = JSON.parse(__firebase_config);
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'anonymous-private-chat';

        let currentUser = null;
        let unsubscribeMessages = null;
        const myNameStr = `User_${Math.floor(Math.random() * 9000 + 1000)}`;
        const myAvatarStr = `https://i.pravatar.cc/150?u=${Math.random()}`;

        const myNameEl = document.getElementById('my-name');
        const myAvatarEl = document.getElementById('my-avatar');
        const myIdDisplay = document.getElementById('my-id-display');
        const targetUserInput = document.getElementById('target-user-id');
        const messagesContainer = document.getElementById('messages-container');
        const chatForm = document.getElementById('chat-form');
        const messageInput = document.getElementById('message-input');
        const chatWithLabel = document.getElementById('chat-with-label');
        const chatWithIdDisplay = document.getElementById('chat-with-id');
        const chatStatusDot = document.getElementById('chat-status-dot');

        // Authentication logic with proper order
        const initAuth = async () => {
            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
            } catch (error) {
                console.error("Auth Error:", error);
            }
        };

        onAuthStateChanged(auth, (user) => {
            if (user) {
                currentUser = user;
                myNameEl.textContent = myNameStr;
                myAvatarEl.src = myAvatarStr;
                myIdDisplay.textContent = `ID: ${user.uid}`;
                // Only start listening AFTER we have a user
                startListeningForMessages();
            } else {
                initAuth();
            }
        });

        // Copy ID logic
        document.getElementById('copy-id-btn').onclick = () => {
            if (currentUser) {
                const el = document.createElement('textarea');
                el.value = currentUser.uid;
                document.body.appendChild(el);
                el.select();
                document.execCommand('copy');
                document.body.removeChild(el);
                alert("Your ID copied! Send this to your friend.");
            }
        };

        function startListeningForMessages() {
            if (!currentUser) return;
            
            // Clean up old listener if exists
            if (unsubscribeMessages) unsubscribeMessages();

            const messagesRef = collection(db, 'artifacts', appId, 'public', 'data', 'private_messages');
            
            unsubscribeMessages = onSnapshot(messagesRef, (snapshot) => {
                const targetId = targetUserInput.value.trim();
                const allMessages = snapshot.docs.map(doc => doc.data());
                
                // Filter locally to avoid index errors and permissions issues with complex queries
                const filtered = allMessages.filter(m => {
                    return (m.senderId === currentUser.uid && m.receiverId === targetId) ||
                           (m.senderId === targetId && m.receiverId === currentUser.uid);
                }).sort((a, b) => a.createdAt - b.createdAt);

                renderMessages(filtered);
            }, (error) => {
                // Silently handle or log non-critical permission errors during init
                if (error.code !== 'permission-denied') {
                    console.error("Snapshot error:", error);
                }
            });
        }

        function renderMessages(messages) {
            const targetId = targetUserInput.value.trim();
            if (targetId === "") {
                messagesContainer.innerHTML = `
                    <div class="flex flex-col items-center justify-center h-full text-gray-400 opacity-50">
                        <i data-lucide="message-circle" class="w-12 h-12 mb-2"></i>
                        <p class="text-sm">Enter a Friend's ID on the left to start talking.</p>
                    </div>`;
                lucide.createIcons();
                return;
            }
            
            messagesContainer.innerHTML = '';
            messages.forEach(msg => {
                const isMe = msg.senderId === currentUser.uid;
                const div = document.createElement('div');
                div.className = `flex ${isMe ? 'justify-end' : 'justify-start'}`;
                div.innerHTML = `
                    <div class="max-w-[80%] p-3 rounded-2xl shadow-sm ${isMe ? 'bg-blue-600 text-white rounded-br-none' : 'bg-gray-200 text-gray-800 rounded-bl-none'}">
                        <p class="text-sm">${msg.text}</p>
                        <p class="text-[8px] opacity-50 mt-1 text-right">${new Date(msg.createdAt).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}</p>
                    </div>
                `;
                messagesContainer.appendChild(div);
            });
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }

        // Handle target ID input
        targetUserInput.addEventListener('input', () => {
            const val = targetUserInput.value.trim();
            if (val.length > 5) {
                chatWithLabel.textContent = "Chatting with Friend";
                chatWithIdDisplay.textContent = `ID: ${val}`;
                chatStatusDot.classList.remove('bg-gray-300');
                chatStatusDot.classList.add('bg-green-500');
            } else {
                chatWithLabel.textContent = "Enter an ID to Chat";
                chatWithIdDisplay.textContent = "";
                chatStatusDot.classList.remove('bg-green-500');
                chatStatusDot.classList.add('bg-gray-300');
            }
            // Re-filter messages for the new target
            startListeningForMessages();
        });

        // Send Message
        chatForm.onsubmit = async (e) => {
            e.preventDefault();
            const text = messageInput.value.trim();
            const receiverId = targetUserInput.value.trim();

            if (!text || !receiverId || !currentUser) return;

            try {
                // Ensure auth before write
                await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'private_messages'), {
                    text: text,
                    senderId: currentUser.uid,
                    receiverId: receiverId,
                    createdAt: Date.now()
                });
                messageInput.value = '';
            } catch (err) {
                console.error("Send error:", err);
            }
        };

        lucide.createIcons();
    </script>
</body>
</html>
