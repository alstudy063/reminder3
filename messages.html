<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anonymous Private Chat</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+Sinhala:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        body {
            font-family: 'Inter', 'Noto Sans Sinhala', sans-serif;
        }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 h-screen w-full overflow-hidden flex">

    <!-- Left Sidebar -->
    <div class="w-[350px] bg-gray-100 flex flex-col border-r border-gray-200 shrink-0">
        <div class="p-6 bg-white border-b">
            <div class="flex items-center gap-4 mb-4">
                <img id="my-avatar" src="https://i.pravatar.cc/150?u=temp" class="w-14 h-14 rounded-full shadow-md border-2 border-blue-500" />
                <div class="overflow-hidden">
                    <h2 id="my-name" class="text-blue-600 font-bold truncate">Loading...</h2>
                    <p class="text-[10px] text-gray-400 font-mono" id="my-id-display">ID: ...</p>
                </div>
            </div>
            <button id="copy-id-btn" class="w-full bg-blue-50 text-blue-600 text-xs py-2 rounded-lg font-semibold hover:bg-blue-100 transition-all flex items-center justify-center gap-2">
                <i data-lucide="copy" class="w-3 h-3"></i> Copy My ID for Friends
            </button>
        </div>

        <div class="p-4">
            <p class="text-xs font-bold text-gray-500 mb-3 uppercase tracking-wider">Start Private Chat</p>
            <div class="bg-white rounded-xl p-3 shadow-sm border border-gray-200">
                <input type="text" id="target-user-id" placeholder="Paste Friend's ID here..." class="w-full text-sm outline-none border-b border-gray-100 pb-2 mb-2" />
                <p class="text-[9px] text-gray-400 italic">* Note: With current rules, only you can see your data.</p>
            </div>
        </div>

        <div class="flex-1 overflow-y-auto p-4 pt-0">
            <div class="bg-blue-500 rounded-2xl p-4 text-white shadow-lg shadow-blue-200">
                <h3 class="font-bold text-sm mb-1">Secure Mode Active</h3>
                <p class="text-[11px] opacity-90">Data is stored under your private UID path as per Firestore rules.</p>
            </div>
        </div>
    </div>

    <!-- Main Chat Area -->
    <div class="flex-1 bg-white flex flex-col relative">
        <div class="h-20 border-b flex items-center justify-between px-6 bg-white shrink-0">
            <div class="flex items-center gap-4">
                <div id="chat-status-dot" class="w-3 h-3 bg-blue-500 rounded-full"></div>
                <div>
                    <h2 id="chat-with-label" class="text-lg font-semibold text-gray-700">My Private Notes / Chat</h2>
                    <p id="chat-with-id" class="text-[10px] text-gray-400 font-mono"></p>
                </div>
            </div>
        </div>

        <div id="messages-container" class="flex-1 overflow-y-auto p-6 flex flex-col space-y-4">
            <!-- Messages will load here -->
        </div>

        <div class="p-4 bg-gray-50 border-t flex items-center shrink-0">
            <form id="chat-form" class="w-full bg-white rounded-2xl px-4 py-3 flex items-center shadow-md border border-gray-200">
                <input 
                    type="text" 
                    id="message-input"
                    placeholder="Type your message..." 
                    class="flex-1 outline-none text-sm bg-transparent"
                    autocomplete="off"
                />
                <button 
                    type="submit" 
                    id="send-btn"
                    class="bg-blue-600 text-white w-10 h-10 flex items-center justify-center rounded-xl hover:bg-blue-700 transition-all shadow-lg disabled:opacity-50"
                >
                    <i data-lucide="send" class="w-5 h-5"></i>
                </button>
            </form>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, doc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = JSON.parse(__firebase_config);
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        
        // Rule එකට අනුකූල වීම සඳහා App ID එක 'studyflow-pro' ලෙස ස්ථිරව සකසන ලදී.
        const appId = 'studyflow-pro';

        let currentUser = null;
        let unsubscribeMessages = null;

        let myProfile = JSON.parse(localStorage.getItem('chat_profile'));
        if (!myProfile) {
            myProfile = {
                name: `User_${Math.floor(Math.random() * 9000 + 1000)}`,
                avatar: `https://i.pravatar.cc/150?u=${Math.random()}`
            };
            localStorage.setItem('chat_profile', JSON.stringify(myProfile));
        }

        const myNameEl = document.getElementById('my-name');
        const myAvatarEl = document.getElementById('my-avatar');
        const myIdDisplay = document.getElementById('my-id-display');
        const messagesContainer = document.getElementById('messages-container');
        const chatForm = document.getElementById('chat-form');
        const messageInput = document.getElementById('message-input');

        myNameEl.textContent = myProfile.name;
        myAvatarEl.src = myProfile.avatar;

        const initAuth = async () => {
            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
            } catch (error) {
                console.error("Auth Error:", error);
            }
        };

        onAuthStateChanged(auth, (user) => {
            if (user) {
                currentUser = user;
                myIdDisplay.textContent = `ID: ${user.uid}`;
                startListeningForMessages();
            } else {
                initAuth();
            }
        });

        document.getElementById('copy-id-btn').onclick = () => {
            if (currentUser) {
                const text = currentUser.uid;
                const textArea = document.createElement("textarea");
                textArea.value = text;
                document.body.appendChild(textArea);
                textArea.select();
                document.execCommand('copy');
                document.body.removeChild(textArea);
                alert("Your Private ID copied!");
            }
        };

        function startListeningForMessages() {
            if (!currentUser) return;
            if (unsubscribeMessages) unsubscribeMessages();

            // Rule එකට අනුව නිවැරදි Path එක: /artifacts/studyflow-pro/users/{userId}/messages
            const messagesRef = collection(db, 'artifacts', appId, 'users', currentUser.uid, 'messages');
            
            unsubscribeMessages = onSnapshot(messagesRef, (snapshot) => {
                const allMessages = snapshot.docs.map(doc => doc.data());
                const sorted = allMessages.sort((a, b) => a.createdAt - b.createdAt);
                renderMessages(sorted);
            }, (error) => {
                console.error("Permission/Snapshot Error:", error);
            });
        }

        function renderMessages(messages) {
            messagesContainer.innerHTML = '';
            if (messages.length === 0) {
                messagesContainer.innerHTML = `
                    <div class="flex flex-col items-center justify-center h-full text-gray-400 opacity-50">
                        <i data-lucide="shield-check" class="w-12 h-12 mb-2 text-blue-500"></i>
                        <p class="text-sm">Your private storage is ready.</p>
                    </div>`;
                lucide.createIcons();
            }

            messages.forEach(msg => {
                const div = document.createElement('div');
                div.className = `flex justify-end`;
                div.innerHTML = `
                    <div class="max-w-[80%] p-3 rounded-2xl shadow-sm bg-blue-600 text-white rounded-br-none">
                        <p class="text-sm">${msg.text}</p>
                        <p class="text-[8px] opacity-50 mt-1 text-right">${new Date(msg.createdAt).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}</p>
                    </div>
                `;
                messagesContainer.appendChild(div);
            });
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }

        chatForm.onsubmit = async (e) => {
            e.preventDefault();
            const text = messageInput.value.trim();

            if (!text || !currentUser) return;

            try {
                // Rule එකට අනුව ලිවීමට අවසර ඇත්තේ තම UID එක යටතේ ඇති path එකට පමණි
                const messagesRef = collection(db, 'artifacts', appId, 'users', currentUser.uid, 'messages');
                await addDoc(messagesRef, {
                    text: text,
                    senderId: currentUser.uid,
                    createdAt: Date.now()
                });
                messageInput.value = '';
            } catch (err) {
                console.error("Send error (Check Rules):", err);
            }
        };

        lucide.createIcons();
    </script>
</body>
</html>
