<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChatPro - Private Messenger</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Noto+Sans+Sinhala:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        body { font-family: 'Plus Jakarta Sans', 'Noto Sans Sinhala', sans-serif; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        .message-bubble {
            max-width: 75%;
            padding: 12px 16px;
            border-radius: 20px;
            font-size: 14px;
            line-height: 1.5;
            position: relative;
        }
        .my-message {
            background: #3b82f6;
            color: white;
            border-bottom-right-radius: 4px;
            align-self: flex-end;
        }
        .their-message {
            background: #f1f5f9;
            color: #1e293b;
            border-bottom-left-radius: 4px;
            align-self: flex-start;
        }
    </style>
</head>
<body class="bg-[#F8F9FD] h-screen flex overflow-hidden">

    <!-- Sidebar: පින්තූරයේ තිබූ වම්පස කොටස -->
    <div class="w-80 bg-white border-r border-gray-100 flex flex-col hidden md:flex">
        <div class="p-6">
            <div class="flex items-center justify-between mb-8">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 rounded-full bg-blue-100 flex items-center justify-center border border-blue-200">
                        <img id="my-avatar" src="https://api.dicebear.com/7.x/avataaars/svg?seed=Felix" class="w-full h-full rounded-full" />
                    </div>
                    <div class="overflow-hidden">
                        <h2 id="my-name" class="text-sm font-bold text-gray-900 truncate">මගේ ගිණුම</h2>
                        <p id="my-id-display" class="text-[9px] text-gray-400 font-mono truncate">ID: Loading...</p>
                    </div>
                </div>
                <button id="copy-id-btn" class="p-2 hover:bg-gray-50 rounded-lg text-gray-400" title="Copy ID">
                    <i data-lucide="copy" class="w-4 h-4"></i>
                </button>
            </div>

            <div class="relative mb-6">
                <i data-lucide="search" class="w-4 h-4 absolute left-3 top-3 text-gray-400"></i>
                <input 
                    type="text" 
                    id="target-user-id" 
                    placeholder="මිතුරාගේ ID එක මෙතැනට..." 
                    class="w-full bg-gray-50 border-none p-2.5 pl-10 rounded-xl text-xs outline-none ring-1 ring-gray-100 focus:ring-blue-500/20"
                />
            </div>

            <div class="space-y-2 overflow-y-auto no-scrollbar flex-1">
                <p class="text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-4">සම්බන්ධතා</p>
                <div id="contact-item" class="flex items-center gap-3 p-3 rounded-2xl transition-all cursor-pointer bg-gray-50 opacity-50">
                    <div class="w-10 h-10 rounded-full bg-gray-200 flex items-center justify-center">
                        <i data-lucide="user" class="w-5 h-5 text-gray-400"></i>
                    </div>
                    <div class="flex-1 overflow-hidden">
                        <h3 class="text-xs font-bold text-gray-800">No Active Chat</h3>
                        <p class="text-[10px] text-gray-400 truncate">ID එක ඇතුළත් කරන්න</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Main Chat Area: මැද පණිවිඩ පෙන්වන කොටස -->
    <div class="flex-1 flex flex-col bg-white">
        <!-- Header -->
        <header class="h-20 border-b border-gray-50 flex items-center justify-between px-8 bg-white/80 backdrop-blur-md">
            <div class="flex items-center gap-4">
                <div class="relative">
                    <div class="w-11 h-11 rounded-full bg-gray-100 border border-gray-100 overflow-hidden">
                        <img id="chat-avatar" src="https://api.dicebear.com/7.x/avataaars/svg?seed=Dianne" />
                    </div>
                    <div id="status-dot" class="w-3 h-3 bg-gray-300 rounded-full border-2 border-white absolute bottom-0 right-0 transition-colors"></div>
                </div>
                <div>
                    <h2 id="chat-title" class="font-bold text-gray-800">Private Session</h2>
                    <p id="chat-subtitle" class="text-[11px] text-gray-400">Waiting for valid Friend ID...</p>
                </div>
            </div>
            <div class="flex items-center gap-2">
                <button class="p-2.5 text-gray-400 hover:bg-gray-50 rounded-xl transition-all"><i data-lucide="phone" class="w-5 h-5"></i></button>
                <button class="p-2.5 text-gray-400 hover:bg-gray-50 rounded-xl transition-all"><i data-lucide="video" class="w-5 h-5"></i></button>
                <button class="p-2.5 text-gray-400 hover:bg-gray-50 rounded-xl transition-all"><i data-lucide="more-vertical" class="w-5 h-5"></i></button>
            </div>
        </header>

        <!-- Messages Container -->
        <div id="messages-container" class="flex-1 overflow-y-auto p-8 flex flex-col gap-4 no-scrollbar bg-[#FCFDFF]">
            <div class="flex flex-col items-center justify-center h-full text-gray-300">
                <div class="w-16 h-16 bg-gray-50 rounded-full flex items-center justify-center mb-4">
                    <i data-lucide="lock" class="w-8 h-8 opacity-20"></i>
                </div>
                <p class="text-sm font-medium">මෙම චැට් එක සම්පූර්ණයෙන් ආරක්ෂිතයි.</p>
                <p class="text-[11px] mt-1 text-gray-400">ID එකක් ලබාදී පණිවිඩ යැවීම අරඹන්න.</p>
            </div>
        </div>

        <!-- Input Area -->
        <div class="p-6 border-t border-gray-50 bg-white">
            <form id="chat-form" class="max-w-4xl mx-auto flex items-center gap-3 bg-gray-50 p-2 rounded-2xl border border-gray-100 transition-all focus-within:ring-2 focus-within:ring-blue-500/10">
                <button type="button" class="p-2 text-gray-400 hover:text-blue-500"><i data-lucide="paperclip" class="w-5 h-5"></i></button>
                <input 
                    id="message-input" 
                    type="text" 
                    placeholder="පණිවිඩය මෙතැන ලියන්න..." 
                    class="flex-1 bg-transparent border-none outline-none text-sm p-2"
                    autocomplete="off"
                    disabled
                />
                <div class="flex items-center gap-1">
                    <button type="button" class="p-2 text-gray-400 hover:text-blue-500 hidden sm:block"><i data-lucide="smile" class="w-5 h-5"></i></button>
                    <button 
                        type="submit" 
                        id="send-btn" 
                        disabled 
                        class="w-10 h-10 bg-blue-600 text-white rounded-xl flex items-center justify-center shadow-lg shadow-blue-200 disabled:opacity-30 disabled:shadow-none transition-all active:scale-95"
                    >
                        <i data-lucide="send" class="w-5 h-5"></i>
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Firebase Configuration (Using studymaster)
        const firebaseConfig = {
            apiKey: "AIzaSyA9DLfAHTUUGxCPn2j_k6godoTEopzaFAU",
            authDomain: "studymaster-919ba.firebaseapp.com",
            projectId: "studymaster-919ba",
            storageBucket: "studymaster-919ba.firebasestorage.app",
            messagingSenderId: "426684063256",
            appId: "1:426684063256:web:52c17625a9450ea9662d6d"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = 'studyflow-pro';

        let currentUser = null;
        let unsubscribe = null;

        // UI Elements
        const targetInput = document.getElementById('target-user-id');
        const msgContainer = document.getElementById('messages-container');
        const msgInput = document.getElementById('message-input');
        const sendBtn = document.getElementById('send-btn');
        const chatForm = document.getElementById('chat-form');
        const statusDot = document.getElementById('status-dot');
        const chatSubtitle = document.getElementById('chat-subtitle');
        const contactItem = document.getElementById('contact-item');

        // 1. Auth Setup
        onAuthStateChanged(auth, (user) => {
            if (user) {
                currentUser = user;
                document.getElementById('my-id-display').textContent = `ID: ${user.uid}`;
                document.getElementById('my-avatar').src = `https://api.dicebear.com/7.x/avataaars/svg?seed=${user.uid}`;
                initChatListener();
            } else {
                signInAnonymously(auth);
            }
        });

        // 2. Chat Logic (Rule වලට අනුකූලව)
        function initChatListener() {
            const targetId = targetInput.value.trim();
            
            if (unsubscribe) unsubscribe();

            // ID එකේ දිග පරීක්ෂාව
            if (targetId.length < 10) {
                msgInput.disabled = true;
                sendBtn.disabled = true;
                statusDot.className = "w-3 h-3 bg-gray-300 rounded-full border-2 border-white absolute bottom-0 right-0";
                chatSubtitle.textContent = "Waiting for valid Friend ID...";
                contactItem.classList.add('opacity-50');
                contactItem.classList.remove('bg-blue-50', 'border-blue-100');
                return;
            }

            // UI එක Update කිරීම
            msgInput.disabled = false;
            statusDot.className = "w-3 h-3 bg-green-500 rounded-full border-2 border-white absolute bottom-0 right-0 animate-pulse";
            chatSubtitle.textContent = `Connected: ${targetId.substring(0, 15)}...`;
            contactItem.classList.remove('opacity-50');
            contactItem.classList.add('bg-blue-50', 'border-blue-100');

            // Firestore Path: artifacts/studyflow-pro/public/data/private_messages
            const msgRef = collection(db, 'artifacts', appId, 'public', 'data', 'private_messages');
            
            unsubscribe = onSnapshot(msgRef, (snapshot) => {
                // Rule එකට අනුව: අපිට කියවිය හැක්කේ අප sender හෝ receiver වන දත්ත පමණි
                const msgs = snapshot.docs.map(doc => doc.data())
                    .filter(m => (m.senderId === currentUser.uid && m.receiverId === targetId) || 
                                 (m.senderId === targetId && m.receiverId === currentUser.uid))
                    .sort((a, b) => a.createdAt - b.createdAt);
                
                renderMessages(msgs);
            }, (error) => {
                console.error("Rule Denial:", error);
                msgContainer.innerHTML = `<p class="text-red-500 text-center text-xs">Permission Denied. Please update Firestore Rules.</p>`;
            });
        }

        // 3. UI Rendering
        function renderMessages(msgs) {
            if (msgs.length === 0) {
                msgContainer.innerHTML = `
                    <div class="flex-1 flex flex-col items-center justify-center text-gray-300">
                        <i data-lucide="message-circle" class="w-10 h-10 mb-2 opacity-20"></i>
                        <p class="text-sm">හලෝ කියන්න!</p>
                    </div>`;
                lucide.createIcons();
                return;
            }

            msgContainer.innerHTML = msgs.map(m => {
                const isMe = m.senderId === currentUser.uid;
                return `
                    <div class="flex flex-col ${isMe ? 'items-end' : 'items-start'}">
                        <div class="message-bubble ${isMe ? 'my-message' : 'their-message'}">
                            ${escapeHTML(m.text)}
                        </div>
                        <span class="text-[9px] text-gray-400 mt-1 px-2">
                            ${new Date(m.createdAt).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}
                        </span>
                    </div>
                `;
            }).join('');
            msgContainer.scrollTop = msgContainer.scrollHeight;
        }

        function escapeHTML(str) {
            const p = document.createElement('p');
            p.textContent = str;
            return p.innerHTML;
        }

        // 4. Events
        targetInput.addEventListener('input', initChatListener);

        chatForm.onsubmit = async (e) => {
            e.preventDefault();
            const text = msgInput.value.trim();
            const targetId = targetInput.value.trim();

            if (!text || !targetId || !currentUser) return;

            try {
                // Rule එකට අනුව: artifacts/studyflow-pro/public/data/private_messages වෙත ලිවීම
                await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'private_messages'), {
                    text,
                    senderId: currentUser.uid,
                    receiverId: targetId,
                    createdAt: Date.now()
                });
                msgInput.value = '';
                sendBtn.disabled = true;
            } catch (err) {
                alert("Permission Denied: Firestore Rules පරීක්ෂා කරන්න.");
            }
        };

        msgInput.addEventListener('input', () => {
            sendBtn.disabled = !msgInput.value.trim();
        });

        document.getElementById('copy-id-btn').onclick = () => {
            if (currentUser) {
                navigator.clipboard.writeText(currentUser.uid);
                const originalHTML = document.getElementById('copy-id-btn').innerHTML;
                document.getElementById('copy-id-btn').innerHTML = '<i data-lucide="check" class="w-4 h-4 text-green-500"></i>';
                lucide.createIcons();
                setTimeout(() => {
                    document.getElementById('copy-id-btn').innerHTML = originalHTML;
                    lucide.createIcons();
                }, 2000);
            }
        };

        lucide.createIcons();
    </script>
</body>
</html>
