<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anonymous Private Chat</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+Sinhala:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        body { font-family: 'Inter', 'Noto Sans Sinhala', sans-serif; }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 h-screen w-full overflow-hidden flex">

    <!-- Left Sidebar -->
    <div class="w-[320px] bg-white flex flex-col border-r border-gray-200 shrink-0 shadow-sm">
        <div class="p-6 border-b">
            <div class="flex items-center gap-3 mb-4">
                <img id="my-avatar" src="https://i.pravatar.cc/150?u=temp" class="w-12 h-12 rounded-full border-2 border-blue-500 p-0.5" />
                <div class="overflow-hidden">
                    <h2 id="my-name" class="text-sm font-bold text-gray-900 truncate">Loading...</h2>
                    <p id="my-id-display" class="text-[9px] text-gray-400 font-mono truncate">ID: Fetching...</p>
                </div>
            </div>
            <button id="copy-id-btn" class="w-full bg-blue-50 text-blue-600 text-[10px] py-2 rounded-lg font-bold hover:bg-blue-100 transition-all flex items-center justify-center gap-2">
                <i data-lucide="copy" class="w-3 h-3"></i> COPY MY ID
            </button>
        </div>

        <div class="p-6">
            <label class="text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-2 block">Connect with Friend</label>
            <div class="relative">
                <input 
                    type="text" 
                    id="target-user-id" 
                    placeholder="Enter Friend's ID..." 
                    class="w-full bg-gray-50 border border-gray-100 text-xs p-3 rounded-xl outline-none focus:ring-2 focus:ring-blue-500/20 transition-all"
                />
                <div id="id-status-icon" class="absolute right-3 top-3 text-gray-300">
                    <i data-lucide="user-plus" class="w-4 h-4"></i>
                </div>
            </div>
            <p class="text-[9px] text-gray-400 mt-2 leading-relaxed">Paste a friend's ID here to start a secure private session.</p>
        </div>

        <div class="mt-auto p-6 bg-blue-50/50">
            <div class="flex items-center gap-2 text-blue-600 mb-1">
                <i data-lucide="shield-check" class="w-4 h-4"></i>
                <span class="text-[10px] font-bold uppercase">Encrypted Path</span>
            </div>
            <p class="text-[10px] text-blue-500/70">Your messages are stored under the studyflow-pro/public path.</p>
        </div>
    </div>

    <!-- Main Chat Area -->
    <div class="flex-1 bg-white flex flex-col relative">
        <!-- Header -->
        <div class="h-20 border-b flex items-center justify-between px-8 bg-white shrink-0">
            <div class="flex items-center gap-4">
                <div id="chat-indicator" class="w-3 h-3 bg-gray-200 rounded-full"></div>
                <div>
                    <h2 id="chat-title" class="text-md font-bold text-gray-800">Private Messenger</h2>
                    <p id="chat-subtitle" class="text-[10px] text-gray-400 font-mono">Enter an ID to start</p>
                </div>
            </div>
        </div>

        <!-- Messages -->
        <div id="messages-container" class="flex-1 overflow-y-auto p-8 flex flex-col gap-4">
            <div class="flex flex-col items-center justify-center h-full text-gray-300 opacity-60">
                <i data-lucide="message-square" class="w-12 h-12 mb-2"></i>
                <p class="text-sm">Waiting for a valid Friend ID...</p>
            </div>
        </div>

        <!-- Input Area -->
        <div class="p-6 bg-gray-50/50 border-t border-gray-100">
            <form id="chat-form" class="max-w-4xl mx-auto flex items-center gap-3">
                <input 
                    type="text" 
                    id="message-input"
                    placeholder="Type your secure message..." 
                    class="flex-1 bg-white border border-gray-200 p-4 rounded-2xl outline-none shadow-sm focus:ring-4 focus:ring-blue-500/5 transition-all text-sm"
                    autocomplete="off"
                    disabled
                />
                <button 
                    type="submit" 
                    id="send-btn"
                    disabled
                    class="bg-blue-600 text-white w-12 h-12 flex items-center justify-center rounded-2xl hover:bg-blue-700 transition-all shadow-lg shadow-blue-200 disabled:opacity-50 disabled:shadow-none"
                >
                    <i data-lucide="send" class="w-5 h-5"></i>
                </button>
            </form>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, where } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Firebase Config (Using studymaster-919ba)
        const firebaseConfig = {
            apiKey: "AIzaSyA9DLfAHTUUGxCPn2j_k6godoTEopzaFAU",
            authDomain: "studymaster-919ba.firebaseapp.com",
            projectId: "studymaster-919ba",
            storageBucket: "studymaster-919ba.firebasestorage.app",
            messagingSenderId: "426684063256",
            appId: "1:426684063256:web:52c17625a9450ea9662d6d"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = 'studyflow-pro';

        let currentUser = null;
        let unsubscribe = null;
        
        // Persistent Profile
        const myName = `User_${Math.floor(Math.random() * 9000 + 1000)}`;
        const myAvatar = `https://i.pravatar.cc/150?u=${Math.random()}`;

        // DOM
        const targetInput = document.getElementById('target-user-id');
        const messagesContainer = document.getElementById('messages-container');
        const chatForm = document.getElementById('chat-form');
        const messageInput = document.getElementById('message-input');
        const sendBtn = document.getElementById('send-btn');
        const chatTitle = document.getElementById('chat-title');
        const chatSubtitle = document.getElementById('chat-subtitle');
        const chatIndicator = document.getElementById('chat-indicator');

        // Initial UI
        document.getElementById('my-name').textContent = myName;
        document.getElementById('my-avatar').src = myAvatar;

        // Auth
        onAuthStateChanged(auth, (user) => {
            if (user) {
                currentUser = user;
                document.getElementById('my-id-display').textContent = `ID: ${user.uid}`;
                setupChatListener();
            } else {
                signInAnonymously(auth);
            }
        });

        function setupChatListener() {
            const targetId = targetInput.value.trim();
            
            if (unsubscribe) unsubscribe();

            if (targetId.length < 10) {
                renderEmptyState("Enter a valid Friend ID to start.");
                messageInput.disabled = true;
                sendBtn.disabled = true;
                chatIndicator.className = "w-3 h-3 bg-gray-200 rounded-full";
                return;
            }

            messageInput.disabled = false;
            chatIndicator.className = "w-3 h-3 bg-green-500 rounded-full animate-pulse";
            chatTitle.textContent = "Chatting with Friend";
            chatSubtitle.textContent = `ID: ${targetId}`;

            // Listen for messages in public/data/private_messages
            const msgRef = collection(db, 'artifacts', appId, 'public', 'data', 'private_messages');
            
            unsubscribe = onSnapshot(msgRef, (snapshot) => {
                const msgs = snapshot.docs.map(doc => doc.data())
                    .filter(m => (m.senderId === currentUser.uid && m.receiverId === targetId) || 
                                 (m.senderId === targetId && m.receiverId === currentUser.uid))
                    .sort((a, b) => a.createdAt - b.createdAt);
                
                renderMessages(msgs);
            });
        }

        function renderMessages(msgs) {
            if (msgs.length === 0) {
                renderEmptyState("No messages yet. Say hi!");
                return;
            }
            
            messagesContainer.innerHTML = msgs.map(m => {
                const isMe = m.senderId === currentUser.uid;
                return `
                    <div class="flex ${isMe ? 'justify-end' : 'justify-start'}">
                        <div class="max-w-[75%] p-4 rounded-2xl shadow-sm ${isMe ? 'bg-blue-600 text-white rounded-br-none' : 'bg-gray-100 text-gray-800 rounded-bl-none'}">
                            <p class="text-sm leading-relaxed">${escapeHTML(m.text)}</p>
                            <p class="text-[8px] opacity-40 mt-1 text-right">${new Date(m.createdAt).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</p>
                        </div>
                    </div>
                `;
            }).join('');
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }

        function renderEmptyState(text) {
            messagesContainer.innerHTML = `
                <div class="flex flex-col items-center justify-center h-full text-gray-300 opacity-60">
                    <i data-lucide="message-square" class="w-12 h-12 mb-2"></i>
                    <p class="text-sm">${text}</p>
                </div>`;
            lucide.createIcons();
        }

        function escapeHTML(str) {
            const div = document.createElement('div');
            div.innerText = str;
            return div.innerHTML;
        }

        targetInput.addEventListener('input', setupChatListener);

        chatForm.onsubmit = async (e) => {
            e.preventDefault();
            const text = messageInput.value.trim();
            const targetId = targetInput.value.trim();

            if (!text || !targetId || !currentUser) return;

            try {
                await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'private_messages'), {
                    text,
                    senderId: currentUser.uid,
                    receiverId: targetId,
                    createdAt: Date.now()
                });
                messageInput.value = '';
            } catch (err) {
                console.error("Send Error:", err);
            }
        };

        document.getElementById('copy-id-btn').onclick = () => {
            if (currentUser) {
                const el = document.createElement('textarea');
                el.value = currentUser.uid;
                document.body.appendChild(el);
                el.select();
                document.execCommand('copy');
                document.body.removeChild(el);
                alert("Your Unique ID Copied!");
            }
        };

        messageInput.oninput = () => {
            sendBtn.disabled = !messageInput.value.trim();
        };

        lucide.createIcons();
    </script>
</body>
</html>
