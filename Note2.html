<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Docket Notes</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- Google Fonts: Inter + Sinhala -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+Sinhala:wght@100..900&display=swap" rel="stylesheet">
    
    <!-- Markdown Parser -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    
    <!-- KaTeX for Math Rendering -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'Noto Sans Sinhala', 'sans-serif'],
                        sinhala: ['Noto Sans Sinhala', 'sans-serif'],
                    },
                    colors: {
                        c1: '#ffcc80',
                        c2: '#ffab91',
                        c3: '#b39ddb',
                        c4: '#80deea',
                        c5: '#c5e1a5',
                    },
                    transitionTimingFunction: {
                        'smooth': 'cubic-bezier(0.16, 1, 0.3, 1)',
                        'spring': 'cubic-bezier(0.175, 0.885, 0.32, 1.275)',
                    }
                }
            }
        }
    </script>

    <style>
        * {
            -webkit-tap-highlight-color: transparent;
        }
        body {
            font-family: 'Inter', 'Noto Sans Sinhala', sans-serif;
            background-color: #ffffff;
            overflow: hidden;
        }

        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        /* Premium Animations */
        @keyframes shine {
            to { background-position: -200% center; }
        }
        .text-shine {
            background: linear-gradient(120deg, #111827 40%, #e5e7eb 50%, #111827 60%);
            background-size: 200% auto;
            color: transparent !important;
            -webkit-background-clip: text !important;
            background-clip: text !important;
            animation: shine 2.5s linear infinite;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in-up {
            animation: fadeInUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            opacity: 0;
        }
        @keyframes popIn {
            from { opacity: 0; transform: scale(0.95) translateY(10px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }
        .animate-pop-in {
            animation: popIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
            opacity: 0;
        }

        /* Premium Palette menu & Animations */
        .palette-menu {
            opacity: 0;
            pointer-events: none;
            transform: translateY(15px) scale(0.95);
            transform-origin: bottom center;
            transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        @media (min-width: 768px) {
            .palette-menu {
                transform: translateY(-15px) scale(0.95);
                transform-origin: top center;
            }
        }
        .palette-menu.open {
            opacity: 1;
            pointer-events: auto;
            transform: translateY(0) scale(1);
        }
        .color-dot {
            opacity: 0;
            transform: translateY(15px) scale(0.5);
            transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        @media (min-width: 768px) {
            .color-dot {
                transform: translateY(-15px) scale(0.5);
            }
        }
        .palette-menu.open .color-dot {
            opacity: 1;
            transform: translateY(0) scale(1);
        }
        
        /* Mobile stagger (bottom up) */
        .color-dot:nth-child(5) { transition-delay: 0.05s; }
        .color-dot:nth-child(4) { transition-delay: 0.10s; }
        .color-dot:nth-child(3) { transition-delay: 0.15s; }
        .color-dot:nth-child(2) { transition-delay: 0.20s; }
        .color-dot:nth-child(1) { transition-delay: 0.25s; }

        /* Desktop stagger (top down) */
        @media (min-width: 768px) {
            .color-dot:nth-child(1) { transition-delay: 0.05s; }
            .color-dot:nth-child(2) { transition-delay: 0.10s; }
            .color-dot:nth-child(3) { transition-delay: 0.15s; }
            .color-dot:nth-child(4) { transition-delay: 0.20s; }
            .color-dot:nth-child(5) { transition-delay: 0.25s; }
        }

        /* FAB Rotate Animation */
        #toggle-palette-btn i {
            transition: transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        #toggle-palette-btn.open i {
            transform: rotate(135deg);
        }

        /* Professional typography */
        .prose {
            line-height: 1.6;
            color: #1f2937;
        }
        .prose h1 {
            font-size: 2.5rem;
            font-weight: 800;
            margin-top: 2.5rem;
            margin-bottom: 1rem;
            border-bottom: 2px solid #e5e7eb;
            padding-bottom: 0.5rem;
            color: #111827;
        }
        .prose h2 {
            font-size: 2rem;
            font-weight: 700;
            margin-top: 2rem;
            margin-bottom: 0.75rem;
            color: #111827;
        }
        .prose h3 {
            font-size: 1.5rem;
            font-weight: 600;
            margin-top: 1.5rem;
            margin-bottom: 0.5rem;
            color: #1f2937;
        }
        .prose p {
            margin-bottom: 1.25rem;
            line-height: 1.7;
        }
        .prose strong {
            font-weight: 700;
            color: #000000;
        }
        .prose em {
            font-style: italic;
        }
        .prose del {
            text-decoration: line-through;
            color: #6b7280;
        }
        
        /* Inline Code */
        .prose code:not(pre code) {
            background-color: #f3f4f6;
            color: #ef4444;
            padding: 0.2rem 0.4rem;
            border-radius: 0.375rem;
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
            font-size: 0.875em;
        }
        
        /* Code Blocks */
        .prose pre {
            background-color: #1f2937;
            padding: 1.25rem;
            border-radius: 0.75rem;
            overflow-x: auto;
            margin-top: 1.5rem;
            margin-bottom: 1.5rem;
        }
        .prose pre code {
            color: #e5e7eb;
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
            font-size: 0.875em;
            background: none;
            padding: 0;
            line-height: 1.5;
        }
        
        /* Lists */
        .prose ul {
            list-style-type: disc;
            margin: 1rem 0 1rem 1.5rem;
            padding-left: 0.5rem;
        }
        .prose ol {
            list-style-type: decimal;
            margin: 1rem 0 1rem 1.5rem;
            padding-left: 0.5rem;
        }
        .prose ol li::marker {
            font-weight: 700;
            color: #111827;
        }
        .prose li {
            margin-bottom: 0.5rem;
            line-height: 1.6;
        }
        
        /* Nested Lists - "Kapila Penna" styling */
        .prose li > ul, .prose li > ol {
            margin-top: 0.5rem;
            margin-bottom: 0.5rem;
            border-left: 2px solid #e5e7eb;
            padding-left: 1.25rem;
            margin-left: 0.25rem;
        }
        .prose li > ul li, .prose li > ol li {
            color: #4b5563;
            font-weight: 400;
            font-size: 0.95em;
        }
        
        /* Blockquotes - Soft yellow with orange border */
        .prose blockquote {
            background-color: #fef9e3;
            border-left: 4px solid #f5b042;
            padding: 1rem 1.5rem;
            margin: 1.5rem 0;
            border-radius: 0 0.75rem 0.75rem 0;
            color: #78350f;
            font-style: italic;
        }
        .prose blockquote p:last-child {
            margin-bottom: 0;
        }
        
        /* Links */
        .prose a {
            color: #2563eb;
            text-decoration: underline;
            text-underline-offset: 3px;
            font-weight: 500;
        }
        
        /* Images */
        .prose img {
            max-width: 100%;
            height: auto;
            border-radius: 0.75rem;
            margin: 1.5rem auto;
            display: block;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
        }
        
        /* Horizontal Rules */
        .prose hr {
            border: none;
            border-top: 2px solid #e5e7eb;
            margin: 2.5rem 0;
        }
        
        /* KaTeX Math Adjustments */
        .katex {
            background-color: #f8fafc;
            padding: 0.1rem 0.2rem;
            border-radius: 0.25rem;
            font-size: 1.05em;
        }
        .katex-display {
            background: transparent;
            padding: 1rem 0 !important;
            margin: 1.5rem 0 !important;
            display: flex !important;
            justify-content: center;
            overflow-x: auto;
        }
        .katex-display .katex {
            background: transparent;
            padding: 0;
        }

        @media (max-width: 768px) {
            .prose h1 { font-size: 1.75rem; margin-top: 1.5rem; }
            .prose h2 { font-size: 1.5rem; margin-top: 1.5rem; }
            .prose h3 { font-size: 1.25rem; }
            .prose { font-size: 0.95rem; }
        }

        .modal-center {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        @media (max-width: 768px) {
            #editor-modal .bg-white, #view-modal .bg-white, #settings-modal .bg-white {
                width: 100%;
                height: 100%;
                max-width: 100%;
                max-height: 100%;
                border-radius: 0;
            }
            #editor-modal, #view-modal, #settings-modal { padding: 0; }
            #view-modal-content { max-height: 100%; border-radius: 0; }
            .edit-btn { opacity: 1 !important; background-color: rgba(0,0,0,0.7) !important; }
        }
    </style>
</head>
<body class="h-screen w-full flex flex-col md:flex-row">

    <!-- Sidebar (desktop: left, vertical; mobile: hidden/0-width so FAB can float) -->
    <aside class="w-0 h-0 md:w-[100px] md:h-full md:bg-white md:border-r border-gray-200 flex md:flex-col items-center md:justify-start md:py-8 md:px-4 z-[60] flex-shrink-0 order-last md:order-1">
        <h1 class="font-bold text-xl tracking-tight text-gray-900 hidden md:block mb-20 animate-fade-in-up">Docket</h1>
        
        <!-- New Note Button + Palette (FAB on Mobile) -->
        <div class="fixed bottom-6 right-6 md:relative md:bottom-auto md:right-auto flex flex-col items-center z-[100] animate-fade-in-up" style="animation-delay: 0.1s;">
            <!-- Palette Menu -->
            <div id="palette-menu" class="palette-menu absolute bottom-full mb-4 md:top-full md:bottom-auto md:mb-0 md:mt-6 flex flex-col items-center gap-3 p-3 bg-white/90 backdrop-blur-xl rounded-[24px] md:rounded-full shadow-2xl border border-gray-100 z-10">
                <button class="w-11 h-11 md:w-8 md:h-8 rounded-full bg-c5 color-dot shadow-sm border border-black/5 hover:scale-110 active:scale-95 transition-transform" data-color="#c5e1a5"></button>
                <button class="w-11 h-11 md:w-8 md:h-8 rounded-full bg-c4 color-dot shadow-sm border border-black/5 hover:scale-110 active:scale-95 transition-transform" data-color="#80deea"></button>
                <button class="w-11 h-11 md:w-8 md:h-8 rounded-full bg-c3 color-dot shadow-sm border border-black/5 hover:scale-110 active:scale-95 transition-transform" data-color="#b39ddb"></button>
                <button class="w-11 h-11 md:w-8 md:h-8 rounded-full bg-c2 color-dot shadow-sm border border-black/5 hover:scale-110 active:scale-95 transition-transform" data-color="#ffab91"></button>
                <button class="w-11 h-11 md:w-8 md:h-8 rounded-full bg-c1 color-dot shadow-sm border border-black/5 hover:scale-110 active:scale-95 transition-transform" data-color="#ffcc80"></button>
            </div>
            
            <!-- Floating Action Button -->
            <button id="toggle-palette-btn" class="w-14 h-14 md:w-12 md:h-12 bg-gray-900 text-white rounded-full flex items-center justify-center transition-all duration-300 shadow-[0_8px_30px_rgb(0,0,0,0.2)] md:shadow-lg hover:shadow-[0_12px_40px_rgb(0,0,0,0.3)] hover:scale-105 active:scale-95 focus:outline-none z-20">
                <i data-lucide="plus" class="w-7 h-7 md:w-6 md:h-6"></i>
            </button>
        </div>

        <!-- Settings Icon (Desktop: bottom of sidebar) -->
        <div class="hidden md:block mt-auto animate-fade-in-up" style="animation-delay: 0.2s;">
            <button id="settings-btn-desktop" class="w-10 h-10 rounded-full flex items-center justify-center text-gray-500 hover:text-gray-900 hover:bg-gray-100 transition-all duration-300 active:scale-90">
                <i data-lucide="settings" class="w-5 h-5 transition-transform duration-500 hover:rotate-90"></i>
            </button>
        </div>
    </aside>

    <!-- Main Content Area -->
    <main class="flex-1 h-full flex flex-col relative bg-white overflow-hidden order-2">
        <header class="pt-4 md:pt-8 px-4 md:px-10 flex items-center justify-between md:justify-end z-10">
            <!-- Settings Icon (Mobile: top left/right) -->
            <button id="settings-btn-mobile" class="md:hidden w-10 h-10 rounded-full flex items-center justify-center text-gray-500 hover:text-gray-900 hover:bg-gray-100 transition-all active:scale-90 animate-fade-in-up">
                <i data-lucide="settings" class="w-5 h-5"></i>
            </button>
            <div class="flex items-center text-gray-400 bg-gray-50 border border-gray-200 rounded-full px-4 py-2 w-full max-w-sm ml-auto md:ml-0 animate-fade-in-up transition-all duration-300 focus-within:shadow-md focus-within:bg-white focus-within:border-gray-300" style="animation-delay: 0.1s;">
                <i data-lucide="search" class="w-5 h-5 mr-2"></i>
                <input id="search-input" type="text" placeholder="Search notes..." class="bg-transparent w-full outline-none text-base">
            </div>
        </header>

        <div class="flex-1 overflow-y-auto no-scrollbar px-4 md:px-10 pb-20 md:pb-16 pt-4">
            <h2 id="main-title" class="text-6xl md:text-8xl font-extrabold text-gray-900 mb-6 md:mb-12 tracking-tighter animate-fade-in-up" style="animation-delay: 0.2s;">Notes</h2>
            <div id="notes-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 md:gap-8 items-start pb-8"></div>
            
            <div id="empty-state" class="hidden w-full py-12 flex flex-col justify-center items-center text-gray-400 animate-fade-in-up" style="animation-delay: 0.3s;">
                <i data-lucide="sticky-note" class="w-16 h-16 mb-4 opacity-50 transform transition-transform duration-700 hover:scale-110 hover:-rotate-6"></i>
                <p class="text-lg text-center px-4">No notes found. Tap the + button to create your first note!</p>
            </div>
        </div>
    </main>

    <!-- Editor Modal -->
    <div id="editor-modal" class="fixed inset-0 z-50 bg-white/90 md:bg-white/40 backdrop-blur-md hidden modal-center p-0 md:p-6 opacity-0 transition-opacity duration-500 ease-smooth">
        <div class="bg-white w-full h-full md:w-full md:max-w-7xl md:h-[90vh] md:rounded-[30px] shadow-[0_20px_60px_-15px_rgba(0,0,0,0.1)] flex flex-col overflow-hidden border-0 md:border border-gray-200 transform scale-95 transition-all duration-500 ease-smooth" id="editor-container">
            <div class="h-14 md:h-16 border-b border-gray-100 flex items-center justify-between px-4 md:px-6 flex-shrink-0 transition-colors duration-500" id="modal-header">
                <div class="flex items-center gap-2">
                    <div id="modal-color-indicator" class="w-4 h-4 rounded-full transition-colors duration-500"></div>
                    <span class="font-medium text-gray-500 text-sm">Editor</span>
                </div>
                <div class="flex items-center gap-2">
                    <button id="delete-note-btn" class="px-3 py-1.5 text-sm font-medium text-red-600 hover:bg-red-50 rounded-full hidden items-center gap-1 transition-colors active:scale-95">
                        <i data-lucide="trash-2" class="w-4 h-4"></i>
                        <span class="hidden md:inline">Delete</span>
                    </button>
                    <button id="cancel-note-btn" class="px-3 py-1.5 text-sm font-medium text-gray-600 hover:bg-gray-50 rounded-full transition-colors active:scale-95">Cancel</button>
                    <button id="save-note-btn" class="px-4 py-1.5 text-sm font-semibold text-white bg-black rounded-full hover:bg-gray-800 shadow-md hover:shadow-lg transition-all active:scale-95">Save</button>
                </div>
            </div>
            <div class="flex flex-col md:flex-row flex-1 overflow-hidden">
                <div class="w-full md:w-1/2 h-1/2 md:h-full border-b md:border-b-0 md:border-r border-gray-100 flex flex-col bg-white">
                    <div class="flex-1 flex flex-col p-4 md:p-6 overflow-hidden">
                        <input id="note-title-input" type="text" placeholder="Note Title..." class="text-2xl md:text-3xl font-bold text-gray-900 outline-none w-full mb-4 bg-transparent">
                        <textarea id="note-content-input" placeholder="Start typing... Markdown & LaTeX supported" class="flex-1 w-full resize-none outline-none text-base md:text-lg text-gray-700 bg-transparent leading-relaxed no-scrollbar"></textarea>
                    </div>
                    <div class="h-10 border-t border-gray-50 flex items-center px-4 md:px-6 flex-shrink-0 bg-gray-50/50 text-xs text-gray-400 justify-between font-medium">
                        <span id="word-count">0 words</span>
                        <span id="char-count">0 characters</span>
                    </div>
                </div>
                <div class="w-full md:w-1/2 h-1/2 md:h-full overflow-y-auto p-4 md:p-8 bg-gray-50">
                    <h1 id="preview-title" class="text-2xl md:text-4xl font-bold text-gray-900 mb-4 pb-2 border-b border-gray-200 empty:hidden"></h1>
                    <div id="preview-content" class="prose prose-base md:prose-lg text-gray-800 w-full max-w-none"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- View Modal -->
    <div id="view-modal" class="fixed inset-0 z-50 bg-black/50 backdrop-blur-sm hidden modal-center p-0 md:p-6 opacity-0 transition-opacity duration-500 ease-smooth">
        <div id="view-modal-content" class="bg-white w-full h-full md:w-full md:max-w-4xl md:max-h-[85vh] md:rounded-2xl shadow-2xl flex flex-col overflow-hidden transform scale-95 transition-all duration-500 ease-smooth">
            <div class="flex items-center justify-between px-4 md:px-6 py-3 md:py-4 border-b border-gray-100">
                <div class="flex items-center gap-2">
                    <div id="view-color-indicator" class="w-4 h-4 rounded-full transition-colors duration-500"></div>
                    <span class="text-xs font-medium text-gray-400 uppercase tracking-wider">Preview</span>
                </div>
                <button id="close-view-modal" class="text-gray-400 hover:text-gray-600 transition-colors active:scale-90"><i data-lucide="x" class="w-5 h-5"></i></button>
            </div>
            <div class="flex-1 overflow-y-auto p-4 md:p-8">
                <h1 id="view-title" class="text-2xl md:text-4xl font-bold text-gray-900 mb-4"></h1>
                <div id="view-content" class="prose prose-base md:prose-lg text-gray-800 w-full max-w-none"></div>
            </div>
            <div class="px-4 md:px-6 py-3 md:py-4 border-t border-gray-100 flex justify-end gap-2">
                <button id="copy-view-btn" class="px-3 py-1.5 text-sm font-medium text-gray-600 hover:bg-gray-50 rounded-full flex items-center gap-1 transition-colors active:scale-95">
                    <i data-lucide="copy" class="w-4 h-4"></i>
                    <span class="hidden md:inline">Copy Text</span>
                </button>
                <button id="fullscreen-view-btn" class="px-3 py-1.5 text-sm font-medium text-gray-600 hover:bg-gray-50 rounded-full flex items-center gap-1 transition-colors active:scale-95">
                    <i data-lucide="maximize" class="w-4 h-4"></i>
                    <span class="hidden md:inline">Full Screen</span>
                </button>
                <button id="edit-from-view-btn" class="px-4 py-1.5 text-sm font-semibold text-white bg-black rounded-full hover:bg-gray-800 shadow-md hover:shadow-lg transition-all active:scale-95 flex items-center gap-1">
                    <i data-lucide="pencil" class="w-4 h-4"></i>
                    <span>Edit</span>
                </button>
            </div>
        </div>
    </div>

    <!-- Settings Modal (includes sign-in) -->
    <div id="settings-modal" class="fixed inset-0 z-50 bg-black/50 backdrop-blur-sm hidden modal-center p-4 opacity-0 transition-opacity duration-500 ease-smooth">
        <div class="bg-white w-full max-w-md rounded-2xl shadow-2xl transform scale-95 transition-all duration-500 ease-smooth overflow-hidden">
            <div class="flex items-center justify-between px-6 py-4 border-b border-gray-100">
                <h3 class="text-lg font-semibold text-gray-900">Settings</h3>
                <button id="close-settings-btn" class="text-gray-400 hover:text-gray-600 transition-colors active:scale-90">
                    <i data-lucide="x" class="w-5 h-5"></i>
                </button>
            </div>
            <div class="p-6">
                <div id="settings-auth-container">
                    <!-- Dynamic content: sign-in button or user profile -->
                    <div class="flex flex-col items-center gap-4">
                        <div id="settings-user-info" class="hidden flex flex-col items-center gap-2">
                            <img id="settings-avatar" class="w-16 h-16 rounded-full object-cover" src="" alt="avatar">
                            <span id="settings-name" class="text-sm font-medium text-gray-700"></span>
                            <button id="settings-signout-btn" class="mt-2 text-sm text-red-600 hover:text-red-700">Sign out</button>
                        </div>
                        <button id="settings-google-signin-btn" class="flex items-center gap-2 bg-white border border-gray-300 rounded-full px-6 py-2 text-sm font-medium text-gray-700 hover:bg-gray-50 transition-all active:scale-95 shadow-sm hover:shadow">
                            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" class="w-5 h-5" alt="Google">
                            Sign in with Google
                        </button>
                    </div>
                </div>
                <!-- Additional settings can be added here -->
            </div>
        </div>
    </div>

    <!-- Delete Confirmation Modal -->
    <div id="confirm-modal" class="fixed inset-0 z-[100] bg-black/50 backdrop-blur-sm hidden modal-center p-4 opacity-0 transition-opacity duration-500 ease-smooth">
        <div class="bg-white w-full max-w-md rounded-2xl shadow-2xl transform scale-95 transition-all duration-500 ease-smooth overflow-hidden">
            <div class="p-6">
                <div class="flex items-center gap-3 mb-4">
                    <div class="w-10 h-10 rounded-full bg-red-100 flex items-center justify-center">
                        <i data-lucide="alert-triangle" class="w-5 h-5 text-red-600"></i>
                    </div>
                    <h3 class="text-xl font-semibold text-gray-900">Delete Note</h3>
                </div>
                <p class="text-gray-600 mb-6">Are you sure you want to delete this note? This action cannot be undone.</p>
                <div class="flex justify-end gap-3">
                    <button id="confirm-cancel-btn" class="px-4 py-2 text-sm font-medium text-gray-600 hover:bg-gray-50 rounded-full transition-colors active:scale-95">Cancel</button>
                    <button id="confirm-delete-btn" class="px-4 py-2 text-sm font-semibold text-white bg-red-600 hover:bg-red-700 rounded-full shadow-md hover:shadow-lg transition-all active:scale-95">Delete</button>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, onSnapshot, doc, setDoc, addDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getAnalytics } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-analytics.js";

        const firebaseConfig = {
            apiKey: "AIzaSyA9DLfAHTUUGxCPn2j_k6godoTEopzaFAU",
            authDomain: "studymaster-919ba.firebaseapp.com",
            projectId: "studymaster-919ba",
            storageBucket: "studymaster-919ba.firebasestorage.app",
            messagingSenderId: "426684063256",
            appId: "1:426684063256:web:52c17625a9450ea9662d6d",
            measurementId: "G-CWQB2330GF"
        };

        const app = initializeApp(firebaseConfig);
        const analytics = getAnalytics(app);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();
        const APP_ID = 'studyflow-pro';

        let currentUser = null;
        let unsubscribeSnapshot = null;
        let notesData = [];

        lucide.createIcons();

        // Loading UI Handlers
        const mainTitle = document.getElementById('main-title');
        
        function renderSkeletons() {
            const notesGrid = document.getElementById('notes-grid');
            notesGrid.innerHTML = '';
            for(let i=0; i<6; i++) {
                notesGrid.innerHTML += `
                    <div class="rounded-2xl md:rounded-[30px] p-5 md:p-7 flex flex-col justify-between min-h-[200px] md:min-h-[240px] bg-white border border-gray-100 shadow-sm animate-pulse">
                        <div>
                            <div class="h-7 bg-gray-200 rounded-lg w-3/4 mb-5"></div>
                            <div class="h-3.5 bg-gray-100 rounded mb-3 w-full"></div>
                            <div class="h-3.5 bg-gray-100 rounded mb-3 w-5/6"></div>
                            <div class="h-3.5 bg-gray-100 rounded w-4/6"></div>
                        </div>
                        <div class="mt-4 flex items-end justify-between">
                            <div class="h-3.5 bg-gray-200 rounded w-24"></div>
                            <div class="w-10 h-10 md:w-12 md:h-12 bg-gray-200 rounded-full"></div>
                        </div>
                    </div>
                `;
            }
        }
        
        function showLoading() {
            mainTitle.classList.add('text-shine');
            document.getElementById('empty-state').classList.add('hidden');
            renderSkeletons();
        }

        function hideLoading() {
            mainTitle.classList.remove('text-shine');
        }

        // Trigger loading visually immediately
        showLoading();

        // Configure Marked.js for Canvas-like formatting
        marked.setOptions({
            gfm: true,     // GitHub Flavored Markdown
            breaks: true   // Convert \n to <br> to mimic word processors
        });

        // Auth state listener
        onAuthStateChanged(auth, (user) => {
            currentUser = user;
            updateSettingsUI(user);
            if (user) {
                fetchNotesFromFirestore();
            } else {
                if (unsubscribeSnapshot) unsubscribeSnapshot();
                notesData = [];
                hideLoading();
                renderNotes([]);
            }
        });

        // Update settings modal UI based on auth state
        function updateSettingsUI(user) {
            const signinBtn = document.getElementById('settings-google-signin-btn');
            const userInfoDiv = document.getElementById('settings-user-info');
            const avatarImg = document.getElementById('settings-avatar');
            const nameSpan = document.getElementById('settings-name');
            const signOutBtn = document.getElementById('settings-signout-btn');

            if (user) {
                signinBtn.classList.add('hidden');
                userInfoDiv.classList.remove('hidden');
                avatarImg.src = user.photoURL || 'https://ui-avatars.com/api/?background=random&name=' + encodeURIComponent(user.displayName || 'User');
                nameSpan.textContent = user.displayName || user.email || 'User';
                signOutBtn.classList.remove('hidden');
            } else {
                signinBtn.classList.remove('hidden');
                userInfoDiv.classList.add('hidden');
            }
        }

        // Settings modal handlers
        const settingsModal = document.getElementById('settings-modal');
        const openSettings = () => {
            settingsModal.classList.remove('hidden');
            // Small delay to allow display:block to apply before animating opacity/transform
            setTimeout(() => {
                settingsModal.classList.remove('opacity-0');
                settingsModal.querySelector('.bg-white').classList.remove('scale-95');
                settingsModal.classList.add('opacity-100');
                settingsModal.querySelector('.bg-white').classList.add('scale-100');
            }, 20);
        };
        const closeSettings = () => {
            settingsModal.classList.remove('opacity-100');
            settingsModal.querySelector('.bg-white').classList.remove('scale-100');
            settingsModal.classList.add('opacity-0');
            settingsModal.querySelector('.bg-white').classList.add('scale-95');
            setTimeout(() => settingsModal.classList.add('hidden'), 500);
        };
        document.getElementById('settings-btn-desktop').addEventListener('click', openSettings);
        document.getElementById('settings-btn-mobile').addEventListener('click', openSettings);
        document.getElementById('close-settings-btn').addEventListener('click', closeSettings);
        settingsModal.addEventListener('click', (e) => { if (e.target === settingsModal) closeSettings(); });

        // Sign-in / sign-out inside settings modal
        document.getElementById('settings-google-signin-btn').addEventListener('click', async () => {
            try {
                await signInWithPopup(auth, provider);
                showToast("Signed in! Notes are now synced.");
                closeSettings();
            } catch (error) {
                console.error(error);
                showToast("Sign in failed.");
            }
        });
        document.getElementById('settings-signout-btn').addEventListener('click', async () => {
            await signOut(auth);
            showToast("Signed out.");
            closeSettings();
        });

        function fetchNotesFromFirestore() {
            if (!currentUser) return;
            const notesCollectionRef = collection(db, 'artifacts', APP_ID, 'users', currentUser.uid, 'notes');
            if (unsubscribeSnapshot) unsubscribeSnapshot();
            unsubscribeSnapshot = onSnapshot(notesCollectionRef, (snapshot) => {
                notesData = [];
                snapshot.forEach((doc) => notesData.push({ id: doc.id, ...doc.data() }));
                notesData.sort((a, b) => (b.timestamp || 0) - (a.timestamp || 0));
                hideLoading();
                renderNotes(notesData);
                processUrlParam();
            }, (error) => {
                console.error(error);
                hideLoading();
                renderNotes([]);
            });
        }

        function formatSnippet(content, maxLength = 100) {
            if (!content) return '';
            let text = content.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
            text = text.replace(/\[([^\]]+)\]\([^\)]+\)/g, '$1');
            text = text.replace(/!\[[^\]]*\]\([^\)]+\)/g, '');
            text = text.replace(/```[\s\S]*?```/g, '[code block]');
            text = text.replace(/^#{1,6}\s+/gm, '');
            text = text.replace(/^[-*_]{3,}\s*$/gm, '');
            text = text.replace(/\s+/g, ' ').trim();
            if (text.length > maxLength) text = text.substring(0, maxLength) + '...';
            return text;
        }

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m]));
        }

        function showToast(message) {
            const existing = document.getElementById('dynamic-toast');
            if (existing) existing.remove();
            const toast = document.createElement('div');
            toast.id = 'dynamic-toast';
            toast.innerText = message;
            toast.style.position = 'fixed';
            toast.style.bottom = '70px';
            toast.style.left = '50%';
            toast.style.transform = 'translateX(-50%)';
            toast.style.backgroundColor = '#1f2937';
            toast.style.color = 'white';
            toast.style.padding = '10px 20px';
            toast.style.borderRadius = '9999px';
            toast.style.fontSize = '0.875rem';
            toast.style.fontWeight = '500';
            toast.style.zIndex = '9999';
            toast.style.whiteSpace = 'nowrap';
            toast.style.opacity = '0';
            toast.style.transition = 'opacity 0.2s ease';
            document.body.appendChild(toast);
            setTimeout(() => toast.style.opacity = '1', 10);
            setTimeout(() => {
                toast.style.opacity = '0';
                setTimeout(() => toast.remove(), 300);
            }, 2000);
        }

        let urlParamProcessed = false;
        function processUrlParam() {
            if (urlParamProcessed) return;
            const params = new URLSearchParams(window.location.search);
            const noteId = params.get('note');
            if (noteId && notesData.length > 0) {
                const note = notesData.find(n => n.id === noteId);
                if (note) {
                    urlParamProcessed = true;
                    openViewModal(note);
                    setTimeout(() => {
                        if (!viewModal.classList.contains('hidden')) toggleFullscreen();
                    }, 300);
                } else {
                    showToast("Note not found");
                    urlParamProcessed = true;
                }
            }
        }

        // DOM elements (same as before)
        const toggleBtn = document.getElementById('toggle-palette-btn');
        const paletteMenu = document.getElementById('palette-menu');
        const notesGrid = document.getElementById('notes-grid');
        const searchInput = document.getElementById('search-input');
        const emptyState = document.getElementById('empty-state');
        const editorModal = document.getElementById('editor-modal');
        const editorContainer = document.getElementById('editor-container');
        const titleInput = document.getElementById('note-title-input');
        const contentInput = document.getElementById('note-content-input');
        const previewTitle = document.getElementById('preview-title');
        const previewContent = document.getElementById('preview-content');
        const cancelBtn = document.getElementById('cancel-note-btn');
        const saveBtn = document.getElementById('save-note-btn');
        const deleteBtn = document.getElementById('delete-note-btn');
        const modalHeader = document.getElementById('modal-header');
        const modalColorIndicator = document.getElementById('modal-color-indicator');
        const viewModal = document.getElementById('view-modal');
        const viewModalContent = document.getElementById('view-modal-content');
        const viewTitle = document.getElementById('view-title');
        const viewContent = document.getElementById('view-content');
        const viewColorIndicator = document.getElementById('view-color-indicator');
        const closeViewBtn = document.getElementById('close-view-modal');
        const editFromViewBtn = document.getElementById('edit-from-view-btn');
        const fullscreenViewBtn = document.getElementById('fullscreen-view-btn');
        let fullscreenIcon = null;
        const confirmModal = document.getElementById('confirm-modal');
        const confirmCancelBtn = document.getElementById('confirm-cancel-btn');
        const confirmDeleteBtn = document.getElementById('confirm-delete-btn');

        let isPaletteOpen = false;
        let activeNoteId = null;
        let activeColor = '#ffffff';
        let currentViewNote = null;

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                viewModalContent.requestFullscreen().catch(err => console.error(err));
                if (fullscreenIcon) fullscreenIcon.setAttribute('data-lucide', 'minimize');
            } else {
                document.exitFullscreen();
                if (fullscreenIcon) fullscreenIcon.setAttribute('data-lucide', 'maximize');
            }
            lucide.createIcons();
        }

        function handleFullscreenChange() {
            if (document.fullscreenElement) {
                if (fullscreenIcon) fullscreenIcon.setAttribute('data-lucide', 'minimize');
            } else {
                if (fullscreenIcon) fullscreenIcon.setAttribute('data-lucide', 'maximize');
            }
            lucide.createIcons();
        }
        document.addEventListener('fullscreenchange', handleFullscreenChange);
        fullscreenViewBtn.addEventListener('click', toggleFullscreen);

        toggleBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            isPaletteOpen = !isPaletteOpen;
            if (isPaletteOpen) {
                paletteMenu.classList.add('open');
                toggleBtn.classList.add('open');
            } else closePalette();
        });
        document.addEventListener('click', (e) => {
            if (isPaletteOpen && !toggleBtn.contains(e.target) && !paletteMenu.contains(e.target)) closePalette();
        });
        function closePalette() {
            isPaletteOpen = false;
            paletteMenu.classList.remove('open');
            toggleBtn.classList.remove('open');
        }

        document.querySelectorAll('.color-dot').forEach(dot => {
            dot.addEventListener('click', (e) => {
                const selectedColor = e.target.getAttribute('data-color');
                closePalette();
                openEditorModal(null, selectedColor);
            });
        });

        searchInput.addEventListener('input', (e) => {
            const query = e.target.value.toLowerCase();
            const filtered = notesData.filter(note => 
                note.title?.toLowerCase().includes(query) || note.content?.toLowerCase().includes(query)
            );
            renderNotes(filtered);
        });

        function renderNotes(notesToRender) {
            notesGrid.innerHTML = '';
            if (notesToRender.length === 0) emptyState.classList.remove('hidden');
            else emptyState.classList.add('hidden');

            notesToRender.forEach((note, index) => {
                const div = document.createElement('div');
                div.className = `group relative rounded-2xl md:rounded-[30px] p-5 md:p-7 flex flex-col justify-between min-h-[200px] md:min-h-[240px] transition-all duration-500 ease-smooth hover:-translate-y-2 hover:shadow-2xl hover:scale-[1.02] cursor-pointer animate-pop-in`;
                
                // Staggered entrance delay based on grid position
                div.style.animationDelay = `${index * 0.05}s`;
                div.style.backgroundColor = note.color || '#ffffff';
                
                let snippet = formatSnippet(note.content, 100);
                if (!snippet) snippet = 'No content';
                const dateStr = note.timestamp ? new Date(note.timestamp).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' }) : 'No date';
                div.innerHTML = `
                    <div class="transition-transform duration-500 ease-smooth group-hover:translate-x-1">
                        <h3 class="text-xl md:text-2xl font-bold text-gray-900 mb-2 leading-tight line-clamp-2">${escapeHtml(note.title) || 'Untitled Note'}</h3>
                        <p class="text-gray-800/80 font-medium text-sm md:text-base leading-relaxed line-clamp-3">${snippet}</p>
                    </div>
                    <div class="mt-4 flex items-end justify-between z-10">
                        <span class="text-xs md:text-sm font-semibold text-gray-900/60 transition-opacity duration-300 group-hover:opacity-100">${dateStr}</span>
                        <div class="w-10 h-10 md:w-12 md:h-12 bg-black rounded-full text-white flex items-center justify-center shadow-md cursor-pointer edit-btn transform transition-all duration-300 ease-spring group-hover:scale-110 active:scale-90">
                            <i data-lucide="pencil" class="w-4 h-4 md:w-5 md:h-5 pointer-events-none transition-transform duration-300 group-hover:rotate-12"></i>
                        </div>
                    </div>
                `;
                div.addEventListener('click', (e) => {
                    if (e.target.closest('.edit-btn')) return;
                    openViewModal(note);
                });
                const editBtn = div.querySelector('.edit-btn');
                editBtn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    openEditorModal(note);
                });
                div.addEventListener('contextmenu', (e) => {
                    e.preventDefault();
                    const shareUrl = window.location.origin + window.location.pathname + "?note=" + note.id;
                    const el = document.createElement('textarea');
                    el.value = shareUrl;
                    document.body.appendChild(el);
                    el.select();
                    document.execCommand('copy');
                    document.body.removeChild(el);
                    showToast("Link Copied! 🔗");
                });
                notesGrid.appendChild(div);
            });
            lucide.createIcons();
        }

        function openViewModal(note) {
            currentViewNote = note;
            viewTitle.textContent = note.title || 'Untitled Note';
            viewColorIndicator.style.backgroundColor = note.color || '#cccccc';
            const parsedHtml = marked.parse(note.content || '');
            viewContent.innerHTML = parsedHtml;
            try {
                renderMathInElement(viewContent, {
                    delimiters: [
                        {left: '$$', right: '$$', display: true},
                        {left: '$', right: '$', display: false},
                        {left: '\\(', right: '\\)', display: false},
                        {left: '\\[', right: '\\]', display: true}
                    ],
                    throwOnError: false
                });
            } catch(e) { console.error(e); }
            viewModal.classList.remove('hidden');
            setTimeout(() => {
                viewModal.classList.remove('opacity-0');
                viewModalContent.classList.remove('scale-95');
                viewModal.classList.add('opacity-100');
                viewModalContent.classList.add('scale-100');
            }, 20);
            fullscreenIcon = fullscreenViewBtn.querySelector('i');
            if (fullscreenIcon) lucide.createIcons();
        }

        function closeViewModal() {
            viewModal.classList.remove('opacity-100');
            viewModalContent.classList.remove('scale-100');
            viewModal.classList.add('opacity-0');
            viewModalContent.classList.add('scale-95');
            setTimeout(() => {
                viewModal.classList.add('hidden');
                currentViewNote = null;
                if (document.fullscreenElement) document.exitFullscreen();
            }, 500);
        }
        closeViewBtn.addEventListener('click', closeViewModal);
        viewModal.addEventListener('click', (e) => { if (e.target === viewModal) closeViewModal(); });
        editFromViewBtn.addEventListener('click', () => {
            if (currentViewNote) { closeViewModal(); openEditorModal(currentViewNote); }
        });
        
        // Copy Text Button Feature
        document.getElementById('copy-view-btn').addEventListener('click', () => {
            if (!currentViewNote) return;
            const textToCopy = currentViewNote.content || '';
            const tempTextArea = document.createElement('textarea');
            tempTextArea.value = textToCopy;
            document.body.appendChild(tempTextArea);
            tempTextArea.select();
            document.execCommand('copy');
            document.body.removeChild(tempTextArea);
            showToast("Content Copied! 📋");
        });

        document.addEventListener('keydown', (e) => {
            if (viewModal.classList.contains('hidden')) return;
            if (e.key === 'Enter') { e.preventDefault(); toggleFullscreen(); }
        });

        function showConfirmModal(onConfirm) {
            confirmModal.classList.remove('hidden');
            setTimeout(() => {
                confirmModal.classList.remove('opacity-0');
                confirmModal.querySelector('.bg-white').classList.remove('scale-95');
                confirmModal.classList.add('opacity-100');
                confirmModal.querySelector('.bg-white').classList.add('scale-100');
            }, 20);
            const handleConfirm = () => { closeConfirmModal(); onConfirm(); };
            const handleCancel = () => closeConfirmModal();
            confirmDeleteBtn.onclick = handleConfirm;
            confirmCancelBtn.onclick = handleCancel;
            confirmModal.onclick = (e) => { if (e.target === confirmModal) closeConfirmModal(); };
        }
        function closeConfirmModal() {
            confirmModal.classList.remove('opacity-100');
            confirmModal.querySelector('.bg-white').classList.remove('scale-100');
            confirmModal.classList.add('opacity-0');
            confirmModal.querySelector('.bg-white').classList.add('scale-95');
            setTimeout(() => {
                confirmModal.classList.add('hidden');
                confirmDeleteBtn.onclick = null;
                confirmCancelBtn.onclick = null;
                confirmModal.onclick = null;
            }, 500);
        }

        function openEditorModal(note = null, color = '#ffffff') {
            activeNoteId = note ? note.id : null;
            activeColor = note ? note.color : color;
            titleInput.value = note ? note.title || '' : '';
            contentInput.value = note ? note.content || '' : '';
            modalHeader.style.backgroundColor = `${activeColor}20`;
            modalColorIndicator.style.backgroundColor = activeColor;
            updatePreview();
            if (activeNoteId) {
                deleteBtn.classList.remove('hidden');
                deleteBtn.classList.add('flex');
            } else {
                deleteBtn.classList.add('hidden');
                deleteBtn.classList.remove('flex');
            }
            editorModal.classList.remove('hidden');
            void editorModal.offsetWidth;
            editorModal.classList.remove('opacity-0');
            editorModal.classList.add('opacity-100');
            editorContainer.classList.remove('scale-95');
            editorContainer.classList.add('scale-100');
            titleInput.focus();
        }

        function closeEditorModal() {
            editorModal.classList.remove('opacity-100');
            editorModal.classList.add('opacity-0');
            editorContainer.classList.remove('scale-100');
            editorContainer.classList.add('scale-95');
            setTimeout(() => {
                editorModal.classList.add('hidden');
                titleInput.value = '';
                contentInput.value = '';
                activeNoteId = null;
                deleteBtn.classList.add('hidden');
                deleteBtn.classList.remove('flex');
            }, 500);
        }
        cancelBtn.addEventListener('click', closeEditorModal);
        deleteBtn.addEventListener('click', () => {
            if (!activeNoteId || !currentUser) return;
            showConfirmModal(async () => {
                const noteRef = doc(db, 'artifacts', APP_ID, 'users', currentUser.uid, 'notes', activeNoteId);
                await deleteDoc(noteRef);
                closeEditorModal();
            });
        });

        function updatePreview() {
            previewTitle.textContent = titleInput.value || 'Untitled Note';
            const parsedHtml = marked.parse(contentInput.value || '');
            previewContent.innerHTML = parsedHtml;
            try {
                renderMathInElement(previewContent, {
                    delimiters: [
                        {left: '$$', right: '$$', display: true},
                        {left: '$', right: '$', display: false},
                        {left: '\\(', right: '\\)', display: false},
                        {left: '\\[', right: '\\]', display: true}
                    ],
                    throwOnError: false
                });
            } catch(e) { console.error(e); }
            
            // Update Word & Character Count
            const text = contentInput.value;
            const chars = text.length;
            const words = text.trim() === '' ? 0 : text.trim().split(/\s+/).length;
            document.getElementById('word-count').textContent = `${words} word${words !== 1 ? 's' : ''}`;
            document.getElementById('char-count').textContent = `${chars} character${chars !== 1 ? 's' : ''}`;
        }
        titleInput.addEventListener('input', updatePreview);
        contentInput.addEventListener('input', updatePreview);

        // Smart Editor Features: Auto-formatting lists & Tab support
        contentInput.addEventListener('keydown', function(e) {
            // Tab to insert spaces (prevents jumping out of textarea)
            if (e.key === 'Tab') {
                e.preventDefault();
                const start = this.selectionStart;
                const end = this.selectionEnd;
                this.value = this.value.substring(0, start) + "  " + this.value.substring(end);
                this.selectionStart = this.selectionEnd = start + 2;
                updatePreview();
            }
            
            // Enter key to auto-continue lists
            if (e.key === 'Enter') {
                const start = this.selectionStart;
                const textToCursor = this.value.substring(0, start);
                const lines = textToCursor.split('\n');
                const currentLine = lines[lines.length - 1];
                
                // Regex matches lines starting with optional space, then - or * or number.
                const ulMatch = currentLine.match(/^(\s*)([-*])\s(.*)$/);
                const olMatch = currentLine.match(/^(\s*)(\d+)\.\s(.*)$/);

                if (ulMatch || olMatch) {
                    const isEmpty = ulMatch ? !ulMatch[3].trim() : !olMatch[3].trim();
                    
                    if (isEmpty) {
                        // User pressed enter on an empty list item -> break the list by removing the marker
                        e.preventDefault();
                        const markerLength = ulMatch ? ulMatch[1].length + ulMatch[2].length + 1 : olMatch[1].length + olMatch[2].length + 2;
                        const newValue = this.value.substring(0, start - markerLength) + '\n' + this.value.substring(this.selectionEnd);
                        this.value = newValue;
                        this.selectionStart = this.selectionEnd = start - markerLength + 1;
                        updatePreview();
                        return;
                    }

                    // Auto-continue the list format
                    e.preventDefault();
                    let insertion = '\n';
                    if (ulMatch) {
                        insertion += ulMatch[1] + ulMatch[2] + ' ';
                    } else if (olMatch) {
                        const nextNum = parseInt(olMatch[2], 10) + 1;
                        insertion += olMatch[1] + nextNum + '. ';
                    }
                    
                    this.value = this.value.substring(0, start) + insertion + this.value.substring(this.selectionEnd);
                    this.selectionStart = this.selectionEnd = start + insertion.length;
                    updatePreview();
                }
            }
        });

        saveBtn.addEventListener('click', async () => {
            if (!currentUser) { 
                showToast("Please sign in to save notes.");
                openSettings();
                return;
            }
            const title = titleInput.value.trim() || 'Untitled Note';
            const content = contentInput.value.trim();
            if (!content && !titleInput.value.trim()) { closeEditorModal(); return; }
            const noteData = { title, content, color: activeColor, timestamp: Date.now() };
            const collectionRef = collection(db, 'artifacts', APP_ID, 'users', currentUser.uid, 'notes');
            if (activeNoteId) await setDoc(doc(collectionRef, activeNoteId), noteData);
            else await addDoc(collectionRef, noteData);
            closeEditorModal();
        });
    </script>
</body>
</html>
