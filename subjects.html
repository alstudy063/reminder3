<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>StudyMaster Pro</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>

  <style>
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes slideInFromBottom { from { transform: translateY(1rem); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    @keyframes slideInFromRight { from { transform: translateX(100%); } to { transform: translateX(0); } }
    @keyframes zoomIn { from { transform: scale(0.95); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    
    .animate-fade-in { animation: fadeIn 0.3s ease-out forwards; }
    .animate-slide-up { animation: slideInFromBottom 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
    .animate-slide-right { animation: slideInFromRight 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
    .animate-zoom-in { animation: zoomIn 0.2s cubic-bezier(0.16, 1, 0.3, 1) forwards; }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    
    .pb-safe { padding-bottom: env(safe-area-inset-bottom); }
  </style>
</head>
<body class="bg-slate-50 font-sans text-slate-900 overflow-hidden select-none md:select-auto">

        <button onclick="window.app.switchTab('dashboard')" id="nav-desktop-dashboard" class="nav-btn w-full flex items-center gap-3 px-4 py-3 rounded-xl transition-all bg-indigo-50 text-indigo-700 font-semibold">

        </button>

        <button onclick="window.app.openSettings()" class="w-full flex items-center gap-3 p-3 mb-2 rounded-xl bg-slate-50 hover:bg-indigo-50 transition-colors group text-left">
          <div id="desktop-user-avatar" class="w-10 h-10 rounded-full bg-indigo-100 flex items-center justify-center text-indigo-700 font-bold group-hover:bg-indigo-200 transition-colors">U</div>
          <div class="flex-1 overflow-hidden">
            <p id="desktop-user-name" class="text-sm font-semibold text-slate-800 truncate">Student</p>

    <nav class="md:hidden fixed bottom-0 w-full bg-white border-t border-slate-100 flex justify-around p-3 pb-safe z-30 shadow-[0_-4px_20px_rgba(0,0,0,0.02)]">

        <span class="text-[10px] font-medium">Overview</span>

      <button onclick="window.app.switchTab('subjects')" id="nav-mobile-subjects" class="nav-btn flex flex-col items-center p-2 rounded-xl transition-colors text-slate-400">
        <i data-lucide="book-open" class="w-6 h-6 mb-1"></i>

  </div>

  <!-- MODALS -->

    <div class="absolute inset-0 bg-slate-900/20 backdrop-blur-sm" onclick="window.app.closeSettings()"></div>
    <div class="relative bg-white rounded-3xl shadow-xl w-full max-w-md animate-zoom-in flex flex-col max-h-[90vh]">

        <h2 class="text-xl font-bold text-slate-800 flex items-center gap-2">

            <button onclick="window.app.handleBackup()" class="w-full flex items-center justify-between p-4 hover:bg-slate-50 transition-colors border-b border-slate-100 text-left group">

                  <p class="text-xs text-slate-500">Save your progress to a file</p>

              </div>

  <!-- SIGN-IN MODAL (shown when not logged in) -->

      </div>
      <h2 class="text-2xl font-bold text-slate-800 mb-2">Welcome to StudyMaster</h2>
      <p class="text-slate-500 mb-6">Sign in with Google to start tracking your learning progress.</p>
      <button id="immediate-google-signin" class="w-full flex items-center justify-center gap-3 bg-white border border-slate-300 hover:bg-slate-50 text-slate-700 font-medium py-3 px-4 rounded-xl transition-colors shadow-sm">
        <svg class="w-5 h-5" viewBox="0 0 24 24">
          <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
          <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
          <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
          <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
        </svg>
        Sign in with Google

  <!-- Toast Notification -->
  <div id="toast" class="fixed top-4 right-4 z-[70] transition-all duration-300 transform -translate-y-full opacity-0 pointer-events-none">
    <div id="toast-content" class="flex items-center gap-3 px-4 py-3 rounded-2xl shadow-lg border bg-white border-slate-100 text-slate-700">
      <i id="toast-icon" data-lucide="info" class="w-5 h-5"></i>
      <span id="toast-message" class="font-medium text-sm">Message</span>

  <!-- Firebase & App Logic -->
  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js';
    import { getAuth, onAuthStateChanged, signOut, GoogleAuthProvider, signInWithPopup } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js';
    import { getFirestore, collection, doc, setDoc, deleteDoc, onSnapshot, updateDoc } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js';

    lucide.createIcons();

    // ---------- YOUR FIREBASE CONFIG ----------
    const firebaseConfig = {
      apiKey: "AIzaSyA9DLfAHTUUGxCPn2j_k6godoTEopzaFAU",
      authDomain: "studymaster-919ba.firebaseapp.com",
      databaseURL: "https://studymaster-919ba-default-rtdb.firebaseio.com",
      projectId: "studymaster-919ba",
      storageBucket: "studymaster-919ba.firebasestorage.app",
      messagingSenderId: "426684063256",
      appId: "1:426684063256:web:52c17625a9450ea9662d6d",
      measurementId: "G-CWQB2330GF"
    };
    // ------------------------------------------

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    
    // 🔧 CHANGED: Use the same appId as your Firestore security rule
    const appId = "studyflow-pro";  // was "studymaster-v2"

    // UI elements
    const signinModal = document.getElementById('signin-modal');
    const appContainer = document.getElementById('app-container');

    // Global state
    const state = {
      user: null,
      subjects: [],
      activeTab: 'dashboard',
      selectedSubjectId: null,
      unsubscribeDb: null
    };

    // Utility functions (same as before)
    const colors = ['bg-blue-500', 'bg-indigo-500', 'bg-purple-500', 'bg-emerald-500', 'bg-rose-500', 'bg-amber-500'];

    function showToast(message, type = 'info') {
      const toast = document.getElementById('toast');
      const toastContent = document.getElementById('toast-content');
      const toastIcon = document.getElementById('toast-icon');
      const toastMessage = document.getElementById('toast-message');
      
      toastMessage.textContent = message;
      
      toastContent.className = 'flex items-center gap-3 px-4 py-3 rounded-2xl shadow-lg border';
      if (type === 'error') {
        toastContent.classList.add('bg-rose-50', 'border-rose-100', 'text-rose-700');
        toastIcon.setAttribute('data-lucide', 'alert-circle');
      } else if (type === 'success') {
        toastContent.classList.add('bg-emerald-50', 'border-emerald-100', 'text-emerald-700');
        toastIcon.setAttribute('data-lucide', 'check-circle-2');
      } else {
        toastContent.classList.add('bg-white', 'border-slate-100', 'text-slate-700');
        toastIcon.setAttribute('data-lucide', 'info');
      }
      lucide.createIcons({ root: toast });
      
      toast.classList.remove('-translate-y-full', 'opacity-0');
      toast.classList.add('translate-y-0', 'opacity-100');
      setTimeout(() => {
        toast.classList.remove('translate-y-0', 'opacity-100');
        toast.classList.add('-translate-y-full', 'opacity-0');
      }, 3000);
    }

    function calculateProgress(subject) {
      let total = 0, completed = 0;
      if (subject.units) {
        subject.units.forEach(u => {
          if (u.subunits) {
            total += u.subunits.length;
            completed += u.subunits.filter(su => su.completed).length;
          }
        });
      }
      if (subject.subtopics) {
        total += subject.subtopics.length;
        completed += subject.subtopics.filter(st => st.completed).length;
      }
      if (total === 0) return 0;
      return Math.round((completed / total) * 100);
    }

    function getTaskCount(subject) {
      let count = 0;
      if (subject.units) {
        subject.units.forEach(u => count += (u.subunits ? u.subunits.length : 0));
      }
      if (subject.subtopics) count += subject.subtopics.length;
      return count;
    }

    function getOverallStats() {
      let tTasks = 0, cTasks = 0;
      state.subjects.forEach(s => {
        if (s.units) {
          s.units.forEach(u => {
            if (u.subunits) {
              tTasks += u.subunits.length;
              cTasks += u.subunits.filter(su => su.completed).length;
            }
          });
        }
        if (s.subtopics) {
          tTasks += s.subtopics.length;
          cTasks += s.subtopics.filter(st => st.completed).length;
        }
      });
      return {
        totalTasks: tTasks,
        completedTasks: cTasks,
        progress: tTasks === 0 ? 0 : Math.round((cTasks / tTasks) * 100)
      };
    }

    function generateProgressBar(progress, colorClass) {
      return `
        <div class="w-full bg-slate-100 rounded-full h-2.5 overflow-hidden">
          <div class="h-2.5 rounded-full transition-all duration-500 ease-out ${colorClass}" style="width: ${progress}%"></div>
        </div>
      `;
    }

    function generateSubjectCard(subject) {
      const progress = calculateProgress(subject);
      const taskCount = getTaskCount(subject);
      const unitCount = subject.units ? subject.units.length : 0;
      const textColor = subject.color.replace('bg-', 'text-');
      
      return `
        <div onclick="window.app.openSubjectDrawer('${subject.id}')" class="bg-white rounded-3xl p-5 border border-slate-100 shadow-sm hover:shadow-md hover:border-indigo-100 hover:-translate-y-1 transition-all cursor-pointer group flex flex-col justify-between h-48">
          <div>
            <div class="flex justify-between items-start mb-4">
              <div class="p-3 rounded-2xl ${subject.color} bg-opacity-10 text-opacity-90 flex items-center justify-center">
                <i data-lucide="book-marked" class="w-6 h-6 ${textColor}"></i>
              </div>
              <button class="text-slate-300 group-hover:text-slate-500 p-1">
                <i data-lucide="more-vertical" class="w-5 h-5"></i>
              </button>
            </div>
            <h3 class="text-lg font-bold text-slate-800 mb-1 truncate">${subject.title}</h3>
            <p class="text-sm text-slate-500 mb-6">${unitCount} Units • ${taskCount} Tasks</p>
          </div>
          <div>
            <div class="flex justify-between items-center mb-2">
              <span class="text-xs font-semibold text-slate-500 uppercase tracking-wider">Progress</span>
              <span class="text-sm font-bold text-slate-700">${progress}%</span>
            </div>
            ${generateProgressBar(progress, subject.color)}
          </div>
        </div>
      `;
    }

    function renderNavigation() {
      document.querySelectorAll('.nav-btn').forEach(btn => {
        btn.className = btn.id.includes('desktop') 
          ? 'nav-btn w-full flex items-center gap-3 px-4 py-3 rounded-xl transition-all text-slate-600 hover:bg-slate-50'
          : 'nav-btn flex flex-col items-center p-2 rounded-xl transition-colors text-slate-400';
      });

      const activeDesktop = document.getElementById(`nav-desktop-${state.activeTab}`);
      const activeMobile = document.getElementById(`nav-mobile-${state.activeTab}`);
      
      if(activeDesktop) activeDesktop.className = 'nav-btn w-full flex items-center gap-3 px-4 py-3 rounded-xl transition-all bg-indigo-50 text-indigo-700 font-semibold';
      if(activeMobile) activeMobile.className = 'nav-btn flex flex-col items-center p-2 rounded-xl transition-colors text-indigo-600';

      document.getElementById('page-title').textContent = state.activeTab === 'dashboard' ? 'Overview' : 'My Subjects';
      document.getElementById('page-subtitle').textContent = state.activeTab === 'dashboard' ? "Let's track your progress today." : "Manage your learning modules.";
    }

    function renderView() {
      renderNavigation();
      const container = document.getElementById('view-container');
      
      if (state.activeTab === 'dashboard') {
        const stats = getOverallStats();
        let recentCardsHTML = state.subjects.length === 0 
          ? `
            <div class="text-center py-12 bg-white rounded-3xl border border-dashed border-slate-200 col-span-full">
              <div class="w-16 h-16 bg-slate-50 rounded-full flex items-center justify-center mx-auto mb-3">
                <i data-lucide="book-open" class="w-8 h-8 text-slate-400"></i>
              </div>
              <p class="text-slate-500 font-medium">No subjects yet.</p>
              <button onclick="window.app.openAddSubjectModal()" class="mt-4 text-indigo-600 font-medium hover:underline">
                Create your first subject
              </button>
            </div>
          `
          : state.subjects.slice(0, 3).map(generateSubjectCard).join('');

        container.innerHTML = `
          <div class="space-y-8 animate-slide-up">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4 md:gap-6">
              <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-100 flex items-center gap-4">
                <div class="p-4 bg-indigo-50 rounded-2xl text-indigo-600">
                  <i data-lucide="book-open" class="w-8 h-8"></i>
                </div>
                <div>
                  <p class="text-sm font-medium text-slate-500">Total Subjects</p>
                  <p class="text-3xl font-bold text-slate-800">${state.subjects.length}</p>
                </div>
              </div>
              <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-100 flex items-center gap-4">
                <div class="p-4 bg-emerald-50 rounded-2xl text-emerald-600">
                  <i data-lucide="check-circle-2" class="w-8 h-8"></i>
                </div>
                <div>
                  <p class="text-sm font-medium text-slate-500">Tasks Completed</p>
                  <p class="text-3xl font-bold text-slate-800">${stats.completedTasks} <span class="text-lg text-slate-400 font-normal">/ ${stats.totalTasks}</span></p>
                </div>
              </div>
              <div class="bg-gradient-to-br from-indigo-600 to-purple-600 p-6 rounded-3xl shadow-md text-white flex flex-col justify-between">
                <div>
                  <p class="text-indigo-100 font-medium mb-1">Overall Progress</p>
                  <div class="flex items-baseline gap-1">
                    <span class="text-4xl font-bold">${stats.progress}</span>
                    <span class="text-xl opacity-80">%</span>
                  </div>
                </div>
                <div class="mt-4">
                  <div class="w-full bg-white/20 rounded-full h-2">
                    <div class="bg-white h-2 rounded-full transition-all duration-1000" style="width: ${stats.progress}%"></div>
                  </div>
                </div>
              </div>
            </div>
            <div>
              <h3 class="text-xl font-bold text-slate-800 mb-4">Active Subjects</h3>
              <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 md:gap-6">
                ${recentCardsHTML}
              </div>
              ${state.subjects.length > 3 ? `
                <button onclick="window.app.switchTab('subjects')" class="mt-4 w-full md:w-auto text-center py-2 px-4 text-slate-600 hover:text-indigo-600 font-medium transition-colors">
                  View all subjects &rarr;
                </button>
              ` : ''}
            </div>
          </div>
        `;
      } else {
        const cardsHTML = state.subjects.map(generateSubjectCard).join('');
        const addPlaceholder = `
          <button onclick="window.app.openAddSubjectModal()" class="flex flex-col items-center justify-center h-48 bg-slate-50 hover:bg-indigo-50 border-2 border-dashed border-slate-200 hover:border-indigo-300 rounded-3xl transition-all group">
            <div class="p-3 bg-white rounded-full text-slate-400 group-hover:text-indigo-600 group-hover:scale-110 transition-all shadow-sm">
              <i data-lucide="plus" class="w-6 h-6"></i>
            </div>
            <span class="mt-3 font-medium text-slate-500 group-hover:text-indigo-600">Add New Subject</span>
          </button>
        `;
        container.innerHTML = `
          <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 md:gap-6 animate-slide-up">
            ${cardsHTML}
            ${addPlaceholder}
          </div>
        `;
      }
      lucide.createIcons();
    }

    function renderSubjectDrawer() {
      if (!state.selectedSubjectId) return;
      const subject = state.subjects.find(s => s.id === state.selectedSubjectId);
      if (!subject) {
        window.app.closeSubjectDrawer();
        return;
      }

      const progress = calculateProgress(subject);
      const textColor = subject.color.replace('bg-', 'text-');
      const drawer = document.getElementById('drawer-content');

      let unitsHTML = '';
      if (!subject.units || subject.units.length === 0) {
        unitsHTML += `
          <div class="text-center py-10">
            <div class="inline-flex items-center justify-center w-12 h-12 rounded-full bg-slate-100 mb-3">
              <i data-lucide="folder-open" class="w-6 h-6 text-slate-400"></i>
            </div>
            <p class="text-slate-500 font-medium">No units added yet.</p>
            <p class="text-xs text-slate-400 mt-1">Start by creating your first unit below.</p>
          </div>
        `;
      } else {
        unitsHTML += subject.units.map(unit => {
          let subunitsHTML = '';
          if (unit.subunits && unit.subunits.length > 0) {
            subunitsHTML = `<ul class="space-y-1 mt-2 mb-3">` + unit.subunits.map(su => `
              <li class="group flex items-center justify-between hover:bg-slate-50 p-2 rounded-xl transition-colors border border-transparent hover:border-slate-100">
                <button onclick="window.app.toggleSubunit('${subject.id}', '${unit.id}', '${su.id}')" class="flex-1 flex items-center gap-3 text-left">
                  ${su.completed 
                    ? `<i data-lucide="check-circle-2" class="w-5 h-5 ${textColor}"></i>` 
                    : `<i data-lucide="circle" class="w-5 h-5 text-slate-300 group-hover:text-indigo-300"></i>`
                  }
                  <span class="text-sm font-medium ${su.completed ? 'text-slate-400 line-through' : 'text-slate-700'}">${su.title}</span>
                </button>
                <button onclick="window.app.deleteSubunit('${subject.id}', '${unit.id}', '${su.id}')" class="p-1.5 text-slate-300 hover:text-rose-500 opacity-0 group-hover:opacity-100 transition-opacity md:opacity-0 opacity-100 rounded-lg">
                  <i data-lucide="trash-2" class="w-4 h-4"></i>
                </button>
              </li>
            `).join('') + `</ul>`;
          } else {
            subunitsHTML = `<p class="text-xs text-slate-400 mt-2 ml-2 italic mb-3">No tasks in this unit yet.</p>`;
          }
          return `
            <div class="bg-white border border-slate-200 rounded-2xl mb-4 overflow-hidden shadow-sm">
              <div class="bg-slate-50/50 p-3 border-b border-slate-100 flex items-center justify-between">
                <h4 class="font-bold text-slate-800 text-sm flex items-center gap-2">
                  <i data-lucide="folder" class="w-4 h-4 ${textColor}"></i>
                  ${unit.title}
                </h4>
                <button onclick="window.app.deleteUnit('${subject.id}', '${unit.id}')" class="text-slate-400 hover:text-rose-500 transition-colors p-1.5 rounded-lg hover:bg-rose-50" title="Delete Unit">
                  <i data-lucide="trash-2" class="w-4 h-4"></i>
                </button>
              </div>
              <div class="p-3">
                ${subunitsHTML}
                <form onsubmit="window.app.handleAddSubunit(event, '${subject.id}', '${unit.id}')" class="flex items-center gap-2">
                  <input type="text" name="subunit" placeholder="Add sub-unit task..." class="flex-1 bg-slate-50 border border-slate-200 rounded-lg px-3 py-2 text-xs focus:outline-none focus:ring-1 focus:ring-indigo-500 focus:bg-white transition-all" required autocomplete="off"/>
                  <button type="submit" class="bg-slate-100 text-slate-600 hover:text-white hover:${subject.color} p-2 rounded-lg transition-colors">
                    <i data-lucide="plus" class="w-4 h-4"></i>
                  </button>
                </form>
              </div>
            </div>
          `;
        }).join('');
      }

      drawer.innerHTML = `
        <div class="${subject.color} bg-opacity-10 p-6 border-b border-slate-100 flex items-start justify-between">
          <div>
            <div class="flex items-center gap-3 mb-2">
              <div class="p-3 rounded-2xl ${subject.color} bg-opacity-10 text-opacity-90 flex items-center justify-center">
                <i data-lucide="book-marked" class="w-6 h-6 ${textColor}"></i>
              </div>
              <h2 class="text-xl font-bold text-slate-800">${subject.title}</h2>
            </div>
            <div class="flex items-center gap-2 mt-4">
              <div class="flex-1 w-32">
                ${generateProgressBar(progress, subject.color)}
              </div>
              <span class="text-sm font-semibold text-slate-600">${progress}%</span>
            </div>
          </div>
          <div class="flex items-center gap-2">
            <button onclick="window.app.deleteSubject('${subject.id}')" class="p-2 text-slate-400 hover:text-rose-500 hover:bg-rose-50 rounded-full transition-colors">
              <i data-lucide="trash-2" class="w-5 h-5"></i>
            </button>
            <button onclick="window.app.closeSubjectDrawer()" class="p-2 text-slate-400 hover:bg-slate-100 rounded-full transition-colors">
              <i data-lucide="x" class="w-6 h-6"></i>
            </button>
          </div>
        </div>
        <div class="flex-1 overflow-y-auto p-4 md:p-6 bg-slate-50/50">
          <div class="flex justify-between items-center mb-4">
            <h3 class="text-xs font-bold text-slate-400 uppercase tracking-wider">Course Units</h3>
          </div>
          ${unitsHTML}
        </div>
        <div class="p-4 bg-white border-t border-slate-100 shadow-[0_-4px_10px_rgba(0,0,0,0.02)]">
          <form onsubmit="window.app.handleAddUnit(event, '${subject.id}')" class="flex items-center gap-2">
            <input type="text" name="unit" placeholder="Create a new unit..." class="flex-1 bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:bg-white transition-all" required autocomplete="off"/>
            <button type="submit" class="${subject.color} text-white px-4 py-3 rounded-xl hover:opacity-90 transition-opacity font-medium text-sm shadow-sm flex items-center gap-2">
              <i data-lucide="folder-plus" class="w-4 h-4"></i>
              <span class="hidden sm:inline">Add Unit</span>
            </button>
          </form>
        </div>
      `;
      lucide.createIcons({ root: drawer });
    }

    function updateUserProfileUI(user) {
      if (!user) return;
      const name = user.displayName || 'Student';
      const email = user.email || 'Signed in via Google';
      const initial = name.charAt(0).toUpperCase();

      document.getElementById('desktop-user-avatar').textContent = initial;
      document.getElementById('desktop-user-name').textContent = name;
      document.getElementById('desktop-user-email').textContent = email;
      document.getElementById('mobile-user-avatar').textContent = initial;
      document.getElementById('settings-avatar').textContent = initial;
      document.getElementById('settings-name').textContent = name;
      document.getElementById('settings-email').textContent = email;
    }

    // App API
    window.app = {
      switchTab: (tab) => {
        state.activeTab = tab;
        renderView();
      },
      openAddSubjectModal: () => {
        document.getElementById('new-subject-title').value = '';
        document.getElementById('add-subject-modal').classList.remove('hidden');
        setTimeout(() => document.getElementById('new-subject-title').focus(), 100);
      },
      closeAddSubjectModal: () => {
        document.getElementById('add-subject-modal').classList.add('hidden');
      },
      openSubjectDrawer: (id) => {
        state.selectedSubjectId = id;
        renderSubjectDrawer();
        document.getElementById('subject-drawer').classList.remove('hidden');
      },
      closeSubjectDrawer: () => {
        state.selectedSubjectId = null;
        document.getElementById('subject-drawer').classList.add('hidden');
      },
      openSettings: () => {
        document.getElementById('settings-modal').classList.remove('hidden');
      },
      closeSettings: () => {
        document.getElementById('settings-modal').classList.add('hidden');
      },
      logout: async () => {
        try { 
          await signOut(auth); 
          window.app.closeSettings();
        } catch (error) { 
          console.error(error); 
        }
      },
      handleGoogleSignIn: async () => {
        const provider = new GoogleAuthProvider();
        try {
          await signInWithPopup(auth, provider);
          showToast("Signed in with Google", "success");
        } catch (error) {
          console.error(error);
          showToast("Authentication failed.", "error");
        }
      },
      handleBackup: () => {
        if (!state.subjects || state.subjects.length === 0) {
          showToast("No data to backup", "info");
          return;
        }
        try {
          const dataStr = JSON.stringify(state.subjects, null, 2);
          const blob = new Blob([dataStr], { type: "application/json" });
          const url = URL.createObjectURL(blob);
          const a = document.createElement('a');
          a.href = url;
          a.download = `studymaster_backup_${new Date().toISOString().split('T')[0]}.json`;
          document.body.appendChild(a);
          a.click();
          document.body.removeChild(a);
          URL.revokeObjectURL(url);
          showToast("Backup downloaded", "success");
        } catch(error) {
          console.error(error);
          showToast("Failed to create backup", "error");
        }
      },
      handleRestore: (event) => {
        const file = event.target.files[0];
        if (!file || !state.user) return;
        const reader = new FileReader();
        reader.onload = async (e) => {
          try {
            const data = JSON.parse(e.target.result);
            if (!Array.isArray(data)) throw new Error("Invalid format");
            showToast("Restoring data...", "info");
            for (const subject of data) {
              const ref = doc(db, 'artifacts', appId, 'users', state.user.uid, 'subjects', subject.id);
              await setDoc(ref, subject);
            }
            showToast("Data restored successfully!", "success");
            window.app.closeSettings();
          } catch(err) {
            console.error(err);
            showToast("Invalid backup file", "error");
          }
          event.target.value = '';
        };
        reader.readAsText(file);
      },
      handleAddSubject: async (e) => {
        e.preventDefault();
        if (!state.user) return;
        const titleInput = document.getElementById('new-subject-title');
        const title = titleInput.value.trim();
        if (!title) return;

        const randomColor = colors[Math.floor(Math.random() * colors.length)];
        const newId = crypto.randomUUID();
        const subjectRef = doc(db, 'artifacts', appId, 'users', state.user.uid, 'subjects', newId);
        
        try {
          await setDoc(subjectRef, {
            title: title,
            color: randomColor,
            units: [], 
            createdAt: Date.now()
          });
          window.app.closeAddSubjectModal();
          showToast("Subject added", "success");
        } catch (error) {
          console.error("Add subject error:", error);
          showToast("Failed to add subject: " + error.message, "error");
        }
      },
      deleteSubject: async (id) => {
        if (!state.user || !confirm("Are you sure you want to delete this subject?")) return;
        try {
          await deleteDoc(doc(db, 'artifacts', appId, 'users', state.user.uid, 'subjects', id));
          window.app.closeSubjectDrawer();
          showToast("Subject deleted", "info");
        } catch (error) {
          console.error(error);
          showToast("Failed to delete", "error");
        }
      },
      handleAddUnit: async (e, subjectId) => {
        e.preventDefault();
        if (!state.user) return;
        const input = e.target.elements.unit;
        const title = input.value.trim();
        if (!title) return;

        const subject = state.subjects.find(s => s.id === subjectId);
        if (!subject) return;

        const newUnit = { id: crypto.randomUUID(), title: title, subunits: [] };
        const subjectRef = doc(db, 'artifacts', appId, 'users', state.user.uid, 'subjects', subjectId);
        try {
          await updateDoc(subjectRef, { units: [...(subject.units || []), newUnit] });
          input.value = '';
        } catch (error) {
          console.error(error);
          showToast("Failed to add unit", "error");
        }
      },
      deleteUnit: async (subjectId, unitId) => {
        if (!state.user || !confirm("Delete this unit and all its sub-units?")) return;
        const subject = state.subjects.find(s => s.id === subjectId);
        if (!subject || !subject.units) return;

        const updatedUnits = subject.units.filter(u => u.id !== unitId);
        const subjectRef = doc(db, 'artifacts', appId, 'users', state.user.uid, 'subjects', subjectId);
        try {
          await updateDoc(subjectRef, { units: updatedUnits });
        } catch (error) { console.error(error); }
      },
      handleAddSubunit: async (e, subjectId, unitId) => {
        e.preventDefault();
        if (!state.user) return;
        const input = e.target.elements.subunit;
        const title = input.value.trim();
        if (!title) return;

        const subject = state.subjects.find(s => s.id === subjectId);
        if (!subject || !subject.units) return;

        const newSubunit = { id: crypto.randomUUID(), title: title, completed: false };
        const updatedUnits = subject.units.map(u => 
          u.id === unitId ? { ...u, subunits: [...(u.subunits || []), newSubunit] } : u
        );

        const subjectRef = doc(db, 'artifacts', appId, 'users', state.user.uid, 'subjects', subjectId);
        try {
          await updateDoc(subjectRef, { units: updatedUnits });
          input.value = '';
        } catch (error) { console.error(error); }
      },
      toggleSubunit: async (subjectId, unitId, subunitId) => {
        if (!state.user) return;
        const subject = state.subjects.find(s => s.id === subjectId);
        if (!subject || !subject.units) return;

        const updatedUnits = subject.units.map(u => 
          u.id === unitId ? {
            ...u, subunits: u.subunits.map(su => su.id === subunitId ? { ...su, completed: !su.completed } : su)
          } : u
        );

        const subjectRef = doc(db, 'artifacts', appId, 'users', state.user.uid, 'subjects', subjectId);
        try { await updateDoc(subjectRef, { units: updatedUnits }); } catch (error) { console.error(error); }
      },
      deleteSubunit: async (subjectId, unitId, subunitId) => {
        if (!state.user) return;
        const subject = state.subjects.find(s => s.id === subjectId);
        if (!subject || !subject.units) return;

        const updatedUnits = subject.units.map(u => 
          u.id === unitId ? { ...u, subunits: u.subunits.filter(su => su.id !== subunitId) } : u
        );

        const subjectRef = doc(db, 'artifacts', appId, 'users', state.user.uid, 'subjects', subjectId);
        try { await updateDoc(subjectRef, { units: updatedUnits }); } catch (error) { console.error(error); }
      }
    };

    // Auth listener: show modal if no user, else hide modal and load app
    onAuthStateChanged(auth, (user) => {
      state.user = user;
      if (user) {
        signinModal.classList.add('hidden');
        appContainer.classList.remove('hidden');
        
        updateUserProfileUI(user);
        
        if (state.unsubscribeDb) state.unsubscribeDb();
        const subjectsRef = collection(db, 'artifacts', appId, 'users', user.uid, 'subjects');
        state.unsubscribeDb = onSnapshot(subjectsRef, (snapshot) => {
          state.subjects = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
          state.subjects.sort((a, b) => b.createdAt - a.createdAt);
          renderView();
          if (state.selectedSubjectId) renderSubjectDrawer();
        }, (error) => {
          console.error("Firestore error:", error);
          showToast("Error loading data", "error");
        });
      } else {
        signinModal.classList.remove('hidden');
        appContainer.classList.add('hidden');
        if (state.unsubscribeDb) {
          state.unsubscribeDb();
          state.unsubscribeDb = null;
        }
        state.subjects = [];
      }
    });

    document.getElementById('immediate-google-signin').addEventListener('click', () => {
      window.app.handleGoogleSignIn();
    });
  </script>
</body>
</html>
