<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>StudyMaster Pro</title>
  
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:ital,wght@0,100..900;1,100..900&family=Noto+Sans+Sinhala:wght@100..900&display=swap" rel="stylesheet">
  
  <!-- Tailwind CSS with Dark Mode config -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            dark: {
              bg: '#0f172a',
              card: '#1e293b',
              border: '#334155',
              text: '#f8fafc',
              muted: '#94a3b8'
            }
          }
        }
      }
    }
  </script>
  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>

  <style>
    body {
      font-family: 'Noto Sans', 'Noto Sans Sinhala', sans-serif;
      transition: background-color 0.3s ease, color 0.3s ease;
    }
    
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes slideInFromBottom { from { transform: translateY(1.5rem); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    @keyframes slideInFromRight { from { transform: translateX(100%); } to { transform: translateX(0); } }
    @keyframes zoomIn { from { transform: scale(0.95); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    
    .animate-fade-in { animation: fadeIn 0.4s ease-out forwards; }
    .animate-slide-up { animation: slideInFromBottom 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
    .animate-slide-right { animation: slideInFromRight 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
    .animate-zoom-in { animation: zoomIn 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards; }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    
    .dark ::-webkit-scrollbar-thumb { background: #334155; }
    .dark ::-webkit-scrollbar-thumb:hover { background: #475569; }

    .pb-safe { padding-bottom: env(safe-area-inset-bottom); }

    .skeleton-shimmer {
      background: #f1f5f9;
      background-image: linear-gradient(to right, #f1f5f9 0%, #e2e8f0 20%, #f1f5f9 40%, #f1f5f9 100%);
      background-repeat: no-repeat;
      background-size: 800px 100%; 
      animation-duration: 1.5s;
      animation-fill-mode: forwards; 
      animation-iteration-count: infinite;
      animation-name: placeholderShimmer;
      animation-timing-function: linear;
    }
    
    .dark .skeleton-shimmer {
      background: #1e293b;
      background-image: linear-gradient(to right, #1e293b 0%, #334155 20%, #1e293b 40%, #1e293b 100%);
    }
    
    @keyframes placeholderShimmer {
      0% { background-position: -468px 0; }
      100% { background-position: 468px 0; }
    }

    /* Prevent text selection during rapid clicking */
    .no-select { user-select: none; -webkit-user-select: none; }
  </style>
</head>
<body class="bg-slate-50 dark:bg-[#0f172a] text-slate-900 dark:text-slate-100 overflow-hidden select-none md:select-auto">

  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js';
    import { getAuth, onAuthStateChanged, signOut, signInAnonymously, signInWithCustomToken, GoogleAuthProvider, signInWithPopup, linkWithPopup } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js';
    import { getFirestore, collection, doc, setDoc, deleteDoc, onSnapshot, updateDoc } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js';

    lucide.createIcons();

    // Firebase Config
    let firebaseConfig = {
      apiKey: "AIzaSyA9DLfAHTUUGxCPn2j_k6godoTEopzaFAU",
      authDomain: "studymaster-919ba.firebaseapp.com",
      projectId: "studymaster-919ba",
      storageBucket: "studymaster-919ba.firebasestorage.app",
      messagingSenderId: "426684063256",
      appId: "1:426684063256:web:52c17625a9450ea9662d6d"
    };

    if (typeof __firebase_config !== 'undefined') {
      firebaseConfig = JSON.parse(__firebase_config);
    }

    const fbApp = initializeApp(firebaseConfig);
    const auth = getAuth(fbApp);
    const db = getFirestore(fbApp);
    const appId = "studyflow-pro";

    // State
    const state = {
      user: null,
      subjects: [],
      activeTab: 'dashboard',
      selectedSubjectId: null,
      unsubscribeDb: null,
      isLoading: true,
      darkMode: localStorage.getItem('theme') === 'dark'
    };

    const colors = ['bg-blue-500', 'bg-indigo-500', 'bg-purple-500', 'bg-emerald-500', 'bg-rose-500', 'bg-amber-500'];

    // UI Helpers
    function showToast(message, type = 'info') {
      const toast = document.getElementById('toast');
      const toastContent = document.getElementById('toast-content');
      const toastIcon = document.getElementById('toast-icon');
      const toastMessage = document.getElementById('toast-message');
      
      toastMessage.textContent = message;
      toastContent.className = 'flex items-center gap-3 px-4 py-3.5 rounded-2xl shadow-xl border transition-all';
      
      if (type === 'error') {
        toastContent.classList.add('bg-rose-50', 'dark:bg-rose-900/20', 'border-rose-100', 'dark:border-rose-900/50', 'text-rose-700', 'dark:text-rose-400');
        toastIcon.setAttribute('data-lucide', 'alert-circle');
      } else if (type === 'success') {
        toastContent.classList.add('bg-emerald-50', 'dark:bg-emerald-900/20', 'border-emerald-100', 'dark:border-emerald-900/50', 'text-emerald-700', 'dark:text-emerald-400');
        toastIcon.setAttribute('data-lucide', 'check-circle-2');
      } else {
        toastContent.classList.add('bg-white', 'dark:bg-slate-800', 'border-slate-100', 'dark:border-slate-700', 'text-slate-700', 'dark:text-slate-200');
        toastIcon.setAttribute('data-lucide', 'info');
      }
      lucide.createIcons({ root: toast });
      
      toast.classList.remove('-translate-y-full', 'opacity-0');
      toast.classList.add('translate-y-0', 'opacity-100');
      setTimeout(() => {
        toast.classList.remove('translate-y-0', 'opacity-100');
        toast.classList.add('-translate-y-full', 'opacity-0');
      }, 3000);
    }

    function calculateProgress(subject) {
      let total = 0, completed = 0;
      if (subject.units) {
        subject.units.forEach(u => {
          if (u.subunits) {
            total += u.subunits.length;
            completed += u.subunits.filter(su => su.completed).length;
          }
        });
      }
      return total === 0 ? 0 : Math.round((completed / total) * 100);
    }

    function generateSubjectCard(subject, index = 0) {
      const progress = calculateProgress(subject);
      const unitCount = subject.units ? subject.units.length : 0;
      const colorClass = subject.color || 'bg-indigo-500';
      const textColor = colorClass.replace('bg-', 'text-');
      const delay = index * 0.05;

      return `
        <div style="animation-delay: ${delay}s" onclick="window.app.openSubjectDrawer('${subject.id}')" class="animate-slide-up opacity-0 bg-white dark:bg-slate-800 rounded-3xl p-5 border border-slate-100 dark:border-slate-700 shadow-sm hover:shadow-lg hover:-translate-y-1 transition-all duration-300 cursor-pointer group flex flex-col justify-between h-48 no-select">
          <div>
            <div class="flex justify-between items-start mb-4">
              <div class="p-3 rounded-2xl ${colorClass} bg-opacity-10 text-opacity-90 transform group-hover:scale-110 transition-transform">
                <i data-lucide="book-marked" class="w-6 h-6 ${textColor}"></i>
              </div>
              <button class="text-slate-300 dark:text-slate-600 group-hover:text-slate-500 p-1 rounded-lg">
                <i data-lucide="more-vertical" class="w-5 h-5"></i>
              </button>
            </div>
            <h3 class="text-lg font-bold text-slate-800 dark:text-slate-100 mb-1 truncate group-hover:text-indigo-600 dark:group-hover:text-indigo-400 transition-colors">${subject.title}</h3>
            <p class="text-sm text-slate-500 dark:text-slate-400">${unitCount} Units</p>
          </div>
          <div>
            <div class="flex justify-between items-center mb-2">
              <span class="text-xs font-semibold text-slate-400 uppercase">Progress</span>
              <span class="text-sm font-bold text-slate-700 dark:text-slate-300">${progress}%</span>
            </div>
            <div class="w-full bg-slate-100 dark:bg-slate-700 rounded-full h-2 overflow-hidden">
              <div class="h-2 rounded-full transition-all duration-700 ${colorClass}" style="width: ${progress}%"></div>
            </div>
          </div>
        </div>
      `;
    }

    function renderView() {
      // Apply theme
      if (state.darkMode) {
        document.documentElement.classList.add('dark');
        document.getElementById('dark-mode-toggle').checked = true;
      } else {
        document.documentElement.classList.remove('dark');
        document.getElementById('dark-mode-toggle').checked = false;
      }

      // Nav handling
      document.querySelectorAll('.nav-btn').forEach(btn => {
        const isActive = btn.id.includes(state.activeTab);
        if (btn.id.includes('desktop')) {
          btn.className = `nav-btn w-full flex items-center gap-3 px-4 py-3 rounded-xl transition-all duration-300 ${isActive ? 'bg-indigo-50 dark:bg-indigo-900/30 text-indigo-700 dark:text-indigo-400 font-semibold shadow-sm' : 'text-slate-600 dark:text-slate-400 hover:bg-slate-50 dark:hover:bg-slate-800 hover:text-indigo-600'}`;
        } else {
          btn.className = `nav-btn flex flex-col items-center p-2 rounded-xl transition-all duration-300 transform active:scale-95 ${isActive ? 'text-indigo-600 dark:text-indigo-400' : 'text-slate-400 dark:text-slate-500'}`;
        }
      });

      const container = document.getElementById('view-container');
      if (state.isLoading) {
        container.innerHTML = `<div class="grid grid-cols-1 md:grid-cols-3 gap-6">${Array(3).fill('<div class="h-48 rounded-3xl skeleton-shimmer"></div>').join('')}</div>`;
        return;
      }

      if (state.activeTab === 'dashboard') {
        const stats = {
          total: state.subjects.length,
          completed: state.subjects.reduce((acc, sub) => acc + (sub.units ? sub.units.reduce((uAcc, u) => uAcc + (u.subunits ? u.subunits.filter(su => su.completed).length : 0), 0) : 0), 0),
          totalTasks: state.subjects.reduce((acc, sub) => acc + (sub.units ? sub.units.reduce((uAcc, u) => uAcc + (u.subunits ? u.subunits.length : 0), 0) : 0), 0)
        };
        const avgProgress = stats.totalTasks === 0 ? 0 : Math.round((stats.completed / stats.totalTasks) * 100);

        container.innerHTML = `
          <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
            <div class="bg-white dark:bg-slate-800 p-6 rounded-3xl shadow-sm border border-slate-100 dark:border-slate-700 animate-slide-up" style="animation-delay: 0s">
              <div class="flex items-center gap-4">
                <div class="p-3 bg-indigo-50 dark:bg-indigo-900/30 rounded-2xl text-indigo-600 dark:text-indigo-400"><i data-lucide="book-open" class="w-6 h-6"></i></div>
                <div><p class="text-xs font-bold text-slate-400 uppercase">Subjects</p><p class="text-2xl font-bold dark:text-white">${stats.total}</p></div>
              </div>
            </div>
            <div class="bg-white dark:bg-slate-800 p-6 rounded-3xl shadow-sm border border-slate-100 dark:border-slate-700 animate-slide-up" style="animation-delay: 0.1s">
              <div class="flex items-center gap-4">
                <div class="p-3 bg-emerald-50 dark:bg-emerald-900/30 rounded-2xl text-emerald-600 dark:text-emerald-400"><i data-lucide="check-circle" class="w-6 h-6"></i></div>
                <div><p class="text-xs font-bold text-slate-400 uppercase">Completed</p><p class="text-2xl font-bold dark:text-white">${stats.completed}</p></div>
              </div>
            </div>
            <div class="bg-gradient-to-br from-indigo-600 to-purple-600 p-6 rounded-3xl shadow-lg text-white animate-slide-up" style="animation-delay: 0.2s">
               <p class="text-xs font-bold opacity-80 uppercase mb-2">Overall Mastery</p>
               <div class="flex items-end gap-2 mb-2"><span class="text-4xl font-bold">${avgProgress}</span><span class="text-xl opacity-80">%</span></div>
               <div class="w-full bg-white/20 rounded-full h-1.5"><div class="bg-white h-full rounded-full" style="width: ${avgProgress}%"></div></div>
            </div>
          </div>
          <h3 class="text-xl font-bold text-slate-800 dark:text-slate-100 mb-6">Recent Study</h3>
          <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            ${state.subjects.length > 0 ? state.subjects.slice(0, 3).map((s, i) => generateSubjectCard(s, i)).join('') : '<div class="col-span-full py-12 text-center text-slate-400">No subjects yet. Click Plus to start.</div>'}
          </div>
        `;
      } else {
        container.innerHTML = `
          <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            ${state.subjects.map((s, i) => generateSubjectCard(s, i)).join('')}
            <button onclick="window.app.openAddSubjectModal()" class="flex flex-col items-center justify-center h-48 bg-slate-50 dark:bg-slate-800/30 border-2 border-dashed border-slate-200 dark:border-slate-700 rounded-3xl hover:border-indigo-400 transition-all group">
              <div class="p-3 bg-white dark:bg-slate-800 rounded-full text-slate-400 group-hover:text-indigo-600 transition-colors"><i data-lucide="plus" class="w-6 h-6"></i></div>
              <span class="mt-4 font-semibold text-slate-500">New Subject</span>
            </button>
          </div>
        `;
      }
      lucide.createIcons();
    }

    function renderSubjectDrawer() {
      if (!state.selectedSubjectId) return;
      const subject = state.subjects.find(s => s.id === state.selectedSubjectId);
      if (!subject) return window.app.closeSubjectDrawer();

      const scrollArea = document.querySelector('#drawer-content .overflow-y-auto');
      const savedScroll = scrollArea ? scrollArea.scrollTop : 0;
      
      const progress = calculateProgress(subject);
      const colorClass = subject.color || 'bg-indigo-500';
      const textColor = colorClass.replace('bg-', 'text-');
      const drawer = document.getElementById('drawer-content');

      drawer.innerHTML = `
        <div class="${colorClass} bg-opacity-10 dark:bg-opacity-20 p-6 border-b border-slate-100 dark:border-slate-800 flex items-start justify-between">
          <div class="flex-1">
            <div class="flex items-center gap-3 mb-4">
              <div class="p-2 rounded-xl ${colorClass} text-white shadow-sm"><i data-lucide="book" class="w-5 h-5"></i></div>
              <h2 class="text-xl font-bold text-slate-800 dark:text-slate-50">${subject.title}</h2>
            </div>
            <div class="flex items-center gap-3">
              <div class="flex-1 h-2 bg-slate-200 dark:bg-slate-700 rounded-full overflow-hidden">
                <div class="h-full ${colorClass} transition-all duration-500" style="width:${progress}%"></div>
              </div>
              <span class="text-sm font-bold dark:text-slate-300">${progress}%</span>
            </div>
          </div>
          <div class="flex items-center gap-1 ml-4">
            <button onclick="window.app.deleteSubject('${subject.id}')" class="p-2 text-slate-400 hover:text-rose-500 transition-colors"><i data-lucide="trash-2" class="w-5 h-5"></i></button>
            <button onclick="window.app.closeSubjectDrawer()" class="p-2 text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-full transition-colors"><i data-lucide="x" class="w-6 h-6"></i></button>
          </div>
        </div>
        
        <div class="flex-1 overflow-y-auto p-6 space-y-6 dark:bg-slate-900/50">
          ${(subject.units || []).map(unit => `
            <div class="bg-white dark:bg-slate-800 border border-slate-100 dark:border-slate-700 rounded-2xl overflow-hidden shadow-sm">
              <div class="bg-slate-50 dark:bg-slate-900/50 p-4 border-b border-slate-100 dark:border-slate-700 flex justify-between items-center">
                <h4 class="font-bold text-sm dark:text-slate-200">${unit.title}</h4>
                <button onclick="window.app.deleteUnit('${subject.id}', '${unit.id}')" class="text-slate-300 hover:text-rose-500 transition-colors"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
              </div>
              <div class="p-4 space-y-1">
                ${(unit.subunits || []).map(su => `
                  <div class="group flex items-center justify-between p-2 hover:bg-slate-50 dark:hover:bg-slate-700 rounded-xl transition-all">
                    <button onclick="window.app.toggleSubunit('${subject.id}', '${unit.id}', '${su.id}')" class="flex items-center gap-3 flex-1 text-left">
                      <div class="transition-transform active:scale-75">
                        ${su.completed ? `<i data-lucide="check-circle-2" class="w-5 h-5 ${textColor}"></i>` : `<i data-lucide="circle" class="w-5 h-5 text-slate-300 dark:text-slate-600"></i>`}
                      </div>
                      <span class="text-sm font-medium ${su.completed ? 'text-slate-400 line-through' : 'text-slate-700 dark:text-slate-300'}">${su.title}</span>
                    </button>
                    <button onclick="window.app.deleteSubunit('${subject.id}', '${unit.id}', '${su.id}')" class="opacity-0 group-hover:opacity-100 p-1 text-slate-300 hover:text-rose-500 transition-all"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                  </div>
                `).join('')}
                <form onsubmit="window.app.handleAddSubunit(event, '${subject.id}', '${unit.id}')" class="mt-3 flex gap-2">
                  <input type="text" name="subunit" placeholder="Task name..." class="flex-1 text-xs bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-lg px-3 py-2 focus:outline-none dark:text-white" required />
                  <button type="submit" class="p-2 bg-slate-100 dark:bg-slate-700 text-slate-600 dark:text-slate-300 rounded-lg hover:bg-indigo-600 hover:text-white transition-all"><i data-lucide="plus" class="w-4 h-4"></i></button>
                </form>
              </div>
            </div>
          `).join('')}
        </div>
        
        <div class="p-4 border-t border-slate-100 dark:border-slate-800 bg-white dark:bg-slate-900">
           <form onsubmit="window.app.handleAddUnit(event, '${subject.id}')" class="flex gap-2">
             <input type="text" name="unit" placeholder="Add new unit..." class="flex-1 bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl px-4 py-3 text-sm focus:outline-none dark:text-white" required />
             <button type="submit" class="${colorClass} text-white px-4 py-3 rounded-xl font-bold text-xs shadow-md">ADD UNIT</button>
           </form>
        </div>
      `;
      lucide.createIcons({ root: drawer });
      const newScrollArea = document.querySelector('#drawer-content .overflow-y-auto');
      if (newScrollArea) newScrollArea.scrollTop = savedScroll;
    }

    // App Logic API
    window.app = {
      switchTab: (t) => { state.activeTab = t; renderView(); },
      openSettings: () => document.getElementById('settings-modal').classList.remove('hidden'),
      closeSettings: () => document.getElementById('settings-modal').classList.add('hidden'),
      toggleDarkMode: () => {
        state.darkMode = !state.darkMode;
        localStorage.setItem('theme', state.darkMode ? 'dark' : 'light');
        renderView();
        if (state.selectedSubjectId) renderSubjectDrawer();
      },
      openAddSubjectModal: () => {
        document.getElementById('new-subject-title').value = '';
        document.getElementById('add-subject-modal').classList.remove('hidden');
      },
      closeAddSubjectModal: () => document.getElementById('add-subject-modal').classList.add('hidden'),
      openSubjectDrawer: (id) => {
        state.selectedSubjectId = id;
        renderSubjectDrawer();
        document.getElementById('subject-drawer').classList.remove('hidden');
      },
      closeSubjectDrawer: () => {
        state.selectedSubjectId = null;
        document.getElementById('subject-drawer').classList.add('hidden');
        renderView();
      },
      handleAddSubject: async (e) => {
        e.preventDefault();
        const title = document.getElementById('new-subject-title').value.trim();
        if (!title || !state.user) return;
        const newId = crypto.randomUUID();
        const subject = { id: newId, title, color: colors[Math.floor(Math.random()*colors.length)], units: [], createdAt: Date.now() };
        await setDoc(doc(db, 'artifacts', appId, 'users', state.user.uid, 'subjects', newId), subject);
        window.app.closeAddSubjectModal();
        showToast("Subject added!");
      },
      deleteSubject: async (id) => {
        if (!confirm("Are you sure?")) return;
        await deleteDoc(doc(db, 'artifacts', appId, 'users', state.user.uid, 'subjects', id));
        window.app.closeSubjectDrawer();
      },
      handleAddUnit: async (e, sid) => {
        e.preventDefault();
        const title = e.target.unit.value.trim();
        const sub = state.subjects.find(s => s.id === sid);
        if (!title || !sub) return;
        const units = [...(sub.units || []), { id: crypto.randomUUID(), title, subunits: [] }];
        await updateDoc(doc(db, 'artifacts', appId, 'users', state.user.uid, 'subjects', sid), { units });
        e.target.unit.value = '';
      },
      deleteUnit: async (sid, uid) => {
        const sub = state.subjects.find(s => s.id === sid);
        const units = sub.units.filter(u => u.id !== uid);
        await updateDoc(doc(db, 'artifacts', appId, 'users', state.user.uid, 'subjects', sid), { units });
      },
      handleAddSubunit: async (e, sid, uid) => {
        e.preventDefault();
        const title = e.target.subunit.value.trim();
        const sub = state.subjects.find(s => s.id === sid);
        if (!title || !sub) return;
        const units = sub.units.map(u => u.id === uid ? { ...u, subunits: [...(u.subunits || []), { id: crypto.randomUUID(), title, completed: false }] } : u);
        await updateDoc(doc(db, 'artifacts', appId, 'users', state.user.uid, 'subjects', sid), { units });
      },
      toggleSubunit: async (sid, uid, suid) => {
        const sub = state.subjects.find(s => s.id === sid);
        const units = sub.units.map(u => u.id === uid ? { ...u, subunits: u.subunits.map(su => su.id === suid ? { ...su, completed: !su.completed } : su) } : u);
        await updateDoc(doc(db, 'artifacts', appId, 'users', state.user.uid, 'subjects', sid), { units });
      },
      deleteSubunit: async (sid, uid, suid) => {
        const sub = state.subjects.find(s => s.id === sid);
        const units = sub.units.map(u => u.id === uid ? { ...u, subunits: u.subunits.filter(su => su.id !== suid) } : u);
        await updateDoc(doc(db, 'artifacts', appId, 'users', state.user.uid, 'subjects', sid), { units });
      },
      handleBackup: () => {
        const blob = new Blob([JSON.stringify(state.subjects)], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url; a.download = 'study_backup.json';
        a.click(); URL.revokeObjectURL(url);
      },
      handleRestore: (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = async (ev) => {
          const data = JSON.parse(ev.target.result);
          for (const s of data) await setDoc(doc(db, 'artifacts', appId, 'users', state.user.uid, 'subjects', s.id), s);
          showToast("Restored!");
        };
        reader.readAsText(file);
      },
      logout: () => signOut(auth),
      signInWithGoogle: async () => {
        const provider = new GoogleAuthProvider();
        try { await signInWithPopup(auth, provider); window.app.closeSettings(); } catch(err) { showToast("Sign-in failed", "error"); }
      }
    };

    // Firebase Auth Init
    onAuthStateChanged(auth, (user) => {
      state.user = user;
      if (user) {
        document.getElementById('desktop-user-name').textContent = user.isAnonymous ? "Guest Student" : (user.displayName || "Student");
        document.getElementById('desktop-user-email').textContent = user.email || "Local Progress";
        document.getElementById('settings-name').textContent = document.getElementById('desktop-user-name').textContent;
        document.getElementById('settings-email').textContent = document.getElementById('desktop-user-email').textContent;

        const signoutBlock = document.getElementById('signout-block');
        if (user.isAnonymous) {
          signoutBlock.innerHTML = `<button onclick="window.app.signInWithGoogle()" class="w-full py-2.5 bg-slate-100 dark:bg-slate-800 dark:text-white rounded-xl font-bold text-sm">SIGN IN WITH GOOGLE</button>`;
        } else {
          signoutBlock.innerHTML = `<button onclick="window.app.logout()" class="w-full py-2.5 text-rose-500 font-bold text-sm">SIGN OUT</button>`;
        }

        if (state.unsubscribeDb) state.unsubscribeDb();
        state.unsubscribeDb = onSnapshot(collection(db, 'artifacts', appId, 'users', user.uid, 'subjects'), (snap) => {
          state.subjects = snap.docs.map(d => d.data()).sort((a,b) => b.createdAt - a.createdAt);
          state.isLoading = false;
          renderView();
          if (state.selectedSubjectId) renderSubjectDrawer();
        });
      } else {
        signInAnonymously(auth);
      }
    });

    // Startup
    renderView();

  </script>
</body>
</html>
