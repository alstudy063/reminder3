<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>StudyMaster Pro</title>
  
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>

  <style>
    body {
      font-family: 'Noto Sans', sans-serif;
    }
    
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes slideInFromBottom { from { transform: translateY(1.5rem); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    @keyframes slideInFromRight { from { transform: translateX(100%); } to { transform: translateX(0); } }
    @keyframes zoomIn { from { transform: scale(0.95); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    
    .animate-fade-in { animation: fadeIn 0.4s ease-out forwards; }
    .animate-slide-up { animation: slideInFromBottom 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
    .animate-slide-right { animation: slideInFromRight 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
    .animate-zoom-in { animation: zoomIn 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards; }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    
    .pb-safe { padding-bottom: env(safe-area-inset-bottom); }

    /* Custom skeleton shimmer effect */
    .skeleton-shimmer {
      background: #f1f5f9;
      background-image: linear-gradient(to right, #f1f5f9 0%, #e2e8f0 20%, #f1f5f9 40%, #f1f5f9 100%);
      background-repeat: no-repeat;
      background-size: 800px 100%; 
      animation-duration: 1.5s;
      animation-fill-mode: forwards; 
      animation-iteration-count: infinite;
      animation-name: placeholderShimmer;
      animation-timing-function: linear;
    }
    
    @keyframes placeholderShimmer {
      0% { background-position: -468px 0; }
      100% { background-position: 468px 0; }
    }
  </style>
</head>
<body class="bg-slate-50 text-slate-900 overflow-hidden select-none md:select-auto">

  <!-- MAIN APP -->
  <div id="app-container" class="flex h-screen overflow-hidden relative">
    
    <!-- Sidebar Navigation -->
    <aside class="hidden md:flex w-72 flex-col bg-white border-r border-slate-200 z-10 shadow-[4px_0_24px_rgba(0,0,0,0.02)]">
      <div class="p-6 flex items-center gap-3">
        <div class="bg-indigo-600 p-2.5 rounded-xl shadow-md shadow-indigo-200 transform transition-transform hover:rotate-12">
          <i data-lucide="graduation-cap" class="w-6 h-6 text-white"></i>
        </div>
        <h1 class="text-2xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-indigo-600 to-purple-600 tracking-tight">
          StudyMaster
        </h1>
      </div>
      
      <nav class="flex-1 px-4 py-6 space-y-2">
        <button onclick="window.app.switchTab('dashboard')" id="nav-desktop-dashboard" class="nav-btn w-full flex items-center gap-3 px-4 py-3 rounded-xl transition-all duration-300 bg-indigo-50 text-indigo-700 font-semibold hover:shadow-sm">
          <i data-lucide="layout-dashboard" class="w-5 h-5"></i>
          Dashboard
        </button>
        <button onclick="window.app.switchTab('subjects')" id="nav-desktop-subjects" class="nav-btn w-full flex items-center gap-3 px-4 py-3 rounded-xl transition-all duration-300 text-slate-600 hover:bg-slate-50 hover:text-indigo-600">
          <i data-lucide="book-open" class="w-5 h-5"></i>
          All Subjects
        </button>
      </nav>

      <div class="p-4 border-t border-slate-100">
        <button onclick="window.app.openSettings()" class="w-full flex items-center gap-3 p-3 mb-2 rounded-xl bg-slate-50 hover:bg-indigo-50 transition-all duration-300 group text-left border border-transparent hover:border-indigo-100">
          <div id="desktop-user-avatar" class="w-10 h-10 rounded-full bg-indigo-100 flex items-center justify-center text-indigo-700 font-bold group-hover:bg-indigo-600 group-hover:text-white transition-colors shadow-sm">G</div>
          <div class="flex-1 overflow-hidden">
            <p id="desktop-user-name" class="text-sm font-semibold text-slate-800 truncate transition-colors group-hover:text-indigo-700">Guest User</p>
            <p id="desktop-user-email" class="text-xs text-slate-500 truncate">Not Logged In</p>
          </div>
          <i data-lucide="settings" class="w-4 h-4 text-slate-400 group-hover:text-indigo-600 group-hover:rotate-90 transition-transform duration-500"></i>
        </button>
      </div>
    </aside>

    <!-- Main Content Area -->
    <main class="flex-1 flex flex-col h-full overflow-hidden relative bg-slate-50/50">
      
      <!-- Mobile Header -->
      <header class="md:hidden flex items-center justify-between p-4 bg-white/80 backdrop-blur-md border-b border-slate-200 z-10 sticky top-0">
        <div class="flex items-center gap-2">
          <div class="bg-indigo-600 p-1.5 rounded-lg shadow-sm">
            <i data-lucide="graduation-cap" class="w-5 h-5 text-white"></i>
          </div>
          <h1 class="text-lg font-bold text-slate-800 tracking-tight">StudyMaster</h1>
        </div>
        <button onclick="window.app.openSettings()" class="flex items-center justify-center w-8 h-8 rounded-full bg-indigo-100 text-indigo-700 font-bold active:scale-95 transition-transform" id="mobile-user-avatar">
          G
        </button>
      </header>

      <div class="flex-1 overflow-y-auto pb-24 md:pb-8" id="main-scroll-area">
        <div class="max-w-6xl mx-auto p-4 md:p-8">
          
          <div class="flex justify-between items-end mb-8 animate-fade-in">
            <div>
              <h2 id="page-title" class="text-2xl md:text-3xl font-bold text-slate-900 tracking-tight">Dashboard</h2>
              <p id="page-subtitle" class="text-slate-500 mt-1">Let's review your learning progress today.</p>
            </div>
            <button onclick="window.app.openAddSubjectModal()" class="hidden md:flex items-center gap-2 bg-indigo-600 hover:bg-indigo-700 text-white px-5 py-2.5 rounded-xl font-medium transition-all duration-300 shadow-md shadow-indigo-200/50 hover:shadow-lg hover:-translate-y-0.5 active:scale-95">
              <i data-lucide="plus" class="w-5 h-5"></i>
              Add Subject
            </button>
          </div>

          <!-- View Container (Dashboard or Subjects) -->
          <div id="view-container" class="min-h-[400px]">
            <!-- Initially empty, will be populated by JS -->
          </div>

        </div>
      </div>

      <!-- Mobile Floating Action Button -->
      <button onclick="window.app.openAddSubjectModal()" class="md:hidden absolute bottom-28 right-4 w-14 h-14 bg-indigo-600 text-white rounded-full flex items-center justify-center shadow-lg shadow-indigo-200 active:scale-95 transition-transform duration-200 z-20 hover:bg-indigo-700">
        <i data-lucide="plus" class="w-6 h-6"></i>
      </button>

    </main>

    <!-- Mobile Navigation -->
    <nav class="md:hidden fixed bottom-0 w-full bg-white/90 backdrop-blur-md border-t border-slate-100 flex justify-around p-3 pb-safe z-30 shadow-[0_-4px_20px_rgba(0,0,0,0.04)]">
      <button onclick="window.app.switchTab('dashboard')" id="nav-mobile-dashboard" class="nav-btn flex flex-col items-center p-2 rounded-xl transition-all duration-300 text-indigo-600 transform active:scale-95">
        <i data-lucide="layout-dashboard" class="w-6 h-6 mb-1"></i>
        <span class="text-[10px] font-medium">Dashboard</span>
      </button>
      <button onclick="window.app.switchTab('subjects')" id="nav-mobile-subjects" class="nav-btn flex flex-col items-center p-2 rounded-xl transition-all duration-300 text-slate-400 transform active:scale-95">
        <i data-lucide="book-open" class="w-6 h-6 mb-1"></i>
        <span class="text-[10px] font-medium">Subjects</span>
      </button>
    </nav>
  </div>

  <!-- Drawers & Modals -->
  <div id="subject-drawer" class="fixed inset-0 z-40 flex justify-end hidden">
    <div class="absolute inset-0 bg-slate-900/30 backdrop-blur-sm transition-opacity" onclick="window.app.closeSubjectDrawer()"></div>
    <div class="relative w-full md:w-[450px] max-w-lg h-full bg-white shadow-2xl flex flex-col animate-slide-right border-l border-slate-100">
      <div id="drawer-content" class="flex flex-col h-full"></div>
    </div>
  </div>

  <div id="add-subject-modal" class="fixed inset-0 z-50 flex items-center justify-center p-4 hidden">
    <div class="absolute inset-0 bg-slate-900/30 backdrop-blur-sm transition-opacity" onclick="window.app.closeAddSubjectModal()"></div>
    <div class="relative bg-white rounded-3xl shadow-2xl w-full max-w-sm p-6 animate-zoom-in border border-slate-100">
      <div class="flex justify-between items-center mb-6">
        <h2 class="text-xl font-bold text-slate-800 tracking-tight">New Subject</h2>
        <button onclick="window.app.closeAddSubjectModal()" class="text-slate-400 hover:text-slate-600 hover:bg-slate-100 p-2 rounded-full transition-colors duration-200">
          <i data-lucide="x" class="w-5 h-5"></i>
        </button>
      </div>
      <form id="add-subject-form" onsubmit="window.app.handleAddSubject(event)">
        <div class="mb-6">
          <label class="block text-sm font-medium text-slate-600 mb-2">Subject Name</label>
          <input type="text" id="new-subject-title" placeholder="e.g. Mathematics, Science" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-indigo-500/50 focus:border-indigo-500 focus:bg-white transition-all shadow-sm" required />
        </div>
        <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-3.5 rounded-xl transition-all duration-300 shadow-md shadow-indigo-200 hover:shadow-lg active:scale-[0.98]">
          Create Subject
        </button>
      </form>
    </div>
  </div>

  <div id="settings-modal" class="fixed inset-0 z-50 flex items-center justify-center p-4 hidden">
    <div class="absolute inset-0 bg-slate-900/30 backdrop-blur-sm transition-opacity" onclick="window.app.closeSettings()"></div>
    <div class="relative bg-white rounded-3xl shadow-2xl w-full max-w-md animate-zoom-in flex flex-col max-h-[90vh] border border-slate-100">
      <div class="flex justify-between items-center p-6 border-b border-slate-100">
        <h2 class="text-xl font-bold text-slate-800 flex items-center gap-2 tracking-tight">
          <i data-lucide="settings" class="w-5 h-5 text-indigo-600"></i> Settings
        </h2>
        <button onclick="window.app.closeSettings()" class="text-slate-400 hover:text-slate-600 hover:bg-slate-100 p-2 rounded-full transition-colors duration-200">
          <i data-lucide="x" class="w-5 h-5"></i>
        </button>
      </div>
      <div class="p-6 overflow-y-auto space-y-8 flex-1">
        <section>
          <h3 class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-3">Profile</h3>
          <div class="bg-slate-50 border border-slate-100 rounded-2xl p-4 transition-all hover:shadow-sm">
            <div class="flex items-center gap-4 mb-4">
              <div id="settings-avatar" class="w-12 h-12 rounded-full bg-indigo-100 flex items-center justify-center text-indigo-700 font-bold text-lg shadow-inner">G</div>
              <div>
                <p id="settings-name" class="font-bold text-slate-800">Guest User</p>
                <p id="settings-email" class="text-sm text-slate-500">Not Logged In</p>
              </div>
            </div>
            <div id="signout-block" class="mt-4 pt-4 border-t border-slate-200">
              <button onclick="window.app.logout()" class="w-full flex items-center justify-center gap-2 text-rose-600 hover:bg-rose-50 font-medium py-2.5 px-4 rounded-xl transition-colors duration-200 group">
                <i data-lucide="log-out" class="w-4 h-4 group-hover:-translate-x-1 transition-transform"></i> Sign Out
              </button>
            </div>
          </div>
        </section>
        <section>
          <h3 class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-3">Data Management</h3>
          <div class="bg-white border border-slate-200 rounded-2xl overflow-hidden shadow-sm">
            <button onclick="window.app.handleBackup()" class="w-full flex items-center justify-between p-4 hover:bg-slate-50 transition-colors border-b border-slate-100 text-left group">
              <div class="flex items-center gap-3">
                <div class="bg-indigo-50 p-2.5 rounded-lg text-indigo-600 group-hover:scale-110 transition-transform duration-300">
                  <i data-lucide="download" class="w-4 h-4"></i>
                </div>
                <div>
                  <p class="font-semibold text-slate-700">Backup Data</p>
                  <p class="text-xs text-slate-500">Save progress locally</p>
                </div>
              </div>
              <i data-lucide="chevron-right" class="w-4 h-4 text-slate-300 group-hover:text-indigo-400 group-hover:translate-x-1 transition-all"></i>
            </button>
            <button onclick="document.getElementById('file-upload').click()" class="w-full flex items-center justify-between p-4 hover:bg-slate-50 transition-colors text-left group">
              <div class="flex items-center gap-3">
                <div class="bg-emerald-50 p-2.5 rounded-lg text-emerald-600 group-hover:scale-110 transition-transform duration-300">
                  <i data-lucide="upload" class="w-4 h-4"></i>
                </div>
                <div>
                  <p class="font-semibold text-slate-700">Restore Data</p>
                  <p class="text-xs text-slate-500">Load previous backup</p>
                </div>
              </div>
              <i data-lucide="chevron-right" class="w-4 h-4 text-slate-300 group-hover:text-emerald-400 group-hover:translate-x-1 transition-all"></i>
            </button>
            <input type="file" id="file-upload" accept=".json" class="hidden" onchange="window.app.handleRestore(event)">
          </div>
        </section>
      </div>
    </div>
  </div>

  <!-- Toast Notification -->
  <div id="toast" class="fixed top-4 right-4 z-[70] transition-all duration-300 transform -translate-y-full opacity-0 pointer-events-none">
    <div id="toast-content" class="flex items-center gap-3 px-4 py-3.5 rounded-2xl shadow-xl border bg-white border-slate-100 text-slate-700">
      <i id="toast-icon" data-lucide="info" class="w-5 h-5"></i>
      <span id="toast-message" class="font-medium text-sm tracking-wide">Notification</span>
    </div>
  </div>

  <!-- Firebase & App Logic -->
  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js';
    import { getAuth, onAuthStateChanged, signOut, signInAnonymously, signInWithCustomToken, GoogleAuthProvider, signInWithPopup, linkWithPopup } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js';
    import { getFirestore, collection, doc, setDoc, deleteDoc, onSnapshot, updateDoc } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js';

    lucide.createIcons();

    // Setup Firebase configuration
    // Fallback logic to support both the canvas environment and local testing with user's config
    let firebaseConfig;
    if (typeof __firebase_config !== 'undefined') {
      firebaseConfig = JSON.parse(__firebase_config);
    } else {
      firebaseConfig = {
        apiKey: "AIzaSyA9DLfAHTUUGxCPn2j_k6godoTEopzaFAU",
        authDomain: "studymaster-919ba.firebaseapp.com",
        databaseURL: "https://studymaster-919ba-default-rtdb.firebaseio.com",
        projectId: "studymaster-919ba",
        storageBucket: "studymaster-919ba.firebasestorage.app",
        messagingSenderId: "426684063256",
        appId: "1:426684063256:web:52c17625a9450ea9662d6d",
        measurementId: "G-CWQB2330GF"
      };
    }

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    
    // Setting App ID specifically to match the Firestore rules provided:
    // match /artifacts/studyflow-pro/users/{userId}/{document=**}
    const appId = "studyflow-pro";

    // App State
    const state = {
      user: null,
      subjects: [],
      activeTab: 'dashboard',
      selectedSubjectId: null,
      unsubscribeDb: null,
      isLoading: true // Used for showing skeletons
    };

    const colors = ['bg-blue-500', 'bg-indigo-500', 'bg-purple-500', 'bg-emerald-500', 'bg-rose-500', 'bg-amber-500'];

    function showToast(message, type = 'info') {
      const toast = document.getElementById('toast');
      const toastContent = document.getElementById('toast-content');
      const toastIcon = document.getElementById('toast-icon');
      const toastMessage = document.getElementById('toast-message');
      
      toastMessage.textContent = message;
      
      toastContent.className = 'flex items-center gap-3 px-4 py-3.5 rounded-2xl shadow-xl border transition-all';
      if (type === 'error') {
        toastContent.classList.add('bg-rose-50', 'border-rose-100', 'text-rose-700');
        toastIcon.setAttribute('data-lucide', 'alert-circle');
      } else if (type === 'success') {
        toastContent.classList.add('bg-emerald-50', 'border-emerald-100', 'text-emerald-700');
        toastIcon.setAttribute('data-lucide', 'check-circle-2');
      } else {
        toastContent.classList.add('bg-white', 'border-slate-100', 'text-slate-700');
        toastIcon.setAttribute('data-lucide', 'info');
      }
      lucide.createIcons({ root: toast });
      
      toast.classList.remove('-translate-y-full', 'opacity-0');
      toast.classList.add('translate-y-0', 'opacity-100');
      setTimeout(() => {
        toast.classList.remove('translate-y-0', 'opacity-100');
        toast.classList.add('-translate-y-full', 'opacity-0');
      }, 3000);
    }

    function calculateProgress(subject) {
      let total = 0, completed = 0;
      if (subject.units) {
        subject.units.forEach(u => {
          if (u.subunits) {
            total += u.subunits.length;
            completed += u.subunits.filter(su => su.completed).length;
          }
        });
      }
      if (total === 0) return 0;
      return Math.round((completed / total) * 100);
    }

    function getTaskCount(subject) {
      let count = 0;
      if (subject.units) {
        subject.units.forEach(u => count += (u.subunits ? u.subunits.length : 0));
      }
      return count;
    }

    function getOverallStats() {
      let tTasks = 0, cTasks = 0;
      state.subjects.forEach(s => {
        if (s.units) {
          s.units.forEach(u => {
            if (u.subunits) {
              tTasks += u.subunits.length;
              cTasks += u.subunits.filter(su => su.completed).length;
            }
          });
        }
      });
      return {
        totalTasks: tTasks,
        completedTasks: cTasks,
        progress: tTasks === 0 ? 0 : Math.round((cTasks / tTasks) * 100)
      };
    }

    function generateProgressBar(progress, colorClass) {
      return `
        <div class="w-full bg-slate-100 rounded-full h-2 overflow-hidden shadow-inner">
          <div class="h-2 rounded-full transition-all duration-700 ease-out ${colorClass}" style="width: ${progress}%"></div>
        </div>
      `;
    }

    function generateSubjectCard(subject, index = 0) {
      const progress = calculateProgress(subject);
      const taskCount = getTaskCount(subject);
      const unitCount = subject.units ? subject.units.length : 0;
      
      // Fallback in case subject.color is missing or undefined
      const colorClass = subject.color || 'bg-indigo-500';
      const textColor = colorClass.replace('bg-', 'text-');
      
      // Delay animation slightly based on index
      const delay = index * 0.05;

      return `
        <div style="animation-delay: ${delay}s" onclick="window.app.openSubjectDrawer('${subject.id}')" class="animate-slide-up opacity-0 bg-white rounded-3xl p-5 border border-slate-100 shadow-[0_2px_10px_rgba(0,0,0,0.02)] hover:shadow-[0_8px_30px_rgba(0,0,0,0.06)] hover:border-indigo-100 hover:-translate-y-1 transition-all duration-300 cursor-pointer group flex flex-col justify-between h-48">
          <div>
            <div class="flex justify-between items-start mb-4">
              <div class="p-3 rounded-2xl ${colorClass} bg-opacity-10 text-opacity-90 flex items-center justify-center transform group-hover:scale-110 group-hover:rotate-3 transition-all duration-300">
                <i data-lucide="book-marked" class="w-6 h-6 ${textColor}"></i>
              </div>
              <button class="text-slate-300 group-hover:text-slate-500 p-1 hover:bg-slate-50 rounded-lg transition-colors">
                <i data-lucide="more-vertical" class="w-5 h-5"></i>
              </button>
            </div>
            <h3 class="text-lg font-bold text-slate-800 mb-1 truncate group-hover:text-indigo-600 transition-colors">${subject.title}</h3>
            <p class="text-sm text-slate-500 mb-6">${unitCount} Units • ${taskCount} Tasks</p>
          </div>
          <div>
            <div class="flex justify-between items-center mb-2">
              <span class="text-xs font-semibold text-slate-400 uppercase tracking-wider">Progress</span>
              <span class="text-sm font-bold text-slate-700">${progress}%</span>
            </div>
            ${generateProgressBar(progress, colorClass)}
          </div>
        </div>
      `;
    }

    function getSkeletonsHTML() {
      const skeletonCard = `
        <div class="bg-white rounded-3xl p-5 border border-slate-100 shadow-sm h-48 flex flex-col justify-between">
          <div>
            <div class="w-12 h-12 rounded-2xl mb-4 skeleton-shimmer"></div>
            <div class="h-6 rounded w-3/4 mb-2 skeleton-shimmer"></div>
            <div class="h-4 rounded w-1/2 mb-6 skeleton-shimmer"></div>
          </div>
          <div>
            <div class="flex justify-between mb-2">
               <div class="h-3 rounded w-1/4 skeleton-shimmer"></div>
               <div class="h-3 rounded w-8 skeleton-shimmer"></div>
            </div>
            <div class="h-2 rounded-full w-full skeleton-shimmer"></div>
          </div>
        </div>
      `;
      return `
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 md:gap-6 mt-6">
          ${skeletonCard}${skeletonCard}${skeletonCard}
        </div>
      `;
    }

    function renderNavigation() {
      document.querySelectorAll('.nav-btn').forEach(btn => {
        btn.className = btn.id.includes('desktop') 
          ? 'nav-btn w-full flex items-center gap-3 px-4 py-3 rounded-xl transition-all duration-300 text-slate-600 hover:bg-slate-50 hover:text-indigo-600'
          : 'nav-btn flex flex-col items-center p-2 rounded-xl transition-all duration-300 text-slate-400 transform active:scale-95';
      });

      const activeDesktop = document.getElementById(`nav-desktop-${state.activeTab}`);
      const activeMobile = document.getElementById(`nav-mobile-${state.activeTab}`);
      
      if(activeDesktop) activeDesktop.className = 'nav-btn w-full flex items-center gap-3 px-4 py-3 rounded-xl transition-all duration-300 bg-indigo-50 text-indigo-700 font-semibold shadow-sm';
      if(activeMobile) activeMobile.className = 'nav-btn flex flex-col items-center p-2 rounded-xl transition-all duration-300 text-indigo-600 transform active:scale-95';

      document.getElementById('page-title').textContent = state.activeTab === 'dashboard' ? 'Dashboard' : 'All Subjects';
      document.getElementById('page-subtitle').textContent = state.activeTab === 'dashboard' ? "Let's review your learning progress today." : "Manage and view all your subject units.";
    }

    function renderView() {
      renderNavigation();
      const container = document.getElementById('view-container');
      
      if (state.isLoading) {
        // Show Skeletons
        if (state.activeTab === 'dashboard') {
           container.innerHTML = `
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4 md:gap-6 mb-8">
              <div class="h-28 rounded-3xl skeleton-shimmer"></div>
              <div class="h-28 rounded-3xl skeleton-shimmer"></div>
              <div class="h-28 rounded-3xl skeleton-shimmer"></div>
            </div>
            <h3 class="text-xl font-bold text-slate-800 mb-4">Recent Subjects</h3>
            ${getSkeletonsHTML()}
           `;
        } else {
           container.innerHTML = getSkeletonsHTML();
        }
        return;
      }

      container.innerHTML = ''; 
      
      if (state.activeTab === 'dashboard') {
        const stats = getOverallStats();
        let recentCardsHTML = state.subjects.length === 0 
          ? `
            <div class="text-center py-12 bg-white rounded-3xl border border-dashed border-slate-200 col-span-full animate-fade-in hover:bg-slate-50 transition-colors">
              <div class="w-16 h-16 bg-indigo-50 rounded-full flex items-center justify-center mx-auto mb-4">
                <i data-lucide="book-open" class="w-8 h-8 text-indigo-400"></i>

              <p class="text-slate-500 font-medium text-lg">No subjects yet.</p>
              <button onclick="window.app.openAddSubjectModal()" class="mt-4 text-indigo-600 font-semibold hover:text-indigo-700 hover:underline inline-flex items-center gap-2">
                Create your first subject <i data-lucide="arrow-right" class="w-4 h-4"></i>
              </button>
            </div>
          `
          : state.subjects.slice(0, 3).map((sub, i) => generateSubjectCard(sub, i)).join('');

        container.innerHTML = `
          <div class="space-y-8">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4 md:gap-6">
              <div class="animate-slide-up opacity-0 bg-white p-6 rounded-3xl shadow-sm border border-slate-100 flex items-center gap-4 hover:shadow-md transition-shadow" style="animation-delay: 0s;">
                <div class="p-4 bg-indigo-50 rounded-2xl text-indigo-600">
                  <i data-lucide="book-open" class="w-8 h-8"></i>
                </div>
                <div>
                  <p class="text-sm font-medium text-slate-500">Total Subjects</p>
                  <p class="text-3xl font-bold text-slate-800">${state.subjects.length}</p>
                </div>
              </div>
              <div class="animate-slide-up opacity-0 bg-white p-6 rounded-3xl shadow-sm border border-slate-100 flex items-center gap-4 hover:shadow-md transition-shadow" style="animation-delay: 0.1s;">
                <div class="p-4 bg-emerald-50 rounded-2xl text-emerald-600">
                  <i data-lucide="check-circle-2" class="w-8 h-8"></i>
                </div>
                <div>
                  <p class="text-sm font-medium text-slate-500">Tasks Completed</p>
                  <p class="text-3xl font-bold text-slate-800">${stats.completedTasks} <span class="text-lg text-slate-400 font-normal">/ ${stats.totalTasks}</span></p>
                </div>
              </div>
              <div class="animate-slide-up opacity-0 bg-gradient-to-br from-indigo-600 to-purple-600 p-6 rounded-3xl shadow-md text-white flex flex-col justify-between hover:shadow-lg hover:-translate-y-0.5 transition-all" style="animation-delay: 0.2s;">
                <div>
                  <p class="text-indigo-100 font-medium mb-1">Overall Progress</p>
                  <div class="flex items-baseline gap-1">
                    <span class="text-4xl font-bold">${stats.progress}</span>
                    <span class="text-xl opacity-80">%</span>
                  </div>
                </div>
                <div class="mt-4">
                  <div class="w-full bg-white/20 rounded-full h-2 shadow-inner">
                    <div class="bg-white h-2 rounded-full transition-all duration-1000 ease-out" style="width: ${stats.progress}%"></div>
                  </div>
                </div>
              </div>
            </div>
            
            <div>
              <h3 class="text-xl font-bold text-slate-800 mb-4 animate-fade-in">Recent Subjects</h3>
              <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 md:gap-6">
                ${recentCardsHTML}
              </div>
              ${state.subjects.length > 3 ? `
                <button onclick="window.app.switchTab('subjects')" class="mt-6 w-full md:w-auto text-center py-2.5 px-6 rounded-xl bg-slate-100 text-slate-600 hover:bg-indigo-50 hover:text-indigo-700 font-semibold transition-colors duration-300 animate-fade-in">
                  View All Subjects &rarr;
                </button>
              ` : ''}
            </div>
          </div>
        `;
      } else {
        const cardsHTML = state.subjects.map((sub, i) => generateSubjectCard(sub, i)).join('');
        const addPlaceholderDelay = state.subjects.length * 0.05;
        const addPlaceholder = `
          <button style="animation-delay: ${addPlaceholderDelay}s" onclick="window.app.openAddSubjectModal()" class="animate-slide-up opacity-0 flex flex-col items-center justify-center h-48 bg-slate-50 hover:bg-indigo-50/50 border-2 border-dashed border-slate-200 hover:border-indigo-300 rounded-3xl transition-all duration-300 group hover:shadow-sm">
            <div class="p-3 bg-white rounded-full text-slate-400 group-hover:text-indigo-600 group-hover:scale-110 group-hover:rotate-90 transition-all duration-500 shadow-sm">
              <i data-lucide="plus" class="w-6 h-6"></i>
            </div>
            <span class="mt-4 font-semibold text-slate-500 group-hover:text-indigo-600 transition-colors">Add New Subject</span>
          </button>
        `;
        container.innerHTML = `
          <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 md:gap-6">
            ${cardsHTML}
            ${addPlaceholder}
          </div>
        `;
      }
      lucide.createIcons();
    }

    function renderSubjectDrawer() {
      if (!state.selectedSubjectId) return;
      const subject = state.subjects.find(s => s.id === state.selectedSubjectId);
      if (!subject) {
        window.app.closeSubjectDrawer();
        return;
      }

      const progress = calculateProgress(subject);
      
      // Fallback in case subject.color is missing or undefined
      const colorClass = subject.color || 'bg-indigo-500';
      const textColor = colorClass.replace('bg-', 'text-');
      const drawer = document.getElementById('drawer-content');

      let unitsHTML = '';
      if (!subject.units || subject.units.length === 0) {
        unitsHTML += `
          <div class="text-center py-12 animate-fade-in">
            <div class="inline-flex items-center justify-center w-14 h-14 rounded-full bg-slate-100 mb-4">
              <i data-lucide="folder-open" class="w-7 h-7 text-slate-400"></i>
            </div>
            <p class="text-slate-600 font-semibold">No units added yet.</p>
            <p class="text-sm text-slate-400 mt-1">Start organizing your subject by adding a unit.</p>
          </div>
        `;
      } else {
        unitsHTML += subject.units.map((unit, uIdx) => {
          let subunitsHTML = '';
          if (unit.subunits && unit.subunits.length > 0) {
            subunitsHTML = `<ul class="space-y-1.5 mt-3 mb-4">` + unit.subunits.map(su => `
              <li class="group flex items-center justify-between hover:bg-slate-50 p-2.5 rounded-xl transition-all duration-200 border border-transparent hover:border-slate-100">
                <button onclick="window.app.toggleSubunit('${subject.id}', '${unit.id}', '${su.id}')" class="flex-1 flex items-center gap-3 text-left">
                  <div class="transform transition-transform active:scale-75">
                    ${su.completed 
                      ? `<i data-lucide="check-circle-2" class="w-5 h-5 ${textColor}"></i>` 
                      : `<i data-lucide="circle" class="w-5 h-5 text-slate-300 group-hover:text-indigo-400 transition-colors"></i>`
                    }
                  </div>
                  <span class="text-sm font-medium transition-all ${su.completed ? 'text-slate-400 line-through' : 'text-slate-700'}">${su.title}</span>
                </button>
                <button onclick="window.app.deleteSubunit('${subject.id}', '${unit.id}', '${su.id}')" class="p-1.5 text-slate-300 hover:text-rose-500 opacity-0 group-hover:opacity-100 transition-all md:opacity-0 opacity-100 rounded-lg hover:bg-rose-50" title="Delete Task">
                  <i data-lucide="trash-2" class="w-4 h-4"></i>
                </button>
              </li>
            `).join('') + `</ul>`;
          } else {
            subunitsHTML = `<p class="text-xs text-slate-400 mt-3 ml-2 italic mb-4">No tasks found in this unit.</p>`;
          }
          return `
            <div class="bg-white border border-slate-200 rounded-2xl mb-5 overflow-hidden shadow-sm animate-slide-up" style="animation-delay: ${uIdx * 0.05}s">
              <div class="bg-slate-50/70 p-3.5 border-b border-slate-100 flex items-center justify-between">
                <h4 class="font-bold text-slate-800 text-sm flex items-center gap-2">
                  <i data-lucide="folder" class="w-4 h-4 ${textColor}"></i>
                  ${unit.title}
                </h4>
                <button onclick="window.app.deleteUnit('${subject.id}', '${unit.id}')" class="text-slate-400 hover:text-rose-500 transition-colors p-1.5 rounded-lg hover:bg-rose-50" title="Delete Unit">
                  <i data-lucide="trash-2" class="w-4 h-4"></i>
                </button>
              </div>
              <div class="p-4">
                ${subunitsHTML}
                <form onsubmit="window.app.handleAddSubunit(event, '${subject.id}', '${unit.id}')" class="flex items-center gap-2 mt-2">
                  <input type="text" name="subunit" placeholder="Add new task..." class="flex-1 bg-slate-50 border border-slate-200 rounded-xl px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500/50 focus:border-indigo-400 focus:bg-white transition-all" required autocomplete="off"/>
                  <button type="submit" class="bg-slate-100 text-slate-600 hover:text-white hover:${colorClass} p-2.5 rounded-xl transition-all duration-300 hover:shadow-md">
                    <i data-lucide="plus" class="w-4 h-4"></i>
                  </button>
                </form>
              </div>
            </div>
          `;
        }).join('');
      }

      drawer.innerHTML = `
        <div class="${colorClass} bg-opacity-10 p-6 border-b border-slate-100 flex items-start justify-between relative overflow-hidden">
          <div class="relative z-10">
            <div class="flex items-center gap-3 mb-2">
              <div class="p-3 rounded-2xl ${colorClass} bg-opacity-10 text-opacity-90 flex items-center justify-center shadow-sm">
                <i data-lucide="book-marked" class="w-6 h-6 ${textColor}"></i>
              </div>
              <h2 class="text-xl font-bold text-slate-800 tracking-tight">${subject.title}</h2>
            </div>
            <div class="flex items-center gap-3 mt-5">
              <div class="flex-1 w-40">
                ${generateProgressBar(progress, colorClass)}
              </div>
              <span class="text-sm font-bold text-slate-700">${progress}%</span>
            </div>
          </div>
          <div class="flex items-center gap-1 relative z-10">
            <button onclick="window.app.deleteSubject('${subject.id}')" class="p-2.5 text-slate-400 hover:text-rose-600 hover:bg-rose-50 rounded-full transition-colors" title="Delete Subject">
              <i data-lucide="trash-2" class="w-5 h-5"></i>
            </button>
            <button onclick="window.app.closeSubjectDrawer()" class="p-2.5 text-slate-400 hover:bg-slate-100 rounded-full transition-colors">
              <i data-lucide="x" class="w-6 h-6"></i>
            </button>
          </div>
          <!-- Decorative circle -->
          <div class="absolute -bottom-10 -right-10 w-32 h-32 rounded-full ${colorClass} opacity-[0.03] pointer-events-none"></div>
        </div>
        
        <div class="flex-1 overflow-y-auto p-4 md:p-6 bg-slate-50/50">
          <div class="flex justify-between items-center mb-5">
            <h3 class="text-xs font-bold text-slate-400 uppercase tracking-wider">Subject Units</h3>
          </div>
          ${unitsHTML}
        </div>
        
        <div class="p-4 bg-white border-t border-slate-100 shadow-[0_-10px_30px_rgba(0,0,0,0.03)] z-10">
          <form onsubmit="window.app.handleAddUnit(event, '${subject.id}')" class="flex items-center gap-2">
            <input type="text" name="unit" placeholder="Add new unit..." class="flex-1 bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500/50 focus:border-indigo-400 focus:bg-white transition-all shadow-sm" required autocomplete="off"/>
            <button type="submit" class="${colorClass} text-white px-4 py-3 rounded-xl hover:opacity-90 transition-all duration-300 font-semibold text-sm shadow-md hover:shadow-lg active:scale-95 flex items-center gap-2">
              <i data-lucide="folder-plus" class="w-4 h-4"></i>
              <span class="hidden sm:inline">Add Unit</span>
            </button>
          </form>
        </div>
      `;
      lucide.createIcons({ root: drawer });
    }

    // App API Exposed globally
    window.app = {
      switchTab: (tab) => {
        state.activeTab = tab;
        renderView();
      },
      openAddSubjectModal: () => {
        document.getElementById('new-subject-title').value = '';
        document.getElementById('add-subject-modal').classList.remove('hidden');
        setTimeout(() => document.getElementById('new-subject-title').focus(), 100);
      },
      closeAddSubjectModal: () => {
        document.getElementById('add-subject-modal').classList.add('hidden');
      },
      openSubjectDrawer: (id) => {
        state.selectedSubjectId = id;
        renderSubjectDrawer();
        document.getElementById('subject-drawer').classList.remove('hidden');
      },
      closeSubjectDrawer: () => {
        state.selectedSubjectId = null;
        document.getElementById('subject-drawer').classList.add('hidden');
      },
      openSettings: () => {
        document.getElementById('settings-modal').classList.remove('hidden');
      },
      closeSettings: () => {
        document.getElementById('settings-modal').classList.add('hidden');
      },
      signInWithGoogle: async () => {
        const provider = new GoogleAuthProvider();
        try {
          // If the user is currently anonymous, try linking their account so they don't lose data
          if (auth.currentUser && auth.currentUser.isAnonymous) {
             await linkWithPopup(auth.currentUser, provider);
             showToast("Successfully linked with Google!", "success");
          } else {
             await signInWithPopup(auth, provider);
             showToast("Signed in with Google", "success");
          }
          window.app.closeSettings();
        } catch (error) {
          if (error.code === 'auth/credential-already-in-use') {
             // Account exists, just sign them in (might drop local anonymous data if not merged)
             await signInWithPopup(auth, provider);
             showToast("Signed in with Google", "success");
             window.app.closeSettings();
          } else {
             console.error("Google Auth error:", error);
             showToast("Google Sign-In failed", "error");
          }
        }
      },
      logout: async () => {
        try { 
          await signOut(auth); 
          window.app.closeSettings();
        } catch (error) { 
          console.error(error); 
        }
      },
      handleBackup: () => {
        if (!state.subjects || state.subjects.length === 0) {
          showToast("No data to backup", "info");
          return;
        }
        try {
          const dataStr = JSON.stringify(state.subjects, null, 2);
          const blob = new Blob([dataStr], { type: "application/json" });
          const url = URL.createObjectURL(blob);
          const a = document.createElement('a');
          a.href = url;
          a.download = `studymaster_backup_${new Date().toISOString().split('T')[0]}.json`;
          document.body.appendChild(a);
          a.click();
          document.body.removeChild(a);
          URL.revokeObjectURL(url);
          showToast("Backup downloaded successfully", "success");
        } catch(error) {
          console.error(error);
          showToast("Failed to backup data", "error");
        }
      },
      handleRestore: (event) => {
        const file = event.target.files[0];
        if (!file || !state.user) return;
        const reader = new FileReader();
        reader.onload = async (e) => {
          try {
            const data = JSON.parse(e.target.result);
            if (!Array.isArray(data)) throw new Error("Invalid format");
            showToast("Restoring data...", "info");
            for (const subject of data) {
              const ref = doc(db, 'artifacts', appId, 'users', state.user.uid, 'subjects', subject.id);
              await setDoc(ref, subject);
            }
            showToast("Data restored successfully!", "success");
            window.app.closeSettings();
          } catch(err) {
            console.error(err);
            showToast("Failed to parse file", "error");
          }
          event.target.value = '';
        };
        reader.readAsText(file);
      },
      handleAddSubject: async (e) => {
        e.preventDefault();
        if (!state.user) return;
        const titleInput = document.getElementById('new-subject-title');
        const title = titleInput.value.trim();
        if (!title) return;

        const randomColor = colors[Math.floor(Math.random() * colors.length)];
        const newId = crypto.randomUUID();
        
        // Optimistic Update
        const newSubject = { id: newId, title: title, color: randomColor, units: [], createdAt: Date.now() };
        state.subjects.unshift(newSubject);
        window.app.closeAddSubjectModal();
        renderView();

        const subjectRef = doc(db, 'artifacts', appId, 'users', state.user.uid, 'subjects', newId);
        try {
          await setDoc(subjectRef, newSubject);
          showToast("Subject added successfully", "success");
        } catch (error) {
          console.error("Add error:", error);
          showToast("Failed to add subject", "error");
        }
      },
      deleteSubject: async (id) => {
        if (!state.user) return;
        
        // Optimistic Update
        state.subjects = state.subjects.filter(s => s.id !== id);
        window.app.closeSubjectDrawer();
        renderView();

        try {
          await deleteDoc(doc(db, 'artifacts', appId, 'users', state.user.uid, 'subjects', id));
          showToast("Subject deleted", "info");
        } catch (error) {
          console.error(error);
          showToast("Failed to delete", "error");
        }
      },
      handleAddUnit: async (e, subjectId) => {
        e.preventDefault();
        if (!state.user) return;
        const input = e.target.elements.unit;
        const title = input.value.trim();
        if (!title) return;

        const subject = state.subjects.find(s => s.id === subjectId);
        if (!subject) return;

        const newUnit = { id: crypto.randomUUID(), title: title, subunits: [] };
        const updatedUnits = [...(subject.units || []), newUnit];
        
        // Optimistic Update
        subject.units = updatedUnits;
        input.value = '';
        renderSubjectDrawer();

        const subjectRef = doc(db, 'artifacts', appId, 'users', state.user.uid, 'subjects', subjectId);
        try {
          await updateDoc(subjectRef, { units: updatedUnits });
        } catch (error) { console.error(error); }
      },
      deleteUnit: async (subjectId, unitId) => {
        if (!state.user) return;
        const subject = state.subjects.find(s => s.id === subjectId);
        if (!subject || !subject.units) return;

        const updatedUnits = subject.units.filter(u => u.id !== unitId);
        
        // Optimistic Update
        subject.units = updatedUnits;
        renderSubjectDrawer();

        const subjectRef = doc(db, 'artifacts', appId, 'users', state.user.uid, 'subjects', subjectId);
        try { await updateDoc(subjectRef, { units: updatedUnits }); } 
        catch (error) { console.error(error); }
      },
      handleAddSubunit: async (e, subjectId, unitId) => {
        e.preventDefault();
        if (!state.user) return;
        const input = e.target.elements.subunit;
        const title = input.value.trim();
        if (!title) return;

        const subject = state.subjects.find(s => s.id === subjectId);
        if (!subject || !subject.units) return;

        const newSubunit = { id: crypto.randomUUID(), title: title, completed: false };
        const updatedUnits = subject.units.map(u => 
          u.id === unitId ? { ...u, subunits: [...(u.subunits || []), newSubunit] } : u
        );

        // Optimistic Update
        subject.units = updatedUnits;
        input.value = '';
        renderSubjectDrawer();
        if (state.activeTab === 'dashboard') renderView();

        const subjectRef = doc(db, 'artifacts', appId, 'users', state.user.uid, 'subjects', subjectId);
        try { await updateDoc(subjectRef, { units: updatedUnits }); } 
        catch (error) { console.error(error); }
      },
      toggleSubunit: async (subjectId, unitId, subunitId) => {
        if (!state.user) return;
        const subject = state.subjects.find(s => s.id === subjectId);
        if (!subject || !subject.units) return;

        const updatedUnits = subject.units.map(u => 
          u.id === unitId ? {
            ...u, subunits: u.subunits.map(su => su.id === subunitId ? { ...su, completed: !su.completed } : su)
          } : u
        );

        // Optimistic Update
        subject.units = updatedUnits;
        renderSubjectDrawer();
        if (state.activeTab === 'dashboard') renderView();

        const subjectRef = doc(db, 'artifacts', appId, 'users', state.user.uid, 'subjects', subjectId);
        try { await updateDoc(subjectRef, { units: updatedUnits }); } 
        catch (error) { console.error(error); }
      },
      deleteSubunit: async (subjectId, unitId, subunitId) => {
        if (!state.user) return;
        const subject = state.subjects.find(s => s.id === subjectId);
        if (!subject || !subject.units) return;

        const updatedUnits = subject.units.map(u => 
          u.id === unitId ? { ...u, subunits: u.subunits.filter(su => su.id !== subunitId) } : u
        );

        // Optimistic Update
        subject.units = updatedUnits;
        renderSubjectDrawer();
        if (state.activeTab === 'dashboard') renderView();

        const subjectRef = doc(db, 'artifacts', appId, 'users', state.user.uid, 'subjects', subjectId);
        try { await updateDoc(subjectRef, { units: updatedUnits }); } 
        catch (error) { console.error(error); }
      }
    };

    // Initialize Auth (Allows "Guest Mode" via Anonymously if no token present)
    const initAuth = async () => {
      try {
        await auth.authStateReady(); // Wait for existing session to load
        if (auth.currentUser) return; // Prevent overwriting existing login

        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
          await signInWithCustomToken(auth, __initial_auth_token);
        } else {
          // If no formal auth, fallback to Anonymous "Guest Mode"
          await signInAnonymously(auth);
        }
      } catch (err) {
        console.error("Auth error:", err);
      }
    };
    
    // Render initial skeletons
    renderView();
    initAuth();

    onAuthStateChanged(auth, (user) => {
      state.user = user;
      
      if (user) {
        // Update user profile UI for Guest Mode vs Logged In
        const isGuest = user.isAnonymous;
        const userNameText = isGuest ? "Guest User" : "Logged Student";
        const emailText = isGuest ? "Local Guest Mode" : (user.email || "Authenticated");
        
        document.getElementById('desktop-user-name').textContent = userNameText;
        document.getElementById('desktop-user-email').textContent = emailText;
        document.getElementById('settings-name').textContent = userNameText;
        document.getElementById('settings-email').textContent = emailText;

        // Update settings modal block based on login status
        const signoutBlock = document.getElementById('signout-block');
        if (isGuest) {
          signoutBlock.innerHTML = `
            <button onclick="window.app.signInWithGoogle()" class="w-full flex items-center justify-center gap-2 bg-white border border-slate-200 text-slate-700 hover:bg-slate-50 font-medium py-2.5 px-4 rounded-xl transition-colors duration-200 shadow-sm mb-2">
              <svg class="w-5 h-5" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
              Sign in with Google
            </button>
          `;
        } else {
          signoutBlock.innerHTML = `
            <button onclick="window.app.logout()" class="w-full flex items-center justify-center gap-2 text-rose-600 hover:bg-rose-50 font-medium py-2.5 px-4 rounded-xl transition-colors duration-200 group">
              <i data-lucide="log-out" class="w-4 h-4 group-hover:-translate-x-1 transition-transform"></i> Sign Out
            </button>
          `;
          lucide.createIcons({ root: signoutBlock });
        }

        if (state.unsubscribeDb) state.unsubscribeDb();
        
        // Connect to Firestore using the matching path for your security rules
        const subjectsRef = collection(db, 'artifacts', appId, 'users', user.uid, 'subjects');
        
        state.unsubscribeDb = onSnapshot(subjectsRef, (snapshot) => {
          state.subjects = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
          state.subjects.sort((a, b) => b.createdAt - a.createdAt);
          
          // Data loaded, hide skeletons
          state.isLoading = false;
          renderView();
          
          if (state.selectedSubjectId) renderSubjectDrawer();
        }, (error) => {
          console.error("Firestore error:", error);
          showToast("Failed to sync data", "error");
          state.isLoading = false;
          renderView();
        });
      } else {
        if (state.unsubscribeDb) {
          state.unsubscribeDb();
          state.unsubscribeDb = null;
        }
        state.subjects = [];
        state.isLoading = true;
        renderView();
      }
    });

  </script>
</body>
</html>
