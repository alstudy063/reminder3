<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>StudyMaster Pro</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>

  <style>
    /* Custom Animations */
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes slideInFromBottom { from { transform: translateY(1rem); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    @keyframes slideInFromRight { from { transform: translateX(100%); } to { transform: translateX(0); } }
    @keyframes zoomIn { from { transform: scale(0.95); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    
    .animate-fade-in { animation: fadeIn 0.3s ease-out forwards; }
    .animate-slide-up { animation: slideInFromBottom 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
    .animate-slide-right { animation: slideInFromRight 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
    .animate-zoom-in { animation: zoomIn 0.2s cubic-bezier(0.16, 1, 0.3, 1) forwards; }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    
    .pb-safe { padding-bottom: env(safe-area-inset-bottom); }
  </style>
</head>
<body class="bg-slate-50 font-sans text-slate-900 overflow-hidden select-none md:select-auto">

  <div class="flex h-screen overflow-hidden relative">
    
    <!-- DESKTOP SIDEBAR -->
    <aside class="hidden md:flex w-72 flex-col bg-white border-r border-slate-200 z-10">
      <div class="p-6 flex items-center gap-3">
        <div class="bg-indigo-600 p-2 rounded-xl">
          <i data-lucide="graduation-cap" class="w-6 h-6 text-white"></i>
        </div>
        <h1 class="text-xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-indigo-600 to-purple-600">
          StudyMaster
        </h1>
      </div>
      
      <nav class="flex-1 px-4 py-6 space-y-2">
        <button onclick="handleSwitchTab('dashboard')" id="nav-desktop-dashboard" class="nav-btn w-full flex items-center gap-3 px-4 py-3 rounded-xl transition-all bg-indigo-50 text-indigo-700 font-semibold">
          <i data-lucide="layout-dashboard" class="w-5 h-5"></i>
          Dashboard
        </button>
        <button onclick="handleSwitchTab('subjects')" id="nav-desktop-subjects" class="nav-btn w-full flex items-center gap-3 px-4 py-3 rounded-xl transition-all text-slate-600 hover:bg-slate-50">
          <i data-lucide="book-open" class="w-5 h-5"></i>
          All Subjects
        </button>
      </nav>

      <div class="p-4 border-t border-slate-100">
        <button onclick="handleOpenSettings()" class="w-full flex items-center gap-3 p-3 mb-2 rounded-xl bg-slate-50 hover:bg-indigo-50 transition-colors group text-left">
          <div id="desktop-user-avatar" class="w-10 h-10 rounded-full bg-indigo-100 flex items-center justify-center text-indigo-700 font-bold group-hover:bg-indigo-200 transition-colors">U</div>
          <div class="flex-1 overflow-hidden">
            <p id="desktop-user-name" class="text-sm font-semibold text-slate-800 truncate">Student</p>
            <p id="desktop-user-email" class="text-xs text-slate-500 truncate">Tap for settings</p>
          </div>
          <i data-lucide="settings" class="w-4 h-4 text-slate-400 group-hover:text-indigo-600"></i>
        </button>
      </div>
    </aside>

    <!-- MAIN CONTENT AREA -->
    <main class="flex-1 flex flex-col h-full overflow-hidden relative">
      
      <!-- Mobile Header -->
      <header class="md:hidden flex items-center justify-between p-4 bg-white border-b border-slate-200 z-10">
        <div class="flex items-center gap-2">
          <div class="bg-indigo-600 p-1.5 rounded-lg">
            <i data-lucide="graduation-cap" class="w-5 h-5 text-white"></i>
          </div>
          <h1 class="text-lg font-bold text-slate-800">StudyMaster</h1>
        </div>
        <button onclick="handleOpenSettings()" class="flex items-center justify-center w-8 h-8 rounded-full bg-indigo-100 text-indigo-700 font-bold active:scale-95 transition-transform" id="mobile-user-avatar">
          U
        </button>
      </header>

      <!-- Scrollable Content -->
      <div class="flex-1 overflow-y-auto pb-24 md:pb-8" id="main-scroll-area">
        <div class="max-w-6xl mx-auto p-4 md:p-8">
          
          <div class="flex justify-between items-end mb-8">
            <div>
              <h2 id="page-title" class="text-2xl md:text-3xl font-bold text-slate-900">Overview</h2>
              <p id="page-subtitle" class="text-slate-500 mt-1">Let's track your progress today.</p>
            </div>
            <button onclick="handleOpenAddSubjectModal()" class="hidden md:flex items-center gap-2 bg-indigo-600 hover:bg-indigo-700 text-white px-5 py-2.5 rounded-xl font-medium transition-all shadow-sm shadow-indigo-200 hover:shadow-md hover:-translate-y-0.5">
              <i data-lucide="plus" class="w-5 h-5"></i>
              Add Subject
            </button>
          </div>

          <div id="view-container"></div>
        </div>
      </div>

      <!-- Floating Action Button (Mobile) -->
      <button onclick="handleOpenAddSubjectModal()" class="md:hidden absolute bottom-24 right-4 w-14 h-14 bg-indigo-600 text-white rounded-full flex items-center justify-center shadow-lg shadow-indigo-200 active:scale-95 transition-transform z-20">
        <i data-lucide="plus" class="w-6 h-6"></i>
      </button>

    </main>

    <!-- MOBILE BOTTOM NAV -->
    <nav class="md:hidden fixed bottom-0 w-full bg-white border-t border-slate-100 flex justify-around p-3 pb-safe z-30 shadow-[0_-4px_20px_rgba(0,0,0,0.02)]">
      <button onclick="handleSwitchTab('dashboard')" id="nav-mobile-dashboard" class="nav-btn flex flex-col items-center p-2 rounded-xl transition-colors text-indigo-600">
        <i data-lucide="layout-dashboard" class="w-6 h-6 mb-1"></i>
        <span class="text-[10px] font-medium">Overview</span>
      </button>
      <button onclick="handleSwitchTab('subjects')" id="nav-mobile-subjects" class="nav-btn flex flex-col items-center p-2 rounded-xl transition-colors text-slate-400">
        <i data-lucide="book-open" class="w-6 h-6 mb-1"></i>
        <span class="text-[10px] font-medium">Subjects</span>
      </button>
    </nav>
  </div>

  <!-- MODALS -->
  <div id="subject-drawer" class="fixed inset-0 z-40 flex justify-end hidden">
    <div class="absolute inset-0 bg-slate-900/20 backdrop-blur-sm transition-opacity" onclick="handleCloseSubjectDrawer()"></div>
    <div class="relative w-full md:w-[450px] max-w-lg h-full bg-white shadow-2xl flex flex-col animate-slide-right">
      <div id="drawer-content" class="flex flex-col h-full"></div>
    </div>
  </div>

  <div id="add-subject-modal" class="fixed inset-0 z-50 flex items-center justify-center p-4 hidden">
    <div class="absolute inset-0 bg-slate-900/20 backdrop-blur-sm" onclick="handleCloseAddSubjectModal()"></div>
    <div class="relative bg-white rounded-3xl shadow-xl w-full max-w-sm p-6 animate-zoom-in">
      <div class="flex justify-between items-center mb-6">
        <h2 class="text-xl font-bold text-slate-800">New Subject</h2>
        <button onclick="handleCloseAddSubjectModal()" class="text-slate-400 hover:bg-slate-100 p-2 rounded-full transition-colors">
          <i data-lucide="x" class="w-5 h-5"></i>
        </button>
      </div>
      <form id="add-subject-form">
        <div class="mb-6">
          <label class="block text-sm font-medium text-slate-500 mb-2">Subject Title</label>
          <input type="text" id="new-subject-title" placeholder="e.g. Mathematics, History" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:bg-white transition-all" required />
        </div>
        <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-3 rounded-xl transition-colors shadow-md shadow-indigo-200">
          Create Subject
        </button>
      </form>
    </div>
  </div>

  <div id="settings-modal" class="fixed inset-0 z-50 flex items-center justify-center p-4 hidden">
    <div class="absolute inset-0 bg-slate-900/20 backdrop-blur-sm" onclick="handleCloseSettings()"></div>
    <div class="relative bg-white rounded-3xl shadow-xl w-full max-w-md animate-zoom-in flex flex-col max-h-[90vh]">
      <div class="flex justify-between items-center p-6 border-b border-slate-100">
        <h2 class="text-xl font-bold text-slate-800 flex items-center gap-2">
          <i data-lucide="settings" class="w-5 h-5 text-indigo-600"></i> Settings
        </h2>
        <button onclick="handleCloseSettings()" class="text-slate-400 hover:bg-slate-100 p-2 rounded-full transition-colors">
          <i data-lucide="x" class="w-5 h-5"></i>
        </button>
      </div>
      <div class="p-6 overflow-y-auto space-y-8 flex-1">
        <section>
          <h3 class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-3">Account</h3>
          <div class="bg-slate-50 border border-slate-100 rounded-2xl p-4">
            <div class="flex items-center gap-4 mb-4">
              <div id="settings-avatar" class="w-12 h-12 rounded-full bg-indigo-100 flex items-center justify-center text-indigo-700 font-bold text-lg">U</div>
              <div>
                <p id="settings-name" class="font-bold text-slate-800">Guest User</p>
                <p id="settings-email" class="text-sm text-slate-500">Local Session Only</p>
              </div>
            </div>
            <div id="google-signin-block" class="mt-4 pt-4 border-t border-slate-200 hidden">
              <button onclick="window.handleGoogleSignIn()" class="w-full flex items-center justify-center gap-3 bg-white border border-slate-300 hover:bg-slate-50 text-slate-700 font-medium py-2.5 px-4 rounded-xl shadow-sm transition-colors">
                Sign in with Google
              </button>
            </div>
            <div id="signout-block" class="mt-4 pt-4 border-t border-slate-200 hidden">
              <button onclick="window.handleLogout()" class="w-full flex items-center justify-center gap-2 text-rose-600 hover:bg-rose-50 font-medium py-2 px-4 rounded-xl transition-colors">
                Sign Out
              </button>
            </div>
          </div>
        </section>
      </div>
    </div>
  </div>

  <div id="toast" class="fixed top-4 right-4 z-[70] transition-all duration-300 transform -translate-y-full opacity-0 pointer-events-none">
    <div id="toast-content" class="flex items-center gap-3 px-4 py-3 rounded-2xl shadow-lg border bg-white border-slate-100 text-slate-700">
      <i id="toast-icon" data-lucide="info" class="w-5 h-5"></i>
      <span id="toast-message" class="font-medium text-sm">Message</span>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js';
    import { getAuth, signInAnonymously, onAuthStateChanged, signOut, GoogleAuthProvider, signInWithPopup, linkWithPopup } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js';
    import { getFirestore, collection, doc, setDoc, deleteDoc, onSnapshot, updateDoc } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js';

    lucide.createIcons();

    const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : { projectId: "demo-project" };
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const appId = typeof __app_id !== 'undefined' ? __app_id : 'studymaster-v2';

    const state = {
      user: null,
      subjects: [],
      activeTab: 'dashboard',
      selectedSubjectId: null,
      unsubscribeDb: null
    };

    const colors = ['bg-blue-500', 'bg-indigo-500', 'bg-purple-500', 'bg-emerald-500', 'bg-rose-500', 'bg-amber-500'];

    function showToast(message, type = 'info') {
      const toast = document.getElementById('toast');
      const toastMessage = document.getElementById('toast-message');
      toastMessage.textContent = message;
      toast.classList.remove('-translate-y-full', 'opacity-0');
      toast.classList.add('translate-y-0', 'opacity-100');
      setTimeout(() => {
        toast.classList.remove('translate-y-0', 'opacity-100');
        toast.classList.add('-translate-y-full', 'opacity-0');
      }, 3000);
    }

    function calculateProgress(subject) {
      let total = 0, completed = 0;
      if (subject.units) {
        subject.units.forEach(u => {
          if (u.subunits) {
            total += u.subunits.length;
            completed += u.subunits.filter(su => su.completed).length;
          }
        });
      }
      return total === 0 ? 0 : Math.round((completed / total) * 100);
    }

    function renderView() {
      const container = document.getElementById('view-container');
      
      // Update Nav Visuals
      document.querySelectorAll('.nav-btn').forEach(btn => {
        const isActive = btn.id.includes(state.activeTab);
        if (btn.id.startsWith('nav-desktop')) {
          btn.className = isActive 
            ? 'nav-btn w-full flex items-center gap-3 px-4 py-3 rounded-xl transition-all bg-indigo-50 text-indigo-700 font-semibold'
            : 'nav-btn w-full flex items-center gap-3 px-4 py-3 rounded-xl transition-all text-slate-600 hover:bg-slate-50';
        } else {
          btn.className = isActive
            ? 'nav-btn flex flex-col items-center p-2 rounded-xl transition-colors text-indigo-600'
            : 'nav-btn flex flex-col items-center p-2 rounded-xl transition-colors text-slate-400';
        }
      });

      if (state.activeTab === 'dashboard') {
        container.innerHTML = `<div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
          ${state.subjects.map(s => `
            <div onclick="handleOpenSubjectDrawer('${s.id}')" class="bg-white p-5 rounded-3xl border border-slate-100 shadow-sm cursor-pointer hover:shadow-md transition-all">
              <h3 class="font-bold text-slate-800">${s.title}</h3>
              <p class="text-sm text-slate-500 mt-1">${calculateProgress(s)}% Complete</p>
            </div>
          `).join('')}
        </div>`;
      } else {
        container.innerHTML = `<div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
           ${state.subjects.map(s => `<div onclick="handleOpenSubjectDrawer('${s.id}')" class="bg-white p-5 rounded-3xl border border-slate-100 shadow-sm cursor-pointer">
              <h3 class="font-bold text-slate-800">${s.title}</h3>
           </div>`).join('')}
        </div>`;
      }
      lucide.createIcons();
    }

    function renderSubjectDrawer() {
      const subject = state.subjects.find(s => s.id === state.selectedSubjectId);
      if (!subject) return;
      const content = document.getElementById('drawer-content');
      content.innerHTML = `
        <div class="p-6 border-b border-slate-100 flex justify-between items-center">
          <h2 class="text-xl font-bold">${subject.title}</h2>
          <button onclick="handleCloseSubjectDrawer()"><i data-lucide="x"></i></button>
        </div>
        <div class="p-6 overflow-y-auto flex-1">
          <form onsubmit="handleAddUnit(event, '${subject.id}')" class="flex gap-2">
            <input name="unit" class="flex-1 bg-slate-50 border p-2 rounded-lg" placeholder="New unit name" required/>
            <button class="bg-indigo-600 text-white px-4 rounded-lg">+</button>
          </form>
          <div class="mt-6 space-y-4">
            ${(subject.units || []).map(u => `
              <div class="bg-slate-50 p-4 rounded-xl">
                <div class="flex justify-between">
                  <span class="font-bold">${u.title}</span>
                  <button onclick="handleDeleteUnit('${subject.id}', '${u.id}')" class="text-rose-500"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                </div>
              </div>
            `).join('')}
          </div>
        </div>
      `;
      lucide.createIcons();
    }

    // Expose functions to window for onclick handlers
    window.handleSwitchTab = (tab) => {
      state.activeTab = tab;
      renderView();
    };

    window.handleOpenAddSubjectModal = () => document.getElementById('add-subject-modal').classList.remove('hidden');
    window.handleCloseAddSubjectModal = () => document.getElementById('add-subject-modal').classList.add('hidden');
    window.handleOpenSettings = () => document.getElementById('settings-modal').classList.remove('hidden');
    window.handleCloseSettings = () => document.getElementById('settings-modal').classList.add('hidden');
    
    window.handleOpenSubjectDrawer = (id) => {
      state.selectedSubjectId = id;
      renderSubjectDrawer();
      document.getElementById('subject-drawer').classList.remove('hidden');
    };
    window.handleCloseSubjectDrawer = () => {
      state.selectedSubjectId = null;
      document.getElementById('subject-drawer').classList.add('hidden');
    };

    window.handleAddUnit = async (e, sid) => {
      e.preventDefault();
      const title = e.target.unit.value;
      const subject = state.subjects.find(s => s.id === sid);
      const units = [...(subject.units || []), { id: crypto.randomUUID(), title, subunits: [] }];
      await updateDoc(doc(db, 'artifacts', appId, 'users', state.user.uid, 'subjects', sid), { units });
      e.target.reset();
    };

    window.handleDeleteUnit = async (sid, uid) => {
      const subject = state.subjects.find(s => s.id === sid);
      const units = subject.units.filter(u => u.id !== uid);
      await updateDoc(doc(db, 'artifacts', appId, 'users', state.user.uid, 'subjects', sid), { units });
    };

    document.getElementById('add-subject-form').onsubmit = async (e) => {
      e.preventDefault();
      const title = document.getElementById('new-subject-title').value;
      const id = crypto.randomUUID();
      await setDoc(doc(db, 'artifacts', appId, 'users', state.user.uid, 'subjects', id), {
        title, color: colors[0], units: [], createdAt: Date.now()
      });
      window.handleCloseAddSubjectModal();
    };

    onAuthStateChanged(auth, (user) => {
      state.user = user;
      if (user) {
        document.getElementById('google-signin-block').classList.toggle('hidden', !user.isAnonymous);
        document.getElementById('signout-block').classList.toggle('hidden', user.isAnonymous);
        
        if (state.unsubscribeDb) state.unsubscribeDb();
        const ref = collection(db, 'artifacts', appId, 'users', user.uid, 'subjects');
        state.unsubscribeDb = onSnapshot(ref, (snap) => {
          state.subjects = snap.docs.map(d => ({ id: d.id, ...d.data() }));
          renderView();
          if (state.selectedSubjectId) renderSubjectDrawer();
        });
      }
    });

    signInAnonymously(auth);

  </script>
</body>
</html>
